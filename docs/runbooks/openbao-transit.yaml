# Stage 1 — Transit seal-provider OpenBao (openbao-transit).
# Derived from openbao.yaml: single replica, DEV static toy seal, openbao-retain
# storageClass, tls_disable=1 (internal-only seal provider). Flux HelmRelease +
# HelmRepository, reconciled by Cozystack flux.
apiVersion: v1
kind: Namespace
metadata:
  name: openbao
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openbao
  namespace: openbao
spec:
  interval: 1h
  url: https://openbao.github.io/openbao-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao-transit
  namespace: openbao
spec:
  interval: 30m
  releaseName: openbao-transit
  chart:
    spec:
      chart: openbao
      version: "0.28.4"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: openbao
  values:
    server:
      image:
        repository: openbao/openbao
        tag: "2.5.4"
      ha:
        enabled: true
        replicas: 1
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true
            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
            }
            storage "raft" {
              path = "/openbao/data"
            }
            seal "static" {
              current_key_id = "dev-toy-v1"
              current_key    = "Z3VhcmRpYW4tZGV2LXRveS1zZWFsLWtleS0wMDAwMDA="
            }
            service_registration "kubernetes" {}
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: openbao-retain
