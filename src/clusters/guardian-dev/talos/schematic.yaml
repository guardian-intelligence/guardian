# Talos Image Factory schematic for ash-bm-001.
# Static addressing is baked into the maintenance boot assets because Latitude
# assigns the host address without DHCP.
customization:
  extraKernelArgs:
    - ip=206.223.228.101::206.223.228.100:255.255.255.254::enp1s0f1:off
    - console=ttyS1,115200n8
  systemExtensions:
    officialExtensions:
      - siderolabs/zfs
