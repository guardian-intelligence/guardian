# Dev host facts consumed before Kubernetes exists. Paths are repo-root
# relative; run guardian from the repo root.
host: ash-bm-001
environment: dev

provider:
  name: latitude
  serverId: sv_vAPXaMxKM5epz
  metro: ash
  plan: f4.metal.small

cluster:
  name: guardian-dev
  endpoint: https://206.223.228.101:6443

node:
  address: 206.223.228.101
  hostname: gi-ash-dev-platform-01
  # Latitude assigns the address statically (no DHCP): /31 point-to-point
  # with the gateway on the paired address.
  prefixLength: 31
  gateway: 206.223.228.100
  # The external X550 port, selected by MAC. Never select by name: names are
  # derived per kernel policy and per board.
  interfaceMac: "90:5a:08:33:ba:9f"
  # Two identical 894GB Micron NVMes, distinguishable only by serial.
  installDiskSerial: "362510FCEFB8" # nvme0n1, Talos system disk
  zfsDiskSerial: "362510FD7C47" # nvme1n1, reserved for the ZFS pool

storage:
  pools:
    - name: guardian
      type: zfs
      role: product-workloads
      deviceSerials:
        - "362510FD7C47"
      wipePolicy: never
      mountpoint: /var/mnt/guardian

talos:
  schematic: src/hosts/ash-bm-001/talos/schematic.yaml
  patches:
    - src/hosts/ash-bm-001/talos/patches/single-node.yaml
    - src/hosts/ash-bm-001/talos/patches/registry-mirror.yaml
    - src/hosts/ash-bm-001/talos/patches/image-cache.yaml
    - src/hosts/ash-bm-001/talos/patches/zfs-module.yaml
    - src/hosts/ash-bm-001/talos/patches/cni-none.yaml
    # Gateway API CRDs MUST stay listed above cilium: list order is
    # inlineManifests order, and the CRDs have to exist before the Cilium
    # render that watches them.
    - src/infrastructure-components/cilium/talos/gateway-api-crds-inline.yaml
    # Shared generated render, deliberately not copied per host: one Cilium
    # version across the fleet, one Bazel target to update on upgrade.
    - src/infrastructure-components/cilium/talos/cilium-inline.yaml
    - src/hosts/ash-bm-001/talos/patches/ingress-firewall.yaml
