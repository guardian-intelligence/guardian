# Serve image pulls from the on-disk IMAGECACHE partition (registryd on
# 127.0.0.1:3172, injected as the first mirror for every registry). The
# 4GiB ext4 partition labeled IMAGECACHE survives `down` (STATE,EPHEMERAL
# wipe); a --wipe-mode all or reinstall destroys it and it must be refilled
# (talosctl image cache-create --layout flat; see drill runbook). Without
# this feature flag the partition is ignored entirely — and a converge with
# the flag but no partition fails closed by design.
machine:
  features:
    imageCache:
      localEnabled: true
