# Load the ZFS kernel module at boot. The siderolabs/zfs extension ships the
# module but does not load it; its ext-zfs-service waits for /dev/zfs, and
# startAllServices waits for the service — so without this declaration the
# boot sequence never completes and Talos reboot-retries forever (~75 min
# cycle, found live on gamma+prod 2026-06-11). Dev booted only because the
# kernel's devname alias auto-loaded the module — luck, not config. Declared
# here so dev's stability is reproducible from source, not accidental.
machine:
  kernel:
    modules:
      - name: zfs
