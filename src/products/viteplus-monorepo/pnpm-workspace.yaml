packages:
  - apps/*
  - packages/*
allowBuilds:
  esbuild: true
  protobufjs: true
blockExoticSubdeps: true

catalog:
  "@bufbuild/protobuf": 2.12.1
  "@bufbuild/protoc-gen-es": 2.12.1
  "@changesets/cli": 2.31.0
  "@changesets/read": 0.6.7
  "@chenglou/pretext": 0.0.8
  "@connectrpc/connect": 2.1.2
  "@connectrpc/connect-web": 2.1.2
  "@manypkg/get-packages": 1.1.3
  "@opentelemetry/api": 1.9.1
  "@resvg/resvg-js": 2.6.2
  "@sigstore/bundle": 5.0.0
  "@tailwindcss/vite": ^4
  # Exact TanStack pins are intentional. Move them as a reviewed set with
  # lockfile evidence because install-time malware has landed in this family.
  "@tanstack/react-router": 1.168.10
  "@tanstack/react-start": 1.167.16
  "@tanstack/router-generator": 1.166.24
  "@types/d3-scale": 4.0.9
  "@types/d3-shape": 3.1.8
  "@types/node": ^22.19.17
  "@types/react": ^19
  "@types/react-dom": ^19
  "@types/three": 0.184.0
  "@vitejs/plugin-react": ^6.0.1
  d3-scale: 4.0.2
  d3-shape: 3.2.0
  effect: 3.21.3
  gray-matter: 4.0.3
  lucide-react: 1.8.0
  marked: 15.0.12
  nitro: ^3.0.260311-beta
  npm: 11.17.0
  react: ^19.0.0
  react-dom: ^19.0.0
  sigstore: 5.0.0
  tailwindcss: ^4
  three: 0.184.0
  tsx: 4.21.0
  typescript: ^5.9.3
  valibot: 1.3.1
  # Pinned to specific versions so the on-host Verdaccio mirror does not
  # have to keep up with @latest publish drift on every install.
  vite: npm:@voidzero-dev/vite-plus-core@0.1.19
  vite-plus: 0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.16
  web-vitals: 4.2.4

catalogMode: prefer
dangerouslyAllowAllBuilds: false

minimumReleaseAge: 4320
onlyBuiltDependencies:
  - "@resvg/resvg-js"
  - esbuild
  - protobufjs

overrides:
  vite: "catalog:"
  vitest: "catalog:"

packageExtensions:
  "@voidzero-dev/vite-plus-core@*":
    dependencies:
      picomatch: 4.0.4
packageManagerStrict: true
packageManagerStrictVersion: true

patchedDependencies:
  srvx@0.11.15: patches/srvx@0.11.15.patch

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
strictDepBuilds: true
trustPolicy: no-downgrade
# The downgrade check exists to catch fresh package takeovers; pre-provenance
# versions that have sat unflagged for a year (semver@6.3.1, undici-types) are
# not live incidents. 525600 minutes = 365 days.
trustPolicyIgnoreAfter: 525600
verifyDepsBeforeRun: error
minimumReleaseAgeExclude:
  # Renovate security update: pnpm@11.8.0
  - pnpm@11.8.0
