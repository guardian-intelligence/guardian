packages:
  - apps/*
  - packages/*
allowBuilds:
  esbuild: true
  protobufjs: true
blockExoticSubdeps: true

catalog:
  "@actions/core": 3.0.1
  "@bufbuild/protobuf": 2.12.1
  "@bufbuild/protoc-gen-es": 2.12.1
  "@changesets/cli": 2.31.1
  "@changesets/read": 0.6.7
  "@chenglou/pretext": 0.0.8
  "@connectrpc/connect": 2.1.2
  "@connectrpc/connect-web": 2.1.2
  "@manypkg/get-packages": 1.1.3
  "@opentelemetry/api": 1.9.1
  "@resvg/resvg-js": 2.6.2
  "@sigstore/bundle": 5.0.0
  "@tailwindcss/vite": ^4
  # Exact TanStack pins are intentional. Move them as a reviewed set with
  # lockfile evidence because install-time malware has landed in this family.
  "@tanstack/react-router": 1.170.18
  "@tanstack/react-start": 1.168.28
  "@tanstack/router-generator": 1.167.19
  "@types/d3-scale": 4.0.9
  "@types/d3-shape": 3.1.8
  "@types/node": ^22.19.17
  "@types/react": ^19
  "@types/react-dom": ^19
  "@types/three": 0.185.1
  "@vitejs/plugin-react": ^6.0.1
  d3-scale: 4.0.2
  d3-shape: 3.2.0
  effect: 3.21.4
  gray-matter: 4.0.3
  lucide-react: 1.24.0
  marked: 15.0.12
  nitro: 3.0.260610-beta
  npm: 11.18.0
  react: ^19.0.0
  react-dom: ^19.0.0
  sigstore: 5.0.0
  tailwindcss: ^4
  three: 0.185.1
  tsx: 4.23.1
  typescript: ^5.9.3
  valibot: 1.4.2
  # Pinned to specific versions so the on-host Verdaccio mirror does not
  # have to keep up with @latest publish drift on every install.
  vite: npm:@voidzero-dev/vite-plus-core@0.2.4
  vite-plus: 0.2.4
  vitest: 4.1.10
  web-vitals: 4.2.4

catalogMode: prefer
dangerouslyAllowAllBuilds: false

minimumReleaseAge: 4320
onlyBuiltDependencies:
  - "@resvg/resvg-js"
  - esbuild
  - protobufjs

overrides:
  "@babel/core@<=7.29.0": 7.29.7
  "esbuild@>=0.27.3 <0.28.1": 0.28.1
  "js-yaml@<3.15.0": 3.15.0
  "js-yaml@>=4.0.0 <4.2.0": 4.3.0
  vite: "catalog:"
  "vite@>=8.0.0 <=8.0.15": 8.1.5
  vitest: "catalog:"

packageExtensions:
  "@voidzero-dev/vite-plus-core@*":
    dependencies:
      picomatch: 4.0.4
packageManagerStrict: true
packageManagerStrictVersion: true

patchedDependencies:
  srvx@0.11.21: patches/srvx@0.11.21.patch

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
strictDepBuilds: true
trustPolicy: no-downgrade
# The downgrade check exists to catch fresh package takeovers; pre-provenance
# versions that have sat unflagged for a year (semver@6.3.1, undici-types) are
# not live incidents. 525600 minutes = 365 days.
trustPolicyIgnoreAfter: 525600
verifyDepsBeforeRun: error
