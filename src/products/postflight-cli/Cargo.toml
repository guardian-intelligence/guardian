[package]
name = "postflight-cli"
version = "0.1.0"
edition = "2024"
rust-version = "1.97"
publish = false

[[bin]]
name = "postflight"
path = "src/main.rs"

[dependencies]
base64 = "0.22"
clap = { version = "4.5", features = ["derive", "env"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
ureq = { version = "3.1", features = ["json"] }
