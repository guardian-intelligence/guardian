syntax = "proto3";

package guardian.products.aisucks.v1;

import "guardian/policy/v1/policy.proto";

option go_package = "github.com/guardian-intelligence/guardian/src/products/aisucks/api/guardian/products/aisucks/v1;aisucksv1";

service AisucksService {
  rpc Health(HealthRequest) returns (HealthResponse) {
    option (guardian.policy.v1.operation) = {
      auth: AUTH_REQUIREMENT_NONE
      audit_level: AUDIT_LEVEL_OPERATIONAL
      risk_tier: RISK_TIER_LOW
      max_request_bytes: 1024
      rate_limit: {
        requests: 60
        window: "1m"
      }
      idempotency: IDEMPOTENCY_IDEMPOTENT
    };
  }
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
  string service = 2;
  string version = 3;
  repeated string capabilities = 4;
}
