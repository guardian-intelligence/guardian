# The rendered tree is compliant by construction, so the deny side of this
# policy only exists here: an app CR outside tenant-* must be rejected, or a
# hand-applied CR wedges its HelmRelease on a missing cozystack-values Secret.
policy: guardian-cozystack-app-tenant-namespace
cases:
  - name: app CR in a tenant namespace
    resource: {group: apps.cozystack.io, version: v1, resource: postgreses}
    object:
      apiVersion: apps.cozystack.io/v1
      kind: Postgres
      metadata: {name: some-db, namespace: tenant-guardian}
    expect: allow
  - name: app CR outside tenant namespaces
    resource: {group: apps.cozystack.io, version: v1, resource: postgreses}
    object:
      apiVersion: apps.cozystack.io/v1
      kind: Postgres
      metadata: {name: orphan-db, namespace: guardian-analytics}
    expect: deny
