apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-app-secrets
  labels:
    app.kubernetes.io/name: github-integrations
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: github-integrations
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao-github-integrations
  labels:
    app.kubernetes.io/name: github-integrations
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: github-integrations
spec:
  provider:
    vault:
      server: http://openbao-guardian.tenant-guardian-kms.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-github-integrations
          serviceAccountRef:
            name: github-app-secrets
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-app-secrets
  labels:
    app.kubernetes.io/name: github-integrations
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: github-integrations
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: openbao-github-integrations
  target:
    name: github-app-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: github-app-private-key
      remoteRef:
        key: guardian/guardian-mgmt/integrations/github/app
        property: private_key
    - secretKey: github-webhook-secret
      remoteRef:
        key: guardian/guardian-mgmt/integrations/github/app
        property: webhook_secret
    - secretKey: github-oauth-client-secret
      remoteRef:
        key: guardian/guardian-mgmt/integrations/github/app
        property: oauth_client_secret
