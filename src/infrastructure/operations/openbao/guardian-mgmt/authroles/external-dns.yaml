apiVersion: openbao.guardian.dev/v1alpha1
kind: OpenBaoKubernetesAuthRole
metadata:
  name: external-dns
spec:
  backendPath: kubernetes
  roleName: guardian-external-dns
  boundServiceAccountNames:
    - external-dns-secrets
  boundServiceAccountNamespaces:
    - external-dns
  audience: openbao
  tokenPolicies:
    - guardian-external-dns
  tokenTTL: "3600"
  tokenMaxTTL: "3600"
  deletionPolicy: Retain
