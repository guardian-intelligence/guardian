apiVersion: openbao.guardian.dev/v1alpha1
kind: OpenBaoAuthBackend
metadata:
  name: kubernetes
spec:
  path: kubernetes
  type: kubernetes
  description: Kubernetes service account auth for guardian-mgmt workloads.
  kubernetes:
    kubernetesHost: https://kubernetes.default.svc:443
    disableISSValidation: true
  tune:
    defaultLeaseTTL: 15m
    maxLeaseTTL: 1h
    listingVisibility: hidden
  deletionPolicy: Retain
