apiVersion: apps.cozystack.io/v1alpha1
kind: Harbor
metadata:
  name: oci
  namespace: tenant-root
spec:
  host: oci.guardianintelligence.org
  storageClass: replicated-retain
  database:
    replicas: 2
    size: 10Gi
  redis:
    replicas: 2
    size: 2Gi
  core:
    resourcesPreset: t1.small
  registry:
    resourcesPreset: t1.small
  jobservice:
    resourcesPreset: t1.nano
  trivy:
    enabled: true
    size: 10Gi
    resourcesPreset: t1.nano
