apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: ledger
  namespace: tenant-root
spec:
  replicas: 2
  shards: 1
  storageClass: replicated
  size: 100Gi
  logStorageSize: 10Gi
  logTTL: 15
  resourcesPreset: t1.medium
  users:
    guardian_evidence: {}
  clickhouseKeeper:
    enabled: true
    replicas: 3
    size: 5Gi
    resourcesPreset: t1.micro
  backup:
    enabled: true
    # The Altinity BackupClass strategy calls the chart-emitted sidecar. The
    # Secret is minted during secret-zero seeding; see the inventory backup
    # contract for required keys.
    s3PathOverride: gm/ch/ledger
    s3CredentialsSecret:
      name: guardian-r2-db-backups
      bucketKey: bucketName
      endpointKey: endpoint
      regionKey: region
      accessKeyIDKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
