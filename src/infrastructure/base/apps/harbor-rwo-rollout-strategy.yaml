# Server-side apply patch for the Cozystack-generated Harbor child release.
# Harbor jobservice and registry use RWO volumes. The chart accepts Recreate
# rollout values but still renders rollingUpdate, so remove that field after
# rendering to keep upgrades valid and avoid multi-attach deadlocks.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor-guardian-system
  namespace: tenant-root
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: harbor-guardian-jobservice
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: harbor-guardian-jobservice
              spec:
                strategy:
                  type: Recreate
                  rollingUpdate: null
          - target:
              group: apps
              version: v1
              kind: Deployment
              name: harbor-guardian-registry
            patch: |-
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: harbor-guardian-registry
              spec:
                strategy:
                  type: Recreate
                  rollingUpdate: null
  values:
    harbor:
      updateStrategy:
        type: Recreate
