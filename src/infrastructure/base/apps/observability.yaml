# Root tenant observability hub for management-cluster infrastructure.
apiVersion: apps.cozystack.io/v1alpha1
kind: Monitoring
metadata:
  name: monitoring
  namespace: tenant-root
spec:
  host: guardianintelligence.org
  metricsStorages:
    - name: shortterm
      retentionPeriod: 3d
      deduplicationInterval: 15s
      storage: 5Gi
      storageClassName: replicated
      vminsert:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmselect:
        minAllowed:
          cpu: 250m
          memory: 128Mi
        maxAllowed:
          cpu: "2"
          memory: 512Mi
      # Floor raised after 2026-07-07: a vmstorage admitted at the VPA's
      # low-water recommendation (200m CPU) throttled into a silent
      # ingestion stall — writes 2XX'd and spooled while half of new
      # series never became queryable. The floor must carry the live
      # scrape load on its own; the ceiling leaves OOM headroom for
      # series-registration storms (mass pod churn).
      vmstorage:
        minAllowed:
          cpu: 250m
          memory: 1Gi
        maxAllowed:
          cpu: "1"
          memory: 2Gi
    - name: longterm
      retentionPeriod: 14d
      deduplicationInterval: 5m
      storage: 10Gi
      storageClassName: replicated
      vminsert:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmselect:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmstorage:
        minAllowed:
          cpu: 50m
          memory: 256Mi
        maxAllowed:
          cpu: 500m
          memory: 1Gi
  logsStorages:
    - name: generic
      retentionPeriod: "3"
      storage: 5Gi
      storageClassName: replicated
  grafana:
    db:
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  alerta:
    storage: 2Gi
    storageClassName: replicated
    alerts:
      # Not a Slack credential — the in-cluster alert-relay's URL. Alerta's
      # slack plugin emits Slack-webhook-format JSON; the relay converts it
      # to ntfy (deployments/alerting/). The schema requires only `url`.
      slack:
        url: http://alert-relay.tenant-root.svc:8080/slack
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
  vmagent:
    externalLabels:
      cluster: guardian-mgmt
      guardian_tenant: root
    remoteWrite:
      urls:
        - http://vminsert-shortterm:8480/insert/0/prometheus
        - http://vminsert-longterm:8480/insert/0/prometheus
