# Root tenant observability hub for management-cluster infrastructure.
apiVersion: apps.cozystack.io/v1alpha1
kind: Monitoring
metadata:
  name: monitoring
  namespace: tenant-root
spec:
  host: guardianintelligence.org
  metricsStorages:
    - name: shortterm
      retentionPeriod: 3d
      deduplicationInterval: 1s
      # Incident-scale Kubernetes churn creates millions of fresh series per
      # day; the retention window must fit without forcing vmstorage read-only.
      storage: 20Gi
      storageClassName: replicated-encrypted
      vminsert:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      # Floor raised 2026-07-08: shortterm vmselect serves every 30s vmalert
      # evaluation and ran at 40% CFS throttle for a week (CPUThrottlingHigh's
      # top chronic offender). Query bursts truncated by the limit never show
      # up in the VPA's usage percentiles, so it cannot raise the bound on its
      # own — the same trap as the vmstorage floor below.
      vmselect:
        minAllowed:
          cpu: 500m
          memory: 128Mi
        maxAllowed:
          cpu: "2"
          memory: 512Mi
      # Floor raised after 2026-07-07: a vmstorage admitted at the VPA's
      # low-water recommendation (200m CPU) throttled into a silent
      # ingestion stall — writes 2XX'd and spooled while half of new
      # series never became queryable. The floor must carry the live
      # scrape load on its own; the ceiling leaves OOM headroom for
      # series-registration storms (mass pod churn).
      vmstorage:
        minAllowed:
          cpu: 250m
          memory: 1Gi
        maxAllowed:
          cpu: "1"
          memory: 2Gi
    - name: longterm
      retentionPeriod: 14d
      deduplicationInterval: 1m
      # Minute-level deduplication lowers sample volume but not series-index
      # cardinality, so this tier needs the same index headroom.
      storage: 20Gi
      storageClassName: replicated-encrypted
      vminsert:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmselect:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmstorage:
        minAllowed:
          cpu: 50m
          memory: 256Mi
        maxAllowed:
          cpu: 500m
          memory: 1Gi
  logsStorages:
    - name: generic
      # The operator API expresses month retention as a bare integer.
      retentionPeriod: "3"
      # 5Gi hit 88% during the 2026-07-07 incident day (x509 error storms
      # + cluster-wide pod churn); an incident's own log flood must never
      # take out the observability needed to debug it.
      storage: 15Gi
      storageClassName: replicated-encrypted
  grafana:
    db:
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  alerta:
    storage: 2Gi
    storageClassName: replicated-encrypted
    alerts:
      # Not a Slack credential — the in-cluster alert-relay's URL. Alerta's
      # slack plugin emits Slack-webhook-format JSON; the relay converts it
      # to ntfy (deployments/alerting/). The schema requires only `url`.
      slack:
        url: http://alert-relay.tenant-root.svc:8080/slack
    # Alert processing is bursty (storms arrive in batches, and Alerta also
    # serves the dashboard); 250m ran at 40% CFS throttle for a week, delaying
    # the pipeline that reports everything else. Sized for burst headroom.
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi
