# Root tenant infrastructure services shared by the management cluster.
#
# These resources are Cozystack app CRs. The aggregated apps API converts them
# into Flux HelmReleases named postgres-guardian, harbor-guardian, and
# clickhouse-guardian in tenant-root.
#
# Backups point at tenant-local Kubernetes Secrets projected from OpenBao/R2.
# Do not place raw S3 credentials in these app CRs.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  size: 20Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Harbor
metadata:
  name: guardian
  namespace: tenant-root
spec:
  host: harbor.guardianintelligence.org
  storageClass: replicated
  database:
    replicas: 3
    size: 20Gi
  redis:
    replicas: 3
    size: 5Gi
  trivy:
    enabled: true
    size: 10Gi
---
apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  shards: 1
  size: 50Gi
  storageClass: replicated
  logStorageSize: 10Gi
  backup:
    enabled: true
    schedule: ""
    s3CredentialsSecret:
      name: guardian-clickhouse-backup-creds
  clickhouseKeeper:
    enabled: true
    replicas: 3
    size: 5Gi
---
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: guardian-clickhouse-daily
  namespace: tenant-root
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: ClickHouse
    name: guardian
  backupClassName: guardian-clickhouse-altinity
  schedule:
    type: cron
    cron: "17 1 * * *"
