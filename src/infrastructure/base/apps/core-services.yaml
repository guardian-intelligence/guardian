# Root tenant infrastructure services shared by the management cluster.
#
# These resources are Cozystack app CRs. The aggregated apps API converts them
# into Flux HelmReleases in tenant-root.
#
# Guardian runs no in-cluster object storage: the bare-metal NVMe pool is too
# expensive to spend on an S3 tier, and an in-cluster backup target is circular
# (losing the cluster loses the backups). Database backups target off-cluster
# Cloudflare R2; until that path lands, these app CRs carry no backup config.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  size: 10Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Ingress
metadata:
  name: ingress
  namespace: tenant-root
spec:
  replicas: 3
  whitelist: []
  cloudflareProxy: true
---
apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  shards: 1
  size: 20Gi
  storageClass: replicated
  logStorageSize: 5Gi
  clickhouseKeeper:
    enabled: true
    replicas: 3
    size: 2Gi
