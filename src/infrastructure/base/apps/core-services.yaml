# Root tenant infrastructure services shared by the management cluster.
#
# These resources are Cozystack app CRs. The aggregated apps API converts them
# into Flux HelmReleases in tenant-root.
#
# Guardian runs no in-cluster object storage: the bare-metal NVMe pool is too
# expensive to spend on an S3 tier, and an in-cluster backup target is circular
# (losing the cluster loses the backups). Database backups go through
# Cozystack's platform backup machinery (cozy-default BackupClass) pointed at
# off-cluster Cloudflare R2 — see base/cozystack/platform.yaml. Apps opt in
# with backup.useSystemBucket; per-app cadence lives on the Plan CRs below.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  size: 10Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
  # Platform-managed backup flow: the chart leaves barmanObjectStore unset;
  # the CNPG backup driver SSA-patches the live Cluster with the system R2
  # coordinates at first BackupJob time. archive_command (continuous WAL,
  # the actual RPO driver) is NOT active until that first BackupJob — fire
  # an ad-hoc one immediately after enabling, don't wait for the Plan tick.
  backup:
    enabled: true
    useSystemBucket: true
---
# Nightly base backup for the root guardian Postgres (the future product
# database — billing/profile-shaped state). RPO between base backups is
# covered by continuous WAL archiving; the cron only bounds restore replay
# time. Retention (30d) and compression are cozy-default policy.
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: guardian-postgres-nightly
  namespace: tenant-root
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: Postgres
    name: guardian
  backupClassName: cozy-default
  schedule:
    type: cron
    cron: "0 4 * * *"
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Ingress
metadata:
  name: ingress
  namespace: tenant-root
spec:
  replicas: 3
  whitelist: []
  cloudflareProxy: true
---
apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  shards: 1
  size: 20Gi
  storageClass: replicated
  logStorageSize: 5Gi
  clickhouseKeeper:
    enabled: true
    replicas: 3
    size: 2Gi
