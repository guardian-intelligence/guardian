apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  storageClass: replicated
  size: 20Gi
  external: false
  version: v18
  resourcesPreset: t1.small
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
  postgresql:
    parameters:
      max_connections: "200"
  backup:
    enabled: true
    # Cozystack 1.4 recommends BackupClass/Plan orchestration plus chart-side
    # WAL archive plumbing from first install. The Secret is minted during
    # secret-zero seeding; see src/infrastructure/inventory/guardian-mgmt.json.
    schedule: ""
    retentionPolicy: 30d
    destinationPath: s3://guardian-vault/gm/pg/guardian/
    endpointURL: https://c3eaeffaadf7d4847684d4775c16d598.r2.cloudflarestorage.com
    s3CredentialsSecret:
      name: guardian-r2-db-backups
      accessKeyIDKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
