# Inventory reconciled by the `guardian-mgmt-base` Flux Kustomization (flux/sync.yaml).
# Plain manifests (no overlays yet); per-environment overlays patch this base later.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/core-services.yaml
  - backup/clickhouse-altinity.yaml
  - backup/postgres-cnpg.yaml
  - cozystack/platform.yaml
  - networking/metallb.yaml
  - networking/subnet-mtu.yaml
  - secrets/clickhouse-backup-secrets.yaml
  - secrets/cnpg-backup-secrets.yaml
  - storage/linstor-data-pools.yaml
  - storage/storageclasses.yaml
  - tenants/environments.yaml
  - openbao/openbao.yaml
  - openbao/networkpolicy.yaml
  - flux/sync.yaml
