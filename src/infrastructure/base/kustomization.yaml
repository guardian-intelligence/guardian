# Inventory reconciled by the `guardian-mgmt-base` Flux Kustomization (flux/sync.yaml).
# Plain manifests (no overlays yet); per-environment overlays patch this base later.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - apps/core-services.yaml
  - apps/harbor-rwo-rollout-strategy.yaml
  - apps/observability.yaml
  - apps/seaweedfs-s3-ingress-service.yaml
  - tenants/guardian.yaml
  - secrets/external-secrets.yaml
  - networking/metallb.yaml
  - networking/subnet-mtu.yaml
  - flux/sync.yaml
