---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-site
  namespace: tenant-dev
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: dev
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      guardian.dev/stage: dev
  template:
    metadata:
      labels:
        app.kubernetes.io/name: company-site
        app.kubernetes.io/part-of: guardian
        guardian.dev/stage: dev
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: company-site
                    guardian.dev/stage: dev
      containers:
        - name: company-site
          image: oci.guardianintelligence.org/guardian/company-site@sha256:708390f2a646b7286fdc29c6d9bc0cc789932aa7ae6fa899ce436084e5435277
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: company-site
  namespace: tenant-dev
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: dev
spec:
  selector:
    app.kubernetes.io/name: company-site
    guardian.dev/stage: dev
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: company-site
  namespace: tenant-dev
  annotations:
    acme.cert-manager.io/http01-ingress-ingressclassname: tenant-root
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: tenant-root
  tls:
    - hosts:
        - dev.guardianintelligence.org
      secretName: company-site-dev-tls
  rules:
    - host: dev.guardianintelligence.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: company-site
                port:
                  number: 80
