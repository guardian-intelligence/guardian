apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardian-vlogs-patcher
  namespace: cozy-fluxcd
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: guardian-vlogs-patcher
  namespace: tenant-root
rules:
  - apiGroups:
      - operator.victoriametrics.com
    resources:
      - vlclusters
    resourceNames:
      - generic
    verbs:
      - get
      - patch
  # Flux's pinned health poller caches each checked GVK with a namespace LIST.
  - apiGroups:
      - operator.victoriametrics.com
    resources:
      - vlclusters
    verbs:
      - list
  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
      - statefulsets
    verbs:
      - get
      - list
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: guardian-vlogs-patcher
  namespace: tenant-root
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: guardian-vlogs-patcher
subjects:
  - kind: ServiceAccount
    name: guardian-vlogs-patcher
    namespace: cozy-fluxcd
