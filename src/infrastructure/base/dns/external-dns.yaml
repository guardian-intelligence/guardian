apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/external-dns/
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 10m
  chart:
    spec:
      chart: external-dns
      version: 1.21.1
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: external-dns
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    provider:
      name: cloudflare
    sources:
      - crd
    managedRecordTypes:
      - A
    policy: sync
    registry: txt
    txtOwnerId: guardian-mgmt-ash
    domainFilters:
      - guardianintelligence.org
    interval: 1m
    triggerLoopOnEvent: true
    logFormat: json
    logLevel: info
    extraArgs:
      zone-id-filter: c952fb5989d232593ec9cca71030cb58
      cloudflare-dns-records-per-page: "5000"
      cloudflare-record-comment: guardian-mgmt-ash external-dns
    env:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-external-dns
            key: CF_API_TOKEN
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    serviceMonitor:
      enabled: true
    podLabels:
      guardian.dev/component: external-dns
