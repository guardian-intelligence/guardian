apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns-secrets
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: external-dns
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: external-dns-openbao
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: external-dns
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-external-dns
          serviceAccountRef:
            name: external-dns-secrets
            namespace: external-dns
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-external-dns
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: external-dns-openbao
  target:
    name: cloudflare-external-dns
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: CF_API_TOKEN
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian/dns/external-dns
        property: CF_API_TOKEN
