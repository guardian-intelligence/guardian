# Admission backstop for image provenance in the rendered workload
# namespaces: every container image must either be digest-pinned AND come
# from an allowlisted registry prefix, or be a declared-inventory entry
# (images.declared.lock — operator-spawned images no repo manifest renders,
# reviewed like any other supply-chain decision). Git-side conformance (the
# imageset derivation) enforces the same rules for what the repo renders;
# this policy enforces them against what actually reaches the apiserver —
# operator-spawned pods, manual creations, compromised controllers.
#
# Matching the workload templates (not just Pods) is deliberate: a violating
# Deployment fails at Flux apply time with this policy's message in the
# Kustomization status, instead of admitting cleanly and failing minutes
# later deep in ReplicaSet events.
#
# Params (registry prefixes + the declared lock) are one generated
# ConfigMap (see kustomization.yaml); paramRef resolves it live at
# admission, so a merged inventory change is effective as soon as Flux
# applies it.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: guardian-image-provenance
spec:
  failurePolicy: Fail
  paramKind:
    apiVersion: v1
    kind: ConfigMap
  matchConstraints:
    resourceRules:
      - apiGroups: ["apps"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
      - apiGroups: ["batch"]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["jobs", "cronjobs"]
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["pods"]
  variables:
    - name: podSpec
      expression: >-
        request.kind.kind == 'Pod' ? object.spec :
        (request.kind.kind == 'CronJob' ? object.spec.jobTemplate.spec.template.spec :
        object.spec.template.spec)
    - name: images
      expression: >-
        variables.podSpec.containers.map(c, c.image) +
        (has(variables.podSpec.initContainers) ? variables.podSpec.initContainers.map(c, c.image) : []) +
        (has(variables.podSpec.ephemeralContainers) ? variables.podSpec.ephemeralContainers.map(c, c.image) : [])
    - name: prefixes
      expression: >-
        params.data['registry-prefixes.txt'].split('\n').filter(p, p != '')
    - name: declaredLines
      expression: >-
        params.data['images.declared.lock'].split('\n')
    - name: undeclared
      # Images that are not declared-inventory entries (an exact digest-form
      # line, or a tag-form line pinning this exact tag) must satisfy the
      # pinned+allowlisted rules below.
      expression: >-
        variables.images.filter(image,
          !variables.declaredLines.exists(line, line == image || line.startsWith(image + '@')))
  validations:
    - expression: >-
        variables.undeclared.all(image, image.matches('.*@sha256:[a-f0-9]{64}$'))
      messageExpression: >-
        'image(s) [' +
        variables.undeclared.filter(image, !image.matches('.*@sha256:[a-f0-9]{64}$')).join(', ') +
        '] are neither digest-pinned nor declared in images.declared.lock; pin as <repo>[:<tag>]@sha256:<digest>, or declare the exact ref in its own reviewed PR if an operator spawns it (see AGENTS.md image rules)'
      reason: Invalid
    - expression: >-
        variables.undeclared.all(image,
          variables.prefixes.exists(p, image.startsWith(p)))
      messageExpression: >-
        'image(s) [' +
        variables.undeclared.filter(image, !variables.prefixes.exists(p, image.startsWith(p))).join(', ') +
        '] are not from an allowlisted registry prefix and not declared in images.declared.lock; extend base/admission/registry-prefixes.txt in its own reviewed PR if this source is intended'
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: guardian-image-provenance
spec:
  policyName: guardian-image-provenance
  paramRef:
    name: guardian-image-provenance-params
    namespace: tenant-guardian
    parameterNotFoundAction: Deny
  validationActions: ["Deny"]
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - tenant-guardian
            - tenant-guardian-prod
            - tenant-guardian-previews
            - guardian-analytics
            - guardian-cockpit
            - guardian-imageops
            - postflight-runner
