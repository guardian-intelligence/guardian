apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  # The VAP binding's paramRef names this ConfigMap statically; params are
  # resolved live at admission, so content updates take effect on apply.
  disableNameSuffixHash: true
configMapGenerator:
  - name: guardian-image-provenance-params
    namespace: tenant-guardian
    files:
      - registry-prefixes.txt
      - images.declared.lock=../../bootstrap/bundle/images.declared.lock
resources:
  - cozystack-app-namespace.yaml
  - image-provenance.yaml
  - openbao-static-seal.yaml
  - synthetic-storage-classification.yaml
  - tigerbeetle-host-network.yaml
  - vlogs-patcher-update-only.yaml
  - workload-priority.yaml
