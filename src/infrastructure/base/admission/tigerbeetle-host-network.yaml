apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: guardian-tigerbeetle-runtime
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
  variables:
    - name: isTigerBeetle
      expression: >-
        has(object.metadata.labels) &&
        'app.kubernetes.io/name' in object.metadata.labels &&
        object.metadata.labels['app.kubernetes.io/name'] == 'tigerbeetle'
    - name: images
      expression: >-
        object.spec.containers.map(container, container.image) +
        (has(object.spec.initContainers) ? object.spec.initContainers.map(container, container.image) : [])
    - name: isRuntime
      expression: >-
        variables.isTigerBeetle &&
        'guardian.dev/phase' in object.metadata.labels &&
        object.metadata.labels['guardian.dev/phase'] == 'runtime'
    - name: isTransport
      expression: >-
        variables.isTigerBeetle &&
        'guardian.dev/phase' in object.metadata.labels &&
        object.metadata.labels['guardian.dev/phase'] == 'transport'
    - name: allowedImages
      expression: >-
        [
          'ghcr.io/tigerbeetle/tigerbeetle:0.17.9@sha256:48f623f9c1e9b6cc44d77ca93634595ae99cce3246ded418763eb1a62eee45e9',
          'quay.io/prometheus/statsd-exporter:v0.30.0@sha256:378cb79c4ac7d6941e5ed71b1f3cd6f4707cf42c72c104ffe81fa4d9026ef659',
          'docker.io/envoyproxy/envoy:distroless-v1.36.4@sha256:2f71c5666a5209d6ee1ec519b17877ccb6d17be4d00e34de10f11e020ea8707a',
          'ghcr.io/fluxcd/flagger-loadtester@sha256:f98a35ab7aca0f2efdd8e397b4002e283637f5c9e31e4e2a6c1e97af07c50454'
        ]
  validations:
    - expression: >-
        !has(object.spec.hostNetwork) ||
        object.spec.hostNetwork == false ||
        (
          variables.isTigerBeetle &&
          object.spec.serviceAccountName == 'tigerbeetle'
        )
      message: tenant-guardian host networking is reserved for the TigerBeetle runtime
    - expression: >-
        !variables.isTigerBeetle ||
        (
          object.spec.serviceAccountName == 'tigerbeetle' &&
          has(object.spec.automountServiceAccountToken) &&
          object.spec.automountServiceAccountToken == false &&
          has(object.spec.hostNetwork) &&
          object.spec.hostNetwork == true &&
          (!has(object.spec.hostPID) || object.spec.hostPID == false) &&
          (!has(object.spec.hostIPC) || object.spec.hostIPC == false) &&
          has(object.spec.nodeSelector) &&
          (
            (
              variables.isRuntime &&
              'kubernetes.io/hostname' in object.spec.nodeSelector &&
              ['ash-earth', 'ash-wind', 'ash-water'].exists(node,
                node == object.spec.nodeSelector['kubernetes.io/hostname']
              )
            ) ||
            (
              variables.isTransport &&
              'node-role.kubernetes.io/control-plane' in object.spec.nodeSelector
            )
          ) &&
          variables.images.size() > 0 &&
          variables.images.all(image, image in variables.allowedImages) &&
          (
            (
              variables.isRuntime &&
              variables.images.size() == 2 &&
              variables.images.filter(image,
                image.startsWith('ghcr.io/tigerbeetle/tigerbeetle:0.17.9@sha256:')
              ).size() == 1 &&
              variables.images.filter(image,
                image.startsWith('quay.io/prometheus/statsd-exporter:v0.30.0@sha256:')
              ).size() == 1
            ) ||
            (
              variables.isTransport &&
              variables.images.size() == 2 &&
              variables.images.filter(image,
                image == 'docker.io/envoyproxy/envoy:distroless-v1.36.4@sha256:2f71c5666a5209d6ee1ec519b17877ccb6d17be4d00e34de10f11e020ea8707a'
              ).size() == 1 &&
              variables.images.filter(image,
                image == 'ghcr.io/fluxcd/flagger-loadtester@sha256:f98a35ab7aca0f2efdd8e397b4002e283637f5c9e31e4e2a6c1e97af07c50454'
              ).size() == 1
            )
          ) &&
          (!has(object.spec.volumes) || object.spec.volumes.all(volume,
            (
              variables.isRuntime &&
              has(volume.persistentVolumeClaim) &&
              ['tigerbeetle-data-0', 'tigerbeetle-data-1', 'tigerbeetle-data-2'].exists(claim,
                claim == volume.persistentVolumeClaim.claimName
              )
            ) ||
            (
              variables.isTransport &&
              (
                (has(volume.configMap) && volume.configMap.name == 'tigerbeetle-transport') ||
                (has(volume.secret) && volume.secret.secretName == 'tigerbeetle-transport-server-tls') ||
                (has(volume.emptyDir) && volume.name == 'config')
              )
            )
          )) &&
          object.spec.containers.all(container,
            has(container.securityContext) &&
            (!has(container.securityContext.privileged) || container.securityContext.privileged == false) &&
            has(container.securityContext.allowPrivilegeEscalation) &&
            container.securityContext.allowPrivilegeEscalation == false &&
            has(container.securityContext.readOnlyRootFilesystem) &&
            container.securityContext.readOnlyRootFilesystem == true &&
            has(container.securityContext.capabilities) &&
            has(container.securityContext.capabilities.drop) &&
            container.securityContext.capabilities.drop.exists(capability, capability == 'ALL') &&
            (!has(container.securityContext.capabilities.add) ||
              container.securityContext.capabilities.add.all(capability, capability == 'IPC_LOCK')
            ) &&
            (!has(container.ports) || container.ports.all(port, !has(port.hostPort))) &&
            (!has(container.command) || container.command.all(argument, argument != 'format')) &&
            (!has(container.args) || container.args.all(argument, argument != 'format'))
          ) &&
          (
            !has(object.spec.initContainers) ||
            object.spec.initContainers.all(container,
              has(container.securityContext) &&
              (!has(container.securityContext.privileged) || container.securityContext.privileged == false) &&
              has(container.securityContext.allowPrivilegeEscalation) &&
              container.securityContext.allowPrivilegeEscalation == false &&
              has(container.securityContext.readOnlyRootFilesystem) &&
              container.securityContext.readOnlyRootFilesystem == true &&
              has(container.securityContext.capabilities) &&
              has(container.securityContext.capabilities.drop) &&
              container.securityContext.capabilities.drop.exists(capability, capability == 'ALL') &&
              (!has(container.securityContext.capabilities.add) ||
                container.securityContext.capabilities.add.size() == 0
              ) &&
              (!has(container.ports) || container.ports.all(port, !has(port.hostPort))) &&
              (!has(container.command) || container.command.all(argument, argument != 'format')) &&
              (!has(container.args) || container.args.all(argument, argument != 'format'))
            )
          )
        )
      message: TigerBeetle runtime and mTLS transport pods must use the dedicated identity, fixed nodes, exact images and volumes, and hardened non-formatting containers
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: guardian-tigerbeetle-runtime
spec:
  policyName: guardian-tigerbeetle-runtime
  validationActions:
    - Deny
  matchResources:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - tenant-guardian
