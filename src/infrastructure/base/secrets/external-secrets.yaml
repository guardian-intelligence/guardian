# External Secrets Operator — projects OpenBao KV into Kubernetes Secrets
# (ClusterSecretStore/ExternalSecret consumers live with their workloads, e.g.
# base/dns/secrets.yaml for ExternalDNS).
#
# DRILL FINDING (2026-07-01 cold boot): ESO ran on the old cluster but was
# never declared in Git — an out-of-band install. The rebuilt cluster had no
# ExternalSecret CRDs and guardian-mgmt-dns-controller could not reconcile.
# Declared here since, image digest-pinned via postRenderer and thereby
# rendered into the generated union images lock.
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: guardian
---
# Chart artifact is pulled by Flux source-controller directly (NOT containerd;
# node registry mirrors do not apply). Digest-pinned like the Cozystack
# packages artifact in images.lock.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: external-secrets-chart
  namespace: external-secrets
spec:
  interval: 1h
  url: oci://ghcr.io/external-secrets/charts/external-secrets
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: extract
  ref:
    tag: 0.17.0
    digest: sha256:ee8f614ec685dad312afa92d2d7de78efd51aea1624f655487ba8502c8265cb5
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: external-secrets-chart
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
  values:
    installCRDs: true
    concurrent: 1
    # The chart still defaults conversion stanzas into the CRDs at this
    # version, but the incoming CRDs set a webhook clientConfig without a
    # strategy, which the apiserver rejects on replace (and 0.16 removed the
    # conversion webhooks entirely — v1beta1 and v1 are structurally
    # identical, so nothing needs converting).
    crds:
      conversion:
        enabled: false
  # Digest-pin every image the chart renders (controller, webhook,
  # cert-controller all use the same external-secrets image at this version).
  postRenderers:
    - kustomize:
        images:
          - name: ghcr.io/external-secrets/external-secrets
            newName: oci.external-secrets.io/external-secrets/external-secrets
            digest: sha256:05f5731bb2023baf0f2208824f87bc810c150fd607f3feacd350fa7891224f1a
          - name: oci.external-secrets.io/external-secrets/external-secrets
            digest: sha256:05f5731bb2023baf0f2208824f87bc810c150fd607f3feacd350fa7891224f1a
