# External Secrets Operator — projects OpenBao KV into Kubernetes Secrets
# (ClusterSecretStore/ExternalSecret consumers live with their workloads, e.g.
# base/dns/secrets.yaml for ExternalDNS).
#
# DRILL FINDING (2026-07-01 cold boot): ESO ran on the old cluster but was
# never declared in Git — an out-of-band install. The rebuilt cluster had no
# ExternalSecret CRDs and guardian-mgmt-dns-controller could not reconcile.
# Declared here at the exact version the old cluster ran (v0.10.4, serves
# external-secrets.io/v1beta1), image digest-pinned via postRenderer and
# thereby rendered into the generated union images lock.
apiVersion: v1
kind: Namespace
metadata:
  name: external-secrets
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/part-of: guardian
---
# Chart artifact is pulled by Flux source-controller directly (NOT containerd;
# node registry mirrors do not apply). Digest-pinned like the Cozystack
# packages artifact in images.lock.
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: external-secrets-chart
  namespace: external-secrets
spec:
  interval: 1h
  url: oci://ghcr.io/external-secrets/charts/external-secrets
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: extract
  ref:
    tag: 0.10.4
    digest: sha256:ec681d8b8ee3b5d0a016b1d4dde28dc91ebafa106841dece35722c371b84f49c
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 10m
  timeout: 5m
  chartRef:
    kind: OCIRepository
    name: external-secrets-chart
  install:
    crds: Create
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
  values:
    installCRDs: true
    concurrent: 1
  # Digest-pin every image the chart renders (controller, webhook,
  # cert-controller all use the same external-secrets image at this version).
  postRenderers:
    - kustomize:
        images:
          - name: ghcr.io/external-secrets/external-secrets
            newName: oci.external-secrets.io/external-secrets/external-secrets
            digest: sha256:da1a2ea3f7e855b2fafed792740151edffd7935cfc34542ec6715da30e65ac92
          - name: oci.external-secrets.io/external-secrets/external-secrets
            digest: sha256:da1a2ea3f7e855b2fafed792740151edffd7935cfc34542ec6715da30e65ac92
