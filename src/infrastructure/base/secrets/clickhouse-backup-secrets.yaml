# OpenBao-backed delivery for root tenant ClickHouse backup coordinates.
#
# This declares where the Kubernetes Secret must come from; it does not place R2
# credentials in Git and it does not enable ClickHouse backups by itself.
# OpenBao must be initialized/unsealed and configured with a matching Kubernetes
# auth role and kv-v2 secret before this ExternalSecret becomes Ready.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardian-clickhouse-external-secrets
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: clickhouse-backup
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao-clickhouse-backup
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: clickhouse-backup
spec:
  provider:
    vault:
      server: http://openbao-guardian.tenant-root.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: tenant-root-clickhouse-backup
          serviceAccountRef:
            name: guardian-clickhouse-external-secrets
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-clickhouse-backup-creds
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: clickhouse-backup
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-clickhouse-backup
    kind: SecretStore
  target:
    name: guardian-clickhouse-backup-creds
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: bucketName
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/clickhouse/guardian/backup
        property: bucketName
    - secretKey: endpoint
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/clickhouse/guardian/backup
        property: endpoint
    - secretKey: region
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/clickhouse/guardian/backup
        property: region
    - secretKey: accessKey
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/clickhouse/guardian/backup
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/clickhouse/guardian/backup
        property: secretKey
