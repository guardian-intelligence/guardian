apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-origin-tls
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: root-ingress
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-root
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: tenant-root-openbao
  target:
    name: cloudflare-origin-tls
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: kubernetes.io/tls
      engineVersion: v2
  data:
    - secretKey: tls.crt
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/cloudflare-origin-tls
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/cloudflare-origin-tls
        property: tls.key
