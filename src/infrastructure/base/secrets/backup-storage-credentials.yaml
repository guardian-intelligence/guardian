# Per-namespace secret scope for tenant-root, introduced for the platform
# backup credential: secrets-reader is what ESO authenticates as (OpenBao
# role guardian-reader-tenant-root, read-only on this namespace's kv
# subtree); secrets-writer exists only so an operator with custody
# kubeconfig access can mint a short-lived token scoped to writing this
# namespace's subtree and nothing else. Neither SA automounts; nothing
# schedules as them. The OpenBao roles are created by self-init; adding
# further tenant-root secrets later never touches OpenBao config — see the
# static-seal runbook, "Adding An Integration".
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: backup-storage
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-root
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: backup-storage
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-root
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: tenant-root-openbao
  labels:
    app.kubernetes.io/name: backup-storage
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-root
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-tenant-root
          serviceAccountRef:
            name: secrets-reader
            namespace: tenant-root
            audiences:
              - openbao
---
# Source credentials for Cozystack's platform backup machinery. The
# backupstrategy-controller reads this Secret (systemSecretName in
# base/cozystack/platform.yaml) and projects it as cozy-backups-creds into
# consumer namespaces per BackupJob/RestoreJob reconcile and into
# cozy-velero on a 1-minute tick. Flat-key format is the controller's
# documented human-friendly contract: accessKey/secretKey/endpoint/
# bucketName. The keypair is the bucket-scoped guardian-backups R2 token
# (Object Read & Write on that one bucket only), seeded in OpenBao by the
# bootstrap importer.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: guardian-backups-creds
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: backup-storage
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-root
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: tenant-root-openbao
  target:
    name: guardian-backups-creds
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: accessKey
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/backups-r2
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/backups-r2
        property: secretKey
    - secretKey: endpoint
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/backups-r2
        property: endpoint
    - secretKey: bucketName
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/backups-r2
        property: bucketName
    - secretKey: region
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/backups-r2
        property: region
