# OpenBao-backed delivery for root tenant CNPG backup credentials.
#
# This declares where the Kubernetes Secret must come from; it does not place R2
# credentials in Git and it does not enable Postgres backups by itself. OpenBao
# must be initialized/unsealed and configured with a matching Kubernetes auth
# role and kv-v2 secret before this ExternalSecret becomes Ready.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardian-external-secrets
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: cnpg-backup
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: cnpg-backup
spec:
  provider:
    vault:
      server: http://openbao-guardian.tenant-root.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: tenant-root-cnpg-backup
          serviceAccountRef:
            name: guardian-external-secrets
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-cnpg-backup-creds
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: cnpg-backup
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: SecretStore
  target:
    name: guardian-cnpg-backup-creds
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/postgres/guardian/cnpg-backup
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/postgres/guardian/cnpg-backup
        property: AWS_SECRET_ACCESS_KEY
