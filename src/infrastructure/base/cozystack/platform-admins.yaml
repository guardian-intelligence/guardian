# Named operator identities for the platform Keycloak (cozy realm). Each human
# and each long-horizon agent gets its own user so access is attributable and
# individually revocable. The apiserver maps preferred_username to the user
# and Keycloak groups to Kubernetes RBAC groups.
#
# The CRs live in tenant-root, not cozy-keycloak: the EDP keycloak-operator
# watches all namespaces (WATCH_NAMESPACE unset), and tenant-root is the
# namespace with an OpenBao secret scope, so the passwords ride the standard
# ESO path (kv/guardian/guardian-mgmt/tenant-root/platform-admins, seeded
# via the importer plan + a scoped secrets-writer write — see the
# static-seal runbook, "Adding An Integration"). Passwords never appear in
# Git or in the CR; the operator reads them from the projected Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: platform-admin-passwords
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: platform-admins
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-root
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: tenant-root-openbao
  target:
    name: platform-admin-passwords
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: platform-admin
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/platform-admins
        property: platform-admin
    - secretKey: platform-agent
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/platform-admins
        property: platform-agent
---
# platform-admin — the human operator's interactive identity.
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmUser
metadata:
  name: platform-admin
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: platform-admins
    app.kubernetes.io/part-of: guardian
spec:
  realmRef:
    kind: ClusterKeycloakRealm
    name: keycloakrealm-cozy
  username: platform-admin
  email: platform-admin@guardianintelligence.org
  emailVerified: true
  firstName: Platform
  lastName: Admin
  enabled: true
  groups:
    - cozystack-cluster-admin
  passwordSecret:
    name: platform-admin-passwords
    key: platform-admin
---
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmGroup
metadata:
  name: guardian-platform-agent
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: platform-admins
    app.kubernetes.io/part-of: guardian
spec:
  name: guardian-platform-agent
  realmRef:
    kind: ClusterKeycloakRealm
    name: keycloakrealm-cozy
---
# platform-agent — the identity for long-horizon agent sessions on the
# release runner and laptop (Devin/Codex/Claude). Distinct from
# platform-admin so an agent credential leak is revocable without locking
# the human out, and so audit logs separate agent actions from human ones.
# Split into per-agent users when concurrency warrants it. The
# offline_access realm role is what authorizes offline tokens
# (kubelogin --oidc-extra-scope=offline_access): 30-day-idle refresh
# tokens that reset on use, so an agent acting monthly stays logged in
# indefinitely while remaining one-click revocable in Keycloak
# (Sessions -> Offline). Without the role Keycloak fails code exchange
# with "Offline tokens not allowed for the user or client".
apiVersion: v1.edp.epam.com/v1
kind: KeycloakRealmUser
metadata:
  name: platform-agent
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: platform-admins
    app.kubernetes.io/part-of: guardian
spec:
  realmRef:
    kind: ClusterKeycloakRealm
    name: keycloakrealm-cozy
  username: platform-agent
  email: platform-agent@guardianintelligence.org
  emailVerified: true
  firstName: Platform
  lastName: Agent
  enabled: true
  groups:
    - guardian-platform-agent
  roles:
    - offline_access
  passwordSecret:
    name: platform-admin-passwords
    key: platform-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: guardian-platform-agent-cluster-view
  labels:
    app.kubernetes.io/name: platform-agent
    app.kubernetes.io/part-of: guardian
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
      - nodes/status
      - persistentvolumes
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - rbac.authorization.k8s.io
    resources:
      - clusterrolebindings
      - clusterroles
      - rolebindings
      - roles
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - admissionregistration.k8s.io
    resources:
      - mutatingwebhookconfigurations
      - validatingadmissionpolicies
      - validatingadmissionpolicybindings
      - validatingwebhookconfigurations
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - apiregistration.k8s.io
    resources:
      - apiservices
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - certificates.k8s.io
    resources:
      - certificatesigningrequests
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - flowcontrol.apiserver.k8s.io
    resources:
      - flowschemas
      - prioritylevelconfigurations
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - networking.k8s.io
    resources:
      - ingressclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - node.k8s.io
    resources:
      - runtimeclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - scheduling.k8s.io
    resources:
      - priorityclasses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - storage.k8s.io
    resources:
      - csidrivers
      - csinodes
      - storageclasses
      - volumeattachments
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: guardian-platform-agent-maintenance
  labels:
    app.kubernetes.io/name: platform-agent
    app.kubernetes.io/part-of: guardian
rules:
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - delete
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - delete
  - apiGroups:
      - ""
    resources:
      - pods/portforward
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: guardian-platform-agent-cluster-view
  labels:
    app.kubernetes.io/name: platform-agent
    app.kubernetes.io/part-of: guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: guardian-platform-agent-cluster-view
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: guardian-platform-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: guardian-platform-agent-view
  labels:
    app.kubernetes.io/name: platform-agent
    app.kubernetes.io/part-of: guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: guardian-platform-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: guardian-platform-agent-maintenance
  labels:
    app.kubernetes.io/name: platform-agent
    app.kubernetes.io/part-of: guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: guardian-platform-agent-maintenance
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: guardian-platform-agent
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: guardian-platform-agent-readonly
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:
          - "*"
        apiVersions:
          - "*"
        operations:
          - CREATE
          - UPDATE
          - DELETE
          - CONNECT
        resources:
          - "*/*"
  matchConditions:
    - name: platform-agent-identity
      expression: >-
        request.userInfo.username.endsWith("#platform-agent") ||
        "guardian-platform-agent" in request.userInfo.groups
  validations:
    - expression: >-
        (request.operation == "DELETE" && !has(request.subResource) &&
          ((request.resource.group == "" && request.resource.resource == "pods") ||
           (request.resource.group == "batch" && request.resource.resource == "jobs"))) ||
        (request.operation == "CONNECT" && request.resource.group == "" &&
          request.resource.resource == "pods" && request.subResource == "portforward")
      message: >-
        platform-agent is read-only except for deleting pods and jobs and
        opening pod port-forwards
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: guardian-platform-agent-readonly
spec:
  policyName: guardian-platform-agent-readonly
  validationActions:
    - Deny
