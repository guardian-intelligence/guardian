apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: cozystack.cozystack-platform
spec:
  variant: isp-full
  components:
    platform:
      values:
        publishing:
          host: guardianintelligence.org
          # k8s API rides a Talos Layer2 VIP on the Latitude Virtual Network.
          apiServerEndpoint: https://10.8.0.250:6443
          # Cloudflare Load Balancing probes and routes to each public node IP.
          # MetalLB remains private L2/ARP only on the Latitude VLAN.
          externalIPs:
            - 206.223.228.101
            - 45.250.254.119
            - 206.223.228.87
          exposedServices:
            - dashboard
            - api
          # Private LoadBalancer services use MetalLB L2 on the VLAN range.
        networking:
          podCIDR: 10.244.0.0/16
          podGateway: 10.244.0.1
          serviceCIDR: 10.96.0.0/16
          joinCIDR: 100.64.0.0/16
        authentication:
          # Platform OIDC (cozy-keycloak) re-enabled 2026-07-06 to gate
          # cluster-admin access: kubectl authenticates via OIDC against the
          # cozy realm (the apiserver oidc-issuer-url flags baked into the
          # talm node configs are load-bearing again), and the custody x509
          # kubeconfig becomes breakglass-only. The 2026-07-05 disable
          # (f82b8e2) was about the chart's Ingress publicly routing the
          # Keycloak admin console at keycloak.guardianintelligence.org on
          # path / — upstream 1.5.2 exposes no values knob to restrict it, so
          # keycloak-admin-guard.yaml shadows /admin and /realms/master with
          # longer-prefix paths to an endpointless Service (503 at origin,
          # edge-probed). The per-stage Verself Keycloaks under
          # deployments/iam/ are a separate product-facing system and stay
          # headless.
          oidc:
            enabled: true
            keycloakInternalUrl: http://keycloak-http.cozy-keycloak.svc:8080/realms/cozy
        branding:
          titleText: Guardian
          footerText: Guardian Intelligence
          tenantText: Guardian Platform
          logoText: Guardian
          brandName: Guardian
          brandHtmlName: "<b>Guardian</b>"
    # MTU is set authoritatively on the kube-ovn Subnets in networking/subnet-mtu.yaml.
---
# Platform backup machinery pointed at off-cluster Cloudflare R2 (Guardian
# runs no in-cluster object storage; an in-cluster backup target would be
# circular). provisionBucket: false skips the COSI Bucket entirely and makes
# bucketName authoritative; guardian-backups-creds is materialized in
# tenant-root by ESO from OpenBao (flat keys accessKey/secretKey/endpoint/
# bucketName — base/secrets/backup-storage-credentials.yaml).
#
# The override MUST live on this Package CR, not as a component of
# cozystack.cozystack-platform: the package reconciler merges
# spec.components[<name>].values only for components its own PackageSource
# declares, and cozystack-platform declares exactly one component
# ("platform") — a backupstrategy-controller key there is silently ignored
# (verified against the v1.5.0 package_reconciler; the upstream
# backup-classes.md example is wrong on this point). The platform bundle
# renders this same Package CR with a bare spec; Helm's three-way merge
# never strips spec.components because the bundle manifest doesn't carry
# that field, so both owners coexist.
#
# The endpoint hostname carries the Cloudflare account ID: an identifier,
# not a credential — it appears in every R2 URL and is useless without the
# bucket-scoped token, which lives only in OpenBao/custody. R2 accepts
# path-style requests and the literal region "auto".
apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: cozystack.backupstrategy-controller
spec:
  variant: default
  components:
    backupstrategy-controller:
      values:
        backupStorage:
          provisionBucket: false
          bucketName: guardian-backups
          endpoint: https://c3eaeffaadf7d4847684d4775c16d598.r2.cloudflarestorage.com
          region: auto
          forcePathStyle: true
          systemSecretName: guardian-backups-creds
