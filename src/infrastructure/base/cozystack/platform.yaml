apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: cozystack.cozystack-platform
spec:
  variant: isp-full
  components:
    platform:
      values:
        publishing:
          host: guardianintelligence.org
          apiServerEndpoint: https://206.223.228.101:6443
          exposedServices:
            - dashboard
            - api
          # Cross-subnet /31 nodes: no MetalLB/L2/VIP. exposure MUST be set
          # explicitly — the real default leaves root-ingress-controller a
          # stuck LoadBalancer<pending>. externalIPs path => ClusterIP svc
          # carrying the node public IPs (which the *.guardianintelligence.org
          # wildcard A records resolve to).
          exposure: externalIPs
          externalIPs:
            - 206.223.228.101
            - 45.250.254.119
            - 67.213.115.113
        networking:
          podCIDR: 10.244.0.0/16
          podGateway: 10.244.0.1
          serviceCIDR: 10.96.0.0/16
          joinCIDR: 100.64.0.0/16
        authentication:
          oidc:
            enabled: true
            keycloakInternalUrl: http://keycloak-http.cozy-keycloak.svc:8080/realms/cozy
        branding:
          titleText: Guardian
          footerText: Guardian Intelligence
          tenantText: Guardian Platform
          logoText: Guardian
          brandName: Guardian
          brandHtmlName: "<b>Guardian</b>"
    networking:
      values:
        kube-ovn:
          mtu: 1222
