# GitOps entrypoint for the guardian-mgmt cluster.
#
# Cozystack already runs Flux in-cluster (cozy-fluxcd). These objects make Flux
# reconcile the management-cluster substrate in ordered slices, turning the
# by-hand bring-up into a control loop.
#
# Bootstrap: `kubectl apply -f src/infrastructure/base/flux/sync.yaml` once. The
# Kustomization then manages this file too (the path includes flux/), so further
# changes flow through git.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: guardian
  namespace: cozy-fluxcd
spec:
  interval: 5m
  url: https://github.com/guardian-intelligence/guardian
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/base/cozystack
  sourceRef:
    kind: GitRepository
    name: guardian
  # Apply-only. The Platform package fans out into Cozystack-owned packages and
  # HelmReleases; the storage slice below retries until the Piraeus CRDs exist.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-storage
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/base/storage
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform
  # Apply-only. The LINSTOR data-pool CRDs are created by the Platform package;
  # Flux retry handles that CRD discovery race without a manual kubectl apply.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-base
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/base
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform
    - name: guardian-mgmt-storage
  # Conservative start: never delete. Flip to true once the inventory is
  # trusted — pruning the cozystack Package or storage classes would be
  # catastrophic, so we apply/update only until then.
  prune: false
  # Apply-only: this Kustomization owns the dependent product/tenant
  # Kustomizations. Waiting on all applied resources would include those
  # children, which themselves depend on this parent.
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  # Existing live object name kept intentionally so Flux updates the former
  # top-level environment reconciler instead of leaving it orphaned.
  name: guardian-mgmt-tenant-apps
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/tenants/guardian-commercial
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-base
  # This is the migration boundary from old top-level dev/gamma/prod tenants.
  # Pruning here removes the previous inventory before the product-scoped stage
  # reconcilers create their nested tenant resources.
  prune: true
  # Tenant-only slice: wait until the Cozystack tenant controller has created
  # the namespace before applying nested product tenants.
  wait: true
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: tenant-guardiancommercial
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-tenant
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/tenants/platform
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-tenant-apps
  prune: true
  wait: true
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: tenant-guardiancommercial-platform
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-dev-tenant
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/tenants/platform/dev
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform-tenant
  prune: true
  wait: true
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: tenant-guardiancommercial-platform-dev
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-dev
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/products/platform/dev
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform-dev-tenant
  prune: true
  wait: false
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-gamma-tenant
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/tenants/platform/gamma
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform-dev
  prune: true
  wait: true
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: tenant-guardiancommercial-platform-gamma
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-gamma
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/products/platform/gamma
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform-gamma-tenant
  prune: true
  wait: false
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-prod-tenant
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/tenants/platform/prod
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform-gamma
  prune: true
  wait: true
  healthChecks:
    - apiVersion: v1
      kind: Namespace
      name: tenant-guardiancommercial-platform-prod
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-prod
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/products/platform/prod
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform-prod-tenant
  prune: true
  # Apply-only. Cozystack app resources fan out into HelmReleases; readiness is
  # proven by explicit live checks and standard tool output, not by Flux kstatus
  # on the app CR itself.
  wait: false
  timeout: 10m
