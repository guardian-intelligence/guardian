# GitOps entrypoint for the guardian-mgmt cluster.
#
# Cozystack already runs Flux in-cluster (cozy-fluxcd). These objects make Flux
# reconcile the management-cluster substrate in ordered slices, turning the
# by-hand bring-up into a control loop.
#
# Bootstrap: `kubectl apply -k src/infrastructure/bootstrap/sync-steady` once
# (or sync-dark for a dark-uplink bring-up). The overlays resolve the
# ${GUARDIAN_SOURCE_*} placeholders below, which kubectl cannot substitute;
# once applied, Flux manages this file too (the path includes flux/) and
# resolves the placeholders itself via postBuild.substituteFrom — the
# guardian-source ConfigMap is optional and absent in steady state, so the
# GitRepository defaults hold, while dark mode pins the OCIRepository source
# without any edit to this file.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: guardian
  namespace: cozy-fluxcd
spec:
  interval: 10s
  url: https://github.com/guardian-intelligence/guardian
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/base/cozystack
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  # Apply-only. The Platform package fans out into Cozystack-owned packages and
  # HelmReleases; the storage slice below retries until the Piraeus CRDs exist.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-patches
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/base/platform-patches
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-platform
  # These patches target Cozystack-generated platform Package objects. They
  # retry until the platform chart has created the targets and never prune
  # generated objects.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-storage
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/base/storage
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-platform
  # Apply-only. The LINSTOR data-pool CRDs are created by the Platform package;
  # Flux retry handles that CRD discovery race without a manual kubectl apply.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-base
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/base
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-platform
    - name: guardian-mgmt-storage
  # This slice owns root tenant apps, networking, OpenBao policy, and the Flux
  # entrypoint. The Cozystack platform package and storage classes are separate
  # apply-only slices, so this inventory can be pruned safely.
  prune: true
  # Do not wait here: this Kustomization owns the dependent product/tenant
  # Kustomizations, and those children depend on this parent.
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-admission
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/base/admission
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    # The image-provenance params ConfigMap lives in tenant-guardian, which
    # the base slice's Tenant chart creates.
    - name: guardian-mgmt-base
  # Guardian-owned admission policies and their params — unlike app-patches
  # these are whole objects with no external owner, so removal from Git must
  # remove them from the cluster, and readiness is meaningful.
  prune: true
  wait: true
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-app-patches
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/base/app-patches
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-base
  # These patches target Cozystack-generated application objects. They must
  # retry until the app API has created each target and should never prune them.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-vlogs-hardening-prerequisites
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/base/vlogs-hardening-prerequisites
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-base
    - name: guardian-mgmt-admission
  prune: true
  wait: false
  timeout: 10m
  healthChecks:
    - apiVersion: operator.victoriametrics.com/v1
      kind: VLCluster
      name: generic
      namespace: tenant-root
  healthCheckExprs:
    - apiVersion: operator.victoriametrics.com/v1
      kind: VLCluster
      current: >-
        has(status.observedGeneration) &&
        status.observedGeneration == metadata.generation &&
        has(status.updateStatus) &&
        status.updateStatus == 'operational'
      failed: >-
        (has(status.updateStatus) && status.updateStatus == 'failed') ||
        (has(status.conditions) &&
        status.conditions.exists(c, c.type == 'Degraded' && c.status == 'True'))
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-vlogs-hardening
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/base/vlogs-hardening
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  serviceAccountName: guardian-vlogs-patcher
  dependsOn:
    - name: guardian-vlogs-hardening-prerequisites
  prune: false
  wait: false
  timeout: 15m
  healthChecks:
    - apiVersion: operator.victoriametrics.com/v1
      kind: VLCluster
      name: generic
      namespace: tenant-root
    - apiVersion: apps/v1
      kind: Deployment
      name: vlinsert-generic
      namespace: tenant-root
    - apiVersion: apps/v1
      kind: Deployment
      name: vlselect-generic
      namespace: tenant-root
    - apiVersion: apps/v1
      kind: StatefulSet
      name: vlstorage-generic
      namespace: tenant-root
  healthCheckExprs:
    - apiVersion: operator.victoriametrics.com/v1
      kind: VLCluster
      current: >-
        has(status.observedGeneration) &&
        status.observedGeneration == metadata.generation &&
        has(status.updateStatus) &&
        status.updateStatus == 'operational'
      failed: >-
        (has(status.updateStatus) && status.updateStatus == 'failed') ||
        (has(status.conditions) &&
        status.conditions.exists(c, c.type == 'Degraded' && c.status == 'True'))
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-system
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/guardian/system
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-base
  prune: true
  wait: false
  healthChecks:
    # Certificate Ready latches: nothing flips it if the issuing controller
    # dies, so a dead cert-manager would pass until a leaf missed renewal.
    # Gate on the controller Deployment itself (kstatus assesses Deployments
    # fully; healthChecks entries may reference objects outside this
    # Kustomization's inventory).
    - apiVersion: apps/v1
      kind: Deployment
      name: cert-manager
      namespace: cozy-cert-manager
    - apiVersion: cert-manager.io/v1
      kind: Certificate
      name: guardian-openbao-listener-ca
      namespace: tenant-guardian
    - apiVersion: cert-manager.io/v1
      kind: Certificate
      name: guardian-openbao-api
      namespace: tenant-guardian
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: guardian-openbao
      namespace: tenant-guardian
    # kstatus is lenient for OnDelete StatefulSets (no rollout to track), so
    # this entry only catches generation staleness. Runtime member health is
    # asserted functionally: guardian-mgmt-dns-controller's ExternalSecret only
    # goes Ready when OpenBao self-init has created the kv mount and the
    # external-dns auth role and ESO can read them, and `aspect infra
    # openbao-drill` checks per-member seal/raft state.
    - apiVersion: apps/v1
      kind: StatefulSet
      name: guardian-openbao
      namespace: tenant-guardian
    # zot is deliberately NOT health-checked here: nothing in the graph
    # depends on the mirror (containerd falls back to upstream implicitly),
    # so gating guardian-system — and its many dependents — on zot health
    # would invert the tier's rebuildable-cache posture. Loudness comes from
    # the ZotRegistryDown and mirror-canary pages instead.
  timeout: 10m
---
# SpiceDB's CRD and controller are isolated from the authorization data plane
# so a cold install cannot race custom-resource discovery. The controller
# watches and mutates only tenant-guardian-prod through a namespaced Role.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-authorization-operator
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/authorization/operator
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-admission
    - name: guardian-system
  prune: true
  wait: true
  timeout: 10m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: spicedb-operator
      namespace: tenant-guardian-prod
---
# PostgreSQL initialization, archive activation, serving certificates, and API
# credentials must all be healthy before the SpiceDB CR exists. In particular,
# the Cozystack-generated init Job creates the database role that the SpiceDB
# migration Job needs.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-authorization-data
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/authorization/data
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-authorization-operator
    - name: guardian-mgmt-storage
  prune: true
  wait: false
  timeout: 30m
  healthChecks:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: postgres-spicedb
      namespace: tenant-guardian-prod
    - apiVersion: batch/v1
      kind: Job
      name: postgres-spicedb-init-job
      namespace: tenant-guardian-prod
    - apiVersion: cert-manager.io/v1
      kind: Certificate
      name: spicedb-ca
      namespace: tenant-guardian-prod
    - apiVersion: cert-manager.io/v1
      kind: Certificate
      name: spicedb-server
      namespace: tenant-guardian-prod
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      name: spicedb-api-token-slot-a
      namespace: tenant-guardian-prod
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      name: spicedb-api-token-slot-b
      namespace: tenant-guardian-prod
    - apiVersion: backups.cozystack.io/v1alpha1
      kind: BackupJob
      name: spicedb-postgres-archive-activation
      namespace: tenant-guardian-prod
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      current: >-
        has(status.conditions) &&
        status.conditions.exists(e,
        e.type == 'Ready' && e.status == 'True')
      failed: >-
        has(status.conditions) &&
        status.conditions.exists(e,
        e.type == 'Ready' && e.status == 'False')
    - apiVersion: backups.cozystack.io/v1alpha1
      kind: BackupJob
      current: status.phase == 'Succeeded'
      failed: status.phase == 'Failed'
---
# The authorization service starts only after its data dependencies are
# functional. Generated SpiceDB workloads remain explicit health gates even
# though the operator, rather than Flux inventory, creates them.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-authorization-prod
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/authorization/prod
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-authorization-data
  prune: true
  wait: false
  timeout: 30m
  healthChecks:
    - apiVersion: authzed.com/v1alpha1
      kind: SpiceDBCluster
      name: spicedb
      namespace: tenant-guardian-prod
    - apiVersion: apps/v1
      kind: Deployment
      name: spicedb-spicedb
      namespace: tenant-guardian-prod
    - apiVersion: batch/v1
      kind: Job
      name: spicedb-schema-v1
      namespace: tenant-guardian-prod
    - apiVersion: apps/v1
      kind: Deployment
      name: spicedb-thumper
      namespace: tenant-guardian-prod
  healthCheckExprs:
    - apiVersion: authzed.com/v1alpha1
      kind: SpiceDBCluster
      current: >-
        has(status.observedGeneration) &&
        status.observedGeneration == metadata.generation &&
        has(status.currentMigrationHash) &&
        has(status.targetMigrationHash) &&
        status.currentMigrationHash == status.targetMigrationHash &&
        (!has(status.conditions) ||
        status.conditions.all(c, c.status != 'True'))
      failed: >-
        has(status.conditions) &&
        status.conditions.exists(c,
        (c.status == 'True' &&
        c.type in ['ValidatingFailed', 'PreconditionsFailed',
        'RolloutError', 'ConfigurationWarning']) ||
        (c.status == 'False' &&
        c.type == 'Migrating' &&
        c.reason == 'MigrationFailed'))
---
# TigerBeetle's financial ledger is isolated in its own reconciliation slice
# so replica health is gated without coupling unrelated Guardian system
# services to ledger state.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-tigerbeetle
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/tigerbeetle/system
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-storage
    - name: guardian-mgmt-admission
    - name: guardian-mgmt-app-patches
  prune: true
  wait: false
  timeout: 30m
  healthChecks:
    - apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      name: guardian-tigerbeetle-ca
    - apiVersion: cert-manager.io/v1
      kind: Certificate
      name: guardian-tigerbeetle-ca
      namespace: cozy-cert-manager
    - apiVersion: cert-manager.io/v1
      kind: Certificate
      name: tigerbeetle-transport-server
      namespace: tenant-guardian
    - apiVersion: apps/v1
      kind: DaemonSet
      name: tigerbeetle-transport
      namespace: tenant-guardian
    - apiVersion: apps/v1
      kind: Deployment
      name: tigerbeetle-0
      namespace: tenant-guardian
    - apiVersion: apps/v1
      kind: Deployment
      name: tigerbeetle-1
      namespace: tenant-guardian
    - apiVersion: apps/v1
      kind: Deployment
      name: tigerbeetle-2
      namespace: tenant-guardian
---
# Flagger — progressive-delivery controller, no consumers yet (Canary CRs are
# added alongside each workload that adopts blue/green, e.g. iam/*/). Depends
# only on guardian-system for basic cluster readiness ordering; unlike Kargo
# it ships no admission webhook, so there's no cert-manager dependency.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-flagger
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/guardian/flagger
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-system
  prune: true
  wait: false
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: flagger
      namespace: flagger
    - apiVersion: apps/v1
      kind: Deployment
      name: flagger
      namespace: flagger
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-dns-controller
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/base/dns
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-system
  prune: true
  wait: true
  # kstatus treats ESO custom resources as trivially Current (no standard
  # Reconciling/Stalled conditions), so declare their Ready contract; a synced
  # ExternalSecret is what proves the OpenBao→Secret projection works.
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1beta1
      kind: ClusterSecretStore
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')
      failed: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'False')
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')
      failed: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'False')
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-promotion
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/guardian/promotion
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    # cert-manager (health-checked by guardian-system) must be serving before
    # the chart's self-signed Issuer can mint the webhooks-server cert.
    - name: guardian-system
  prune: true
  wait: false
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kargo
      namespace: kargo
    - apiVersion: apps/v1
      kind: Deployment
      name: kargo-controller
      namespace: kargo
    - apiVersion: apps/v1
      kind: Deployment
      name: kargo-management-controller
      namespace: kargo
    - apiVersion: apps/v1
      kind: Deployment
      name: kargo-webhooks-server
      namespace: kargo
    - apiVersion: apps/v1
      kind: Deployment
      name: kargo-state-metrics
      namespace: kargo
  timeout: 10m
---
# Kargo CRs live in a separate slice: their CRDs and validating webhooks only
# exist once the HelmRelease above is installed and healthy, so applying them
# from the same slice would fail every reconcile until then. dependsOn makes
# the ordering explicit instead of leaning on retry noise.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-promotion-pipelines
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/guardian/promotion/pipelines
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-promotion
  prune: true
  # Apply-only: Kargo's management controller creates the project namespace
  # asynchronously, and Kargo CR conditions are still settling right after
  # install; functional verification is the Warehouse discovering Freight.
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-company-prod
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/company/prod
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-system
    - name: guardian-flagger
  prune: true
  wait: true
  timeout: 10m
---
# Postflight IAM prod stage: Keycloak + stage Postgres + ESO wiring + Flagger
# Canary. Depends on guardian-system (OpenBao roles + kv paths from
# self-init) and guardian-flagger (Canary CRD + controller). The
# ExternalSecret healthCheckExprs make the wait real: the stage only reports
# Ready once ESO can actually read this namespace's OpenBao subtree (kstatus
# treats ESO CRs as trivially Current otherwise).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-iam-prod
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/iam/prod
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional — see guardian-company-prod above.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-system
    - name: guardian-flagger
  prune: true
  wait: true
  timeout: 15m
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1beta1
      kind: ClusterSecretStore
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
---
# Shared product Postgres + Electric, prod stage. The Cozystack app CR is
# served through the aggregated apps API; Flux cannot health-check it
# natively. Runtime readiness is watched operationally and by
# postgres-health alerts.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-products-prod
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/products/prod
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional — see guardian-company-prod above.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-system
  prune: true
  wait: false
---
# Analytics plane: the ClickHouse store (a Cozystack app CR that must live in
# tenant-root — see clickhouse.yaml), the Connect ingest service, OTel
# collector, DDL job, and ESO wiring for guardian-analytics. The ClickHouse
# app is not health-gated here (Flux cannot assess the aggregated apps API
# natively) — the stock flux-resources alerts cover its HelmRelease. Depends
# on storage classes and the base slice; OpenBao wiring for this namespace
# arrives with the ingest service's secrets.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-analytics
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/analytics/system
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional — see guardian-company-prod above.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-storage
    - name: guardian-mgmt-base
  prune: true
  # wait:false + explicit healthChecks: readiness gates on exactly the two
  # Deployments and the ExternalSecret without gating on the DDL Job.
  # kstatus knows nothing about ESO CRs, so the exprs below declare their
  # Ready contract.
  wait: false
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: analytics-ingest
      namespace: guardian-analytics
    - apiVersion: apps/v1
      kind: Deployment
      name: otel-collector
      namespace: guardian-analytics
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      name: analytics-ch-ingest
      namespace: guardian-analytics
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      name: payments-checkout-canary
      namespace: guardian-analytics
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')
      failed: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'False')
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-payments-prod
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/payments/prod
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-products-prod
    - name: guardian-iam-prod
    - name: guardian-analytics
    - name: guardian-tigerbeetle
    - name: guardian-flagger
  prune: true
  wait: true
  timeout: 15m
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
    - apiVersion: flagger.app/v1beta1
      kind: Canary
      current: status.phase == 'Succeeded'
      inProgress: status.phase in ['Initializing', 'Progressing', 'Promoting', 'Finalising']
      failed: status.phase in ['Failed', 'Terminating']
---
# Cockpit telemetry plane: the per-node sampler StatefulSet, the hub serving
# the public homepage stream, Cilium policy, and self-monitoring
# (deployments/cockpit/). No secrets — the stream is public read-only data —
# so only the base slice (Cilium + VM operator CRDs) is needed.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-cockpit
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/cockpit
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional — see guardian-company-prod above.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-base
  prune: true
  wait: false
  timeout: 5m
  healthChecks:
    # The hub only: the sampler StatefulSet deliberately leaves its pod
    # Pending while a node is down (required anti-affinity), so gating on it
    # would flip this Kustomization red for every drain and Talos upgrade.
    # Sampler coverage is owned by CockpitSamplerStreamMissing in
    # observability.yaml, which watches the thing that matters — live tick
    # streams — not pod phase.
    - apiVersion: apps/v1
      kind: Deployment
      name: cockpit-hub
      namespace: guardian-cockpit
---
# Alerting delivery seam: the alert-relay Deployment in tenant-root plus its
# ESO wiring, Cilium policy, and self-monitoring (deployments/alerting/).
# Depends on guardian-system for the same reason as
# guardian-mgmt-dns-controller: the relay's ntfy topic URL arrives via ESO
# from OpenBao, so self-init's kv mount and the tenant-root reader role must
# be serving before the ExternalSecret can go Ready. wait:false + explicit
# healthChecks (the guardian-analytics pattern): gate on exactly the
# Deployment and the ExternalSecret — kstatus knows nothing about ESO CRs,
# so the exprs below declare their Ready contract.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-alerting
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/deployments/alerting
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional — see guardian-company-prod above.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-system
  prune: true
  wait: false
  timeout: 5m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: alert-relay
      namespace: tenant-root
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      name: alert-relay-config
      namespace: tenant-root
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')
      failed: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'False')
---
