  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional — see guardian-company-prod above.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-mgmt-storage
    - name: guardian-mgmt-base
  prune: true
  wait: false
  timeout: 15m
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: verself-controlplane
      namespace: verself-runner
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      name: github-app
      namespace: verself-runner
  healthCheckExprs:
    - apiVersion: external-secrets.io/v1beta1
      kind: ExternalSecret
      current: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')
      failed: has(status.conditions) && status.conditions.exists(c, c.type == 'Ready' && c.status == 'False')
---
# company-site PR previews: static cluster half (Cilium admits for the
# previews tenant) plus the previews-branch source objects, both declared in
# deployments/company/previews. The GitRepository/Kustomization pair that
# watches the machine-managed `previews` branch lives THERE, not here:
# sync.yaml sources must all be flippable to the dark-uplink OCI mirror
# (TestFluxSourceParameterizationConformance), and the previews source is
# deliberately connected-only — in dark mode it starves alone, and nothing
# depends on it. See deployments/company/previews/README.md.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-company-previews-infra
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/deployments/company/previews
  sourceRef:
    kind: ${GUARDIAN_SOURCE_KIND:=GitRepository}
    name: ${GUARDIAN_SOURCE_NAME:=guardian}
  postBuild:
    substituteFrom:
      # Required, not optional: Flux skips substitution entirely when the
      # variable map is empty, which would leave the ${GUARDIAN_SOURCE_*}
      # placeholders literal and fail the CRD enum. The bootstrap overlays
      # always create guardian-source; a missing one should fail loudly.
      - kind: ConfigMap
        name: guardian-source
  dependsOn:
    - name: guardian-system
    - name: guardian-mgmt-dns-controller
  prune: true
  # Apply-only, deliberately: this slice applies the guardian-company-previews
  # Kustomization, which dependsOn THIS slice — wait: true would deadlock on
  # that cycle (infra waits for the child's Ready; the child waits for infra).
  # Everything else here (Cilium policies, GitRepository) is trivially ready.
  wait: false
  timeout: 5m
