# GitOps entrypoint for the guardian-mgmt cluster.
#
# Cozystack already runs Flux in-cluster (cozy-fluxcd). These objects make Flux
# reconcile the management-cluster substrate and the tenant app layer, turning
# the by-hand bring-up into a control loop.
#
# Bootstrap: `kubectl apply -f src/infrastructure/base/flux/sync.yaml` once. The
# Kustomization then manages this file too (the path includes flux/), so further
# changes flow through git.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: guardian
  namespace: cozy-fluxcd
spec:
  interval: 5m
  url: https://github.com/guardian-intelligence/guardian
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-base
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/base
  sourceRef:
    kind: GitRepository
    name: guardian
  # Conservative start: never delete. Flip to true once the inventory is
  # trusted — pruning the cozystack Package or storage classes would be
  # catastrophic, so we apply/update only until then.
  prune: false
  # Apply-only: this Kustomization owns the dependent
  # guardian-mgmt-tenant-apps Kustomization. Waiting on all applied resources
  # would include that child, which itself depends on this parent.
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-tenant-apps
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/environments
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-base
  # Keep the tenant app layer apply-only until live inventory and DR drills are
  # routine. Pruning app CRs can cascade into stateful Helm releases.
  prune: false
  # Apply-only. Cozystack app resources fan out into HelmReleases; readiness is
  # proven by explicit live checks and checked-in drill reports, not by Flux
  # kstatus on the app CR itself.
  wait: false
  timeout: 10m
