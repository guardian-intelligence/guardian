# Authoritative MTU for the kube-ovn Subnets. 1442 = 1500 (clean L2 over the
# Latitude Virtual Network) − 58 (kube-ovn GENEVE). The old 1222 only existed to
# absorb Talos KubeSpan's +80 WireGuard tax, which the shared-L2 rebuild removes.
# REBUILD GATE: confirm the VLAN link clears 1500 with
#   ping -M do -s 1472 -c3 <other-node-vlan-ip>
# before trusting 1442. If the VLAN MTU is < 1500 (some providers clamp tagged
# VLANs to 1496 for the 802.1Q tag), set both mtu values below to VLAN_MTU − 58.
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: ovn-default
spec:
  default: true
  protocol: IPv4
  provider: ovn
  vpc: ovn-cluster
  cidrBlock: 10.244.0.0/16
  gateway: 10.244.0.1
  gatewayType: distributed
  natOutgoing: true
  excludeIps:
    - 10.244.0.1
  mtu: 1442
---
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: join
spec:
  default: false
  protocol: IPv4
  provider: ovn
  vpc: ovn-cluster
  cidrBlock: 100.64.0.0/16
  gateway: 100.64.0.1
  natOutgoing: false
  excludeIps:
    - 100.64.0.1
  mtu: 1442
