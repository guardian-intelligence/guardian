# Authoritative MTU for the kube-ovn Subnets. 1362 = 1420 − 58 (kube-ovn GENEVE).
# The VLAN path MTU was MEASURED at 1420 on the Latitude Virtual Network (VID
# 2140) via tracepath, 2026-06-21 — Latitude's fabric clamps tagged VLANs ~80B
# below 1500; jumbo is unavailable. The old 1222 was over-conservative (it
# absorbed Talos KubeSpan's +80 WireGuard tax, now removed); 1362 is the real
# ceiling and is uniform across the fabric.
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: ovn-default
spec:
  default: true
  protocol: IPv4
  provider: ovn
  vpc: ovn-cluster
  cidrBlock: 10.244.0.0/16
  gateway: 10.244.0.1
  gatewayType: distributed
  natOutgoing: true
  excludeIps:
    - 10.244.0.1
  mtu: 1362
---
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: join
spec:
  default: false
  protocol: IPv4
  provider: ovn
  vpc: ovn-cluster
  cidrBlock: 100.64.0.0/16
  gateway: 100.64.0.1
  natOutgoing: false
  excludeIps:
    - 100.64.0.1
  mtu: 1362
