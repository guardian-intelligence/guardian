# Authoritative MTU for the kube-ovn Subnets. 1362 = 1420 VLAN path MTU − 58
# GENEVE. See docs/runbooks/cozystack-mgmt-rebuild.md.
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: ovn-default
spec:
  default: true
  protocol: IPv4
  provider: ovn
  vpc: ovn-cluster
  cidrBlock: 10.244.0.0/16
  gateway: 10.244.0.1
  gatewayType: distributed
  natOutgoing: true
  excludeIps:
    - 10.244.0.1
  mtu: 1362
---
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: join
spec:
  default: false
  protocol: IPv4
  provider: ovn
  vpc: ovn-cluster
  cidrBlock: 100.64.0.0/16
  gateway: 100.64.0.1
  natOutgoing: false
  excludeIps:
    - 100.64.0.1
  mtu: 1362
