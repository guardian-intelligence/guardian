# Standard Cozystack bare-metal exposure path: MetalLB L2 advertises external
# service IPs from the same Latitude VLAN as the management nodes.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: cozystack
  namespace: cozy-metallb
spec:
  addresses:
    - 10.8.0.200-10.8.0.240
  autoAssign: true
  avoidBuggyIPs: false
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: cozystack
  namespace: cozy-metallb
spec:
  ipAddressPools:
    - cozystack
