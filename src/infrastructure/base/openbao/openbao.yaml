apiVersion: apps.cozystack.io/v1alpha1
kind: OpenBAO
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  # replicated-retain = 3-way DRBD + Retain: each raft member's volume survives
  # node loss and PVC delete. See docs/runbooks/cozystack-mgmt-rebuild.md.
  storageClass: replicated-retain
  size: 10Gi
  ui: true
  external: false
  resources:
    cpu: "1"
    memory: 2Gi
