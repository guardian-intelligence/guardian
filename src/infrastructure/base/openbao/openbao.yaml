apiVersion: apps.cozystack.io/v1alpha1
kind: OpenBAO
metadata:
  name: guardian
  namespace: tenant-root
spec:
  replicas: 3
  # replicated-retain = 3-way DRBD + Retain. Each raft member's volume survives
  # the loss of its node (the ash-fire->ash-water swap stranded the local-retain
  # replica); Retain guards the data on PVC delete.
  storageClass: replicated-retain
  size: 10Gi
  ui: true
  external: false
  resources:
    cpu: "1"
    memory: 2Gi
