# The registry we pull the OpenBao chart from — like registry.npmjs.org, but
# OpenBao hosts its own. Flux's source-controller fetches and caches the chart
# index from here; the HelmRelease then references this by name.
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: openbao
  namespace: openbao
spec:
  interval: 1h
  url: https://openbao.github.io/openbao-helm
