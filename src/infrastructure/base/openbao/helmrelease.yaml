# The claim: "install the openbao chart, version 0.28.4, with these values."
# Flux's helm-controller keeps this installed and in sync (the declarative form
# of `helm install`/`helm upgrade`).
#
# These VALUES are the dev flavor. The chart and version stay identical across
# environments; only the values below change for gamma/prod. The big diff is the
# seal: dev auto-unseals from a NON-SECRET static toy key (so an agent can bring
# dev up unattended and run the daily DR drill), while prod will auto-unseal via
# a dedicated transit OpenBao with TLS + HA. That prod difference is what the
# per-environment overlay will carry — added in the next step.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
spec:
  interval: 30m
  chart:
    spec:
      chart: openbao                 # package name
      version: "0.28.4"              # package version (same everywhere)
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: openbao
  values:                            # the function arguments
    global:
      # dev serves plaintext (default). The prod overlay flips this to false and
      # adds a TLS listener — the chart derives the readiness-probe scheme from
      # this key, a correction the tracer surfaced.
      tlsDisable: true
    server:
      image:
        repository: openbao/openbao
        tag: "2.5.4"
      ha:
        enabled: true
        replicas: 1                  # dev raft-of-1; prod = 3 (+ retry_join in the overlay)
        raft:
          enabled: true
          setNodeId: true
          config: |
            ui = true
            listener "tcp" {
              tls_disable = 1
              address = "[::]:8200"
              cluster_address = "[::]:8201"
            }
            storage "raft" {
              path = "/openbao/data"
            }
            # dev auto-unseal: static toy key (32 bytes, base64). NON-SECRET by
            # design — it protects only dev/toy data, so it lives in git and any
            # agent can bring dev up with it. prod replaces this stanza with
            # seal "transit" in the overlay.
            seal "static" {
              current_key_id = "dev-toy-v1"
              current_key    = "Z3VhcmRpYW4tZGV2LXRveS1zZWFsLWtleS0wMDAwMDA="
            }
            service_registration "kubernetes" {}
      dataStorage:
        enabled: true
        size: 10Gi
        storageClass: openbao-retain
