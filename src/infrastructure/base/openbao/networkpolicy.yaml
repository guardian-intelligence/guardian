apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-openbao-to-apiserver
  namespace: tenant-root
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
  egress:
    - toEntities:
        - kube-apiserver
    - toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external-secrets-to-openbao
  namespace: tenant-root
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": cozy-external-secrets-operator
            app.kubernetes.io/name: external-secrets
            app.kubernetes.io/instance: external-secrets-operator
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
