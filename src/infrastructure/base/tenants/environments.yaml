# Environment tenants for Guardian-managed workloads.
#
# Cozystack's apps API converts each Tenant object into a Flux HelmRelease named
# tenant-<name> in tenant-root. The tenant chart then creates the child namespace
# and its cozystack-values Secret. These tenants intentionally inherit root
# etcd, ingress, monitoring, and SeaweedFS until a stage earns isolation.
apiVersion: apps.cozystack.io/v1alpha1
kind: Tenant
metadata:
  name: dev
  namespace: tenant-root
spec:
  host: dev.gi.org
  etcd: false
  ingress: false
  monitoring: false
  seaweedfs: false
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Tenant
metadata:
  name: gamma
  namespace: tenant-root
spec:
  host: gamma.gi.org
  etcd: false
  ingress: false
  monitoring: false
  seaweedfs: false
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Tenant
metadata:
  name: prod
  namespace: tenant-root
spec:
  host: prod.gi.org
  etcd: false
  ingress: false
  monitoring: false
  seaweedfs: false
