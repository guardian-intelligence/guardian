# Declarative LINSTOR `data` storage pool (thick ZFS) on every node's second
# NVMe (/dev/nvme1n1; OS is on nvme0n1). No nodeSelector => fleet-wide; Piraeus
# adopts the zpool idempotently. See docs/runbooks/cozystack-mgmt-rebuild.md.
apiVersion: piraeus.io/v1
kind: LinstorSatelliteConfiguration
metadata:
  name: guardian-data-pool
spec:
  storagePools:
    - name: data
      zfsPool:
        zPool: data
      source:
        hostDevices:
          - /dev/nvme1n1
