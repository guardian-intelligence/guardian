# Cozystack 1.5 exposes Hubble through the generated cozystack.networking
# Package. The platform chart owns the base Cilium/KubeOVN values; this partial
# Package owns only the Hubble observability fields.
#
# COLD-BOOT CONSTRAINT (2026-07-01 drill finding): this partial must not
# enable Cilium components that need POD networking. The generated CNI conflist
# chains kube-ovn before cilium-cni, and the kubeovn HelmRelease only installs
# after the cilium HelmRelease is Ready — so any pod-network workload added to
# the cilium chart (hubble-relay, hubble-ui) can never start on a fresh
# cluster, the helm upgrade stalls on it, and the whole platform deadlocks
# behind "dependency 'cozy-cilium/cilium' is not ready". Hubble stays enabled
# on the agents (hostNetwork, no CNI dependency) with metrics and the static
# flow exporter; reintroduce relay/ui only in a package layer that reconciles
# after kubeovn is Ready. Without relay there is no observer endpoint any
# in-cluster reader can reach — the agents listen on :4244 behind mTLS and
# the platform agent holds neither exec nor port-forward on cozy-cilium — so
# the exported flow log is the readable record of what the datapath dropped.
apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: cozystack.networking
spec:
  components:
    # MTU (2026-07-02 finding, post cold-boot): the Subnet specs in
    # networking/subnet-mtu.yaml govern POD interfaces only. kube-ovn-cni
    # derives the ovn0 node port MTU from its --mtu flag, defaulting to
    # iface MTU - 100 (1420 - 100 = 1320) and re-enforcing that value in its
    # reconcile loop, so manual `ip link set` is reverted. With pods at 1362
    # (MSS 1322) but ovn0 at 1320, every externally-DNATed flow that Cilium
    # load-balances to the node-local ingress pod black-holed full-MSS
    # packets: the kernel forward path emitted "frag needed (mtu 1320)"
    # ICMPs referencing the post-DNAT pod IP, which clients cannot associate
    # with their connection. Symptom: ~1/3 of TLS handshakes/downloads to
    # guardianintelligence.org stalled (fonts, JS chunks). --mtu must match
    # the Subnet MTU: 1362 = 1420 VLAN path MTU - 58 GENEVE.
    kubeovn:
      values:
        kube-ovn:
          mtu: 1362
    cilium:
      values:
        cilium:
          hubble:
            enabled: true
            peerService:
              clusterDomain: cozy.local
            relay:
              enabled: false
            ui:
              enabled: false
            metrics:
              enabled:
                - dns
                # Namespace-level context, not pod or workload: this cluster
                # runs CronJobs on minute schedules, and both `pod` and
                # `workload-name` resolve a Job pod to its timestamped Job
                # name — one new series per run, unbounded. Namespaces are a
                # closed set, and namespace + traffic_direction + protocol
                # narrows a denial to a handful of candidates. The
                # reserved-identity fallback keeps world/host/remote-node
                # sources labelled instead of collapsing them to empty.
                - drop:sourceContext=namespace|reserved-identity;destinationContext=namespace|reserved-identity;labelsContext=traffic_direction
                - tcp
                - flow
                - port-distribution
                - icmp
                - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
              serviceMonitor:
                enabled: true
            # Metrics say a policy is dropping something; they cannot say
            # what. The drop counter is namespace-scoped by construction
            # (pod/workload context mints a series per CronJob run), so a
            # denial can be narrowed to a namespace and never to a port or a
            # peer — three investigations have dead-ended there. The static
            # exporter is the agent-side answer: it needs no pod networking,
            # so it does not reintroduce the cold-boot deadlock that keeps
            # relay and ui disabled above.
            export:
              static:
                enabled: true
                # stdout, not the default rotated hostPath file: fluent-bit
                # already tails container logs into VictoriaLogs, whereas a
                # file needs a new input in the platform-owned fluent-bit
                # ConfigMap, which a chart upgrade replaces wholesale.
                filePath: stdout
                # Denied and errored flows only — the cluster drops ~0.3
                # flows/s in steady state, so this is a rounding error
                # against agent log volume, and it stays bounded because
                # the alert that reads it fires on the same condition. An
                # unfiltered export is every packet and is not affordable.
                # Space-joined into hubble-export-allowlist, so each filter
                # must be compact JSON.
                allowList:
                  - '{"verdict":["DROPPED","ERROR"]}'
