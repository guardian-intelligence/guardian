# Cozystack 1.5 exposes Hubble through the generated cozystack.networking
# Package. The platform chart owns the base Cilium/KubeOVN values; this partial
# Package owns only the Hubble observability fields.
apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: cozystack.networking
spec:
  components:
    cilium:
      values:
        cilium:
          hubble:
            enabled: true
            peerService:
              clusterDomain: cozy.local
            relay:
              enabled: true
              rollOutPods: true
              prometheus:
                enabled: true
                serviceMonitor:
                  enabled: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
            ui:
              enabled: true
              rollOutPods: true
              backend:
                resources:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
              frontend:
                resources:
                  requests:
                    cpu: 25m
                    memory: 64Mi
                  limits:
                    cpu: 250m
                    memory: 256Mi
            metrics:
              enabled:
                - dns
                - drop
                - tcp
                - flow
                - port-distribution
                - icmp
                - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
              serviceMonitor:
                enabled: true
