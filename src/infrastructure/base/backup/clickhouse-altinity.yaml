# Cluster-scoped ClickHouse backup wiring for Cozystack ClickHouse apps.
#
# This declares the reusable Altinity strategy and BackupClass only. Per-app
# backup orchestration still needs backup.enabled plus a tenant-local
# guardian-clickhouse-backup-creds Secret projected from OpenBao.
apiVersion: strategy.backups.cozystack.io/v1alpha1
kind: Altinity
metadata:
  name: guardian-clickhouse-altinity
spec:
  template:
    spec:
      activeDeadlineSeconds: 1800
      restartPolicy: Never
      containers:
        - name: clickhouse-backup-client
          image: docker.io/library/python@sha256:c25cd44f45df1279a2cba589e67dfcd9db04647ea483b117a7de8b1a99bdfb23
          imagePullPolicy: IfNotPresent
          env:
            - name: MODE
              value: "{{ .Mode }}"
            - name: RELEASE_NAME
              value: "{{ .Release.Name }}"
            - name: RELEASE_NAMESPACE
              value: "{{ .Release.Namespace }}"
            - name: BACKUP_APPLICATION_NAME
              value: "{{ .Backup.ApplicationRef.Name }}"
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: clickhouse-{{ .Release.Name }}-backup-api-auth
                  key: username
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-{{ .Release.Name }}-backup-api-auth
                  key: password
          command:
            - python3
            - -c
          args:
            - |
              import base64
              import datetime
              import json
              import os
              import sys
              import time
              import urllib.error
              import urllib.parse
              import urllib.request

              mode = os.environ["MODE"]
              release = os.environ["RELEASE_NAME"]
              namespace = os.environ["RELEASE_NAMESPACE"]
              api = f"http://chi-clickhouse-{release}-clickhouse-0-0.{namespace}.svc:7171"
              basic = base64.b64encode(
                  f"{os.environ['API_USERNAME']}:{os.environ['API_PASSWORD']}".encode()
              ).decode()

              def request(path, method="GET"):
                  req = urllib.request.Request(
                      api + path,
                      method=method,
                      headers={"Authorization": "Basic " + basic},
                  )
                  with urllib.request.urlopen(req, timeout=10) as response:
                      return response.read().decode()

              def parse_json_stream(raw):
                  raw = raw.strip()
                  if not raw:
                      return []
                  if raw.startswith("["):
                      return json.loads(raw)
                  return [json.loads(line) for line in raw.splitlines() if line.strip()]

              for _ in range(60):
                  try:
                      request("/backup/status")
                      break
                  except Exception:
                      time.sleep(5)
              else:
                  print("clickhouse-backup API did not become ready", file=sys.stderr)
                  sys.exit(1)

              if mode == "backup":
                  prefix = f"clickhouse-{release}-"
                  stamp = datetime.datetime.now(datetime.timezone.utc).strftime("%Y%m%dT%H%M%SZ")
                  target = prefix + stamp
                  print("create_remote", target)
                  request("/backup/create_remote?name=" + urllib.parse.quote(target, safe=""), "POST")
              else:
                  source = os.environ["BACKUP_APPLICATION_NAME"]
                  prefix = f"clickhouse-{source}-"
                  backups = parse_json_stream(request("/backup/list/remote"))
                  matching = sorted(
                      [item for item in backups if str(item.get("name", "")).startswith(prefix)],
                      key=lambda item: str(item.get("created", "")),
                  )
                  if not matching:
                      print("no remote backup found for prefix " + prefix, file=sys.stderr)
                      sys.exit(1)
                  target = matching[-1]["name"]
                  print("restore_remote", target)
                  request("/backup/restore_remote/" + urllib.parse.quote(target, safe=""), "POST")

              deadline = time.time() + 1800
              while time.time() < deadline:
                  actions = parse_json_stream(request("/backup/actions"))
                  matching = sorted(
                      [
                          item
                          for item in actions
                          if str(item.get("command", "")).endswith(target)
                      ],
                      key=lambda item: str(item.get("start", "")),
                  )
                  if matching:
                      status = matching[-1].get("status", "")
                      if status == "success":
                          print("operation succeeded")
                          sys.exit(0)
                      if status == "error":
                          print(
                              "operation failed: " + str(matching[-1].get("error", "unknown")),
                              file=sys.stderr,
                          )
                          sys.exit(1)
                  time.sleep(5)

              print("operation timed out waiting for action completion", file=sys.stderr)
              sys.exit(1)
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: backups.cozystack.io/v1alpha1
kind: BackupClass
metadata:
  name: guardian-clickhouse-altinity
spec:
  strategies:
    - application:
        apiGroup: apps.cozystack.io
        kind: ClickHouse
      strategyRef:
        apiGroup: strategy.backups.cozystack.io
        kind: Altinity
        name: guardian-clickhouse-altinity
