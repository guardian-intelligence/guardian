# Cluster-scoped CNPG backup wiring for Cozystack Postgres apps.
#
# This declares the reusable backup strategy and class. Per-app backup
# activation lives on each Postgres app CR so object-store coordinates stay
# beside the workload that owns the backup stream.
apiVersion: strategy.backups.cozystack.io/v1alpha1
kind: CNPG
metadata:
  name: guardian-postgres-r2
spec:
  template:
    serverName: "{{ .Application.metadata.namespace }}-{{ .Application.metadata.name }}"
    barmanObjectStore:
      destinationPath: "{{ .Application.spec.backup.destinationPath }}"
      endpointURL: "{{ .Application.spec.backup.endpointURL }}"
      retentionPolicy: "30d"
      s3Credentials:
        secretRef:
          name: "{{ .Application.spec.backup.s3CredentialsSecret.name }}"
        accessKeyIDKey: "{{ .Application.spec.backup.s3CredentialsSecret.accessKeyIDKey }}"
        secretAccessKeyKey: "{{ .Application.spec.backup.s3CredentialsSecret.secretAccessKeyKey }}"
      data:
        compression: gzip
      wal:
        compression: gzip
---
apiVersion: backups.cozystack.io/v1alpha1
kind: BackupClass
metadata:
  name: guardian-postgres-cnpg
spec:
  strategies:
    - application:
        apiGroup: apps.cozystack.io
        kind: Postgres
      strategyRef:
        apiGroup: strategy.backups.cozystack.io
        kind: CNPG
        name: guardian-postgres-r2
