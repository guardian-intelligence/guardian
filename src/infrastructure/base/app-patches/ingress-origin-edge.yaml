# TLS terminates at Cloudflare edge. Keep one ingress controller on each origin
# node and keep origin HTTP/2 disabled; the current ClusterIP+externalIPs
# service path requires Cluster traffic policy to remain reachable.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-system
  namespace: tenant-root
spec:
  values:
    ingress-nginx:
      controller:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - ingress-nginx
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - ingress-nginx-system
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - controller
                topologyKey: kubernetes.io/hostname
        config:
          use-http2: "false"
          # Trust labeling for the analytics/fraud pipeline: the x-guardian-*
          # headers exist only on connections that passed Authenticated Origin
          # Pulls client-cert verification ($ssl_client_verify=SUCCESS, see the
          # company-site Ingress auth-tls annotations). Everything else gets
          # empty values, which proxy_set_header strips — so a client-supplied
          # x-guardian-client-ip can never reach an upstream, and apps can
          # treat x-guardian-client-ip-source=cloudflare as proof the address
          # came from the edge, not from a spoofable header.
          http-snippet: |
            map $ssl_client_verify $guardian_client_ip {
              "SUCCESS" $http_cf_connecting_ip;
              default "";
            }
            map $ssl_client_verify $guardian_client_ip_source {
              "SUCCESS" "cloudflare";
              default "";
            }
        proxySetHeaders:
          x-guardian-client-ip: $guardian_client_ip
          x-guardian-client-ip-source: $guardian_client_ip_source
          x-guardian-edge-peer-ip: $remote_addr
        service:
          externalTrafficPolicy: Cluster
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
