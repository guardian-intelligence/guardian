# TLS terminates at Cloudflare edge. Keep one ingress controller on each origin
# node and keep origin HTTP/2 disabled; the current ClusterIP+externalIPs
# service path requires Cluster traffic policy to remain reachable.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-system
  namespace: tenant-root
spec:
  values:
    ingress-nginx:
      controller:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - ingress-nginx
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - ingress-nginx-system
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - controller
                topologyKey: kubernetes.io/hostname
        config:
          use-http2: "false"
          # x-guardian-* headers exist only on AOP-verified connections
          # ($ssl_client_verify=SUCCESS); empty elsewhere, and proxy_set_header
          # with an empty value strips client-supplied values.
          http-snippet: |
            map $ssl_client_verify $guardian_client_ip_source {
              "SUCCESS" "cloudflare";
              default "";
            }
            # The verify gate lives in exactly one map; per-header values
            # derive from it, so a new header can't ship with its own
            # (divergent) copy of the trust check.
            map $guardian_client_ip_source $guardian_client_ip {
              "cloudflare" $http_cf_connecting_ip;
              default "";
            }
            map $guardian_client_ip_source $guardian_client_country {
              "cloudflare" $http_cf_ipcountry;
              default "";
            }
        proxySetHeaders:
          x-guardian-client-ip: $guardian_client_ip
          x-guardian-client-ip-source: $guardian_client_ip_source
          x-guardian-client-country: $guardian_client_country
          # Not $remote_addr: the realip module rewrites it from the
          # client-settable CF-Connecting-IP. $realip_remote_addr is the TCP peer.
          x-guardian-edge-peer-ip: $realip_remote_addr
        service:
          externalTrafficPolicy: Cluster
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
