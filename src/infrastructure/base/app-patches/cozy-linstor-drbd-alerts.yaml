# Piraeus emits one warning for every volume on a degraded DRBD link and for
# every device being resynced. Collapse those into their actionable fault
# domains and require two minutes of persistence, while leaving the immediate
# data-loss and stalled-resync alerts unchanged. The test operations make a
# chart rule reorder fail rendering instead of modifying the wrong rule.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: piraeus-operator
  namespace: cozy-linstor
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: monitoring.coreos.com
              version: v1
              kind: PrometheusRule
              name: piraeus-datastore
            patch: |-
              - op: test
                path: /spec/groups/1/name
                value: drbd.rules
              - op: test
                path: /spec/groups/1/rules/1/alert
                value: drbdConnectionNotConnected
              - op: replace
                path: /spec/groups/1/rules/1/expr
                value: sum by (cluster, tenant, tier, prometheus, job, node, conn_name) (drbd_connection_state{drbd_connection_state!="Connected"} > 0) > 0
              - op: add
                path: /spec/groups/1/rules/1/for
                value: 2m
              - op: add
                path: /spec/groups/1/rules/1/labels/exported_instance
                value: '{{ $labels.node }}->{{ $labels.conn_name }}'
              - op: replace
                path: /spec/groups/1/rules/1/labels/severity
                value: warning
              - op: replace
                path: /spec/groups/1/rules/1/annotations/description
                value: |
                  {{ $value }} DRBD resources on "{{ $labels.node }}" have not been connected to "{{ $labels.conn_name }}" for at least 2 minutes.
              - op: test
                path: /spec/groups/1/rules/2/alert
                value: drbdDeviceNotUpToDate
              - op: replace
                path: /spec/groups/1/rules/2/expr
                value: sum by (cluster, tenant, tier, prometheus, job, node) (drbd_device_state{drbd_device_state!~"UpToDate|Diskless"} > 0) > 0
              - op: add
                path: /spec/groups/1/rules/2/for
                value: 2m
              - op: add
                path: /spec/groups/1/rules/2/labels/exported_instance
                value: '{{ $labels.node }}/drbd-devices'
              - op: replace
                path: /spec/groups/1/rules/2/labels/severity
                value: warning
              - op: replace
                path: /spec/groups/1/rules/2/annotations/description
                value: |
                  {{ $value }} DRBD devices on "{{ $labels.node }}" have not been UpToDate or intentionally Diskless for at least 2 minutes.
