# Cozystack 1.5 projects system-bucket credentials for ClickHouse through
# cozy-backups-creds, but its projector strips the endpoint scheme while the
# bundled clickhouse-backup image requires S3_ENDPOINT to be a URI. Keep the
# credentials, bucket, region, and forcePathStyle keys Cozystack-managed; only
# post-render the non-secret endpoint value into the ClickHouseInstallation.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickhouse-guardian
  namespace: tenant-root
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: clickhouse.altinity.com
              version: v1
              kind: ClickHouseInstallation
              name: clickhouse-guardian
            patch: |-
              - op: remove
                path: /spec/templates/podTemplates/0/spec/containers/1/env/12/valueFrom
              - op: add
                path: /spec/templates/podTemplates/0/spec/containers/1/env/12/value
                value: https://s3.guardianintelligence.org
