# The monitoring-agents chart renders an empty VMAgent resource block, which
# leaves the generated pod at the operator's 200m CPU limit. Keep the VMAgent
# owned by that chart and give its scrape bursts headroom in the rendered CR.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitoring-agents
  namespace: cozy-monitoring
spec:
  postRenderers:
    - kustomize:
        patches:
          - target:
              group: operator.victoriametrics.com
              version: v1beta1
              kind: VMAgent
              name: vmagent
            patch: |-
              - op: add
                path: /spec/resources
                value:
                  requests:
                    cpu: 100m
                    memory: 200Mi
                  limits:
                    cpu: 500m
                    memory: 500Mi
