# The monitoring-agents chart renders an empty resource block, which leaves
# the generated pod at the operator's 200m CPU limit. This partial object owns
# only the resource fields while the chart continues to own scrape behavior.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: vmagent
  namespace: cozy-monitoring
spec:
  resources:
    requests:
      cpu: 100m
      memory: 200Mi
    limits:
      cpu: 500m
      memory: 500Mi
