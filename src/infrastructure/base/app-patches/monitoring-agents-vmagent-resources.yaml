# The single collector cold-starts every target and writes to both metrics
# stores, so its resource envelope must cover the concurrent scrape and
# remote-write peak. Its cAdvisor scrape is labelled job="cadvisor", while
# the chart's kube-prometheus recording rules select job="kubelet" plus
# metrics_path="/metrics/cadvisor". The global relabel fixes that contract
# once before both remote-write destinations.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMAgent
metadata:
  name: vmagent
  namespace: cozy-monitoring
spec:
  inlineRelabelConfig:
    - action: replace
      sourceLabels: [job, metrics_path]
      regex: cadvisor;/metrics/cadvisor
      targetLabel: job
      replacement: kubelet
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
