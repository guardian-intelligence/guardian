# VMRule preserves unknown fields, so its rule group is atomic under server-side
# apply. Keep the chart group intact while matching certificate expiry to the
# platform's short-lived clients. Talos temporary admin clients live for ten
# minutes; a certificate population below one hour for fifteen minutes has
# persisted beyond a complete temporary-client lifetime and needs attention.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: alerts-kubernetes-system-apiserver
  namespace: cozy-monitoring
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: Override
spec:
  groups:
    - name: kubernetes-system-apiserver
      params: {}
      rules:
        - alert: KubeClientCertificateExpiration
          annotations:
            description: >-
              Client certificates used to authenticate to the Kubernetes API
              have remained within one hour of expiry for fifteen minutes.
              Check for a client that is failing to renew or an unexpectedly
              persistent short-lived admin session.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeclientcertificateexpiration
            summary: Client certificate renewal is not keeping ahead of expiry.
          expr: >-
            apiserver_client_certificate_expiration_seconds_count{job="kube-apiserver"} > 0
            and on (job, cluster)
            histogram_quantile(0.01,
              sum by (job, le, cluster) (
                rate(apiserver_client_certificate_expiration_seconds_bucket{job="kube-apiserver"}[5m])
              )
            ) < 3600
          for: 15m
          labels:
            exported_instance: "{{ $labels.cluster }}/apiserver"
            service: kubernetes-system-apiserver
            severity: warning
        - alert: KubeAggregatedAPIErrors
          annotations:
            description: Kubernetes aggregated API {{ $labels.name }}/{{ $labels.namespace }} has reported errors. It has appeared unavailable {{ $value | humanize }} times averaged over the past 10m.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeaggregatedapierrors
            summary: Kubernetes aggregated API has reported errors.
          expr: sum by (name,namespace,cluster)(increase(aggregator_unavailable_apiservice_total{job="kube-apiserver"}[10m])) > 4
          labels:
            exported_instance: "{{ $labels.name }}/{{ $labels.namespace }}"
            service: kubernetes-system-apiserver
            severity: warning
        - alert: KubeAggregatedAPIDown
          annotations:
            description: Kubernetes aggregated API {{ $labels.name }}/{{ $labels.namespace }} has been only {{ $value | humanize }}% available over the last 10m.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeaggregatedapidown
            summary: Kubernetes aggregated API is down.
          expr: (1 - max by (name,namespace,cluster)(avg_over_time(aggregator_unavailable_apiservice{job="kube-apiserver"}[10m]))) * 100 < 85
          for: 5m
          labels:
            exported_instance: "{{ $labels.name }}/{{ $labels.namespace }}"
            service: kubernetes-system-apiserver
            severity: warning
        - alert: KubeAPIDown
          annotations:
            description: KubeAPI has disappeared from Prometheus target discovery.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeapidown
            summary: Target disappeared from Prometheus target discovery.
          expr: absent(up{job="kube-apiserver"} == 1)
          for: 15m
          labels:
            exported_instance: "{{ $labels.cluster }}/apiserver"
            service: kubernetes-system-apiserver
            severity: critical
        - alert: KubeAPITerminatedRequests
          annotations:
            description: The Kubernetes API server has terminated {{ $value | humanizePercentage }} of its incoming requests.
            runbook_url: https://runbooks.prometheus-operator.dev/runbooks/kubernetes/kubeapiterminatedrequests
            summary: The Kubernetes API server has terminated {{ $value | humanizePercentage }} of its incoming requests.
          expr: >-
            sum(rate(apiserver_request_terminations_total{job="kube-apiserver"}[10m])) /
            (
              sum(rate(apiserver_request_total{job="kube-apiserver"}[10m]))
              + sum(rate(apiserver_request_terminations_total{job="kube-apiserver"}[10m]))
            ) > 0.20
          for: 5m
          labels:
            exported_instance: "{{ $labels.cluster }}/apiserver"
            service: kubernetes-system-apiserver
            severity: warning
