# The Multus chart fixes both the request and limit at 100m. Its daemon on
# ash-wind spends over half of its CFS periods throttled even though sustained
# usage is low. Keep the request chart-owned and include the immutable workload
# identity required to validate this partial server-side apply.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cozy-multus
  namespace: cozy-multus
  annotations:
    kustomize.toolkit.fluxcd.io/ssa: Override
spec:
  selector:
    matchLabels:
      name: multus
  template:
    metadata:
      labels:
        name: multus
    spec:
      containers:
        - name: kube-multus
          resources:
            limits:
              cpu: 500m
