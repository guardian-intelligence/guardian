# images.declared.lock — the hand-DECLARED half of the OCI artifact
# inventory: every artifact a cold guardian-mgmt bootstrap must serve that
# is NOT rendered from this repo's manifest trees. The complete inventory
# is the GENERATED union of this file and the rendered refs extracted from
# src/infrastructure/deployments + src/infrastructure/base:
#
#   bazelisk run //src/infrastructure/cmd/imageset -- \
#     --declared src/infrastructure/bootstrap/bundle/images.declared.lock \
#     --repo-root "$PWD" --out dist/images.lock
#
# CI signs the union on main (images-lock-sign.yml); `aspect infra bundle`
# re-derives it and refuses a drive whose union CI never signed. One
# ref@digest per line; # starts a comment.
#
# What belongs here (and only here):
#   bootstrap artifacts: Talos installer + Cozystack installer chart and
#                        packages artifact, referenced by bootstrap tooling
#                        rather than manifests (in-tree Flux OCIRepository
#                        chart pins are RENDERED and live in the union's
#                        rendered half)
#   system images:       talosctl images default (pinned talosctl, matches
#                        machine.install.image)
#   operator-spawned:    images run by Cozystack/app operators that no repo
#                        manifest names (additive live audit; the
#                        image-provenance admission policy flags undeclared
#                        images in covered namespaces as they appear)
#   Go-tool-referenced:  drill/bench job images pinned in Go sources, which
#                        the manifest extractor cannot see
#
# Invariants (Tier-1 conformance tests + the imageset generator):
#   - every entry is digest-pinned
#   - no (repo, digest) pair appears twice
#   - DISJOINT from the rendered set: an entry that a manifest also renders
#     is stale bookkeeping and fails the union — delete it here

