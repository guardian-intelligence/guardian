# Bootstrap entrypoint (dark uplink): `kubectl apply -k` this directory
# exactly once on a fresh cluster whose only reachable endpoint is the
# haul-served mirror. It is the steady entrypoint with three deltas:
# sourceRefs resolve to the OCIRepository, the guardian-source ConfigMap
# makes Flux's own re-application of sync.yaml keep resolving them that way
# (postBuild substitution), and the OCIRepository itself is added. The
# GitRepository stays declared but unused (Not Ready without uplink; nothing
# sources from it). Exiting dark mode is the reverse: delete the ConfigMap,
# let sources flip back to GitRepository on the next reconcile, then delete
# the OCIRepository.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/flux
  - guardian-source-configmap.yaml
  - oci-repository.yaml
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
    patch: |-
      - op: replace
        path: /spec/sourceRef/kind
        value: OCIRepository
      - op: replace
        path: /spec/sourceRef/name
        value: guardian-oci
