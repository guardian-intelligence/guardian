# Bootstrap/steady entrypoint: `kubectl apply -k` this directory to bootstrap
# a fresh cluster, and to EXIT dark mode (it is idempotent — it restores the
# guardian-source ConfigMap to GitRepository and patches the top-level
# Kustomizations back). kubectl performs no Flux post-build substitution and
# the Kustomization CRD's sourceRef.kind enum rejects an unresolved
# placeholder, so the JSON patch resolves the initial apply; thereafter Flux
# resolves the ${GUARDIAN_SOURCE_*} placeholders itself via
# postBuild.substituteFrom the guardian-source ConfigMap declared here.
#
# The ConfigMap must exist even in steady state: Flux runs variable
# substitution only when the variable map is non-empty, so without it the
# placeholders would pass through literally and be rejected.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base/flux
  - guardian-source-configmap.yaml
patches:
  - target:
      group: kustomize.toolkit.fluxcd.io
      kind: Kustomization
    patch: |-
      - op: replace
        path: /spec/sourceRef/kind
        value: GitRepository
      - op: replace
        path: /spec/sourceRef/name
        value: guardian
