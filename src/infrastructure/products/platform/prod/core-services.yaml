# Platform prod tenant core services.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: guardian
  namespace: tenant-guardiancommercial-platform-prod
spec:
  replicas: 3
  size: 5Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
  backup:
    enabled: true
    retentionPolicy: 30d
    destinationPath: s3://guardian-vault/guardian/guardian-mgmt/tenant-guardiancommercial-platform-prod/postgres/guardian/
    endpointURL: https://c3eaeffaadf7d4847684d4775c16d598.r2.cloudflarestorage.com
    schedule: ""
    s3CredentialsSecret:
      name: guardian-cnpg-backup-creds
      accessKeyIDKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
---
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: guardian-postgres-daily
  namespace: tenant-guardiancommercial-platform-prod
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: Postgres
    name: guardian
  backupClassName: guardian-postgres-cnpg
  schedule:
    type: cron
    cron: "37 1 * * *"
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Harbor
metadata:
  name: guardian
  namespace: tenant-guardiancommercial-platform-prod
spec:
  host: harbor.prod.gi.org
  storageClass: replicated
  database:
    replicas: 3
    size: 5Gi
  redis:
    replicas: 3
    size: 1Gi
  trivy:
    enabled: true
    size: 2Gi
---
apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: guardian
  namespace: tenant-guardiancommercial-platform-prod
spec:
  replicas: 3
  shards: 1
  size: 10Gi
  storageClass: replicated
  logStorageSize: 2Gi
  backup:
    enabled: true
    schedule: ""
    s3CredentialsSecret:
      name: guardian-clickhouse-backup-creds
  clickhouseKeeper:
    enabled: true
    replicas: 3
    size: 1Gi
---
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: guardian-clickhouse-daily
  namespace: tenant-guardiancommercial-platform-prod
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: ClickHouse
    name: guardian
  backupClassName: guardian-clickhouse-altinity
  schedule:
    type: cron
    cron: "41 1 * * *"
