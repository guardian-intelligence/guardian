# Platform product observability hub inherited by dev, gamma, and prod.
apiVersion: apps.cozystack.io/v1alpha1
kind: Monitoring
metadata:
  name: monitoring
  namespace: tenant-guardiancommercial-platform
spec:
  host: grafana.platform.guardianintelligence.org
  metricsStorages:
    - name: shortterm
      retentionPeriod: 3d
      deduplicationInterval: 15s
      storage: 5Gi
      storageClassName: replicated
      vminsert:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmselect:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmstorage:
        minAllowed:
          cpu: 50m
          memory: 256Mi
        maxAllowed:
          cpu: 500m
          memory: 1Gi
    - name: longterm
      retentionPeriod: 14d
      deduplicationInterval: 5m
      storage: 10Gi
      storageClassName: replicated
      vminsert:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmselect:
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 500m
          memory: 512Mi
      vmstorage:
        minAllowed:
          cpu: 50m
          memory: 256Mi
        maxAllowed:
          cpu: 500m
          memory: 1Gi
  logsStorages:
    - name: generic
      retentionPeriod: "7"
      storage: 5Gi
      storageClassName: replicated
  grafana:
    db:
      size: 2Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  alerta:
    storage: 2Gi
    storageClassName: replicated
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 512Mi
  vmagent:
    externalLabels:
      cluster: guardian-mgmt
      guardian_product: platform
    remoteWrite:
      urls:
        - http://vminsert-shortterm:8480/insert/0/prometheus
        - http://vminsert-longterm:8480/insert/0/prometheus
