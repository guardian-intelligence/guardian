# Platform dev tenant core services. The tenant namespace is created by
# Tenant/dev under tenant-guardiancommercial-platform.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: guardian
  namespace: tenant-guardiancommercial-platform-dev
spec:
  replicas: 3
  size: 5Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
  backup:
    enabled: true
    retentionPolicy: 30d
    schedule: ""
    useSystemBucket: true
---
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: guardian-postgres-daily
  namespace: tenant-guardiancommercial-platform-dev
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: Postgres
    name: guardian
  backupClassName: cozy-default
  schedule:
    type: cron
    cron: "13 1 * * *"
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Harbor
metadata:
  name: guardian
  namespace: tenant-guardiancommercial-platform-dev
spec:
  host: harbor.dev.gi.org
  storageClass: replicated
  database:
    replicas: 3
    size: 5Gi
  redis:
    replicas: 3
    size: 1Gi
  trivy:
    enabled: true
    size: 2Gi
---
apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: guardian
  namespace: tenant-guardiancommercial-platform-dev
spec:
  replicas: 3
  shards: 1
  size: 10Gi
  storageClass: replicated
  logStorageSize: 2Gi
  backup:
    enabled: true
    schedule: ""
    useSystemBucket: true
  clickhouseKeeper:
    enabled: true
    replicas: 3
    size: 1Gi
---
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: guardian-clickhouse-daily
  namespace: tenant-guardiancommercial-platform-dev
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: ClickHouse
    name: guardian
  backupClassName: cozy-default
  schedule:
    type: cron
    cron: "23 1 * * *"
