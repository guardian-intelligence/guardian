---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evidence-http-load
  namespace: tenant-root
data:
  run.sh: |
    #!/bin/sh
    set -eu

    requests="${REQUESTS:-100}"
    failures=0
    total=0

    while read -r label url; do
      [ -n "${label}" ] || continue
      i=1
      target_failures=0
      while [ "${i}" -le "${requests}" ]; do
        total=$((total + 1))
        if ! curl -fsSL --connect-timeout 5 --max-time 20 --retry 2 --output /dev/null "${url}"; then
          echo "request failed label=${label} url=${url} iteration=${i}" >&2
          failures=$((failures + 1))
          target_failures=$((target_failures + 1))
        fi
        i=$((i + 1))
      done
      echo "http-target label=${label} url=${url} total=${requests} failures=${target_failures}"
    done <<'TARGETS'
    company-prod-root https://guardianintelligence.org/
    company-prod-letters https://guardianintelligence.org/letters/
    company-prod-news https://guardianintelligence.org/news/
    company-prod-healthz https://guardianintelligence.org/healthz
    company-prod-metrics https://guardianintelligence.org/metrics
    company-dev-root https://dev.guardianintelligence.org/
    company-dev-letters https://dev.guardianintelligence.org/letters/
    company-dev-news https://dev.guardianintelligence.org/news/
    company-dev-healthz https://dev.guardianintelligence.org/healthz
    company-dev-metrics https://dev.guardianintelligence.org/metrics
    company-gamma-root https://gamma.guardianintelligence.org/
    company-gamma-letters https://gamma.guardianintelligence.org/letters/
    company-gamma-news https://gamma.guardianintelligence.org/news/
    company-gamma-healthz https://gamma.guardianintelligence.org/healthz
    company-gamma-metrics https://gamma.guardianintelligence.org/metrics
    harbor-health https://oci.guardianintelligence.org/api/v2.0/health
    dashboard-root https://dashboard.guardianintelligence.org/
    TARGETS

    echo "http-load total=${total} failures=${failures}"
    test "${failures}" -eq 0
---
apiVersion: batch/v1
kind: Job
metadata:
  name: evidence-http-load
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: evidence-http-load
    guardian.dev/evidence: infrastructure
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evidence-http-load
        guardian.dev/evidence: infrastructure
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: curl
          image: docker.io/curlimages/curl@sha256:c1fe1679c34d9784c1b0d1e5f62ac0a79fca01fb6377cdd33e90473c6f9f9a69
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/run.sh"]
          env:
            - name: REQUESTS
              value: "100"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
      volumes:
        - name: scripts
          configMap:
            name: evidence-http-load
            defaultMode: 0555
