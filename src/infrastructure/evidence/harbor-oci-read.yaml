---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evidence-harbor-oci-read
  namespace: tenant-root
data:
  run.sh: |
    #!/bin/sh
    set -eu

    requests="${REQUESTS:-25}"
    registry_host="${REGISTRY_HOST:-oci.guardianintelligence.org}"
    repository="${REPOSITORY:-guardian/company-site}"
    digest="${DIGEST:-sha256:708390f2a646b7286fdc29c6d9bc0cc789932aa7ae6fa899ce436084e5435277}"
    url="https://${registry_host}/v2/${repository}/manifests/${digest}"
    accept="application/vnd.oci.image.manifest.v1+json, application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json"

    failures=0
    i=1
    while [ "${i}" -le "${requests}" ]; do
      headers="$(mktemp)"
      if curl -fsSL \
        --connect-timeout 5 \
        --max-time 20 \
        --retry 2 \
        -H "Accept: ${accept}" \
        -D "${headers}" \
        -o /dev/null \
        "${url}"; then
        resolved="$(awk 'tolower($1) == "docker-content-digest:" {print $2}' "${headers}" | tr -d '\r' | tail -n 1)"
        if [ "${resolved}" != "${digest}" ]; then
          echo "digest mismatch expected=${digest} resolved=${resolved:-missing} iteration=${i}" >&2
          failures=$((failures + 1))
        fi
      else
        echo "manifest read failed url=${url} iteration=${i}" >&2
        failures=$((failures + 1))
      fi
      rm -f "${headers}"
      i=$((i + 1))
    done

    echo "harbor-oci-read total=${requests} failures=${failures} repository=${repository} digest=${digest}"
    test "${failures}" -eq 0
---
apiVersion: batch/v1
kind: Job
metadata:
  name: evidence-harbor-oci-read
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: evidence-harbor-oci-read
    guardian.dev/evidence: infrastructure
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evidence-harbor-oci-read
        guardian.dev/evidence: infrastructure
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: curl
          image: docker.io/curlimages/curl@sha256:c1fe1679c34d9784c1b0d1e5f62ac0a79fca01fb6377cdd33e90473c6f9f9a69
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/run.sh"]
          env:
            - name: REQUESTS
              value: "25"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 500m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
      volumes:
        - name: scripts
          configMap:
            name: evidence-harbor-oci-read
            defaultMode: 0555
