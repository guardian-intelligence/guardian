---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evidence-postgres-load
  namespace: tenant-root
data:
  run.sh: |
    #!/bin/sh
    set -eu

    workers="${POSTGRES_WORKERS:-4}"
    rows_per_worker="${POSTGRES_ROWS_PER_WORKER:-250}"
    expected=$((workers * rows_per_worker))
    safe_host="$(printf '%s' "${HOSTNAME:-pod}" | tr -c 'A-Za-z0-9_' '_')"
    run_id="pg_$(date -u +%Y%m%dT%H%M%SZ)_${safe_host}"

    export PGHOST="${PGHOST:-postgres-guardian-rw}"
    export PGPORT="${PGPORT:-5432}"
    export PGDATABASE="${PGDATABASE:-guardian_evidence}"
    export PGUSER="${PGUSER:-guardian_evidence}"

    psql -qAt -v ON_ERROR_STOP=1 <<'SQL'
    CREATE SCHEMA IF NOT EXISTS guardian_evidence;
    CREATE TABLE IF NOT EXISTS guardian_evidence.postgres_load (
      run_id text NOT NULL,
      worker integer NOT NULL,
      seq integer NOT NULL,
      payload text NOT NULL,
      observed_at timestamptz NOT NULL DEFAULT now(),
      PRIMARY KEY (run_id, worker, seq)
    );
    SQL

    run_worker() {
      worker="$1"
      psql -qAt -v ON_ERROR_STOP=1 \
        -v run_id="${run_id}" \
        -v worker="${worker}" \
        -v rows_per_worker="${rows_per_worker}" <<'SQL'
    INSERT INTO guardian_evidence.postgres_load (run_id, worker, seq, payload)
    SELECT :'run_id',
           (:'worker')::integer,
           gs,
           repeat('guardian-postgres-load', 16)
    FROM generate_series(1, (:'rows_per_worker')::integer) AS gs
    ON CONFLICT (run_id, worker, seq) DO NOTHING;
    SQL
    }

    i=1
    while [ "${i}" -le "${workers}" ]; do
      run_worker "${i}" &
      i=$((i + 1))
    done
    wait

    actual="$(psql -qAt -v ON_ERROR_STOP=1 -v run_id="${run_id}" <<'SQL'
    SELECT count(*) FROM guardian_evidence.postgres_load WHERE run_id = :'run_id';
    SQL
    )"

    echo "postgres-load run_id=${run_id} workers=${workers} rows_per_worker=${rows_per_worker} expected=${expected} actual=${actual}"
    test "${actual}" -eq "${expected}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: evidence-postgres-load
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: evidence-postgres-load
    guardian.dev/evidence: infrastructure
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evidence-postgres-load
        guardian.dev/evidence: infrastructure
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: psql
          image: docker.io/library/postgres@sha256:3f0182f7f06d949972a1d1901ff774e6d0b7c03ca95a27a12958d713fe5ea153
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/run.sh"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-guardian-credentials
                  key: guardian_evidence
            - name: POSTGRES_WORKERS
              value: "4"
            - name: POSTGRES_ROWS_PER_WORKER
              value: "250"
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
      volumes:
        - name: scripts
          configMap:
            name: evidence-postgres-load
            defaultMode: 0555
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evidence-clickhouse-load
  namespace: tenant-root
data:
  run.sh: |
    #!/bin/sh
    set -eu

    workers="${CLICKHOUSE_WORKERS:-4}"
    rows_per_worker="${CLICKHOUSE_ROWS_PER_WORKER:-250}"
    expected=$((workers * rows_per_worker))
    safe_host="$(printf '%s' "${HOSTNAME:-pod}" | tr -c 'A-Za-z0-9_' '_')"
    run_id="ch_$(date -u +%Y%m%dT%H%M%SZ)_${safe_host}"

    host="${CLICKHOUSE_HOST:-chendpoint-clickhouse-ledger}"
    port="${CLICKHOUSE_PORT:-9000}"
    user="${CLICKHOUSE_USER:-guardian_evidence}"

    clickhouse-client \
      --host "${host}" \
      --port "${port}" \
      --user "${user}" \
      --password "${CLICKHOUSE_PASSWORD}" \
      --multiquery <<'SQL'
    CREATE TABLE IF NOT EXISTS guardian_evidence_wide_events
    (
      run_id String,
      worker UInt16,
      seq UInt32,
      observed_at DateTime64(3),
      event_name LowCardinality(String),
      trace_id String,
      span_id String,
      float_value Float64,
      attributes Map(String, String)
    )
    ENGINE = MergeTree
    ORDER BY (run_id, worker, seq);
    SQL

    run_worker() {
      worker="$1"
      clickhouse-client \
        --host "${host}" \
        --port "${port}" \
        --user "${user}" \
        --password "${CLICKHOUSE_PASSWORD}" \
        --query "
    INSERT INTO guardian_evidence_wide_events
    SELECT
      '${run_id}',
      toUInt16(${worker}),
      toUInt32(number),
      now64(3),
      'guardian.clickhouse.load',
      concat('${run_id}', '-', toString(number)),
      concat('span-', toString(${worker}), '-', toString(number)),
      toFloat64(number),
      map('component', 'clickhouse', 'worker', toString(${worker}))
    FROM numbers(${rows_per_worker})"
    }

    i=1
    while [ "${i}" -le "${workers}" ]; do
      run_worker "${i}" &
      i=$((i + 1))
    done
    wait

    actual="$(clickhouse-client \
      --host "${host}" \
      --port "${port}" \
      --user "${user}" \
      --password "${CLICKHOUSE_PASSWORD}" \
      --query "SELECT count() FROM guardian_evidence_wide_events WHERE run_id='${run_id}'")"
    cluster_rows="$(clickhouse-client \
      --host "${host}" \
      --port "${port}" \
      --user "${user}" \
      --password "${CLICKHOUSE_PASSWORD}" \
      --query "SELECT count() FROM system.clusters WHERE cluster='clickhouse'")"

    echo "clickhouse-load run_id=${run_id} workers=${workers} rows_per_worker=${rows_per_worker} expected=${expected} actual=${actual} cluster_rows=${cluster_rows}"
    test "${actual}" -eq "${expected}"
    test "${cluster_rows}" -ge 1
---
apiVersion: batch/v1
kind: Job
metadata:
  name: evidence-clickhouse-load
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: evidence-clickhouse-load
    guardian.dev/evidence: infrastructure
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: evidence-clickhouse-load
        guardian.dev/evidence: infrastructure
    spec:
      restartPolicy: Never
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: clickhouse-client
          image: docker.io/clickhouse/clickhouse-server@sha256:cc8c5bf275148b2de01a31e8fd6b55ba1ba2b0d3d08c23fafcb25b06e3c5dec5
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/run.sh"]
          env:
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-ledger-credentials
                  key: guardian_evidence
            - name: CLICKHOUSE_WORKERS
              value: "4"
            - name: CLICKHOUSE_ROWS_PER_WORKER
              value: "250"
            - name: HOME
              value: /tmp
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
      volumes:
        - name: scripts
          configMap:
            name: evidence-clickhouse-load
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
