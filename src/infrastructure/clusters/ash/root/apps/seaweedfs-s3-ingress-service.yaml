# Cozystack v1.5.0 renders the system S3 Ingress backend as
# seaweedfs-system-s3 while the patched chart Service is seaweedfs-s3.
# This Service gives the generated Ingress the backend it declares.
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-system-s3
  namespace: tenant-root
  labels:
    app.kubernetes.io/component: s3
    app.kubernetes.io/instance: seaweedfs-system
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/part-of: cozystack-seaweedfs
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  trafficDistribution: PreferClose
  ports:
    - name: swfs-s3
      port: 8333
      protocol: TCP
      targetPort: 8333
    - name: metrics
      port: 9327
      protocol: TCP
      targetPort: 9327
  selector:
    app.kubernetes.io/component: s3
    app.kubernetes.io/instance: seaweedfs-system
    app.kubernetes.io/name: seaweedfs
