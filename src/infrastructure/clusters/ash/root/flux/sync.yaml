# GitOps entrypoint for the guardian-mgmt cluster.
#
# Cozystack already runs Flux in-cluster (cozy-fluxcd). These objects make Flux
# reconcile the management-cluster substrate in ordered slices, turning the
# by-hand bring-up into a control loop.
#
# Bootstrap: `kubectl apply -f src/infrastructure/clusters/ash/root/flux/sync.yaml` once. The
# Kustomization then manages this file too (the path includes flux/), so further
# changes flow through git.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: guardian
  namespace: cozy-fluxcd
spec:
  interval: 10s
  url: https://github.com/guardian-intelligence/guardian
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/clusters/ash/root/cozystack
  sourceRef:
    kind: GitRepository
    name: guardian
  # Apply-only. The Platform package fans out into Cozystack-owned packages and
  # HelmReleases; the storage slice below retries until the Piraeus CRDs exist.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-platform-patches
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/clusters/ash/root/platform-patches
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform
  # These patches target Cozystack-generated platform Package objects. They
  # retry until the platform chart has created the targets and never prune
  # generated objects.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-storage
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 30s
  path: ./src/infrastructure/clusters/ash/root/storage
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform
  # Apply-only. The LINSTOR data-pool CRDs are created by the Platform package;
  # Flux retry handles that CRD discovery race without a manual kubectl apply.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-base
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 2m
  path: ./src/infrastructure/clusters/ash/root
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-platform
    - name: guardian-mgmt-storage
  # This slice owns root tenant apps, networking, OpenBao policy, and the Flux
  # entrypoint. The Cozystack platform package and storage classes are separate
  # apply-only slices, so this inventory can now be pruned safely.
  prune: true
  # Do not wait here: this Kustomization owns the dependent product/tenant
  # Kustomizations, and those children depend on this parent.
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-app-patches
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/clusters/ash/root/app-patches
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-base
  # These patches target Cozystack-generated HelmReleases. They must retry until
  # the app API has created the target and should never prune generated objects.
  prune: false
  wait: false
  timeout: 5m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-mgmt-dns-controller
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/clusters/ash/root/dns
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-base
  prune: true
  wait: true
  timeout: 10m
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: guardian-company-prod
  namespace: cozy-fluxcd
spec:
  interval: 10m
  retryInterval: 1m
  path: ./src/infrastructure/clusters/ash/deployments/company/prod
  sourceRef:
    kind: GitRepository
    name: guardian
  dependsOn:
    - name: guardian-mgmt-base
  prune: true
  wait: true
  timeout: 10m
