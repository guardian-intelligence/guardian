# Cozystack 1.5 currently renders vmagent's max scrape size inside the
# generated monitoring-agents Package. This partial Package owns only the
# vmagent args we need for root observability.
apiVersion: cozystack.io/v1alpha1
kind: Package
metadata:
  name: cozystack.monitoring-agents
spec:
  components:
    monitoring-agents:
      values:
        vmagent:
          extraArgs:
            promscrape.maxScrapeSize: 64MB
