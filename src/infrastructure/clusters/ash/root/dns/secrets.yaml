apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-dns-secrets
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: external-dns
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: external-dns
spec:
  provider:
    vault:
      server: http://openbao-guardian.tenant-guardian-kms.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: tenant-root-external-dns
          serviceAccountRef:
            name: external-dns-secrets
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-external-dns
  namespace: external-dns
  labels:
    app.kubernetes.io/name: external-dns
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: external-dns
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: SecretStore
    name: openbao
  target:
    name: cloudflare-external-dns
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: CF_API_TOKEN
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/dns/external-dns
        property: CF_API_TOKEN
