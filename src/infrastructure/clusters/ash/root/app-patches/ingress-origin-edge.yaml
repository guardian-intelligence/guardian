# TLS terminates at Cloudflare edge. Keep one ingress controller on each origin
# node and keep origin HTTP/2 disabled. Cloudflare targets the public node IPs
# directly, so nginx must bind the host network instead of relying on the
# ClusterIP+externalIPs service path.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx-system
  namespace: tenant-root
spec:
  values:
    ingress-nginx:
      controller:
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - ingress-nginx
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - ingress-nginx-system
                    - key: app.kubernetes.io/component
                      operator: In
                      values:
                        - controller
                topologyKey: kubernetes.io/hostname
        dnsPolicy: ClusterFirstWithHostNet
        config:
          use-http2: "false"
        hostNetwork: true
        service:
          externalIPs: []
          externalTrafficPolicy: Cluster
        updateStrategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 0
            maxUnavailable: 1
