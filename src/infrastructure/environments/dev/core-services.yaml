# Dev tenant core services. The tenant namespace is created by
# Tenant/dev in src/infrastructure/base/tenants/environments.yaml.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: guardian
  namespace: tenant-dev
spec:
  replicas: 3
  size: 10Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
---
apiVersion: apps.cozystack.io/v1alpha1
kind: Harbor
metadata:
  name: guardian
  namespace: tenant-dev
spec:
  host: harbor.dev.gi.org
  storageClass: replicated
  database:
    replicas: 3
    size: 10Gi
  redis:
    replicas: 3
    size: 2Gi
  trivy:
    enabled: true
    size: 5Gi
---
apiVersion: apps.cozystack.io/v1alpha1
kind: ClickHouse
metadata:
  name: guardian
  namespace: tenant-dev
spec:
  replicas: 3
  shards: 1
  size: 20Gi
  storageClass: replicated
  logStorageSize: 5Gi
  backup:
    enabled: true
    schedule: ""
    s3CredentialsSecret:
      name: guardian-clickhouse-backup-creds
  clickhouseKeeper:
    enabled: true
    replicas: 3
    size: 2Gi
---
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: guardian-clickhouse-daily
  namespace: tenant-dev
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: ClickHouse
    name: guardian
  backupClassName: guardian-clickhouse-altinity
  schedule:
    type: cron
    cron: "23 1 * * *"
