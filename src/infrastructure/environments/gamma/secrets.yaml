# Gamma tenant OpenBao-backed delivery for CNPG backup credentials.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardian-external-secrets
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: cnpg-backup
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: cnpg-backup
spec:
  provider:
    vault:
      server: http://guardian.tenant-root.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: tenant-gamma-cnpg-backup
          serviceAccountRef:
            name: guardian-external-secrets
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-cnpg-backup-creds
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: cnpg-backup
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: SecretStore
  target:
    name: guardian-cnpg-backup-creds
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: guardian/guardian-mgmt/tenant-gamma/postgres/guardian/cnpg-backup
        property: AWS_ACCESS_KEY_ID
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: guardian/guardian-mgmt/tenant-gamma/postgres/guardian/cnpg-backup
        property: AWS_SECRET_ACCESS_KEY
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guardian-clickhouse-external-secrets
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: clickhouse-backup
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao-clickhouse-backup
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: clickhouse-backup
spec:
  provider:
    vault:
      server: http://guardian.tenant-root.svc:8200
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: tenant-gamma-clickhouse-backup
          serviceAccountRef:
            name: guardian-clickhouse-external-secrets
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-clickhouse-backup-creds
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: clickhouse-backup
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-clickhouse-backup
    kind: SecretStore
  target:
    name: guardian-clickhouse-backup-creds
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: bucketName
      remoteRef:
        key: guardian/guardian-mgmt/tenant-gamma/clickhouse/guardian/backup
        property: bucketName
    - secretKey: endpoint
      remoteRef:
        key: guardian/guardian-mgmt/tenant-gamma/clickhouse/guardian/backup
        property: endpoint
    - secretKey: region
      remoteRef:
        key: guardian/guardian-mgmt/tenant-gamma/clickhouse/guardian/backup
        property: region
    - secretKey: accessKey
      remoteRef:
        key: guardian/guardian-mgmt/tenant-gamma/clickhouse/guardian/backup
        property: accessKey
    - secretKey: secretKey
      remoteRef:
        key: guardian/guardian-mgmt/tenant-gamma/clickhouse/guardian/backup
        property: secretKey
