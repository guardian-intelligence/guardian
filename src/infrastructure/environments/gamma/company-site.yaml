apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-site
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: gamma
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      guardian.dev/stage: gamma
  template:
    metadata:
      labels:
        app.kubernetes.io/name: company-site
        app.kubernetes.io/part-of: guardian
        guardian.dev/stage: gamma
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: company-site
              guardian.dev/stage: gamma
      containers:
        - name: company-site
          image: harbor.guardianintelligence.org/guardian/company-site@sha256:07ecde6824415734035cfadc6c8436cee9dcfd0bd18ceab1bd7d99f3a4c9c7d7
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
          resources:
            requests:
              cpu: 25m
              memory: 128Mi
            limits:
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: company-site
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: gamma
spec:
  selector:
    app.kubernetes.io/name: company-site
    guardian.dev/stage: gamma
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: company-site
  namespace: tenant-gamma
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: gamma
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      guardian.dev/stage: gamma
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: company-site
  namespace: tenant-gamma
  annotations:
    acme.cert-manager.io/http01-ingress-ingressclassname: tenant-root
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: tenant-root
  tls:
    - hosts:
        - gamma.gi.org
      secretName: company-site-tls
  rules:
    - host: gamma.gi.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: company-site
                port:
                  number: 80
