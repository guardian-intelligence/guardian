---
apiVersion: v1alpha1
kind: HostnameConfig
hostname: ash-earth
---
apiVersion: v1alpha1
kind: LinkConfig
name: enp1s0f0
up: true
mtu: 1420
---
apiVersion: v1alpha1
kind: VLANConfig
name: enp1s0f0.2140
parent: enp1s0f0
vlanID: 2140
mtu: 1420
addresses:
  - address: 10.8.0.11/24
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: openbao-seal
provisioning:
  diskSelector:
    match: disk.serial == "362510FCEFB8"
  minSize: 64MiB
  maxSize: 64MiB
filesystem:
  type: xfs
encryption:
  provider: luks2
  keys:
    - slot: 0
      tpm:
        options:
          pcrs:
            - 7
