- targets:
    - https://guardianintelligence.org/
  labels:
    guardian_surface: company-site
    guardian_stage: prod
    guardian_expected_statuses: "2xx"
- targets:
    - https://dashboard.guardianintelligence.org/
  labels:
    guardian_surface: dashboard
    guardian_stage: root
    guardian_expected_statuses: "200,302"
- targets:
    - https://grafana.guardianintelligence.org/
  labels:
    guardian_surface: grafana
    guardian_stage: root
    guardian_expected_statuses: "200,302"
- targets:
    - https://alerta.guardianintelligence.org/
  labels:
    guardian_surface: alerta
    guardian_stage: root
    guardian_expected_statuses: "200"
- targets:
    - https://keycloak.guardianintelligence.org/realms/cozy/.well-known/openid-configuration
  labels:
    guardian_surface: keycloak
    guardian_stage: root
    guardian_expected_statuses: "200"
# Guard invariant, not availability: the admin surface must NOT be served on
# the public host (base/cozystack/keycloak-admin-guard.yaml shadows /admin
# and /realms/master to an endpointless Service). 503 is the guard working;
# anything else fails the edge-health gate. Both guarded prefixes are
# probed so a partial guard regression can't hide behind the other path.
- targets:
    - https://keycloak.guardianintelligence.org/admin/master/console/
  labels:
    guardian_surface: keycloak-admin-guard
    guardian_stage: root
    guardian_expected_statuses: "503"
- targets:
    - https://keycloak.guardianintelligence.org/realms/master/.well-known/openid-configuration
  labels:
    guardian_surface: keycloak-admin-guard
    guardian_stage: root
    guardian_expected_statuses: "503"
- targets:
    - https://guardianintelligence.org/realms/postflight/.well-known/openid-configuration
  labels:
    guardian_surface: iam
    guardian_stage: prod
    guardian_expected_statuses: "200"
