# Minutely synthetic login canary (k6). The script is maintained at
# ../login-canary/login-canary.js (flow docs live there) and rendered into
# the keycloak-login-canary ConfigMap by this stage's configMapGenerator.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: keycloak-login-canary
  namespace: tenant-guardian-gamma
  labels:
    app.kubernetes.io/name: keycloak-login-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: gamma
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 55
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keycloak-login-canary
            app.kubernetes.io/part-of: guardian
            guardian.dev/stage: gamma
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            runAsGroup: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: k6
              image: docker.io/grafana/k6@sha256:68e78d94140704ec4ee0cb7c5cf6cd12a32b7d310a6f98d94931ee9b0b9dc629 # 2.1.0
              imagePullPolicy: IfNotPresent
              args:
                - run
                - --tag
                - stage=gamma
                - -o
                - experimental-prometheus-rw
                - /scripts/login-canary.js
              env:
                - name: KC_INTERNAL
                  value: http://keycloak.tenant-guardian-gamma.svc
                - name: PUBLIC_BASE
                  value: https://gamma.guardianintelligence.org
                - name: OOBE_URL
                  value: https://guardianintelligence.org/verself
                - name: K6_PROMETHEUS_RW_SERVER_URL
                  value: http://vminsert-shortterm.tenant-root.svc:8480/insert/0/prometheus/api/v1/write
                - name: CANARY_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-canary-user
                      key: username
                - name: CANARY_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-canary-user
                      key: password
                - name: KC_ADMIN_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-admin-bootstrap
                      key: username
                - name: KC_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: keycloak-admin-bootstrap
                      key: password
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                  ephemeral-storage: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
                  ephemeral-storage: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: keycloak-login-canary
---
# Canary pod flows: keycloak in-namespace, the public edge (auth page,
# OOBE placeholder, broker cancel callback — all through Cloudflare), DNS,
# and the VictoriaMetrics remote-write ingester in tenant-root.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: keycloak-login-canary
  namespace: tenant-guardian-gamma
  labels:
    app.kubernetes.io/name: keycloak-login-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: gamma
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak-login-canary
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - keycloak
                - keycloak-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: vminsert
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Ingress half of the remote-write path: tenant-root's generated isolation
# does not admit grandchild-tenant namespaces (same reason as the
# root-ingress pair); admit exactly the canary pods to vminsert.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-vminsert-from-keycloak-login-canary-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: verself
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: vminsert
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-guardian-gamma
            k8s:app.kubernetes.io/name: keycloak-login-canary
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
