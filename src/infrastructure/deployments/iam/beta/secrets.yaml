# Per-namespace secret scope for tenant-guardian-beta: secrets-reader is what
# ESO authenticates as (OpenBao role guardian-reader-tenant-guardian-beta,
# read-only on this namespace's kv subtree); secrets-writer exists only so an
# operator with custody kubeconfig access can mint a short-lived token scoped
# to writing this namespace's subtree and nothing else. Neither SA
# automounts; nothing schedules as them. The OpenBao roles already exist
# (created by self-init); adding secrets here never touches OpenBao config —
# see the static-seal runbook, "Adding An Integration".
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-beta
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-beta
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: iam-beta-openbao
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-beta
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-tenant-guardian-beta
          serviceAccountRef:
            name: secrets-reader
            namespace: tenant-guardian-beta
            audiences:
              - openbao
---
# GitHub OAuth client secret for the verself realm's GitHub identity
# provider ("Sign in with Guardian (Beta)" — non-secret app metadata lives in
# ../github-oauth-apps.yaml). Seeded in OpenBao by the bootstrap importer.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-github-oauth
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-beta
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-beta-openbao
  target:
    name: keycloak-github-oauth
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-beta/keycloak/github-oauth
        property: GITHUB_CLIENT_SECRET
---
# Autoprovisioned bootstrap admin for the master realm (no static
# admin/admin default ever ships). Value loaded once via the stage's
# secrets-writer role; Keycloak consumes it only at first boot.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin-bootstrap
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-beta
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-beta-openbao
  target:
    name: keycloak-admin-bootstrap
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: username
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-beta/keycloak/admin-bootstrap
        property: username
    - secretKey: password
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-beta/keycloak/admin-bootstrap
        property: password
---
# Dedicated non-privileged realm user for synthetic login checks (Flagger
# pre-rollout gate and the minutely k6 canary use the same identity).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-canary-user
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-beta
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-beta-openbao
  target:
    name: keycloak-canary-user
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: username
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-beta/keycloak/canary-user
        property: username
    - secretKey: password
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-beta/keycloak/canary-user
        property: password
