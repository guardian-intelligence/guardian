# Flagger blue/green for Keycloak (provider: kubernetes — plain
# Service-selector switching, no mesh). Flagger owns the keycloak /
# keycloak-primary / keycloak-canary ClusterIP Services and clones the
# Deployment to keycloak-primary; the Ingress points at the apex Service.
#
# Gate stack (user traffic never touches the canary color; cutover is atomic
# after analysis passes):
#   1. readiness — pods must pass /health/ready (DB + migration) within
#      progressDeadlineSeconds or the rollout fails;
#   2. login-gate (pre-rollout, once) — OIDC discovery + a real direct-grant
#      login against the canary Service, executed by flagger-loadtester;
#   3. login-iterate (every iteration) — the same login, repeated; flaky
#      under warm-up fails here;
#   4. load-tps (every iteration) — hey drives sustained load at the canary
#      and logs raw throughput/latency (logCmdOutput → loadtester logs), so
#      every promotion produces TPS data.
# threshold: 3 failed checks → automatic rollback (canary scaled to zero,
# primary untouched, status Failed). Post-cutover regressions roll back via
# Git revert through this same gate.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: keycloak
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: beta
spec:
  provider: kubernetes
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: keycloak
  progressDeadlineSeconds: 900
  service:
    port: 80
    targetPort: 8080
  analysis:
    interval: 30s
    threshold: 3
    # Deliberately tight for the initial stand-up (Shovon, 2026-07-05): a
    # single passing iteration (one login-gate + one load run after the
    # pre-rollout gate) promotes. Raise toward an industry-standard soak
    # (e.g. iterations: 120 at 30s ~= 1h of steady canary successes) once
    # the k6 canary and SLO metrics are feeding analysis.
    iterations: 1
    # severity warn: failed checks and rollbacks page through the alert-relay;
    # routine info-level promotion events do not.
    alerts:
      - name: ops
        severity: warn
        providerRef:
          name: alert-relay
          namespace: flagger
    webhooks:
      - name: login-gate
        type: pre-rollout
        url: http://flagger-loadtester.tenant-guardian-beta/
        timeout: 60s
        metadata:
          type: bash
          cmd: bash /gate/login-gate.sh
      - name: login-iterate
        type: rollout
        url: http://flagger-loadtester.tenant-guardian-beta/
        timeout: 60s
        metadata:
          type: bash
          cmd: bash /gate/login-gate.sh
      - name: load-tps
        type: rollout
        url: http://flagger-loadtester.tenant-guardian-beta/
        timeout: 45s
        metadata:
          type: cmd
          cmd: "hey -z 20s -q 20 -c 10 -disable-keepalive http://keycloak-canary.tenant-guardian-beta/realms/verself/.well-known/openid-configuration"
          logCmdOutput: "true"
