# Public entry for the beta Keycloak on the stage's own host. Only /realms
# (OIDC endpoints, login pages, broker callbacks) and /resources (theme
# assets) are exposed — /admin is deliberately NOT routed on any public host;
# the admin console is port-forward-only. Cookie affinity keeps interactive
# auth flows pinned to one pod (authentication sessions are cache-local).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: beta
  annotations:
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: GUARDIAN_IAM_AFFINITY
    nginx.ingress.kubernetes.io/session-cookie-secure: "true"
spec:
  ingressClassName: tenant-root
  rules:
    - host: beta.guardianintelligence.org
      http:
        paths:
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
---
# external-dns (sources: [crd]) turns this into a Cloudflare-proxied CNAME to
# the apex: same edge cert, same origins as company-site previews.
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: keycloak-beta
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: beta
spec:
  endpoints:
    - dnsName: beta.guardianintelligence.org
      recordType: CNAME
      targets:
        - guardianintelligence.org
      providerSpecific:
        - name: external-dns.alpha.kubernetes.io/cloudflare-proxied
          value: "true"
