# Flagger's webhook runner checks OIDC discovery and applies load to the
# canary-color Service before Keycloak is promoted. The independent browser
# CronJob exercises the complete public Guardian-to-GitHub user journey.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagger-loadtester
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: flagger-loadtester
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flagger-loadtester
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flagger-loadtester
        app.kubernetes.io/part-of: guardian
        guardian.dev/stage: prod
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loadtester
          image: ghcr.io/fluxcd/flagger-loadtester@sha256:f98a35ab7aca0f2efdd8e397b4002e283637f5c9e31e4e2a6c1e97af07c50454 # 0.37.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          command:
            - ./loadtester
            - -port=8080
            - -log-level=info
            - -timeout=1h
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
              ephemeral-storage: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: probe-scripts
              mountPath: /gate
              readOnly: true
      volumes:
        - name: probe-scripts
          configMap:
            name: keycloak-probe-scripts
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: flagger-loadtester
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: flagger-loadtester
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: flagger-loadtester
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-probe-scripts
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: flagger-loadtester
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
data:
  discovery-gate.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    base="http://keycloak-canary.tenant-guardian-prod"

    curl -fsS --max-time 10 \
      "$base/realms/guardianintelligence.org/.well-known/openid-configuration" \
      | grep -q '"authorization_endpoint"'
    echo "discovery-gate: OK"
