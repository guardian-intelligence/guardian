apiVersion: batch/v1
kind: CronJob
metadata:
  name: guardian-journey-canary
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-journey-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  # Shadow ring beside guardian-login-canary (*/15). Twice hourly keeps the
  # combined OAuth token mint rate at six per hour, under GitHub's ten
  # tokens/hour/user/application ceiling that forces interactive
  # reauthorization when crossed. The Playwright journey takes over the full
  # cadence when the chromedp canary retires.
  schedule: "22,52 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 240
      template:
        metadata:
          labels:
            app.kubernetes.io/name: guardian-journey-canary
            app.kubernetes.io/part-of: guardian
            guardian.dev/stage: prod
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            runAsGroup: 12345
            fsGroup: 12345
            seccompProfile:
              type: RuntimeDefault
          initContainers:
            # First-run triage: the journey timed out with the page never
            # loading while the same image completes the pre-auth path
            # outside the cluster, which smells like an egress drop. The
            # probe separates DNS failure / connect hang / healthy for both
            # journey targets from inside the same CNP identity, without
            # credentials. Always exits 0 — it narrates, the journey judges.
            - name: egress-probe
              image: ghcr.io/guardian-intelligence/canary-journeys@sha256:4bbf4f176bf850fb7fdcfe49eb12bcbdbd6fb2d17e4300675d06d539c04f7214
              command:
                - node
                - -e
                - |
                  const probe = async (url) => {
                    const started = Date.now();
                    try {
                      const res = await fetch(url, { signal: AbortSignal.timeout(15000), redirect: "manual" });
                      console.log(JSON.stringify({ event: "egress-probe", url, ok: true, status: res.status, ms: Date.now() - started }));
                    } catch (err) {
                      console.log(JSON.stringify({ event: "egress-probe", url, ok: false, error: String(err?.cause ?? err), ms: Date.now() - started }));
                    }
                  };
                  (async () => {
                    await probe("https://guardianintelligence.org/postflight");
                    await probe("https://github.com/");
                  })();
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
          containers:
            - name: browser
              image: ghcr.io/guardian-intelligence/canary-journeys@sha256:8805b71aa06ce4608015d420f11c346a1de31ab4fb7843ca72f4ae13e9efcddf
              imagePullPolicy: IfNotPresent
              env:
                # Browser-launch stderr into the pod log while the shadow
                # ring's Chromium hang is under diagnosis.
                - name: DEBUG
                  value: pw:browser
                - name: POSTFLIGHT_URL
                  value: https://guardianintelligence.org/postflight
                - name: CANARY_TIMEOUT
                  value: 2m30s
                # Not a secret: a fixed synthetic marker the harness registers
                # in its redaction registry and deliberately routes through
                # the scrubber every run. The raw literal appearing in any log
                # sink means the scrubber broke (its absence alert lives with
                # the vmalert-vlogs rules). Shaped to match no
                # infrastructure-level redaction pattern so it exercises the
                # harness scrubber alone.
                - name: CANARY_HONEYTOKEN
                  value: guardian-canary-honeytoken-9f2e6c81d4b7
                - name: GITHUB_CANARY_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: username
                - name: GITHUB_CANARY_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: password
                - name: GITHUB_CANARY_TOTP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: totp_secret
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                  ephemeral-storage: 512Mi
                limits:
                  cpu: "2"
                  memory: 1Gi
                  ephemeral-storage: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: browser-state
                  mountPath: /tmp
          volumes:
            - name: browser-state
              emptyDir:
                sizeLimit: 512Mi
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: guardian-journey-canary
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-journey-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: guardian-journey-canary
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
