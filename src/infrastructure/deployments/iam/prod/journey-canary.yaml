apiVersion: batch/v1
kind: CronJob
metadata:
  name: guardian-journey-canary
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-journey-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  # Shadow ring beside guardian-login-canary (*/15). Twice hourly keeps the
  # combined OAuth token mint rate at six per hour, under GitHub's ten
  # tokens/hour/user/application ceiling that forces interactive
  # reauthorization when crossed. The Playwright journey takes over the full
  # cadence when the chromedp canary retires.
  schedule: "22,52 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 240
      template:
        metadata:
          labels:
            app.kubernetes.io/name: guardian-journey-canary
            app.kubernetes.io/part-of: guardian
            guardian.dev/stage: prod
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            runAsGroup: 12345
            fsGroup: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: browser
              image: ghcr.io/guardian-intelligence/canary-journeys@sha256:4ba2c77a51557e63ff3b7ad2a72c57b102c2d4a0f70eadacb5edc20a2e7a44c1
              imagePullPolicy: IfNotPresent
              env:
                # Browser-launch stderr into the pod log while the shadow
                # ring's Chromium hang is under diagnosis.
                - name: DEBUG
                  value: pw:browser
                - name: POSTFLIGHT_URL
                  value: https://guardianintelligence.org/postflight
                - name: CANARY_TIMEOUT
                  value: 2m30s
                # Not a secret: a fixed synthetic marker the harness registers
                # in its redaction registry and deliberately routes through
                # the scrubber every run. The raw literal appearing in any log
                # sink means the scrubber broke (its absence alert lives with
                # the vmalert-vlogs rules). Shaped to match no
                # infrastructure-level redaction pattern so it exercises the
                # harness scrubber alone.
                - name: CANARY_HONEYTOKEN
                  value: guardian-canary-honeytoken-9f2e6c81d4b7
                - name: GITHUB_CANARY_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: username
                - name: GITHUB_CANARY_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: password
                - name: GITHUB_CANARY_TOTP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: totp_secret
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                  ephemeral-storage: 512Mi
                limits:
                  cpu: "2"
                  memory: 1Gi
                  ephemeral-storage: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: browser-state
                  mountPath: /tmp
          volumes:
            - name: browser-state
              emptyDir:
                sizeLimit: 512Mi
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: guardian-journey-canary
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-journey-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: guardian-journey-canary
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
