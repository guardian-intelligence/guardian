# Flagger blue/green for Keycloak (provider: kubernetes — plain
# Service-selector switching, no mesh). Flagger owns the keycloak /
# keycloak-primary / keycloak-canary ClusterIP Services and clones the
# Deployment to keycloak-primary; the Ingress points at the apex Service.
#
# Gate stack (user traffic never touches the canary color; cutover is atomic
# after readiness, OIDC discovery, and sustained discovery load pass).
# The public browser canary validates the complete user journey continuously.
# threshold: 3 failed checks → automatic rollback (canary scaled to zero,
# primary untouched, status Failed). Post-cutover regressions roll back via
# Git revert through this same gate.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: keycloak
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  provider: kubernetes
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: keycloak
  progressDeadlineSeconds: 900
  service:
    port: 80
    targetPort: 8080
  analysis:
    interval: 30s
    threshold: 3
    # 5-minute soak: every iteration re-runs OIDC discovery, sustained
    # discovery load, and a real client-credentials token issuance against
    # the canary color, with the auth-error metric asserting Keycloak
    # recorded no failed authentication meanwhile. Lengthen toward an
    # hour-scale soak once weighted SLO metrics justify the rollout latency.
    iterations: 10
    # severity warn: failed checks and rollbacks page through the alert-relay;
    # routine info-level promotion events do not.
    alerts:
      - name: ops
        severity: warn
        providerRef:
          name: alert-relay
          namespace: flagger
    metrics:
      # Zero authentication errors recorded by the canary color during
      # analysis. Only gate traffic reaches that color pre-cutover, so any
      # error means an attempt failed inside Keycloak even where the HTTP
      # path looked healthy. No-data reads as 0 by design: error series
      # only exist on a color after its first failure.
      - name: keycloak-auth-errors
        templateRef:
          name: keycloak-auth-errors
          namespace: flagger
        thresholdRange:
          max: 0
        interval: 30s
    webhooks:
      - name: discovery-gate
        type: pre-rollout
        url: http://flagger-loadtester.tenant-guardian-prod/
        timeout: 60s
        metadata:
          type: bash
          cmd: bash /gate/discovery-gate.sh
      - name: token-gate
        type: pre-rollout
        url: http://flagger-loadtester.tenant-guardian-prod/
        timeout: 150s
        metadata:
          type: bash
          cmd: bash /gate/token-gate.sh
      - name: discovery-iterate
        type: rollout
        url: http://flagger-loadtester.tenant-guardian-prod/
        timeout: 60s
        metadata:
          type: bash
          cmd: bash /gate/discovery-gate.sh
      - name: load-tps
        type: rollout
        url: http://flagger-loadtester.tenant-guardian-prod/
        timeout: 45s
        metadata:
          type: cmd
          cmd: "hey -z 20s -q 20 -c 10 -disable-keepalive http://keycloak-canary.tenant-guardian-prod/realms/guardianintelligence.org/.well-known/openid-configuration"
          logCmdOutput: "true"
      - name: token-iterate
        type: rollout
        url: http://flagger-loadtester.tenant-guardian-prod/
        timeout: 30s
        metadata:
          type: bash
          cmd: bash /gate/token-gate.sh
