# Prod Keycloak Postgres: quorum replication. Backed up through Cozystack's
# platform backup machinery (cozy-default BackupClass → off-cluster R2, see
# base/cozystack/platform.yaml) — no S3 coordinates or credentials belong
# here. Since the Keycloak file vault landed (PR #401) these backups carry no
# live credential. Keycloak connects via Secret/postgres-keycloak-app against
# the default app database.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: keycloak
  namespace: tenant-guardian-prod
spec:
  replicas: 3
  size: 10Gi
  storageClass: replicated
  external: false
  version: v18
  resources:
    cpu: 2
    memory: 2Gi
  # Operational stamp (uniform across Guardian Postgres instances): bounded
  # session/statement timeouts, slot WAL retention capped at 4GB so an
  # abandoned logical replication slot invalidates itself instead of filling
  # the volume (paired with the postgres-health slot alerts), and a 5m
  # archive_timeout bounding idle-database RPO at ~5m instead of the nightly
  # base backup.
  postgresql:
    parameters:
      statement_timeout: 120s
      idle_in_transaction_session_timeout: 300s
      lock_timeout: 10s
      archive_timeout: 300s
      max_slot_wal_keep_size: 4GB
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
  # Platform-managed backup flow: barmanObjectStore is SSA-patched onto the
  # live Cluster by the CNPG backup driver at first BackupJob time; continuous
  # WAL archiving starts then, not at merge — fire an ad-hoc BackupJob right
  # after enabling.
  backup:
    enabled: true
    useSystemBucket: true
---
# Nightly base backup for prod Keycloak. Continuous WAL archiving covers RPO;
# the cron bounds restore replay time. Offset from the tenant-root
# postflight-controlplane Plan (02:00) and analytics ClickHouse Plan (05:00) so
# base backups don't contend for the same uplink window.
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: keycloak-postgres-nightly
  namespace: tenant-guardian-prod
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: Postgres
    name: keycloak
  backupClassName: cozy-default
  schedule:
    type: cron
    cron: "0 3 * * *"
