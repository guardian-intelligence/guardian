# Prod Keycloak Postgres: quorum replication. Backup config returns when the
# off-cluster (Cloudflare R2) backup path lands — no S3 coordinates or
# credentials belong here. Keycloak connects via Secret/postgres-keycloak-app
# against the default app database.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: keycloak
  namespace: tenant-guardian-prod
spec:
  replicas: 3
  size: 10Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
