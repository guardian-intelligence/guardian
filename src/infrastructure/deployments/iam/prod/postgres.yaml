# Prod Keycloak Postgres: quorum replication. Backed up through Cozystack's
# platform backup machinery (cozy-default BackupClass → off-cluster R2, see
# base/cozystack/platform.yaml) — no S3 coordinates or credentials belong
# here. Since the Keycloak file vault landed (PR #401) these backups carry no
# live credential. Keycloak connects via Secret/postgres-keycloak-app against
# the default app database.
apiVersion: apps.cozystack.io/v1alpha1
kind: Postgres
metadata:
  name: keycloak
  namespace: tenant-guardian-prod
spec:
  replicas: 3
  size: 10Gi
  storageClass: replicated
  external: false
  version: v18
  quorum:
    minSyncReplicas: 1
    maxSyncReplicas: 2
  # Platform-managed backup flow: barmanObjectStore is SSA-patched onto the
  # live Cluster by the CNPG backup driver at first BackupJob time; continuous
  # WAL archiving starts then, not at merge — fire an ad-hoc BackupJob right
  # after enabling.
  backup:
    enabled: true
    useSystemBucket: true
---
# Nightly base backup for prod Keycloak. Continuous WAL archiving covers RPO;
# the cron bounds restore replay time. Offset from the tenant-root guardian
# Plan (04:00) so base backups don't contend for the same uplink window.
apiVersion: backups.cozystack.io/v1alpha1
kind: Plan
metadata:
  name: keycloak-postgres-nightly
  namespace: tenant-guardian-prod
spec:
  applicationRef:
    apiGroup: apps.cozystack.io
    kind: Postgres
    name: keycloak
  backupClassName: cozy-default
  schedule:
    type: cron
    cron: "0 3 * * *"
