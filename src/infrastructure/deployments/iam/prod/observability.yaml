# Keycloak metrics scrape (management port) + the stage's IAM SLO alerts.
# The scrape Service selects labels BOTH Flagger colors share, so primary
# and canary pods are scraped whichever is serving.
apiVersion: v1
kind: Service
metadata:
  name: keycloak-metrics
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: iam
  ports:
    - name: management
      port: 9000
      targetPort: 9000
      protocol: TCP
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: keycloak
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  namespaceSelector:
    matchNames:
      - tenant-guardian-prod
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/component: metrics
  endpoints:
    - port: management
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: guardian-login-canary
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-login-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  groups:
    - name: guardian-login-canary-prod.rules
      interval: 30s
      rules:
        - alert: GuardianLoginCanaryStale
          expr: |
            (
              time() - max(kube_cronjob_status_last_successful_time{namespace="tenant-guardian-prod",cronjob="guardian-login-canary"}) > 600
            )
            or
            (
              max(kube_cronjob_status_last_schedule_time{namespace="tenant-guardian-prod",cronjob="guardian-login-canary"}) > 0
              unless
              max(kube_cronjob_status_last_successful_time{namespace="tenant-guardian-prod",cronjob="guardian-login-canary"}) > 0
            )
          for: 2m
          labels:
            severity: warning
            guardian_stage: prod
            exported_instance: prod/login-canary
          annotations:
            summary: "Sign in with Guardian is failing in prod"
            description: "The last successful browser journey through Postflight, Guardian, GitHub, the OIDC callback, the BFF session, and logout is more than 10 minutes old. Check guardian-login-canary Job logs in tenant-guardian-prod."
        - alert: GuardianLoginCanaryAbsent
          expr: absent(kube_cronjob_status_last_schedule_time{namespace="tenant-guardian-prod",cronjob="guardian-login-canary"})
          for: 15m
          labels:
            severity: warning
            guardian_stage: prod
            exported_instance: prod/login-canary
          annotations:
            summary: "Sign in with Guardian canary is missing in prod"
            description: "kube-state-metrics has not reported the guardian-login-canary CronJob for 15 minutes."
        - alert: KeycloakScrapeDown
          expr: up{namespace="tenant-guardian-prod",job="keycloak-metrics"} == 0
          for: 5m
          labels:
            severity: warning
            guardian_stage: prod
          annotations:
            summary: "Keycloak metrics scrape is down in prod"
            description: "vmagent cannot scrape the Keycloak management endpoint."
---
# vmagent scrapes the management port from cozy-monitoring.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent-to-keycloak-metrics
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - keycloak
          - keycloak-primary
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
