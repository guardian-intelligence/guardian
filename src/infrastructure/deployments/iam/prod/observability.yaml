# Keycloak metrics scrape (management port) + the stage's IAM SLO alerts.
# The scrape Service selects labels BOTH Flagger colors share, so primary
# and canary pods are scraped whichever is serving.
apiVersion: v1
kind: Service
metadata:
  name: keycloak-metrics
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: iam
  ports:
    - name: management
      port: 9000
      targetPort: 9000
      protocol: TCP
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: keycloak
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  namespaceSelector:
    matchNames:
      - tenant-guardian-prod
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/component: metrics
  endpoints:
    - port: management
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: guardian-sign-in
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-sign-in
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  groups:
    - name: guardian-sign-in-prod.rules
      interval: 30s
      rules:
        # Sign-in health is measured at the funnel: Keycloak user event
        # counters over every login attempt, real users and the browser
        # canary alike. The canary guarantees at least one attempt per
        # 15 minutes, so absence of success is meaningful even with zero
        # user traffic.
        - alert: GuardianSignInFailing
          expr: |
            (
              sum(increase(keycloak_user_events_total{namespace="tenant-guardian-prod",realm="guardianintelligence.org",event="login_error"}[10m]))
              /
              sum(increase(keycloak_user_events_total{namespace="tenant-guardian-prod",realm="guardianintelligence.org",event=~"login|login_error"}[10m]))
            ) > 0.5
            and
            sum(increase(keycloak_user_events_total{namespace="tenant-guardian-prod",realm="guardianintelligence.org",event=~"login|login_error"}[10m])) >= 4
          for: 3m
          labels:
            severity: critical
            guardian_stage: prod
            exported_instance: prod/sign-in
          annotations:
            summary: "Most sign-in attempts are failing in prod"
            description: "More than half of the login attempts through the Guardian realm in the last 10 minutes failed (minimum 4 attempts). Split keycloak_user_events_total{event=\"login_error\"} by idp and error to localize: idp=\"github\" points at the broker or GitHub, no idp points at the realm or its database."
        # The 35m window tolerates exactly one failed or missed canary run
        # (15m cadence + 3m run deadline + scrape lag). The 48h clause arms
        # the rule only after the funnel has ever reported a success, so
        # enabling the metric or standing up a new stage cannot page before
        # first traffic.
        - alert: GuardianSignInStale
          expr: |
            (
              (
                sum(increase(keycloak_user_events_total{namespace="tenant-guardian-prod",realm="guardianintelligence.org",event="login"}[35m]))
                or on() vector(0)
              ) == 0
            )
            and
            sum(increase(keycloak_user_events_total{namespace="tenant-guardian-prod",realm="guardianintelligence.org",event="login"}[48h])) > 0
          for: 2m
          labels:
            severity: critical
            guardian_stage: prod
            exported_instance: prod/sign-in
          annotations:
            summary: "Sign in with Guardian is failing in prod"
            description: "No successful login through the Guardian realm for 35 minutes — at least two consecutive browser-canary journeys have not completed. Check guardian-login-canary Job logs in tenant-guardian-prod and keycloak_user_events_total{event=\"login_error\"} for the failing step."
        - alert: GuardianLoginCanaryAbsent
          expr: absent(kube_cronjob_status_last_schedule_time{namespace="tenant-guardian-prod",cronjob="guardian-login-canary"})
          for: 15m
          labels:
            severity: warning
            guardian_stage: prod
            exported_instance: prod/login-canary
          annotations:
            summary: "Sign in with Guardian canary is missing in prod"
            description: "kube-state-metrics has not reported the guardian-login-canary CronJob for 15 minutes."
        - alert: KeycloakScrapeDown
          expr: up{namespace="tenant-guardian-prod",job="keycloak-metrics"} == 0
          for: 5m
          labels:
            severity: warning
            guardian_stage: prod
          annotations:
            summary: "Keycloak metrics scrape is down in prod"
            description: "vmagent cannot scrape the Keycloak management endpoint."
---
# vmagent scrapes the management port from cozy-monitoring.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent-to-keycloak-metrics
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - keycloak
          - keycloak-primary
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
