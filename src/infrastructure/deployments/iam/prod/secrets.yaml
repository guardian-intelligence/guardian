# Per-namespace secret scope for tenant-guardian-prod: secrets-reader is what
# ESO authenticates as (OpenBao role guardian-reader-tenant-guardian-prod,
# read-only on this namespace's kv subtree); secrets-writer exists only so an
# operator with custody kubeconfig access can mint a short-lived token scoped
# to writing this namespace's subtree and nothing else. Neither SA
# automounts; nothing schedules as them. The OpenBao roles already exist
# (created by self-init); adding secrets here never touches OpenBao config —
# see the static-seal runbook, "Adding An Integration".
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-prod
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-prod
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: iam-prod-openbao
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-prod
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-tenant-guardian-prod
          serviceAccountRef:
            name: secrets-reader
            namespace: tenant-guardian-prod
            audiences:
              - openbao
---
# GitHub OAuth client secret for the postflight realm's GitHub identity
# provider ("Sign in with Guardian" — non-secret app metadata lives in
# ../github-oauth-apps.yaml). Seeded in OpenBao by the bootstrap importer.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-github-oauth
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-prod-openbao
  target:
    name: keycloak-github-oauth
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/keycloak/github-oauth
        property: GITHUB_CLIENT_SECRET
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: postflight-oidc-client
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
spec:
  length: 64
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postflight-oidc-client
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
spec:
  refreshInterval: "0"
  target:
    name: postflight-oidc-client
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: postflight-oidc-client
---
# Autoprovisioned bootstrap admin for the master realm (no static
# admin/admin default ever ships). Value loaded once via the stage's
# secrets-writer role; Keycloak consumes it only at first boot.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: keycloak-admin-bootstrap
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-prod-openbao
  target:
    name: keycloak-admin-bootstrap
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: username
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/keycloak/admin-bootstrap
        property: username
    - secretKey: password
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/keycloak/admin-bootstrap
        property: password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-login-canary-github
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-login-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-prod-openbao
  target:
    name: guardian-login-canary-github
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: username
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/keycloak/login-canary-github
        property: username
    - secretKey: password
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/keycloak/login-canary-github
        property: password
    - secretKey: totp_secret
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/keycloak/login-canary-github
        property: totp_secret
