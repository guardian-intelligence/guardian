# Public entry for the prod Keycloak on the SAME apex host company-site owns
# (guardianintelligence.org — prod DNS is managed out-of-band, so no
# DNSEndpoint here). ingress-nginx routes these specific path prefixes ahead
# of company-site's catch-all `/`. Only /realms (OIDC endpoints, login pages,
# broker callbacks) and /resources (theme assets) are exposed — /admin is
# deliberately NOT routed on any public host; the admin console is
# port-forward-only. Cookie affinity keeps interactive auth flows pinned to
# one pod (authentication sessions are cache-local).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: keycloak
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  annotations:
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: GUARDIAN_IAM_AFFINITY
    nginx.ingress.kubernetes.io/session-cookie-secure: "true"
spec:
  ingressClassName: tenant-root
  rules:
    - host: guardianintelligence.org
      http:
        paths:
          - path: /realms
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
          - path: /resources
            pathType: Prefix
            backend:
              service:
                name: keycloak
                port:
                  number: 80
