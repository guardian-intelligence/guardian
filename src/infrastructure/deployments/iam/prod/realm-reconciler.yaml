apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-reconciler
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak-realm-reconciler
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: iam
    guardian.dev/stage: prod
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  backoffLimit: 20
  activeDeadlineSeconds: 600
  template:
    metadata:
      annotations:
        checksum/realm-config: 36540236f67384b0b5a8c5a214766864ec45606e57e1bf7340a1757964336d48
      labels:
        app.kubernetes.io/name: keycloak-realm-reconciler
        app.kubernetes.io/part-of: guardian
        app.kubernetes.io/component: iam
        guardian.dev/stage: prod
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reconcile
          image: quay.io/keycloak/keycloak@sha256:3e58dc82a9b72f364f37dac17f99fcaf53d0052a3c1ad7f00b069a1ed43201c0 # 26.6.2
          command:
            - /bin/sh
            - -ec
            - |
              kcadm=/opt/keycloak/bin/kcadm.sh
              config=/tmp/kcadm.config
              server=http://keycloak.tenant-guardian-prod.svc
              realm=guardianintelligence.org
              trap 'rm -f "$config"' EXIT

              "$kcadm" config credentials \
                --config "$config" \
                --server "$server" \
                --realm "$realm" \
                --client guardian-realm-reconciler

              "$kcadm" update "realms/$realm" \
                --config "$config" \
                -f "/realm/$realm.json"

              for client in /clients/*.json; do
                client_id="${client##*/}"
                client_id="${client_id%.json}"
                internal_id="$("$kcadm" get clients \
                  --config "$config" --realm "$realm" \
                  -q "clientId=$client_id" --fields id --format csv --noquotes)"
                if test -n "$internal_id"; then
                  "$kcadm" update "clients/$internal_id" \
                    --config "$config" --realm "$realm" -f "$client"
                else
                  "$kcadm" create clients \
                    --config "$config" --realm "$realm" -f "$client"
                fi
              done

              desired_providers=""
              for provider in /providers/*.json; do
                alias="${provider##*/}"
                alias="${alias%.json}"
                desired_providers="$desired_providers $alias"
                if "$kcadm" get "identity-provider/instances/$alias" \
                    --config "$config" --realm "$realm" >/dev/null 2>&1; then
                  "$kcadm" update "identity-provider/instances/$alias" \
                    --config "$config" --realm "$realm" -f "$provider"
                else
                  "$kcadm" create identity-provider/instances \
                    --config "$config" --realm "$realm" -f "$provider"
                fi
              done

              for configured_provider in $("$kcadm" get identity-provider/instances \
                  --config "$config" --realm "$realm" \
                  --fields alias --format csv --noquotes); do
                case " $desired_providers " in
                  *" $configured_provider "*) ;;
                  *) "$kcadm" delete "identity-provider/instances/$configured_provider" \
                    --config "$config" --realm "$realm" ;;
                esac
              done
          env:
            - name: KC_CLI_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: keycloak-realm-reconciler-client
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: realm
              mountPath: /realm
              readOnly: true
            - name: clients
              mountPath: /clients
              readOnly: true
            - name: providers
              mountPath: /providers
              readOnly: true
      volumes:
        - name: realm
          configMap:
            name: keycloak-realm-settings
        - name: clients
          configMap:
            name: keycloak-clients
        - name: providers
          configMap:
            name: keycloak-identity-providers
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: keycloak-realm-reconciler
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak-realm-reconciler
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak-realm-reconciler
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - keycloak
                - keycloak-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
