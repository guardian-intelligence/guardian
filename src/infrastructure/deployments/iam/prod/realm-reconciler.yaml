apiVersion: batch/v1
kind: Job
metadata:
  name: keycloak-realm-reconciler
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak-realm-reconciler
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: iam
    guardian.dev/product: postflight
    guardian.dev/stage: prod
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  backoffLimit: 20
  activeDeadlineSeconds: 600
  template:
    metadata:
      annotations:
        checksum/realm-config: 888e23af74742457c3aa2a36f90c80059abbf8c43c80ca3ce6a20aeaef9998b7
      labels:
        app.kubernetes.io/name: keycloak-realm-reconciler
        app.kubernetes.io/part-of: guardian
        app.kubernetes.io/component: iam
        guardian.dev/product: postflight
        guardian.dev/stage: prod
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reconcile
          image: quay.io/keycloak/keycloak@sha256:3e58dc82a9b72f364f37dac17f99fcaf53d0052a3c1ad7f00b069a1ed43201c0 # 26.6.2
          command:
            - /bin/sh
            - -ec
            - |
              kcadm=/opt/keycloak/bin/kcadm.sh
              config=/tmp/kcadm.config
              server=http://keycloak.tenant-guardian-prod.svc
              realm=guardianintelligence.org

              "$kcadm" config credentials \
                --config "$config" \
                --server "$server" \
                --realm master \
                --user "$KC_ADMIN_USERNAME"

              "$kcadm" update "realms/$realm" \
                --config "$config" \
                --set enabled=true \
                --set registrationAllowed=false \
                --set loginWithEmailAllowed=false \
                --set duplicateEmailsAllowed=false

              desired_providers=""
              for provider in /providers/*.json; do
                alias="${provider##*/}"
                alias="${alias%.json}"
                desired_providers="$desired_providers $alias"
                if "$kcadm" get "identity-provider/instances/$alias" \
                    --config "$config" --realm "$realm" >/dev/null 2>&1; then
                  "$kcadm" update "identity-provider/instances/$alias" \
                    --config "$config" --realm "$realm" -f "$provider"
                else
                  "$kcadm" create identity-provider/instances \
                    --config "$config" --realm "$realm" -f "$provider"
                fi
              done

              for configured_provider in $("$kcadm" get identity-provider/instances \
                  --config "$config" --realm "$realm" \
                  --fields alias --format csv --noquotes); do
                case " $desired_providers " in
                  *" $configured_provider "*) ;;
                  *) "$kcadm" delete "identity-provider/instances/$configured_provider" \
                    --config "$config" --realm "$realm" ;;
                esac
              done

              client_id="$("$kcadm" get clients \
                --config "$config" --realm "$realm" \
                -q clientId=postflight-web --fields id --format csv --noquotes)"
              test -n "$client_id"
              "$kcadm" update "clients/$client_id" \
                --config "$config" --realm "$realm" \
                --set secret="$POSTFLIGHT_CLIENT_SECRET"

              for configured_realm in $("$kcadm" get realms \
                  --config "$config" --fields realm --format csv --noquotes); do
                case "$configured_realm" in
                  master|guardianintelligence.org) ;;
                  *) "$kcadm" delete "realms/$configured_realm" --config "$config" ;;
                esac
              done
          env:
            - name: KC_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-bootstrap
                  key: username
            - name: KC_CLI_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-bootstrap
                  key: password
            - name: POSTFLIGHT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: postflight-oidc-client
                  key: password
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
              ephemeral-storage: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: providers
              mountPath: /providers
              readOnly: true
      volumes:
        - name: providers
          configMap:
            name: keycloak-identity-providers
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: keycloak-realm-reconciler
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak-realm-reconciler
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak-realm-reconciler
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - keycloak
                - keycloak-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
