# Guardian's customer identity realm. Login creates a stable Guardian account;
# upstream providers are brokered connections, never the account identifier.
# Provider credentials use Keycloak's file-vault expressions and remain out of
# the realm database and its backups.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-guardian
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  guardianintelligence.org-realm.json: |
    {
      "realm": "guardianintelligence.org",
      "displayName": "Guardian",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "resetPasswordAllowed": false,
      "rememberMe": false,
      "loginWithEmailAllowed": false,
      "duplicateEmailsAllowed": false,
      "bruteForceProtected": true,
      "permanentLockout": false,
      "failureFactor": 10,
      "waitIncrementSeconds": 60,
      "maxFailureWaitSeconds": 900,
      "accessTokenLifespan": 300,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "revokeRefreshToken": true,
      "refreshTokenMaxReuse": 0,
      "adminPermissionsEnabled": true,
      "eventsEnabled": true,
      "adminEventsEnabled": true,
      "adminEventsDetailsEnabled": true,
      "groups": [
        {
          "id": "39e0b10d-a81e-48c3-be07-eb99b742bf92",
          "name": "canary-principals",
          "path": "/canary-principals"
        }
      ],
      "authenticationFlows": [
        {
          "alias": "broker-create-user-only",
          "description": "First broker login with no user-facing steps: create the Guardian user, fail closed on any collision.",
          "providerId": "basic-flow",
          "topLevel": true,
          "builtIn": false,
          "authenticationExecutions": [
            {
              "authenticator": "idp-create-user-if-unique",
              "requirement": "REQUIRED",
              "priority": 10,
              "authenticatorFlow": false,
              "userSetupAllowed": false
            }
          ]
        }
      ],
      "components": {
        "org.keycloak.userprofile.UserProfileProvider": [
          {
            "name": "declarative-user-profile",
            "providerId": "declarative-user-profile",
            "subComponents": {},
            "config": {
              "kc.user.profile.config": ["{\"attributes\":[{\"name\":\"username\",\"displayName\":\"${username}\",\"permissions\":{\"view\":[\"admin\",\"user\"],\"edit\":[\"admin\",\"user\"]},\"validations\":{\"length\":{\"min\":3,\"max\":255},\"username-prohibited-characters\":{},\"up-username-not-idn-homograph\":{}}},{\"name\":\"email\",\"displayName\":\"${email}\",\"required\":{\"roles\":[\"user\"]},\"permissions\":{\"view\":[\"admin\",\"user\"],\"edit\":[\"admin\",\"user\"]},\"validations\":{\"email\":{},\"length\":{\"max\":255}}},{\"name\":\"firstName\",\"displayName\":\"${firstName}\",\"permissions\":{\"view\":[\"admin\",\"user\"],\"edit\":[\"admin\",\"user\"]},\"validations\":{\"length\":{\"max\":255},\"person-name-prohibited-characters\":{}}},{\"name\":\"lastName\",\"displayName\":\"${lastName}\",\"permissions\":{\"view\":[\"admin\",\"user\"],\"edit\":[\"admin\",\"user\"]},\"validations\":{\"length\":{\"max\":255},\"person-name-prohibited-characters\":{}}},{\"name\":\"github_id\",\"displayName\":\"GitHub user id\",\"permissions\":{\"view\":[\"admin\"],\"edit\":[\"admin\"]},\"validations\":{\"pattern\":{\"pattern\":\"^[0-9]{1,20}$\"}}}],\"groups\":[{\"name\":\"user-metadata\",\"displayHeader\":\"User metadata\",\"displayDescription\":\"Attributes, which refer to user metadata\"}]}"]
            }
          }
        ]
      },
      "clients": [
        {
          "clientId": "postflight-web",
          "name": "Postflight web",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            "https://guardianintelligence.org/postflight/auth/callback"
          ],
          "webOrigins": [],
          "attributes": {
            "pkce.code.challenge.method": "S256",
            "post.logout.redirect.uris": "https://guardianintelligence.org/postflight"
          }
        },
        {
          "clientId": "guardian-cli",
          "name": "Guardian CLI",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": true,
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": false,
          "attributes": {
            "oauth2.device.authorization.grant.enabled": "true"
          }
        },
        {
          "clientId": "guardian-realm-reconciler",
          "name": "Guardian realm reconciler",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "${REALM_RECONCILER_CLIENT_SECRET}",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "fullScopeAllowed": true,
          "redirectUris": [],
          "webOrigins": []
        },
        {
          "clientId": "token-gate",
          "name": "Token issuance gate",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "${TOKEN_GATE_CLIENT_SECRET}",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "fullScopeAllowed": false,
          "redirectUris": [],
          "webOrigins": []
        },
        {
          "clientId": "guardian-canary-janitor",
          "name": "Guardian canary janitor",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "clientAuthenticatorType": "client-secret",
          "secret": "${CANARY_JANITOR_CLIENT_SECRET}",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": false,
          "implicitFlowEnabled": false,
          "serviceAccountsEnabled": true,
          "fullScopeAllowed": false,
          "redirectUris": [],
          "webOrigins": []
        }
      ],
      "users": [
        {
          "username": "service-account-guardian-realm-reconciler",
          "enabled": true,
          "serviceAccountClientId": "guardian-realm-reconciler",
          "clientRoles": {
            "realm-management": [
              "realm-admin"
            ]
          }
        }
      ]
    }
---
# Startup import creates the complete realm on an empty database. The
# settings document is the steady-state Admin REST payload because a realm
# update does not reconcile its nested clients or users. The user-profile
# document is applied through its own endpoint because no realm update
# carries it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-settings
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  guardianintelligence.org.json: |
    {
      "realm": "guardianintelligence.org",
      "displayName": "Guardian",
      "enabled": true,
      "sslRequired": "external",
      "registrationAllowed": false,
      "resetPasswordAllowed": false,
      "rememberMe": false,
      "loginWithEmailAllowed": false,
      "duplicateEmailsAllowed": false,
      "bruteForceProtected": true,
      "permanentLockout": false,
      "failureFactor": 10,
      "waitIncrementSeconds": 60,
      "maxFailureWaitSeconds": 900,
      "accessTokenLifespan": 300,
      "ssoSessionIdleTimeout": 1800,
      "ssoSessionMaxLifespan": 36000,
      "revokeRefreshToken": true,
      "refreshTokenMaxReuse": 0,
      "adminPermissionsEnabled": true,
      "eventsEnabled": true,
      "adminEventsEnabled": true,
      "adminEventsDetailsEnabled": true
    }
  up-config.json: |
    {
      "attributes": [
        {
          "name": "username",
          "displayName": "${username}",
          "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
          "validations": {
            "length": {"min": 3, "max": 255},
            "username-prohibited-characters": {},
            "up-username-not-idn-homograph": {}
          }
        },
        {
          "name": "email",
          "displayName": "${email}",
          "required": {"roles": ["user"]},
          "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
          "validations": {"email": {}, "length": {"max": 255}}
        },
        {
          "name": "firstName",
          "displayName": "${firstName}",
          "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
          "validations": {"length": {"max": 255}, "person-name-prohibited-characters": {}}
        },
        {
          "name": "lastName",
          "displayName": "${lastName}",
          "permissions": {"view": ["admin", "user"], "edit": ["admin", "user"]},
          "validations": {"length": {"max": 255}, "person-name-prohibited-characters": {}}
        },
        {
          "name": "github_id",
          "displayName": "GitHub user id",
          "permissions": {"view": ["admin"], "edit": ["admin"]},
          "validations": {"pattern": {"pattern": "^[0-9]{1,20}$"}}
        }
      ],
      "groups": [
        {
          "name": "user-metadata",
          "displayHeader": "User metadata",
          "displayDescription": "Attributes, which refer to user metadata"
        }
      ]
    }
---
