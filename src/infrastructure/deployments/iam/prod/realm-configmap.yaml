# One file per broker makes provider onboarding a data change. The first
# broker flow never trusts or automatically links an upstream email address:
# a collision must prove control of the existing Guardian account.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-identity-providers
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  github.json: |
    {
      "alias": "github",
      "displayName": "GitHub",
      "providerId": "github",
      "enabled": true,
      "trustEmail": false,
      "storeToken": false,
      "linkOnly": false,
      "firstBrokerLoginFlowAlias": "broker-create-user-only",
      "config": {
        "clientId": "Ov23li9wlYzzt3mcfJ7V",
        "clientSecret": "${vault.github-client-secret}",
        "defaultScope": "read:user user:email",
        "syncMode": "IMPORT"
      }
    }
---
# Broker mappers cannot ride the identity-provider representation or a realm
# update; the reconciler applies each <alias>--<name>.json through the mapper
# endpoint. The github_id attribute carries GitHub's immutable numeric id
# (logins are re-registrable); FORCE re-stamps it at every sign-in, so
# existing users backfill on their next visit.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-identity-provider-mappers
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  github--github-id.json: |
    {
      "name": "github-id",
      "identityProviderAlias": "github",
      "identityProviderMapper": "github-user-attribute-mapper",
      "config": {
        "jsonField": "id",
        "userAttribute": "github_id",
        "syncMode": "FORCE"
      }
    }
---
# Enrollment into the canary group is config-only: a realm workflow joins a
# brokered signup to canary-principals when its github_id is in the declared
# fleet, so no runtime credential exists anywhere in the enrollment chain.
# The fleet: guardian-login-canary-01 (306818769, org-less returning-user
# account) and postflight-canary-001 (301926735, owns a real GitHub
# organization for linking journeys). Enrollment fires only at user
# creation; accounts that predate their fleet entry need a one-time
# audit-logged group-add. Workflows are invisible to realm import/export,
# so the reconciler syncs them through the /workflows API.
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-workflows
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: keycloak
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  enroll-canary-principals.json: |
    {
      "name": "enroll-canary-principals",
      "on": "user-created",
      "if": "has-user-attribute(github_id:306818769) or has-user-attribute(github_id:301926735)",
      "steps": [
        {
          "uses": "join-group",
          "with": {
            "group": "canary-principals"
          }
        }
      ]
    }
