apiVersion: batch/v1
kind: CronJob
metadata:
  name: guardian-login-canary
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-login-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 120
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 180
      template:
        metadata:
          labels:
            app.kubernetes.io/name: guardian-login-canary
            app.kubernetes.io/part-of: guardian
            guardian.dev/stage: prod
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 12345
            runAsGroup: 12345
            fsGroup: 12345
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: browser
              image: ghcr.io/guardian-intelligence/login-canary@sha256:04fe397bdbfa9898e8046105b010fed3e29735d6b438f3814251061ac2319244
              imagePullPolicy: IfNotPresent
              env:
                - name: POSTFLIGHT_URL
                  value: https://guardianintelligence.org/postflight
                - name: CANARY_TIMEOUT
                  value: 2m30s
                - name: GITHUB_CANARY_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: username
                - name: GITHUB_CANARY_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: password
                - name: GITHUB_CANARY_TOTP_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: guardian-login-canary-github
                      key: totp_secret
              resources:
                requests:
                  cpu: 250m
                  memory: 512Mi
                  ephemeral-storage: 512Mi
                limits:
                  cpu: "2"
                  memory: 1Gi
                  ephemeral-storage: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: browser-state
                  mountPath: /tmp
          volumes:
            - name: browser-state
              emptyDir:
                sizeLimit: 512Mi
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: guardian-login-canary
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: guardian-login-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: guardian-login-canary
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
