# Static (non-secret) registry of the GitHub OAuth Apps backing each stage's
# Keycloak "Sign in with GitHub" identity provider. Client secrets are NOT
# here — they live in OpenBao at
# guardian/guardian-mgmt/tenant-guardian-<stage>/keycloak/github-oauth,
# projected into each stage's namespace by an ExternalSecret. Client IDs are
# not secret (they're visible in the browser's OAuth authorize redirect) and
# are recorded here directly.
#
# prod reuses the pre-existing "Sign in with Guardian" GitHub OAuth App
# (settings id 3656712), repointed at the guardianintelligence.org callback —
# it is not a fresh app.
stages:
  prod:
    githubAppName: "Sign in with Guardian"
    githubAppSettingsID: 3656712
    homepageURL: https://guardianintelligence.org
    callbackURL: https://guardianintelligence.org/realms/postflight/broker/github/endpoint
    keycloakRealm: postflight
    keycloakIdpAlias: github
    githubClientID: Ov23li9wlYzzt3mcfJ7V
