modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: ip4
      follow_redirects: true
  # For POST-only API routes: a GET drawing the router's 405 proves the
  # whole connect path (edge -> ingress -> network policy -> app) without
  # needing credentials or a side-effect-free GET handler. Any other
  # status — including a 2xx from a route contract change — should fail
  # the probe and force this module choice to be revisited.
  http_405:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: ip4
      follow_redirects: false
      valid_status_codes: [405]
