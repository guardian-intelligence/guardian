# Keep webhook credentials out of request URLs and access logs. Alertmanager
# reads the existing Alerta key from the Secret mounted by VMAlertmanager.
apiVersion: v1
kind: Secret
metadata:
  name: guardian-alertmanager
  namespace: tenant-root
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: [alertname, namespace, cluster]
      group_wait: 15s
      group_interval: 15s
      # Refresh Alerta before the webhook alert's five-minute endsAt expires.
      # Alerta suppresses unchanged repeats, so this keeps state open without
      # duplicating pager notifications.
      repeat_interval: 2m
      receiver: alerta
      routes:
        - receiver: alerta_no_resolve
          repeat_interval: 1m
          matchers:
            - 'event="Heartbeat"'
        - receiver: blackhole
          matchers:
            - 'severity="none"'
        - receiver: blackhole
          matchers:
            - 'alertname=~"CDIDefaultStorageClassDegraded|CDINoDefaultStorageClass"'
    inhibit_rules:
      - source_matchers:
          - 'alertname=~"VMAgentDown|VMAgentCrashLooping"'
        target_matchers:
          - 'prometheus="cozy-monitoring/vmagent"'
      - source_matchers:
          - 'alertname=~"VMAgentDown|VMAgentCrashLooping"'
        target_matchers:
          - 'alertname=~"CadvisorRecordingsAbsent|EtcdGRPCLatencyMetricsAbsent|EtcdMetricsAbsent|FluxResourceMetricsAbsent|GuardianLoginCanaryAbsent|GuardianSignInStale|KubeAggregatedAPIDown|KubeAggregatedAPIErrors|KubeAPIDown|KubeJobFailed|KubeStateMetricsSelfMetricsAbsent|KubeStateObjectMetricsAbsent|KubernetesFluentBitCollectorsMissing|OpenBaoAuditLogSilent|PaymentsCheckoutCanaryStale|PaymentsRailCanaryStale|ZotRegistryScrapeAbsent|etcdHighNumberOfLeaderChanges"'
    receivers:
      - name: blackhole
      - name: alerta
        webhook_configs:
          - url: http://alerta/api/webhooks/prometheus
            send_resolved: true
            http_config:
              authorization:
                type: Key
                credentials_file: /etc/vm/secrets/alerta/alerta-api-key
      - name: alerta_no_resolve
        webhook_configs:
          - url: http://alerta/api/webhooks/prometheus
            send_resolved: false
            http_config:
              authorization:
                type: Key
                credentials_file: /etc/vm/secrets/alerta/alerta-api-key
