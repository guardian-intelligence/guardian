apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
configMapGenerator:
  - name: blackbox-exporter
    namespace: tenant-root
    files:
      - blackbox.yml
generatorOptions:
  labels:
    app.kubernetes.io/name: blackbox-exporter
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
resources:
  - secrets.yaml
  - relay.yaml
  - networkpolicy.yaml
  - observability.yaml
  - alertmanager-config.yaml
  - audit-alerts.yaml
  - blackbox-exporter.yaml
  - cilium-drop-metrics.yaml
  - cockpit-events-scrape.yaml
  - cockpit-rollup-scrape.yaml
  - core-metrics-wiring.yaml
  - electric-scrape.yaml
  - etcd-snapshot-alerts.yaml
  - ingress-error-alerts.yaml
  - ingress-canary-metrics.yaml
  - log-pipeline-health.yaml
  - postgres-alerts.yaml
  - synthetic-probes.yaml
  - talos-host-log-alerts.yaml
  - trust-alerts.yaml
  - canary-redaction-alerts.yaml
  - tsdb-alerts.yaml
  - vmalert-vlogs.yaml
