# Detection over the probe series, independent of any pending promotion.
# Routes through the proven VMRule -> vmalert -> Alertmanager -> Alerta ->
# relay -> ntfy pipeline.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: synthetic-probes
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: synthetic-probes
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  groups:
    - name: synthetic-probes.rules
      interval: 30s
      rules:
        - alert: ProbeFailing
          expr: avg_over_time(probe_success[5m]) < 1
          for: 5m
          labels:
            severity: warning
            guardian_component: synthetic-probes
          annotations:
            summary: 'synthetic probe failing: {{ $labels.instance }} ({{ $labels.probe_class }}) in {{ $labels.probe_namespace }}'
            description: >-
              {{ $labels.instance }} has failed {{ $labels.probe_class }}
              probes for 5+ minutes. service-class = the cluster path;
              edge-class = the public Cloudflare path. If edge fails while
              service passes, the problem is between the user and the
              ingress (DNS, Cloudflare, LB, origin ingress).
        - alert: ProbeAbsent
          # 25 targets x 15s: total silence means the exporter, vmagent, or
          # the scrape path broke — not that traffic is slow.
          expr: absent(probe_success)
          for: 10m
          labels:
            severity: warning
            guardian_component: synthetic-probes
          annotations:
            summary: No synthetic probe metrics are being reported at all.
        - alert: EdgeTTFBHigh
          # phase=processing is time-to-first-byte as seen through the full
          # public path. Normal edge TTFB here is ~100ms; the 2026-07-07
          # stale-ingress incident sat at multi-second TTFB for hours with
          # no watcher. 1s p95 over 15m is a deliberately loose first
          # threshold — tighten after a week of live data.
          expr: >-
            quantile_over_time(0.95,
              probe_http_duration_seconds{probe_class="edge",phase="processing"}[15m]) > 1
          for: 15m
          labels:
            severity: warning
            guardian_component: synthetic-probes
          annotations:
            summary: 'edge TTFB p95 above 1s: {{ $labels.instance }}'
            description: >-
              Time-to-first-byte through the public edge has been above 1s
              (p95, 15m) for {{ $labels.instance }}. Check probe phase
              breakdown (resolve/connect/tls/processing) to localize, then
              origin ingress logs for upstream retries.
