# Synthetic probe targets and their alert rules. Two probe classes per
# stage, every 15s, through blackbox-exporter.yaml:
#
#   probe_class=service — the in-cluster apex Service. Isolates the cluster
#     path; this is what Flagger's analysis metrics and the Kargo promotion
#     gates read (a Cloudflare blip should not fail a deploy the cluster
#     served correctly).
#   probe_class=edge — the public hostname, hairpinning out through
#     Cloudflare and back in via the LB to the origin. Whole-path truth:
#     DNS, edge TLS, LB health, origin ingress, pod. This is the layer that
#     had NO watcher on 2026-07-07 when a stale ingress replica retried
#     dead upstreams for hours (availability held via retries, TTFB
#     didn't, nothing paged).
#
# The probe_namespace label is the literal stage namespace so Flagger's
# {{ namespace }} MetricTemplate substitution matches it directly. Key
# series:
# probe_success, probe_duration_seconds, and
# probe_http_duration_seconds{phase=resolve|connect|tls|processing|transfer}
# — phase=processing is time-to-first-byte.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: company-site-beta-service
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  jobName: probe/company-site/beta/service
  interval: 15s
  module: http_2xx
  vmProberSpec:
    url: blackbox-exporter.tenant-root.svc:9115
    path: /probe
  targets:
    staticConfig:
      targets:
        - http://company-site.tenant-guardian-beta.svc/healthz
        - http://company-site.tenant-guardian-beta.svc/
        - http://company-site.tenant-guardian-beta.svc/letters
        - http://company-site.tenant-guardian-beta.svc/letters/dear-shovon
      labels:
        probe_class: service
        probe_namespace: tenant-guardian-beta
        guardian_surface: company-site
---
