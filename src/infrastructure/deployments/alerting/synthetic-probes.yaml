# Synthetic probe targets and their alert rules. Two probe classes,
# every 15s, through blackbox-exporter.yaml:
#
#   probe_class=service — the in-cluster apex Service. Isolates the cluster
#     path; this is what Flagger's analysis metrics read (a Cloudflare blip
#     should not fail a deploy the cluster served correctly).
#   probe_class=edge — the public hostname, hairpinning out through
#     Cloudflare and back in via the LB to the origin. Whole-path truth:
#     DNS, edge TLS, LB health, origin ingress, pod. This is the layer that
#     had NO watcher on 2026-07-07 when a stale ingress replica retried
#     dead upstreams for hours (availability held via retries, TTFB
#     didn't, nothing paged).
#
# The probe_namespace label is the literal stage namespace so Flagger's
# {{ namespace }} MetricTemplate substitution matches it directly. Key
# series:
# probe_success, probe_duration_seconds, and
# probe_http_duration_seconds{phase=resolve|connect|tls|processing|transfer}
# — phase=processing is time-to-first-byte.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: company-site-prod-service
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  jobName: probe/company-site/prod/service
  interval: 15s
  module: http_2xx
  vmProberSpec:
    url: blackbox-exporter.tenant-root.svc:9115
    path: /probe
  targets:
    staticConfig:
      targets:
        - http://company-site.tenant-guardian-prod.svc/healthz
        - http://company-site.tenant-guardian-prod.svc/
        - http://company-site.tenant-guardian-prod.svc/letters
        - http://company-site.tenant-guardian-prod.svc/letters/dear-shovon
      labels:
        probe_class: service
        probe_namespace: tenant-guardian-prod
        guardian_surface: company-site
---
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: company-site-prod-edge
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  jobName: probe/company-site/prod/edge
  interval: 15s
  module: http_2xx
  vmProberSpec:
    url: blackbox-exporter.tenant-root.svc:9115
    path: /probe
  targets:
    staticConfig:
      targets:
        - https://guardianintelligence.org/healthz
        - https://guardianintelligence.org/
        - https://guardianintelligence.org/letters
        - https://guardianintelligence.org/letters/dear-shovon
        - https://guardianintelligence.org/electric/v1/shape?table=status_heartbeat&offset=-1
      labels:
        probe_class: edge
        probe_namespace: tenant-guardian-prod
        guardian_surface: company-site
---
# Postflight control-plane routes through the full public path. Both
# endpoints are POST-only, so the http_405 module treats the router's 405
# as success — what this watches is the connect path, which is exactly
# what the 2026-07-15 CNP incident broke (the edge served these routes at
# ~2/3 failure for 16 hours while every probe above stayed green). No
# service-class twin: the control-plane CNP admits only node-identity
# ingress, so an in-cluster prober pod is deliberately not admitted.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMProbe
metadata:
  name: postflight-prod-edge
  namespace: tenant-root
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  jobName: probe/postflight/prod/edge
  interval: 15s
  module: http_405
  vmProberSpec:
    url: blackbox-exporter.tenant-root.svc:9115
    path: /probe
  targets:
    staticConfig:
      targets:
        - https://guardianintelligence.org/api/v1/github/webhooks
        - https://guardianintelligence.org/api/v1/hostd/sync
      labels:
        probe_class: edge
        probe_namespace: postflight-runner
        guardian_surface: postflight
---
# Detection over the probe series, independent of any pending promotion.
# Routes through the proven VMRule -> vmalert -> Alertmanager -> Alerta ->
# relay -> ntfy pipeline.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: synthetic-probes
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: synthetic-probes
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  groups:
    - name: synthetic-probes.rules
      interval: 30s
      rules:
        - alert: ProbeFailing
          # < 0.9 tolerates two failed 15s samples per window (~30s), so a
          # single-pod Recreate rollout or a PG switchover blip does not
          # page; a real outage drives the average to 0 within a minute.
          expr: avg_over_time(probe_success[5m]) < 0.9
          for: 5m
          labels:
            severity: warning
            guardian_component: synthetic-probes
          annotations:
            summary: 'synthetic probe failing: {{ $labels.instance }} ({{ $labels.probe_class }}) in {{ $labels.probe_namespace }}'
            description: >-
              {{ $labels.instance }} has failed {{ $labels.probe_class }}
              probes for 5+ minutes. service-class = the cluster path;
              edge-class = the public Cloudflare path. If edge fails while
              service passes, the problem is between the user and the
              ingress (DNS, Cloudflare, LB, origin ingress).
        - alert: ProbeAbsent
          # 11 targets x 15s: total silence means the exporter, vmagent, or
          # the scrape path broke — not that traffic is slow.
          expr: absent(probe_success)
          for: 10m
          labels:
            severity: warning
            guardian_component: synthetic-probes
          annotations:
            summary: No synthetic probe metrics are being reported at all.
        - alert: EdgeTTFBHigh
          # phase=processing is time-to-first-byte as seen through the full
          # public path. Normal edge TTFB here is ~100ms; the 2026-07-07
          # stale-ingress incident sat at multi-second TTFB for hours with
          # no watcher. Transient edge stalls can cluster just above 1s, so
          # 1.5s p95 for 15m preserves a large gap from the healthy baseline.
          # Aggregate by stage to retain any-route coverage without sending
          # one notification for every affected probe target.
          expr: >-
            max by (probe_namespace, guardian_surface) (
              quantile_over_time(0.95,
                probe_http_duration_seconds{probe_class="edge",phase="processing"}[15m])
            ) > 1.5
          for: 15m
          labels:
            severity: warning
            guardian_component: synthetic-probes
            exported_instance: '{{ $labels.probe_namespace }}/edge-ttfb'
          annotations:
            summary: 'edge TTFB p95 above 1.5s in {{ $labels.probe_namespace }}'
            description: >-
              At least one route through the public edge has had
              time-to-first-byte above 1.5s (p95, 15m) in
              {{ $labels.probe_namespace }}. Check the per-route probe phase
              breakdown (resolve/connect/tls/processing) to localize, then
              origin ingress logs for upstream retries.
