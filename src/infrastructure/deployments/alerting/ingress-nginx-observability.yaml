# Standard per-request metrics from the tenant-root ingress controller
# (enabled in base/app-patches/ingress-origin-edge.yaml). The request series
# is what the company-site weighted-canary gate reads: its `canary` label is
# the only place weighted-split attribution exists — the protobuf detail
# series (ingress_nginx_detail_*) labels responses by matched route and is
# blind to the split (proven live on the 2026-07-16 first weighted rollout).
#
# honorLabels keeps the exporter's own namespace/ingress labels: Flagger's
# built-in nginx queries filter on the Ingress resource's namespace, which
# the scrape target's tenant-root identity would otherwise overwrite.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: root-ingress-controller
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: ingress-nginx
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  namespaceSelector:
    matchNames:
      - tenant-root
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
      app.kubernetes.io/instance: ingress-nginx-system
      app.kubernetes.io/component: controller
  endpoints:
    - port: metrics
      path: /metrics
      # 15s keeps ≥4 samples in each 1m canary-gate window.
      interval: 15s
      scrapeTimeout: 10s
      honorLabels: true
