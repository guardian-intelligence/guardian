# The Cilium chart's own VMServiceScrape (hubble.metrics.serviceMonitor in
# base/platform-patches/cozystack-networking-hubble.yaml) is the single
# scrape of the agents' hubble metrics endpoint. A second scrape of the same
# hostPort adds no redundancy — it adds a duplicate series per agent that
# any sum() without a job selector silently doubles.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: cilium-drops
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: cilium-drops
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  groups:
    - name: cilium-drops.rules
      interval: 30s
      rules:
        - alert: CiliumPolicyDeniedSustained
          # Cilium emits two notifications for a single denied packet — a
          # DropNotify and a PolicyVerdictNotify — and hubble's drop handler
          # counts every flow whose verdict is DROPPED, so hubble_drop_total
          # advances by 2 per denial. The threshold is therefore in
          # notifications: 0.1/s is 0.05 denied packets/s. Steady state is
          # near zero — the Talos ingress firewall absorbs internet scans
          # before Cilium ever sees them. The 2026-07-15 CNP incident's SYN
          # retransmits alone ran ~0.5-1 packets/s.
          expr: >-
            sum by (protocol) (rate(hubble_drop_total{reason="POLICY_DENIED"}[10m])) > 0.1
          for: 15m
          labels:
            severity: warning
            guardian_component: cilium-drops
          annotations:
            summary: 'Cilium denying {{ $labels.protocol }} traffic at {{ $value | humanize }} notifications/s'
            description: >-
              POLICY_DENIED drops have been sustained for 15+ minutes.
              Something a network policy does not admit is retrying against
              it — recently applied CNP/CCNP changes and hostNetwork
              (node-identity) sources are the usual suspects. Attribute with
              topk(5, sum by (source, destination, traffic_direction, protocol)
              (rate(hubble_drop_total{reason="POLICY_DENIED"}[30m]))), then
              read the offending namespace's policies with kubectl get
              cnp,ccnp.
        - alert: CiliumDropMetricsAbsent
          # Three agents x 30s: total silence means the scrape or the
          # hubble metrics server broke, not that nothing is being dropped.
          expr: absent(hubble_drop_total)
          for: 15m
          labels:
            severity: warning
            guardian_component: cilium-drops
          annotations:
            summary: No hubble drop metrics are being scraped at all.
