# Usage-time alert on the un-revocable root identity, fed by apiserver audit
# logs (Talos audit policy -> fluent-bit -> VictoriaLogs, log_source=audit_log).
#
# Complements the mint-time breakglass audit (`aspect infra auth
# --platform-admin` pages when a cert is MINTED — #464): this pages when
# `system:masters` is USED. Post CA-rotation (runbooks/cert-rotation.md,
# 2026-07-07) the expected baseline outside the carve-outs is ZERO, so a
# single hit is a page, not a trend.
#
#
# Known-legitimate `system:masters` population (verified from 6h of audit
# logs, 2026-07-07 — see runbooks/cert-rotation.md drill log):
#   - system:apiserver   the apiserver's own loopback client (constant)
#   - talos:admin        Talos internal machinery (constant)
#   - admin              ONLY as Talos node controllers syncing Node objects:
#                        Go-http-client from ::1 / node VLAN IPs / the VIP,
#                        minted fresh from the cluster CA every ~minute.
# Anything else — a human/agent kubectl as admin (breakglass USE), or a novel
# CN minted into the group from stolen custody — fires. A real breakglass
# session paging is intended behavior, not a false positive: the mint already
# paged, and the usage page is the second half of that audit trail.
# The node-IP list is stable across reimages (declared in talm overlays);
# revisit if the VLAN plan changes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: guardian-audit-vlogs-rules
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: vmalert-vlogs
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
data:
  audit.yaml: |
    groups:
      - name: guardian-audit-system-masters
        type: vlogs
        interval: 60s
        rules:
          - alert: SystemMastersUsage
            expr: |
              log_source:audit_log user_groups:"system:masters"
                NOT user_username:="system:apiserver"
                NOT user_username:="talos:admin"
                NOT (user_username:="admin" userAgent:="Go-http-client/2.0" objectRef.resource:="nodes" (sourceIPs:"::1" OR sourceIPs:"10.8.0.11" OR sourceIPs:"10.8.0.12" OR sourceIPs:"10.8.0.13" OR sourceIPs:"10.8.0.250"))
              | stats by (user_username, sourceIPs, userAgent, verb) count() as hits
            # A single 60s window of root usage (proven live 2026-07-07: fires
            # on breakglass kubectl, silent on the Talos node-controller
            # baseline) must survive Alertmanager group_wait even for a short
            # burst — hold the alert for 10m after the last hit so a brief
            # breakglass session still pages rather than self-resolving.
            keep_firing_for: 10m
            labels:
              severity: critical
              guardian_component: audit
              exported_instance: '{{ $labels.user_username }}@{{ $labels.sourceIPs }}/{{ $labels.userAgent }}/{{ $labels.verb }}'
            annotations:
              summary: 'system:masters used: {{ $labels.user_username }} from {{ $labels.sourceIPs }}'
              description: >-
                {{ $labels.hits }} apiserver request(s) as {{ $labels.user_username }}
                (system:masters) from {{ $labels.sourceIPs }} agent {{ $labels.userAgent }}
                verb {{ $labels.verb }} in the last minute. Root-identity usage is
                expected ONLY from Talos node controllers. If this is not a
                breakglass session you started, treat the cluster CA as
                compromised: runbooks/cert-rotation.md + runbooks/custody.md
                "Leak response".
