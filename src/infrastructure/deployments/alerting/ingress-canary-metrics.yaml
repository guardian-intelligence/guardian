# Canary-attribution series for the company-site weighted rollout, derived
# from the ingress controller's access log. This is the ONLY place the
# weight split is attributable: the fork strips the upstream per-request
# Prometheus series, and its protobuf detail series labels responses by
# matched route — both blind to which backend the canary balancer chose
# (proven live on the 2026-07-16 first weighted rollout). The access line
# carries the alternative upstream in its own bracket group:
#
#   ... "GET /x HTTP/1.1" 200 ... [tenant-guardian-prod-company-site-80]
#       [tenant-guardian-prod-company-site-canary-80] 10.244.x.x:8080 ...
#
# The bracketed phrase filter matches only access lines (the balancer's
# post-rollback "no alternative balancer" stderr lines carry the name
# unbracketed), and canary-served responses with a dead backend still
# count — as 5xx, which is exactly what the gate should see. The first
# `" ` in the line closes the request quote, so <status> is the downstream
# status. vmalert-vlogs remote-writes the result; Flagger's
# canary-request-success-rate template gates on it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: guardian-ingress-canary-vlogs-rules
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: vmalert-vlogs
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
data:
  ingress-canary.yaml: |
    groups:
      - name: guardian-ingress-canary
        type: vlogs
        interval: 60s
        rules:
          - record: guardian:company_site_canary_responses:count1m
            expr: |
              log_source:container_log kubernetes_namespace_name:="tenant-root" kubernetes_container_name:="controller"
                "[tenant-guardian-prod-company-site-canary-80]"
                | extract '" <status> '
                | stats by (status) count() as responses
