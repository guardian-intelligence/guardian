# ntfy topic URL for the alert-relay sink. Read through tenant-root's
# existing per-namespace secret scope (ClusterSecretStore tenant-root-openbao
# authenticating as secrets-reader / guardian-reader-tenant-root — declared
# in base/secrets/backup-storage-credentials.yaml, the pattern this mirrors).
# The kv value is seeded by the bootstrap importer
# (cmd/openbao_secret_import) from the custody env file's
# guardian_alerting_ntfy_url.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alert-relay-config
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: alert-relay
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-root
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: tenant-root-openbao
  target:
    name: alert-relay-config
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: ntfy_url
      remoteRef:
        key: guardian/guardian-mgmt/tenant-root/alerting
        property: ntfy_url
