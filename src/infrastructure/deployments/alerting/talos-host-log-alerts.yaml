# Flow assertions for the Talos host-log pipeline
# (base/observability/talos-log-receiver.yaml). The increase()-over-7d
# gate keeps the aggregate rule silent until the pipeline has ever
# carried data (nodes only send once their machine config gains the
# logging destination), then guards it forever after — including across
# counter resets, which an `offset` gate would not survive. Per-node
# silence (one node's sender dying while the others flow) is invisible
# to the aggregate metric, so a LogsQL rule at the bottom of this file
# counts distinct senders instead.
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: talos-host-log-health
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: talos-host-log-health
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
spec:
  groups:
    - name: talos-host-log-health.rules
      interval: 60s
      rules:
        - alert: TalosHostLogFlowStopped
          expr: >-
            sum(rate(fluentbit_input_records_total{namespace="tenant-root",
            pod=~"talos-log-receiver.*"}[30m])) == 0 and
            sum(increase(fluentbit_input_records_total{namespace="tenant-root",
            pod=~"talos-log-receiver.*"}[7d])) > 0
          for: 15m
          labels:
            severity: warning
            guardian_component: observability
          annotations:
            summary: 'Talos host-log flow stopped'
            description: >-
              The talos-log-receiver has ingested nothing for 30+ minutes
              on a pipeline that has carried data within the last week.
              Either every node stopped sending (machine config
              regression) or the receiver/LB path is broken. Host logs
              are fire-and-forget from the Talos side, so this gap is
              silent data loss until fixed.
        - alert: TalosHostLogReceiverAbsent
          expr: >-
            count(up{pod=~"talos-log-receiver.*"} offset 1h) unless
            count(up{pod=~"talos-log-receiver.*"})
          for: 15m
          labels:
            severity: warning
            guardian_component: observability
          annotations:
            summary: 'Talos host-log receiver vanished from metrics'
            description: >-
              The receiver emitted scrape targets an hour ago and none
              exist now — deleted Deployment, broken VMPodScrape, or
              vmagent discovery loss. TalosHostLogFlowStopped is blind
              without these series; treat as the same outage.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: guardian-talos-vlogs-rules
  namespace: tenant-root
  labels:
    app.kubernetes.io/name: vmalert-vlogs
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: alerting
data:
  talos-host-logs.yaml: |
    groups:
      - name: guardian-talos-host-logs
        type: vlogs
        interval: 60s
        rules:
          - alert: TalosNodeLogSilent
            expr: |
              log_source:talos_service _time:15m | stats count_uniq(node) as nodes | filter nodes:<3
            for: 10m
            keep_firing_for: 15m
            labels:
              severity: warning
              guardian_component: observability
            annotations:
              summary: 'A Talos node stopped sending host logs'
              description: >-
                Fewer than 3 distinct nodes appear in talos_service
                streams over the last 15 minutes. The aggregate flow
                alert cannot see one dead sender while the others still
                flow. Compare `log_source:talos_service _time:15m | stats
                by (node) count()` against the node map to find the
                silent one; the usual causes are a machine-config
                regression on that node or its TCP path to
                10.8.0.200:5170.
