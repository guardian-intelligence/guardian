apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: payments-stripe
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: tenant-guardian-prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-prod-openbao
  target:
    name: payments-stripe
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: api_key
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/payments/stripe
        property: api_key
    - secretKey: account_id
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/payments/stripe
        property: account_id
    - secretKey: webhook_secret
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/payments/stripe
        property: webhook_secret
    - secretKey: canary_price_id
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/payments/stripe
        property: canary_price_id
---
