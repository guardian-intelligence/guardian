apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  name: payments-loadtester
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: payments-loadtester
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: payments-loadtester
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payments-loadtester
        app.kubernetes.io/part-of: guardian
        guardian.dev/stage: prod
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loadtester
          image: ghcr.io/fluxcd/flagger-loadtester@sha256:f98a35ab7aca0f2efdd8e397b4002e283637f5c9e31e4e2a6c1e97af07c50454 # 0.37.0
          imagePullPolicy: IfNotPresent
          command:
            - ./loadtester
            - -port=8080
            - -log-level=info
            - -timeout=2m
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PAYMENTS_CANARY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: payments-canary
                  key: token
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
              ephemeral-storage: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: gates
              mountPath: /gate
              readOnly: true
      volumes:
        - name: gates
          configMap:
            name: payments-gates
            defaultMode: 0555
---
apiVersion: v1
kind: Service
metadata:
  name: payments-loadtester
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: payments-loadtester
    app.kubernetes.io/part-of: guardian
spec:
  selector:
    app.kubernetes.io/name: payments-loadtester
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payments-gates
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: payments-loadtester
    app.kubernetes.io/part-of: guardian
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
data:
  readiness.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    curl -fsS --max-time 10 http://payments-canary.tenant-guardian-prod/readyz
  rail.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    curl -fsS --max-time 80 \
      -X POST \
      -H "Authorization: Bearer ${PAYMENTS_CANARY_TOKEN}" \
      http://payments-canary.tenant-guardian-prod/internal/payments/canary/rail \
      | grep -q '"status":"passed"'
