apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: payments
    guardian.dev/product: guardian
    guardian.dev/stage: prod
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: payments
  template:
    metadata:
      annotations:
        guardian.dev/tigerbeetle-transport-api: mtls-host-ip-v1
      labels:
        app.kubernetes.io/name: payments
        app.kubernetes.io/part-of: guardian
        app.kubernetes.io/component: payments
        guardian.dev/otel: producer
        guardian.dev/product: guardian
        guardian.dev/stage: prod
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: payments
                topologyKey: kubernetes.io/hostname
      containers:
        - name: payments
          image: ghcr.io/guardian-intelligence/payments@sha256:322bdc13f57983d4f3c04f02e092d32a9204207d93918d4114a7b2f6a8fc4790
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-products-credentials
                  key: payments
            - name: DATABASE_URL
              value: postgresql://payments:$(PGPASSWORD)@postgres-products-rw.tenant-guardian-prod.svc:5432/payments?sslmode=require
            - name: PUBLIC_BASE_URL
              value: https://guardianintelligence.org
            - name: OIDC_ISSUER
              value: https://guardianintelligence.org/realms/postflight
            - name: OIDC_CLIENT_ID
              value: postflight-web
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: payments-stripe
                  key: api_key
            - name: STRIPE_ACCOUNT_ID
              valueFrom:
                secretKeyRef:
                  name: payments-stripe
                  key: account_id
            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: payments-stripe
                  key: webhook_secret
            - name: STRIPE_CANARY_PRICE_ID
              valueFrom:
                secretKeyRef:
                  name: payments-stripe
                  key: canary_price_id
            - name: TIGERBEETLE_ADDRESSES
              value: 127.0.0.1:13000,127.0.0.1:13001,127.0.0.1:13002
            - name: TIGERBEETLE_CLUSTER_ID
              value: "49532141921164377784457307205600684260"
            - name: JOURNAL_S3_ENDPOINT
              value: https://c3eaeffaadf7d4847684d4775c16d598.r2.cloudflarestorage.com
            - name: JOURNAL_S3_REGION
              value: auto
            - name: JOURNAL_S3_BUCKET
              value: guardian-backups
            - name: JOURNAL_S3_PREFIX
              value: tenant-guardian-prod/payments-journal
            - name: JOURNAL_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: payments-journal-r2
                  key: access_key_id
            - name: JOURNAL_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: payments-journal-r2
                  key: secret_access_key
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: otel-collector.guardian-analytics.svc.cozy.local:4317
            - name: PAYMENTS_CANARY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: payments-canary
                  key: token
            - name: CUSTOMER_CHECKOUT_ENABLED
              value: "false"
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
            failureThreshold: 120
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: "2"
              memory: 1Gi
              ephemeral-storage: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: Unconfined
        - name: tigerbeetle-transport
          image: docker.io/envoyproxy/envoy:distroless-v1.36.4@sha256:2f71c5666a5209d6ee1ec519b17877ccb6d17be4d00e34de10f11e020ea8707a
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - warning
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tigerbeetle-transport-config
              mountPath: /etc/envoy
              readOnly: true
            - name: tigerbeetle-transport-tls
              mountPath: /tls
              readOnly: true
      volumes:
        - name: tigerbeetle-transport-config
          configMap:
            name: payments-tigerbeetle-transport
        - name: tigerbeetle-transport-tls
          secret:
            secretName: payments-tigerbeetle-client-tls
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: payments
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: payments
    app.kubernetes.io/part-of: guardian
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: payments
