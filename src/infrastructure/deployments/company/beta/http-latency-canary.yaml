# Minutely synthetic HTTP latency/availability canary. Not a real Core Web
# Vitals measurement (no browser, no LCP/CLS/INP, no jank) -- that needs a
# custom Playwright-capable image this PR deliberately deferred (see the
# header comment history in this repo's plan notes). This probes a few
# representative in-cluster paths, records status + timing, and pushes to
# VictoriaMetrics so Flagger's analysis (and later, Kargo's promotion gate)
# have a real, continuously-refreshed signal instead of only the one-shot
# pre-rollout/rollout webhook check in loadtester.yaml.
#
# Reuses the already-locked ghcr.io/fluxcd/flagger-loadtester image purely
# as a curl+bash runner (command-overridden) -- that image already has curl
# and bash present (loadtester.yaml's own http-gate.sh already shells out to
# curl inside this exact image), so no new image or images.lock entry is
# needed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: company-site-http-canary
  # substitute: disabled -- the embedded bash uses ${paths[@]}/${#paths[@]},
  # which Flux's post-build envsubst rejects ("missing closing brace").
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: company-site-http-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: beta
data:
  http-latency-canary.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    base="http://company-site.tenant-guardian-beta.svc"
    push_url="http://vminsert-shortterm.tenant-root.svc:8480/insert/0/prometheus/api/v1/import/prometheus"
    # The label value is the actual Kubernetes namespace, not a short stage
    # alias: Flagger's MetricTemplate query interpolates the Canary's own
    # namespace via the built-in {{ namespace }} substitution (there's no
    # custom-arg templating in the stable Flagger API), so the label must
    # match that literal namespace string for the query to find it.
    namespace="tenant-guardian-beta"
    paths=(/healthz / /letters /letters/dear-shovon)

    lines=()
    overall_ok=1
    for path in "${paths[@]}"; do
      # -w's format string MUST end in \n: `read` returns exit 1 when its
      # input has no trailing newline, even though it still populates the
      # variables correctly -- under `set -e` that aborted this script on
      # every SUCCESSFUL curl (the || echo fallback only fires on failure,
      # and only that path had a real trailing newline via echo). Confirmed
      # live: every real run failed with a bare `curl ... $(process
      # substitution)` in an otherwise-empty trace, right after a manual
      # curl to the same URL proved the target was perfectly healthy.
      read -r code total ttfb < <(curl -o /dev/null -s -w '%{http_code} %{time_total} %{time_starttransfer}\n' --max-time 10 "$base$path" || echo "000 0 0")
      ok=0
      if [[ "$code" == "200" ]]; then ok=1; else overall_ok=0; fi
      lines+=("http_canary_duration_seconds{namespace=\"$namespace\",path=\"$path\",phase=\"total\"} $total")
      lines+=("http_canary_duration_seconds{namespace=\"$namespace\",path=\"$path\",phase=\"ttfb\"} $ttfb")
      lines+=("http_canary_success{namespace=\"$namespace\",path=\"$path\"} $ok")
    done

    printf '%s\n' "${lines[@]}" | curl -fsS --max-time 10 --data-binary @- "$push_url"
    echo "http-latency-canary: pushed $(( ${#paths[@]} * 3 )) series (namespace=$namespace, all_ok=$overall_ok)"
    [[ "$overall_ok" -eq 1 ]]
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: company-site-http-canary
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: company-site-http-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: beta
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 45
      template:
        metadata:
          labels:
            app.kubernetes.io/name: company-site-http-canary
            app.kubernetes.io/part-of: guardian
            guardian.dev/stage: beta
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: http-canary
              image: ghcr.io/fluxcd/flagger-loadtester@sha256:f98a35ab7aca0f2efdd8e397b4002e283637f5c9e31e4e2a6c1e97af07c50454 # 0.37.0
              imagePullPolicy: IfNotPresent
              command:
                - bash
                - /scripts/http-latency-canary.sh
              resources:
                requests:
                  cpu: 25m
                  memory: 32Mi
                  ephemeral-storage: 64Mi
                limits:
                  cpu: 250m
                  memory: 128Mi
                  ephemeral-storage: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: scripts
              configMap:
                name: company-site-http-canary
                defaultMode: 0555
---
# Canary pod flows: company-site in-namespace, and the VictoriaMetrics
# remote-write ingester in tenant-root. No public egress needed -- this
# probes the in-cluster Service directly, not the public edge (Cloudflare
# and the edge path have their own separate monitoring).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: company-site-http-canary
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: company-site-http-canary
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: beta
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: company-site-http-canary
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - company-site
                - company-site-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: vminsert
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# Ingress half of the remote-write path: tenant-root's generated isolation
# does not admit grandchild-tenant namespaces (same reason as the
# root-ingress pair); admit exactly the canary pods to vminsert.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-vminsert-from-company-site-http-canary-beta
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: vminsert
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-guardian-beta
            k8s:app.kubernetes.io/name: company-site-http-canary
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
