# The public edge is the tenant-root ingress controller on the node public
# IPs (Cloudflare origins). The Cozystack tenant chart's generated isolation
# policy admits only the parent tenant (tenant-guardian), system namespaces,
# and the apiserver into tenant-guardian-beta — not tenant-root. This
# additive policy admits exactly the root ingress controller to the
# company-site pods (same shape as prod's). Matches both label values
# because Flagger's apex Service routes to the primary clone
# (company-site-primary), not the plain company-site pods, once the Canary
# takes over the Deployment.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-guardian-beta-allow-root-ingress-company-site
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values:
          - tenant-guardian-beta
      - key: k8s:app.kubernetes.io/name
        operator: In
        values:
          - company-site
          - company-site-primary
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: ingress-nginx
            k8s:app.kubernetes.io/component: controller
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# Egress half: tenant-root's generated egress policy only admits destinations
# labeled tenant.cozystack.io/tenant-root, and grandchild tenant namespaces
# carry only parent+self ancestry labels. Admit the root ingress controller
# outbound to the company-site pods (Cilium policies are additive).
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-ingress-egress-company-site-beta
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: ingress-nginx
      k8s:app.kubernetes.io/component: controller
  egress:
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - tenant-guardian-beta
            - key: k8s:app.kubernetes.io/name
              operator: In
              values:
                - company-site
                - company-site-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
