# company-site's own egress flows, following the repo's Cilium conventions
# (selecting an endpoint flips it to default-deny for the selected
# direction; every rule below is therefore the complete allowed set).
# Ingress admission lives in root-ingress-networkpolicy.yaml (the public
# edge is the only caller). company-site is a stateless server; the
# Postflight OIDC callback exchanges authorization codes with Keycloak over
# the namespace-local service; keycloak-primary is Flagger's clone of the
# Keycloak Deployment.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: company-site
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - keycloak
                - keycloak-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
