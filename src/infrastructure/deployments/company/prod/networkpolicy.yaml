# company-site's own flows, following the repo's Cilium conventions
# (selecting an endpoint flips it to default-deny for the selected
# direction; every rule below is therefore the complete allowed set).
# Both selectors match BOTH app label values because Flagger's primary
# clone suffixes the selector label value with -primary. company-site is a
# stateless static-site server (no clustering, no DB, no outbound API
# calls at request time), so egress here is DNS only.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - company-site
          - company-site-primary
  ingress:
    # company-site-loadtester runs the HTTP and k6 gates against the canary
    # Service during Flagger analysis.
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: company-site-loadtester
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
---
# company-site-loadtester: webhook calls arrive from the Flagger controller; the
# checks it executes go to the company-site pods (canary Service), DNS, and
# VictoriaMetrics remote-write for the k6 stress gate.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: company-site-loadtester
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site-loadtester
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: company-site-loadtester
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flagger
            k8s:app.kubernetes.io/name: flagger
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - company-site
                - company-site-primary
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: vminsert
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# Ingress half of the remote-write path: tenant-root's generated isolation
# does not admit grandchild-tenant namespaces; admit exactly the loadtester
# pod that runs the deploy-time k6 stress gate.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-vminsert-from-company-site-loadtester-prod
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: vminsert
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-guardian-prod
            k8s:app.kubernetes.io/name: company-site-loadtester
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
