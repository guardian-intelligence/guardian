apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: web
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      app.kubernetes.io/part-of: guardian
      guardian.dev/stage: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: company-site
        app.kubernetes.io/part-of: guardian
        app.kubernetes.io/component: web
        guardian.dev/product: company
        guardian.dev/stage: prod
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/guardian-intelligence/company-site@sha256:4671c325120c4a41d67602be9a0b797d266c84b6576effa156ee17898b1e8a02
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GUARDIAN_SITE
              value: prod
            - name: GUARDIAN_DEPLOY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: web
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      app.kubernetes.io/part-of: guardian
      guardian.dev/stage: prod
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  annotations:
    # Enforce Authenticated Origin Pulls: only clients presenting a
    # certificate signed by Cloudflare's origin-pull CA (i.e. the edge
    # itself) reach this host. Zone-level AOP is enabled in the
    # guardian-mgmt-edge-policy tofu root; without this verification the
    # origin is directly reachable and CF-Connecting-IP is forgeable.
    # $ssl_client_verify=SUCCESS is also what gates the controller-level
    # x-guardian-client-ip header mapping (app-patches ingress-origin-edge).
    nginx.ingress.kubernetes.io/auth-tls-secret: tenant-guardian-prod/cloudflare-origin-pull-ca
    # Stage 1: "optional" verifies the edge's certificate (SUCCESS gates the
    # x-guardian-* headers) without refusing certless direct traffic, so a
    # misbehaving cert presentation cannot 400 the site. Flip to "on" once
    # logs show client_ip_source=cloudflare on all real traffic; only then is
    # direct-to-origin access actually closed.
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "optional"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    # Cloudflare connects over TLS (zone SSL mode is full); direct plaintext
    # hits get a redirect into the client-cert wall instead of the app.
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  ingressClassName: tenant-root
  rules:
    - host: guardianintelligence.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: company-site
                port:
                  number: 80
