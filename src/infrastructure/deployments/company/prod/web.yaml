apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: web
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      app.kubernetes.io/part-of: guardian
      guardian.dev/stage: prod
  template:
    metadata:
      labels:
        app.kubernetes.io/name: company-site
        app.kubernetes.io/part-of: guardian
        app.kubernetes.io/component: web
        guardian.dev/product: company
        guardian.dev/stage: prod
    spec:
      automountServiceAccountToken: false
      # Soft spread across nodes: with 3 replicas, maxUnavailable 0 and a
      # minAvailable-2 PDB, two replicas co-scheduled on one node would let a
      # single node loss breach the budget. ScheduleAnyway (not DoNotSchedule)
      # so a degraded cluster can still schedule rollouts.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: company-site
              app.kubernetes.io/part-of: guardian
              guardian.dev/stage: prod
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/guardian-intelligence/company-site:edge@sha256:cc2dec7f14f6db721e13735e7c12d82c482af3a3c1f9974852f72a1f0fd39b58 # {"$imagepolicy": "guardian-imageops:company-site"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GUARDIAN_SITE
              value: prod
            - name: POSTFLIGHT_PUBLIC_URL
              value: https://guardianintelligence.org
            - name: POSTFLIGHT_AUTH_ENABLED
              value: "true"
            - name: POSTFLIGHT_OIDC_ISSUER
              value: https://guardianintelligence.org/realms/guardianintelligence.org
            - name: POSTFLIGHT_OIDC_INTERNAL_URL
              value: http://keycloak.tenant-guardian-prod.svc/realms/guardianintelligence.org
            - name: POSTFLIGHT_OIDC_CLIENT_ID
              value: postflight-web
            # The BFF reads these files on every use, so a rotation lands via
            # the kubelet's Secret-mount sync with no pod roll. Seal rotation
            # ceremony: swap the two SESSION_SECRET paths (the standby becomes
            # the sealer), then after the 30m session TTL force-sync the
            # retired slot's generator.
            - name: POSTFLIGHT_OIDC_CLIENT_SECRET_FILE
              value: /auth-secrets/oidc-client-secret
            - name: POSTFLIGHT_SESSION_SECRET_FILE
              value: /auth-secrets/session-seal-slot-a
            - name: POSTFLIGHT_SESSION_SECRET_STANDBY_FILE
              value: /auth-secrets/session-seal-slot-b
            - name: GUARDIAN_DEPLOY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: auth-secrets
              mountPath: /auth-secrets
              readOnly: true
      volumes:
        - name: auth-secrets
          projected:
            sources:
              - secret:
                  name: postflight-oidc-client
                  items:
                    - key: password
                      path: oidc-client-secret
              - secret:
                  name: postflight-session-seal
                  items:
                    - key: password
                      path: session-seal-slot-a
              - secret:
                  name: postflight-session-seal-slot-b
                  items:
                    - key: password
                      path: session-seal-slot-b
---
apiVersion: v1
kind: Service
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: web
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      app.kubernetes.io/part-of: guardian
      guardian.dev/stage: prod
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  annotations:
    # The Talos firewall admits only Cloudflare's origin-facing ranges, while
    # this mTLS check makes the edge prove its identity at HTTP termination.
    nginx.ingress.kubernetes.io/auth-tls-secret: tenant-guardian-prod/cloudflare-origin-pull-ca
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  ingressClassName: tenant-root
  rules:
    - host: guardianintelligence.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: company-site
                port:
                  number: 80
