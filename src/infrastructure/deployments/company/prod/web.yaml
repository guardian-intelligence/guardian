apiVersion: apps/v1
kind: Deployment
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: web
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  replicas: 3
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      app.kubernetes.io/part-of: guardian
      guardian.dev/stage: prod
  template:
    metadata:
      annotations:
        guardian.dev/rollout-controller: flagger
        # Flagger records a failed rollout's spec and will not re-run it
        # until the pod template changes; bump this nonce to re-send the
        # same code through the canary gate.
        guardian.dev/rollout-nonce: canary-gate-vlogs
      labels:
        app.kubernetes.io/name: company-site
        app.kubernetes.io/part-of: guardian
        app.kubernetes.io/component: web
        guardian.dev/product: company
        guardian.dev/stage: prod
    spec:
      automountServiceAccountToken: false
      # Soft spread across nodes: with 3 replicas, maxUnavailable 0 and a
      # minAvailable-2 PDB, two replicas co-scheduled on one node would let a
      # single node loss breach the budget. ScheduleAnyway (not DoNotSchedule)
      # so a degraded cluster can still schedule rollouts.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: company-site
              app.kubernetes.io/part-of: guardian
              guardian.dev/stage: prod
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/guardian-intelligence/company-site@sha256:5bc96cc43704e6909330a6fa34c8786f908e0a6fae60ead0e01023b164bf2286
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GUARDIAN_SITE
              value: prod
            - name: GUARDIAN_DEPLOY_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    app.kubernetes.io/component: web
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  selector:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: company-site
      app.kubernetes.io/part-of: guardian
      guardian.dev/stage: prod
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  annotations:
    # The Talos firewall admits only Cloudflare's origin-facing ranges, while
    # this mTLS check makes the edge prove its identity at HTTP termination.
    nginx.ingress.kubernetes.io/auth-tls-secret: tenant-guardian-prod/cloudflare-origin-pull-ca
    nginx.ingress.kubernetes.io/auth-tls-verify-client: "on"
    nginx.ingress.kubernetes.io/auth-tls-verify-depth: "1"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
    guardian.dev/stage: prod
spec:
  ingressClassName: tenant-root
  rules:
    - host: guardianintelligence.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: company-site
                port:
                  number: 80
