# The public edge is the tenant-root ingress controller on the node public
# IPs (Cloudflare origins). It runs hostNetwork, so its traffic arrives with
# the reserved host/remote-node identities — never a pod identity — and the
# admit must be entity-based. This additive policy admits node-identity
# traffic to the company-site pods.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-guardian-prod-allow-root-ingress-company-site
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values:
          - tenant-guardian-prod
      - key: k8s:app.kubernetes.io/name
        operator: In
        values:
          - company-site
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
