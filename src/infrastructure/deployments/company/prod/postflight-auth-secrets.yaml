apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: postflight-session-seal
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
spec:
  length: 64
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postflight-session-seal
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
spec:
  refreshPolicy: CreatedOnce
  refreshInterval: "0"
  target:
    name: postflight-session-seal
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: postflight-session-seal
---
# Standby seal slot. The BFF seals with slot-a and unseals with both, so a
# rotation is a two-step ceremony with no mass sign-out: swap the two *_FILE
# paths in web.yaml (the standby becomes the sealer), then after the 30m
# session TTL force-sync the retired slot's generator to re-mint it.
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: postflight-session-seal-slot-b
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
spec:
  length: 64
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postflight-session-seal-slot-b
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
spec:
  refreshPolicy: CreatedOnce
  refreshInterval: "0"
  target:
    name: postflight-session-seal-slot-b
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: postflight-session-seal-slot-b
