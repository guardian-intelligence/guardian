# Flagger weighted canary for company-site (provider: nginx). Flagger owns
# the company-site / company-site-primary / company-site-canary ClusterIP
# Services, clones the Deployment to company-site-primary, and clones the
# company-site Ingress to company-site-canary pointed at the canary-color
# Service, stepping the controller's native canary-weight annotation so real
# user traffic ramps 10% -> 40% under per-step metric gates before cutover.
#
# Gate stack per weight step (a breach at any step returns all traffic to
# the primary and pages):
#   1. readiness — pods must pass /healthz within progressDeadlineSeconds or
#      the rollout fails;
#   2. k6-stress (pre-rollout, once, SYNCHRONOUS via the loadtester bash
#      task) — an open-model 250 rps stress run against the canary-color
#      Service before any user traffic shifts. k6's thresholds (error rate,
#      dropped iterations) fail the webhook and the rollout;
#   3. canary-load (during analysis, async cmd task) — 10 rps through the
#      PUBLIC edge (Cloudflare -> origin nginx) with cache-busting query
#      params: the weight split happens inside the ingress controller and
#      AOP admits only edge-terminated connections, so in-cluster traffic
#      cannot exercise the split; this also guarantees the gate series a
#      request-volume floor when organic traffic is sparse;
#   4. per-interval metric checks — Flagger's built-in nginx
#      request-success-rate reads the controller's canary-labeled request
#      series, so it scores ONLY responses the canary color served to
#      weighted traffic; the blackbox probe gates (service class, apex
#      path) guard overall health alongside it.
# threshold: 3 failed checks → automatic rollback (weight to 0, canary
# scaled to zero, primary untouched, status Failed). Post-cutover
# regressions roll back via Git revert through this same gate.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  provider: nginx
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: company-site
  ingressRef:
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    name: company-site
  progressDeadlineSeconds: 900
  service:
    port: 80
    targetPort: http
  analysis:
    # Four weight steps at 1m intervals ≈ a 4–5 minute soak under real
    # traffic; canary-load's 6m run covers the whole window with slack.
    interval: 1m
    threshold: 3
    maxWeight: 40
    stepWeight: 10
    # severity warn: failed checks and rollbacks page through the
    # alert-relay; routine info-level promotion events do not.
    alerts:
      - name: ops
        severity: warn
        providerRef:
          name: alert-relay
          namespace: flagger
    metrics:
      # Flagger built-in (provider: nginx): success rate of the responses
      # the canary color actually served, from the controller's
      # canary-labeled request series via the global metricsServer
      # (vmselect). Starts at 95 (tolerant of a single stray 5xx on the
      # ~60-request windows the 10% step sees); tighten toward 99 once a
      # few weighted rollouts have soaked. No-data fails the check — by
      # design: the canary-load webhook is what guarantees the denominator.
      - name: request-success-rate
        thresholdRange:
          min: 95
        interval: 1m
      # Blackbox probes push every 15s; the 2m lookback keeps several
      # samples per path in every window. Success must be 1.0 (any of the
      # probed paths failing is real); the p95 duration budget is a
      # conservative in-cluster bound.
      - name: probe-success-rate
        templateRef:
          name: probe-success-rate
          namespace: flagger
        thresholdRange:
          min: 1
        interval: 2m
      - name: probe-p95-duration
        templateRef:
          name: probe-p95-duration
          namespace: flagger
        thresholdRange:
          max: 1
        interval: 2m
    webhooks:
      - name: k6-stress
        type: pre-rollout
        url: http://company-site-loadtester.tenant-guardian-prod/
        # bash-type loadtester tasks run synchronously: the webhook blocks
        # until k6 exits, so a threshold breach (error rate, dropped
        # iterations) fails the rollout before any traffic shifts. The
        # run itself is ~2m10s; 300s covers VU setup and teardown.
        timeout: 300s
        metadata:
          type: bash
          cmd: >-
            k6 run -e TARGET_URL=http://company-site-canary.tenant-guardian-prod --tag stage=prod --tag surface=company-site --tag scenario=stress -o experimental-prometheus-rw /gate/stress.js
          logCmdOutput: "true"
      # cmd-type tasks run async (no wait flag): the webhook returns
      # immediately, and the loadtester skips re-launch while the same
      # command is still running, so the per-interval re-fire is harmless.
      - name: canary-load
        url: http://company-site-loadtester.tenant-guardian-prod/
        timeout: 60s
        metadata:
          type: cmd
          cmd: >-
            k6 run -e TARGET_URL=https://guardianintelligence.org --tag stage=prod --tag surface=company-site --tag scenario=canary-load -o experimental-prometheus-rw /gate/canary-load.js
          logCmdOutput: "true"
