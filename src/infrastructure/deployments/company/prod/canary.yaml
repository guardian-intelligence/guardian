# Flagger blue/green for company-site (provider: kubernetes — plain
# Service-selector switching, no mesh). Flagger owns the company-site /
# company-site-primary / company-site-canary ClusterIP Services and clones
# the Deployment to company-site-primary; the Ingress points at the apex
# Service. Same shape as guardian-iam's Keycloak Canaries.
#
# Gate stack (user traffic never touches the canary color; cutover is atomic
# after analysis passes):
#   1. readiness — pods must pass /healthz within progressDeadlineSeconds or
#      the rollout fails;
#   2. k6-stress (pre-rollout, once, SYNCHRONOUS via the loadtester bash
#      task) — an open-model 250 rps stress run against the canary-color
#      Service covering the same paths the synthetic probes watch. k6's
#      thresholds (error rate, dropped iterations) fail the webhook and the
#      rollout; latency is recorded to VictoriaMetrics but not yet gating
#      (observe-only until a week of soak calibrates the threshold);
#   3. per-interval metric checks — the blackbox service-class probe series
#      (deployments/alerting/synthetic-probes.yaml, 15s cadence) must show
#      every probed path healthy over the lookback window.
# threshold: 3 failed checks → automatic rollback (canary scaled to zero,
# primary untouched, status Failed). Post-cutover regressions roll back via
# Git revert through this same gate.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: company-site
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  provider: kubernetes
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: company-site
  progressDeadlineSeconds: 900
  service:
    port: 80
    targetPort: http
  analysis:
    interval: 30s
    threshold: 3
    # Deliberately tight for the initial stand-up, same call IAM's Canaries
    # already made: a single passing iteration promotes. Raise toward a real
    # soak now that the synthetic probes are feeding analysis.metrics.
    iterations: 1
    # severity warn: failed checks and rollbacks page through the
    # alert-relay; routine info-level promotion events do not.
    alerts:
      - name: ops
        severity: warn
        providerRef:
          name: alert-relay
          namespace: flagger
    # Blackbox probes push every 15s; the 2m lookback keeps several samples
    # per path in every window. Success must be 1.0 (any of the 4 probed
    # paths failing is real); the p95 duration budget is a conservative
    # in-cluster bound, tightened once a week of live data sets the real
    # baseline.
    metrics:
      - name: probe-success-rate
        templateRef:
          name: probe-success-rate
          namespace: flagger
        thresholdRange:
          min: 1
        interval: 2m
      - name: probe-p95-duration
        templateRef:
          name: probe-p95-duration
          namespace: flagger
        thresholdRange:
          max: 1
        interval: 2m
    webhooks:
      - name: k6-stress
        type: pre-rollout
        url: http://company-site-loadtester.tenant-guardian-prod/
        # bash-type loadtester tasks run synchronously: the webhook blocks
        # until k6 exits, so a threshold breach (error rate, dropped
        # iterations) fails the rollout before any traffic cutover. The
        # run itself is ~2m10s; 300s covers VU setup and teardown.
        timeout: 300s
        metadata:
          type: bash
          cmd: >-
            k6 run -e TARGET_URL=http://company-site-canary.tenant-guardian-prod --tag stage=prod --tag surface=company-site --tag scenario=stress -o experimental-prometheus-rw /gate/stress.js
          logCmdOutput: "true"
