# Preview deploys live in tenant-guardian-previews (see stage-tenants.yaml)
# and are reached through the same tenant-root ingress controller as prod —
# hostNetwork, so its traffic arrives with the reserved host/remote-node
# identities and the admit must be entity-based. This is the previews twin
# of ../prod/root-ingress-networkpolicy.yaml — one static policy covering
# every preview pod (they all carry app.kubernetes.io/name:
# company-site-preview), so per-PR manifests on the `previews` branch never
# need to ship policy.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-guardian-previews-allow-root-ingress-company-site
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: company
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-guardian-previews
      k8s:app.kubernetes.io/name: company-site-preview
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
