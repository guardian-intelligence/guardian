apiVersion: v1
kind: Service
metadata:
  name: {{ include "preview.name" . }}
  labels:
    {{- include "preview.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  internalTrafficPolicy: Cluster
  selector:
    {{- include "preview.selector" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
