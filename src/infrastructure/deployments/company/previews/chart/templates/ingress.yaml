# Same edge as prod: the tenant-root ingress controller, admitted across
# tenant isolation by the static Cilium pair in ../preview-networkpolicy.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "preview.name" . }}
  labels:
    {{- include "preview.labels" . | nindent 4 }}
spec:
  ingressClassName: tenant-root
  rules:
    - host: {{ include "preview.host" . }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "preview.name" . }}
                port:
                  number: 80
