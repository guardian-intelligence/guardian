# Flagger blue/green for company-site (provider: kubernetes — plain
# Service-selector switching, no mesh). Flagger owns the company-site /
# company-site-primary / company-site-canary ClusterIP Services and clones
# the Deployment to company-site-primary; the Ingress points at the apex
# Service. Same shape as guardian-iam's Keycloak Canaries.
#
# Gate stack (user traffic never touches the canary color; cutover is atomic
# after analysis passes):
#   1. readiness — pods must pass /healthz within progressDeadlineSeconds or
#      the rollout fails;
#   2. http-gate (pre-rollout, once) — a plain HTTP reachability check
#      against the canary Service, executed by company-site-loadtester;
#   3. k6-stress (pre-rollout, once) — an open-model 500 rps stress run
#      against the canary Service, with k6 thresholds remote-written to
#      VictoriaMetrics for observe-only analysis;
#   4. http-iterate (every iteration) — the same check, repeated; a canary
#      that's flaky under warm-up fails here.
# threshold: 3 failed checks → automatic rollback (canary scaled to zero,
# primary untouched, status Failed). Post-cutover regressions roll back via
# Git revert through this same gate.
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: company-site
  namespace: tenant-guardian-gamma
  labels:
    app.kubernetes.io/name: company-site
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: gamma
spec:
  provider: kubernetes
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: company-site
  progressDeadlineSeconds: 900
  service:
    port: 80
    targetPort: http
  analysis:
    interval: 30s
    threshold: 3
    # Deliberately tight for the initial stand-up, same call IAM's Canaries
    # already made: a single passing iteration promotes. Raise toward a real
    # soak now that the http-latency-canary is feeding analysis.metrics.
    iterations: 1
    # severity warn: failed checks and rollbacks page through the
    # alert-relay; routine info-level promotion events do not.
    alerts:
      - name: ops
        severity: warn
        providerRef:
          name: alert-relay
          namespace: flagger
    # http-latency-canary.yaml pushes these every minute; a 2m lookback
    # tolerates alignment jitter between that schedule and this analysis
    # loop while still only ever including recent samples. Success must be
    # 1.0 (any of the 4 probed paths failing is real); p95 duration budget
    # is a conservative starting point for an in-cluster static-site hop,
    # tightened once a week of live data sets the real baseline.
    metrics:
      - name: http-canary-success-rate
        templateRef:
          name: http-canary-success-rate
          namespace: flagger
        thresholdRange:
          min: 1
        interval: 2m
      - name: http-canary-p95-duration
        templateRef:
          name: http-canary-p95-duration
          namespace: flagger
        thresholdRange:
          max: 1
        interval: 2m
    webhooks:
      - name: http-gate
        type: pre-rollout
        url: http://company-site-loadtester.tenant-guardian-gamma/
        timeout: 30s
        metadata:
          type: bash
          cmd: bash /gate/http-gate.sh
      - name: k6-stress
        type: pre-rollout
        url: http://company-site-loadtester.tenant-guardian-gamma/
        timeout: 180s
        metadata:
          type: cmd
          cmd: >-
            k6 run -e TARGET_URL=http://company-site-canary.tenant-guardian-gamma --tag stage=gamma --tag surface=company-site --tag scenario=stress -o experimental-prometheus-rw /gate/stress.js
          logCmdOutput: "true"
      - name: http-iterate
        type: rollout
        url: http://company-site-loadtester.tenant-guardian-gamma/
        timeout: 30s
        metadata:
          type: bash
          cmd: bash /gate/http-gate.sh
