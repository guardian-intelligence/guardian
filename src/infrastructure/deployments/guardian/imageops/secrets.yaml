# The image-automation push credential: the shared guardian-promotions
# GitHub App identity, materialized from OpenBao under this namespace's own
# kv scope. Flux's GitHub-App secret contract uses the same key names
# Kargo's credential does; only the kargo labels and repoURL key are absent.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: guardian-imageops
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-imageops
automountServiceAccountToken: false
---
# Writer twin: exists only so an operator with custody kubeconfig access can
# mint a short-lived token against guardian-writer-guardian-imageops for
# routine value loads and rotations.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: guardian-imageops
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-imageops
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: guardian-imageops-openbao
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-imageops
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-guardian-imageops
          serviceAccountRef:
            name: secrets-reader
            namespace: guardian-imageops
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-repo-creds
  namespace: guardian-imageops
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-imageops
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: guardian-imageops-openbao
  target:
    name: guardian-repo-creds
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      data:
        githubAppID: "4206397"
        githubAppInstallationID: "144138265"
        githubAppPrivateKey: "{{ .githubAppPrivateKey }}"
  data:
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: guardian/guardian-mgmt/guardian-imageops/promotion/github-app
        property: githubAppPrivateKey
