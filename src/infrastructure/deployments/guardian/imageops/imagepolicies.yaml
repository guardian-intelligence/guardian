# One ImageRepository + ImagePolicy per first-party lane. Every lane follows
# the mutable `edge` tag; digestReflectionPolicy: Always re-resolves the
# digest behind it on the policy's own interval, so the Setters markers
# write tag@digest pins — the admission policy's digest-pinning requirement
# holds. 1m matches the Kargo Warehouse poll cadence this replaces. The
# alphabetical policy is vacuous over a single tag; the digest comes from
# reflection.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: company-site
  namespace: guardian-imageops
  labels:
    app.kubernetes.io/part-of: guardian
spec:
  image: ghcr.io/guardian-intelligence/company-site
  interval: 1m0s
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: company-site
  namespace: guardian-imageops
  labels:
    app.kubernetes.io/part-of: guardian
spec:
  imageRepositoryRef:
    name: company-site
  filterTags:
    pattern: '^edge$'
  policy:
    alphabetical:
      order: asc
  digestReflectionPolicy: Always
  interval: 1m0s
