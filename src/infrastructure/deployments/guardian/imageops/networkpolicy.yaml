# Egress: kube-apiserver (CR reconciliation), DNS, and world:443 — the
# reflector polls ghcr.io tag lists and digests, the automation clones and
# pushes github.com. No ingress: neither controller serves webhooks.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: imageops-controllers
  namespace: guardian-imageops
  labels:
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - image-reflector-controller
          - image-automation-controller
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
