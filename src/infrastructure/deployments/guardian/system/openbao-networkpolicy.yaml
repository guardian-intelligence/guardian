apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-openbao-to-apiserver
  namespace: tenant-guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external-secrets-to-openbao
  namespace: tenant-guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: external-secrets
            app.kubernetes.io/name: external-secrets
            k8s:io.kubernetes.pod.namespace: external-secrets
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
---
# The image countersigner is the first direct workload OpenBao client
# (transit signing cannot be materialized into a Secret by ESO — the private
# key never leaves OpenBao; signing is an online operation).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-countersigner-to-openbao
  namespace: tenant-guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: zot-countersigner
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent-to-openbao-metrics
  namespace: tenant-guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: openbao
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "9101"
              protocol: TCP
