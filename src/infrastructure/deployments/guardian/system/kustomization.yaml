apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
generatorOptions:
  # The countersigner mounts this ConfigMap by its static name.
  disableNameSuffixHash: true
configMapGenerator:
  # The same pinned Sigstore trusted root the drive builds and dark bring-up
  # verify against — one copy, projected from the bundle.
  - name: sigstore-trusted-root
    namespace: tenant-guardian
    files:
      - ../../../bootstrap/bundle/sigstore-trusted-root.json
  # The Guardian release-signing public key — the projector's verification
  # anchor, one copy, projected from the bundle like the trusted root.
  - name: guardian-images-pub
    namespace: tenant-guardian
    files:
      - ../../../bootstrap/bundle/guardian-images.pub.pem
  # The reviewable definition of what Guardian releases; the projector's
  # estate (release-manifest.yaml header).
  - name: release-manifest
    namespace: tenant-guardian
    files:
      - release-manifest.yaml
resources:
  - stage-tenants.yaml
  - openbao-listener-tls.yaml
  - openbao-helmrelease.yaml
  - openbao-networkpolicy.yaml
  - openbao-observability.yaml
  - openbao-rbac.yaml
  - release-projector.yaml
  - storage-encryption-canary.yaml
  - vap-denial-canary.yaml
  - zot-countersigner.yaml
  - zot-helmrelease.yaml
  - zot-mirror-canary.yaml
  - zot-networkpolicy.yaml
  - zot-observability.yaml
