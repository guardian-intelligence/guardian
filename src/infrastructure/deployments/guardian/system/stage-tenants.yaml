apiVersion: apps.cozystack.io/v1alpha1
kind: Tenant
metadata:
  name: prod
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
    guardian.dev/tenant-id: gi-guardian-prod
spec:
  host: prod.guardianintelligence.org
  etcd: false
  ingress: false
  monitoring: false
  seaweedfs: false
---
# previews is not a promotion stage and carries no workloads: it is the
# always-present, always-empty namespace the admission canaries probe
# (deployments/guardian/system/vap-denial-canary.yaml) and the narrowest
# binding scope for the policies still rolling out in strict mode
# (base/admission/{workload-priority,image-provenance}.yaml). Deleting it
# would move those probes into a namespace that holds real workloads.
apiVersion: apps.cozystack.io/v1alpha1
kind: Tenant
metadata:
  name: previews
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: previews
    guardian.dev/tenant-id: gi-guardian-previews
spec:
  host: previews.guardianintelligence.org
  etcd: false
  ingress: false
  monitoring: false
  seaweedfs: false
