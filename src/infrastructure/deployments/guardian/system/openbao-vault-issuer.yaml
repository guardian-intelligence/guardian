apiVersion: v1
kind: ServiceAccount
metadata:
  name: cert-manager-openbao-issuer
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cert-manager-openbao-tokenrequest
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
rules:
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    resourceNames:
      - cert-manager-openbao-issuer
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cert-manager-openbao-tokenrequest
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cert-manager-openbao-tokenrequest
subjects:
  - kind: ServiceAccount
    name: cert-manager
    namespace: cozy-cert-manager
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: guardian-openbao-vault
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
spec:
  vault:
    server: https://guardian-openbao.tenant-guardian.svc:8200
    serverName: guardian-openbao.tenant-guardian.svc
    path: pki/openbao-api/sign/openbao-api
    caBundleSecretRef:
      name: guardian-openbao-api-tls
      key: ca.crt
    auth:
      kubernetes:
        mountPath: /v1/auth/kubernetes
        role: guardian-cert-manager-openbao-api-issuer
        serviceAccountRef:
          name: cert-manager-openbao-issuer
          audiences:
            - openbao
