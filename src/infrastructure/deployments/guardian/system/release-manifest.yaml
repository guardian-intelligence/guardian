# The release manifest: the reviewable definition of what Guardian releases
# to public registries (docs/registry-design.md) — the artifacts users
# consume, not the images the cluster happens to run. The release projector
# verifies each digest's Guardian countersignature in zot against the
# committed public key and projects it — signature included — to the ghcr
# path in the ref. Lanes mirror the CLI release channels: the nightly
# promotion PR bumps this lane in the same commit as
# src/products/postflight-cli/release/channels.yaml, and
# TestReleaseManifestCoversReleaseChannels holds every hand-made bump to the
# same rule.
#
# This file is a configMapGenerator input, not a Kubernetes resource; the
# `image:` leaf keys are deliberate — the imageset extractor enforces digest
# pinning on them and carries the refs into the image union.
releases:
  postflight-cli:
    nightly:
      image: ghcr.io/guardian-intelligence/postflight-cli@sha256:69b7beae2cd06a4aaae62d629e15be5d6e43a6d1a701b790e1ca3e80c13d4631
