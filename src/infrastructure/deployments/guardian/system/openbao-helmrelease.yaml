                request "write_writer_policy_tenant_guardian_prod" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-writer-tenant-guardian-prod"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/tenant-guardian-prod/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/tenant-guardian-prod/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n"
                  }
                }

                request "write_writer_role_tenant_guardian_prod" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-writer-tenant-guardian-prod"
                  data = {
