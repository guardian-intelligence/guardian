                }

                request "write_writer_policy_tenant_guardian_gamma" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-writer-tenant-guardian-gamma"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/tenant-guardian-gamma/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/tenant-guardian-gamma/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n"
                  }
                }

                request "write_writer_role_tenant_guardian_gamma" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-writer-tenant-guardian-gamma"
                  data = {
                    bound_service_account_names = ["secrets-writer"]
                    bound_service_account_namespaces = ["tenant-guardian-gamma"]
                    audience = "openbao"
                    token_policies = ["guardian-writer-tenant-guardian-gamma"]
                    token_ttl = "600"
                    token_max_ttl = "600"
                  }
                }

                request "write_reader_policy_tenant_guardian_prod" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-reader-tenant-guardian-prod"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/tenant-guardian-prod/*\" {\n  capabilities = [\"read\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/tenant-guardian-prod/*\" {\n  capabilities = [\"read\"]\n}\n"
                  }
                }

                request "write_reader_role_tenant_guardian_prod" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-reader-tenant-guardian-prod"
                  data = {
                    bound_service_account_names = ["secrets-reader"]
                    bound_service_account_namespaces = ["tenant-guardian-prod"]
                    audience = "openbao"
                    token_policies = ["guardian-reader-tenant-guardian-prod"]
                    token_ttl = "3600"
                    token_max_ttl = "3600"
                  }
