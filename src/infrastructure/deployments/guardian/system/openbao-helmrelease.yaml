                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/guardian-iam/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/guardian-iam/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n"
