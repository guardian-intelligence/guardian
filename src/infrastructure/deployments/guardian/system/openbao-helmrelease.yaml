apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: guardian-openbao
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
  annotations:
    # guardian-system carries postBuild var substitution (source-ref flip for
    # dark bootstrap). Flux envsubst would blank the tls-reloader sidecar's
    # shell parameter expansions (${comm#/proc/} etc.) to empty strings,
    # silently breaking SIGHUP cert reload. This object references none of the
    # ${GUARDIAN_SOURCE_*} vars, so exempt it from substitution entirely.
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  suspend: false
  chartRef:
    kind: ExternalArtifact
    name: cozystack-openbao-application-default-openbao-system
    namespace: cozy-system
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    disableWait: true
    remediation:
      retries: 0
  valuesFrom:
    - kind: Secret
      name: cozystack-values
  values:
    openbao:
      fullnameOverride: guardian-openbao
      global:
        tlsDisable: false
      injector:
        enabled: false
      csi:
        enabled: false
      ui:
        enabled: false
      server:
        configAnnotation: true
        podManagementPolicy: OrderedReady
        image:
          registry: quay.io
          repository: openbao/openbao
          tag: 2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
          pullPolicy: IfNotPresent
        dataStorage:
          enabled: true
          size: 10Gi
          storageClass: openbao-local
        auditStorage:
          enabled: true
          size: 10Gi
          storageClass: openbao-local
        updateStrategyType: OnDelete
        shareProcessNamespace: true
        nodeSelector:
          guardian.dev/openbao-static-seal: "true"
        tolerations:
          - key: guardian.dev/openbao-static-seal
            operator: Exists
            effect: NoSchedule
        extraEnvironmentVars:
          BAO_CACERT: /openbao/tls/ca.crt
        volumes:
          - name: openbao-api-tls
            secret:
              secretName: guardian-openbao-api-tls
          - name: openbao-static-seal
            hostPath:
              path: /var/lib/guardian/openbao/static-seal
              type: DirectoryOrCreate
        volumeMounts:
          - name: openbao-api-tls
            mountPath: /openbao/tls
            readOnly: true
          - name: openbao-static-seal
            mountPath: /openbao/secrets
            readOnly: true
        extraInitContainers:
          - name: verify-static-seal-key
            image: quay.io/openbao/openbao:2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -ec
            args:
              - |
                key=/openbao/secrets/unseal-d1bad73a1cc200c277ef24d23231d99ff6b424d4d4e397bc08f285a6767af013.key
                test -r "$key"
                dir_mode="$(stat -c '%a' /openbao/secrets)"
                case "$dir_mode" in 700|750) ;; *) echo "static seal directory mode must be 0700 or 0750, got $dir_mode" >&2; exit 1;; esac
                key_mode="$(stat -c '%a' "$key")"
                case "$key_mode" in 400|440|600|640) ;; *) echo "static seal key mode must not grant broad access, got $key_mode" >&2; exit 1;; esac
                test "$(wc -c < "$key" | tr -d ' ')" = "32"
                test "$(sha256sum "$key" | awk '{print $1}')" = "d1bad73a1cc200c277ef24d23231d99ff6b424d4d4e397bc08f285a6767af013"
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
                ephemeral-storage: 16Mi
              limits:
                cpu: 100m
                memory: 64Mi
                ephemeral-storage: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            volumeMounts:
              - name: openbao-static-seal
                mountPath: /openbao/secrets
                readOnly: true
        extraPorts:
          - containerPort: 9101
            name: metrics
            protocol: TCP
        extraContainers:
          - name: audit-log-tailer
            image: quay.io/openbao/openbao:2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -ec
            args:
              - |
                while [ ! -e /openbao/audit/audit.log ]; do
                  sleep 1
                done
                exec tail -n+1 -F /openbao/audit/audit.log
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
                ephemeral-storage: 16Mi
              limits:
                cpu: 100m
                memory: 64Mi
                ephemeral-storage: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            volumeMounts:
              - name: audit
                mountPath: /openbao/audit
                readOnly: true
          - name: tls-reloader
            image: quay.io/openbao/openbao:2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -ec
            args:
              - |
                last=""
                while true; do
                  next="$(sha256sum /openbao/tls/tls.crt /openbao/tls/tls.key /openbao/tls/ca.crt 2>/dev/null | sha256sum | awk '{print $1}')"
                  if [ -n "$last" ] && [ "$next" != "$last" ]; then
                    for comm in /proc/[0-9]*/comm; do
                      case "$(cat "$comm" 2>/dev/null)" in
                        bao|openbao|vault)
                          pid="${comm#/proc/}"
                          pid="${pid%/comm}"
                          kill -HUP "$pid" || true
                          ;;
                      esac
                    done
                  fi
                  last="$next"
                  sleep 30
                done
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
                ephemeral-storage: 16Mi
              limits:
                cpu: 100m
                memory: 64Mi
                ephemeral-storage: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            volumeMounts:
              - name: openbao-api-tls
                mountPath: /openbao/tls
                readOnly: true
        resources:
          requests:
            cpu: "0.1"
            # Measured steady-state draw is ~50Mi/member for the current KV
            # inventory; the 2Gi limit keeps headroom for raft snapshots.
            memory: 256Mi
            ephemeral-storage: 128Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi
        standalone:
          enabled: false
        ha:
          enabled: true
          apiAddr: https://guardian-openbao-active.tenant-guardian.svc:8200
          replicas: 3
          raft:
            enabled: true
            setNodeId: true
            config: |
              ui = false

              seal "static" {
                current_key_id = "d1bad73a1cc200c277ef24d23231d99ff6b424d4d4e397bc08f285a6767af013"
                current_key = "file:///openbao/secrets/unseal-d1bad73a1cc200c277ef24d23231d99ff6b424d4d4e397bc08f285a6767af013.key"
              }

              listener "tcp" {
                address = "[::]:8200"
                cluster_address = "[::]:8201"
                tls_disable = false
                tls_cert_file = "/openbao/tls/tls.crt"
                tls_key_file = "/openbao/tls/tls.key"
                tls_client_ca_file = "/openbao/tls/ca.crt"

                telemetry {
                  unauthenticated_metrics_access = false
                }
              }

              listener "tcp" {
                address = "[::]:9101"
                tls_disable = true

                telemetry {
                  metrics_only = true
                  unauthenticated_metrics_access = true
                }
              }

              telemetry {
                prometheus_retention_time = "1m"
                disable_hostname = true
              }

              storage "raft" {
                path = "/openbao/data"
                retry_join {
                  leader_api_addr = "https://guardian-openbao-active.tenant-guardian.svc:8200"
                  leader_ca_cert_file = "/openbao/tls/ca.crt"
                  leader_tls_servername = "guardian-openbao-active.tenant-guardian.svc"
                }
              }

              audit "file" "audit-log" {
                description = "Guardian OpenBao audit log."
                options {
                  file_path = "/openbao/audit/audit.log"
                }
              }

              # Self-init runs once, at first cluster initialization, with a
              # temporary privileged token OpenBao revokes afterward. It creates
              # the complete steady state directly: Kubernetes auth, the kv and
              # transit engines, and one reader+writer policy/role pair per
              # consumer NAMESPACE (not per integration). Each namespace's pair
              # is scoped to that namespace's own KV subtree
              # (kv/guardian/guardian-mgmt/<namespace>/*), so adding an
              # integration inside an existing namespace is a Git-only change
              # (ExternalSecret + workload) plus one scoped value write — it
              # never touches this block. There is no reconciling operator —
              # this block IS the source of truth, so a cold boot converges the
              # same config natively. Only STRUCTURAL changes (a new consumer
              # namespace, a new mount) edit this block and re-initialize (wipe
              # raft data, keep the seal key and audit PVCs, re-import from
              # custody) — see the static-seal runbook.
              initialize "guardian_self_init" {
                request "enable_kubernetes_auth" {
                  operation = "update"
                  path = "sys/auth/kubernetes"
                  data = {
                    type = "kubernetes"
                    description = "Kubernetes service account auth for guardian-mgmt workloads."
                  }
                }

                request "configure_kubernetes_auth" {
                  operation = "update"
                  path = "auth/kubernetes/config"
                  data = {
                    kubernetes_host = "https://kubernetes.default.svc:443"
                    disable_iss_validation = true
                  }
                }

                request "tune_kubernetes_auth" {
                  operation = "update"
                  path = "sys/auth/kubernetes/tune"
                  data = {
                    default_lease_ttl = "15m"
                    max_lease_ttl = "1h"
                    listing_visibility = "hidden"
                  }
                }

                request "enable_kv_mount" {
                  operation = "update"
                  path = "sys/mounts/kv"
                  data = {
                    type = "kv-v2"
                    description = "Guardian management cluster secret material."
                  }
                }

                request "tune_kv_mount" {
                  operation = "update"
                  path = "sys/mounts/kv/tune"
                  data = {
                    listing_visibility = "hidden"
                  }
                }

                request "enable_transit_mount" {
                  operation = "update"
                  path = "sys/mounts/transit"
                  data = {
                    type = "transit"
                    description = "Guardian Transit engine for explicitly approved key-management consumers."
                  }
                }

                request "tune_transit_mount" {
                  operation = "update"
                  path = "sys/mounts/transit/tune"
                  data = {
                    listing_visibility = "hidden"
                  }
                }

                # One reader+writer pair per consumer namespace. Readers are
                # what ESO authenticates as (SA secrets-reader in that
                # namespace); writers are standing but narrowly scoped roles
                # for routine value loads and rotations (SA secrets-writer in
                # that namespace — minting its token requires cluster-admin
                # custody access, and the token can only write that
                # namespace's subtree, so a beta credential can never land on
                # a prod path).

                request "write_reader_policy_external_dns" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-reader-external-dns"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/external-dns/*\" {\n  capabilities = [\"read\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/external-dns/*\" {\n  capabilities = [\"read\"]\n}\n"
                  }
                }

                request "write_reader_role_external_dns" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-reader-external-dns"
                  data = {
                    bound_service_account_names = ["secrets-reader"]
                    bound_service_account_namespaces = ["external-dns"]
                    audience = "openbao"
                    token_policies = ["guardian-reader-external-dns"]
                    token_ttl = "3600"
                    token_max_ttl = "3600"
                  }
                }

                request "write_writer_policy_external_dns" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-writer-external-dns"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/external-dns/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/external-dns/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n"
                  }
                }

                request "write_writer_role_external_dns" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-writer-external-dns"
                  data = {
                    bound_service_account_names = ["secrets-writer"]
                    bound_service_account_namespaces = ["external-dns"]
                    audience = "openbao"
                    token_policies = ["guardian-writer-external-dns"]
                    token_ttl = "600"
                    token_max_ttl = "600"
                  }
                }

                request "write_reader_policy_company_site" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-reader-company-site"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/company-site/*\" {\n  capabilities = [\"read\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/company-site/*\" {\n  capabilities = [\"read\"]\n}\n"
                  }
                }

                request "write_reader_role_company_site" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-reader-company-site"
                  data = {
                    bound_service_account_names = ["secrets-reader"]
                    bound_service_account_namespaces = ["company-site"]
                    audience = "openbao"
                    token_policies = ["guardian-reader-company-site"]
                    token_ttl = "3600"
                    token_max_ttl = "3600"
                  }
                }

                request "write_writer_policy_company_site" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-writer-company-site"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/company-site/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/company-site/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n"
                  }
                }

                request "write_writer_role_company_site" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-writer-company-site"
                  data = {
                    bound_service_account_names = ["secrets-writer"]
                    bound_service_account_namespaces = ["company-site"]
                    audience = "openbao"
                    token_policies = ["guardian-writer-company-site"]
                    token_ttl = "600"
                    token_max_ttl = "600"
                  }
                }

                request "write_reader_policy_tenant_guardian_beta" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-reader-tenant-guardian-beta"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/tenant-guardian-beta/*\" {\n  capabilities = [\"read\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/tenant-guardian-beta/*\" {\n  capabilities = [\"read\"]\n}\n"
                  }
                }

                request "write_reader_role_tenant_guardian_beta" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-reader-tenant-guardian-beta"
                  data = {
                    bound_service_account_names = ["secrets-reader"]
                    bound_service_account_namespaces = ["tenant-guardian-beta"]
                    audience = "openbao"
                    token_policies = ["guardian-reader-tenant-guardian-beta"]
                    token_ttl = "3600"
                    token_max_ttl = "3600"
                  }
                }

                request "write_writer_policy_tenant_guardian_beta" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-writer-tenant-guardian-beta"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/tenant-guardian-beta/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/tenant-guardian-beta/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n"
                  }
                }

                request "write_writer_role_tenant_guardian_beta" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-writer-tenant-guardian-beta"
                  data = {
                    bound_service_account_names = ["secrets-writer"]
                    bound_service_account_namespaces = ["tenant-guardian-beta"]
                    audience = "openbao"
                    token_policies = ["guardian-writer-tenant-guardian-beta"]
                    token_ttl = "600"
                    token_max_ttl = "600"
                  }
                }

                request "write_reader_policy_tenant_guardian_gamma" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-reader-tenant-guardian-gamma"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/tenant-guardian-gamma/*\" {\n  capabilities = [\"read\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/tenant-guardian-gamma/*\" {\n  capabilities = [\"read\"]\n}\n"
                  }
                }

                request "write_reader_role_tenant_guardian_gamma" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-reader-tenant-guardian-gamma"
                  data = {
                    bound_service_account_names = ["secrets-reader"]
                    bound_service_account_namespaces = ["tenant-guardian-gamma"]
                    audience = "openbao"
                    token_policies = ["guardian-reader-tenant-guardian-gamma"]
                    token_ttl = "3600"
                    token_max_ttl = "3600"
