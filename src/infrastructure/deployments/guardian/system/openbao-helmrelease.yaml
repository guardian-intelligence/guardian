apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: guardian-openbao
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
spec:
  suspend: false
  chartRef:
    kind: ExternalArtifact
    name: cozystack-openbao-application-default-openbao-system
    namespace: cozy-system
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  valuesFrom:
    - kind: Secret
      name: cozystack-values
  values:
    openbao:
      fullnameOverride: guardian-openbao
      global:
        tlsDisable: true
      injector:
        enabled: false
      csi:
        enabled: false
      ui:
        enabled: false
      server:
        configAnnotation: true
        podManagementPolicy: Parallel
        image:
          registry: quay.io
          repository: openbao/openbao
          tag: 2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
          pullPolicy: IfNotPresent
        dataStorage:
          enabled: true
          size: 10Gi
          storageClass: replicated
        auditStorage:
          enabled: true
          size: 10Gi
          storageClass: replicated
        updateStrategyType: OnDelete
        extraPorts:
          - containerPort: 9101
            name: metrics
            protocol: TCP
        extraContainers:
          - name: audit-log-tailer
            image: quay.io/openbao/openbao:2.5.4@sha256:436eaf9778cad75507ff70ea26ace30dcbe15606e619ac3823495663d7f7c115
            imagePullPolicy: IfNotPresent
            command:
              - /bin/sh
              - -ec
            args:
              - |
                while [ ! -e /openbao/audit/audit.log ]; do
                  sleep 1
                done
                exec tail -n+1 -F /openbao/audit/audit.log
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
                ephemeral-storage: 16Mi
              limits:
                cpu: 100m
                memory: 64Mi
                ephemeral-storage: 128Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true
            volumeMounts:
              - name: audit
                mountPath: /openbao/audit
                readOnly: true
        resources:
          requests:
            cpu: "0.1"
            memory: 2Gi
            ephemeral-storage: 128Mi
          limits:
            cpu: "1"
            memory: 2Gi
            ephemeral-storage: 2Gi
        standalone:
          enabled: false
        ha:
          enabled: true
          replicas: 3
          raft:
            enabled: true
            setNodeId: true
            config: |
              ui = false

              listener "tcp" {
                address = "[::]:8200"
                cluster_address = "[::]:8201"
                tls_disable = true

                telemetry {
                  unauthenticated_metrics_access = false
                }
              }

              listener "tcp" {
                address = "[::]:9101"
                tls_disable = true

                telemetry {
                  metrics_only = true
                  unauthenticated_metrics_access = true
                }
              }

              telemetry {
                prometheus_retention_time = "1m"
                disable_hostname = true
              }

              storage "raft" {
                path = "/openbao/data"
                retry_join {
                  leader_api_addr = "http://guardian-openbao-0.guardian-openbao-internal:8200"
                }
                retry_join {
                  leader_api_addr = "http://guardian-openbao-1.guardian-openbao-internal:8200"
                }
                retry_join {
                  leader_api_addr = "http://guardian-openbao-2.guardian-openbao-internal:8200"
                }
              }

              audit "file" "audit-log" {
                description = "Guardian OpenBao audit log."
                options {
                  file_path = "/openbao/audit/audit.log"
                }
              }

              service_registration "kubernetes" {}
