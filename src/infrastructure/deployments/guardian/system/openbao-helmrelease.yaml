                request "write_reader_role_guardian_iam" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-reader-guardian-iam"
                  data = {
                    bound_service_account_names = ["secrets-reader"]
                    bound_service_account_namespaces = ["guardian-iam"]
                    audience = "openbao"
