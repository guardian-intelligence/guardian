                }

                request "write_writer_policy_tenant_root" {
                  operation = "update"
                  path = "sys/policies/acl/guardian-writer-tenant-root"
                  data = {
                    policy = "path \"kv/data/guardian/guardian-mgmt/tenant-root/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n\npath \"kv/metadata/guardian/guardian-mgmt/tenant-root/*\" {\n  capabilities = [\"create\", \"read\", \"update\"]\n}\n"
                  }
                }

                request "write_writer_role_tenant_root" {
                  operation = "update"
                  path = "auth/kubernetes/role/guardian-writer-tenant-root"
                  data = {
                    bound_service_account_names = ["secrets-writer"]
                    bound_service_account_namespaces = ["tenant-root"]
