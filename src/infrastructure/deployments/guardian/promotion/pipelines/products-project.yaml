# The postflight CLI release train — Kargo's only remaining lane. Cluster
# workload pins are moved by Flux image automation (deployments/guardian/
# imageops); third-party images are Renovate's like any other dependency.
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: guardian-products
---
# The postflight CLI artifact: binaries-in-an-OCI-image, not a runnable
# container. Its stages advance channel pins rather than cluster manifests;
# cli-nightly-promoter promotes on a cadence instead of on discovery, so no
# auto-promotion policy exists.
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: postflight-cli
  namespace: guardian-products
spec:
  interval: 1m0s
  subscriptions:
    - image:
        repoURL: ghcr.io/guardian-intelligence/postflight-cli
        imageSelectionStrategy: Digest
        constraint: edge
