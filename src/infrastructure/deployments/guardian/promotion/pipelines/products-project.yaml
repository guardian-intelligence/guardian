# The products promotion pipeline. The Warehouse tracks upstream Electric
# releases on docker.io directly (SemVer within the pinned major).
#
# No autoPromotionEnabled entry: Electric fronts the mission-critical product
# Postgres, so promotion to prod is always a deliberate act (human or agent).
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: guardian-products
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: electric
  namespace: guardian-products
spec:
  interval: 5m0s
  subscriptions:
    - image:
        repoURL: docker.io/electricsql/electric
        imageSelectionStrategy: SemVer
        constraint: ">=1.7.6 <2.0.0"
        platform: linux/amd64
