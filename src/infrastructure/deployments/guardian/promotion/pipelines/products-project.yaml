# Product-plane promotion. Electric remains deliberate; the two
# Guardian-built payments images auto-promote together after CI publishes
# their signed edge digests, then pass branch protection and Flagger.
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: guardian-products
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: guardian-products
  namespace: guardian-products
spec:
  promotionPolicies:
    - stageSelector:
        name: payments-prod
      autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: electric
  namespace: guardian-products
spec:
  interval: 5m0s
  subscriptions:
    - image:
        repoURL: docker.io/electricsql/electric
        imageSelectionStrategy: SemVer
        constraint: ">=1.7.6 <2.0.0"
        platform: linux/amd64
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: payments
  namespace: guardian-products
spec:
  interval: 1m0s
  subscriptions:
    - image:
        repoURL: ghcr.io/guardian-intelligence/payments
        imageSelectionStrategy: Digest
        constraint: edge
    - image:
        repoURL: ghcr.io/guardian-intelligence/payments-canary
        imageSelectionStrategy: Digest
        constraint: edge
