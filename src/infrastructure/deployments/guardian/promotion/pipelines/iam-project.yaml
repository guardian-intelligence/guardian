# The Postflight IAM promotion pipeline. The Warehouse tracks upstream Keycloak
# releases on quay.io directly (SemVer within the pinned minor — moving to a
# new minor/major is a deliberate Git edit of this constraint, because major
# upgrades migrate the shared DB schema and must go through a backup-first
# path, not casual blue/green). platform: linux/amd64 makes Freight carry the
# amd64 manifest digest, matching the repo's image lock convention
# (containerStatuses.imageID), not the multi-arch index digest.
#
# Keycloak promotions remain deliberate because they migrate the shared IAM
# database. The Guardian-built browser canary has its own auto-promoted Stage:
# it must follow the user journey continuously as canary fixes are published.
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: guardian-iam
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: guardian-iam
  namespace: guardian-iam
spec:
  promotionPolicies:
    - stageSelector:
        name: login-canary-prod
      autoPromotionEnabled: true
    - stageSelector:
        name: journey-canary-prod
      autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: keycloak
  namespace: guardian-iam
spec:
  interval: 5m0s
  subscriptions:
    - image:
        repoURL: quay.io/keycloak/keycloak
        imageSelectionStrategy: SemVer
        constraint: 26.6.x
        platform: linux/amd64
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: login-canary
  namespace: guardian-iam
spec:
  interval: 1m0s
  subscriptions:
    - image:
        repoURL: ghcr.io/guardian-intelligence/login-canary
        imageSelectionStrategy: Digest
        constraint: edge
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: canary-journeys
  namespace: guardian-iam
spec:
  interval: 1m0s
  subscriptions:
    - image:
        repoURL: ghcr.io/guardian-intelligence/canary-journeys
        imageSelectionStrategy: Digest
        constraint: edge
