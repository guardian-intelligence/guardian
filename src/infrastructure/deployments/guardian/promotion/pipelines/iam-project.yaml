# The Postflight IAM promotion pipeline. The Warehouse tracks upstream Keycloak
# releases on quay.io directly (SemVer within the pinned minor — moving to a
# new minor/major is a deliberate Git edit of this constraint, because major
# upgrades migrate the shared DB schema and must go through a backup-first
# path, not casual blue/green). platform: linux/amd64 makes Freight carry the
# amd64 manifest digest, matching the repo's image lock convention
# (containerStatuses.imageID), not the multi-arch index digest.
#
# No autoPromotionEnabled entry: IAM is mission-critical, so promotion to
# prod is always a deliberate act (human or agent). The promotion PR still
# passes branch protection + CI, and the deploy is then gated in-cluster by
# the Flagger blue/green login gate.
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: guardian-iam
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: keycloak
  namespace: guardian-iam
spec:
  interval: 5m0s
  subscriptions:
    - image:
        repoURL: quay.io/keycloak/keycloak
        imageSelectionStrategy: SemVer
        constraint: 26.6.x
        platform: linux/amd64
