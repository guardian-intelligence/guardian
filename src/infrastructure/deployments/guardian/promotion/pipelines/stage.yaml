# The prod promotion pipeline: new Freight (a digest CI pushed and
# cosign-signed behind company-site:edge) becomes a pin-bump PR against main.
# Kargo is the untrusted proposer — the site-gate check (pin provenance +
# conformance) and branch protection decide whether the PR merges, and the
# promotion-lock-sync workflow keeps images.lock in step and arms automerge.
# git-wait-for-pr closes the loop so the Stage records the promotion only
# once the PR actually merges.
#
# substitute: disabled — the ${{ ... }} promotion expressions must reach
# Kargo verbatim, not be mangled by Flux's envsubst pass.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: company-site
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: company-site
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/guardian-intelligence/guardian.git
        - name: imageRepo
          value: ghcr.io/guardian-intelligence/company-site
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/src/infrastructure/deployments/company/prod/web.yaml
            updates:
              - key: spec.template.spec.containers.0.image
                value: ${{ vars.imageRepo }}@${{ imageFrom(vars.imageRepo).digest }}
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: promote company-site to ${{ imageFrom(vars.imageRepo).digest }}
        - uses: git-push
          as: push
          config:
            path: ./repo
            generateTargetBranch: true
        - uses: git-open-pr
          as: open-pr
          config:
            repoURL: ${{ vars.repoURL }}
            provider: github
            sourceBranch: ${{ outputs.push.branch }}
            targetBranch: main
            title: promote company-site to ${{ imageFrom(vars.imageRepo).digest }}
        - uses: git-wait-for-pr
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
