# Kargo's git credential for the guardian-products project (the shared
# guardian-promotions GitHub App identity). Kargo credentials are
# project-namespaced, so each project materializes its own copy.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: guardian-products
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-products
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: guardian-products
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-products
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: guardian-products-openbao
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-products
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-guardian-products
          serviceAccountRef:
            name: secrets-reader
            namespace: guardian-products
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-repo-creds
  namespace: guardian-products
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-products
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: guardian-products-openbao
  target:
    name: guardian-repo-creds
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      metadata:
        labels:
          kargo.akuity.io/cred-type: git
      data:
        repoURL: https://github.com/guardian-intelligence/guardian
        githubAppID: "4206397"
        githubAppInstallationID: "144138265"
        githubAppPrivateKey: "{{ .githubAppPrivateKey }}"
  data:
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: guardian/guardian-mgmt/guardian-products/promotion/github-app
        property: githubAppPrivateKey
