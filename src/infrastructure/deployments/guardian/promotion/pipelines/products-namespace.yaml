# Pre-created for the same reason as the company-site project namespace:
# Flux dry-run-validates the batch, and the namespaced CRs fail validation
# until the project namespace exists. The kargo.akuity.io/project label is
# Kargo's namespace-adoption contract.
apiVersion: v1
kind: Namespace
metadata:
  name: guardian-products
  labels:
    kargo.akuity.io/project: "true"
    app.kubernetes.io/part-of: guardian
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
