# Kargo's git credential (the guardian-promotions GitHub App) is OpenBao-backed:
# self-init declares the guardian-promotion policy+role, the one-time importer
# writes the App private key to kv, and External Secrets materializes the
# Secret Kargo discovers via the kargo.akuity.io/cred-type label. Only the
# private key lives in OpenBao — the App/installation IDs are public identity
# and belong in Git.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promotion-secrets
  namespace: company-site
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: promotion
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: promotion-openbao
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: promotion
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-promotion
          serviceAccountRef:
            name: promotion-secrets
            namespace: company-site
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-repo-creds
  namespace: company-site
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: promotion
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: promotion-openbao
  target:
    name: guardian-repo-creds
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      metadata:
        labels:
          kargo.akuity.io/cred-type: git
      data:
        repoURL: https://github.com/guardian-intelligence/guardian
        githubAppID: "4206397"
        githubAppInstallationID: "144138265"
        githubAppPrivateKey: "{{ .githubAppPrivateKey }}"
  data:
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: guardian/guardian-mgmt/company-site/promotion/github-app
        property: githubAppPrivateKey
