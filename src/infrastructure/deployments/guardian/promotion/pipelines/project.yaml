# The company-site promotion pipeline. Kargo's management controller creates
# (and owns) the identically-named `company-site` namespace for the Project's
# namespaced resources. The Warehouse tracks the digest behind the mutable
# `edge` tag, which CI pushes and cosign-signs on every main merge that
# changes the site (only canonically-signed digests exist behind that tag, so
# discovery and the provenance gate agree by construction).
#
# beta auto-promotes on new Freight; the promotion PR still passes branch
# protection + CI, and the deploy is then gated in-cluster by Flagger's
# blue/green rollout. gamma/prod Stages (deliberate promotion after checking
# the upstream stage's Canary verdict) land with their stage manifests — same
# policy shape as guardian-iam's ProjectConfig.
#
# The Stages (promotion steps that open the pin-bump PR) land with the git
# credential wiring — a Warehouse needs no credentials against the public
# package, so this half is verifiable on its own.
apiVersion: kargo.akuity.io/v1alpha1
kind: Project
metadata:
  name: company-site
---
apiVersion: kargo.akuity.io/v1alpha1
kind: ProjectConfig
metadata:
  name: company-site
  namespace: company-site
spec:
  promotionPolicies:
    - stageSelector:
        name: beta
      autoPromotionEnabled: true
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: company-site
  namespace: company-site
spec:
  # Poll at 1m: the deploy-latency budget is <3m worst case end to end.
  # Replace polling with the external webhooks receiver (ghcr push events)
  # when the promotion-latency work lands.
  interval: 1m0s
  subscriptions:
    - image:
        repoURL: ghcr.io/guardian-intelligence/company-site
        imageSelectionStrategy: Digest
        constraint: edge
