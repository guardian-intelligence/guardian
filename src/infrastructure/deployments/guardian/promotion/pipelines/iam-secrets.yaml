# Kargo's git credential for the guardian-iam project (the shared
# guardian-promotions GitHub App identity — Kargo credentials are
# project-namespaced, so each project materializes its own copy). Follows the
# per-namespace secret-scope model: secrets-reader is what ESO authenticates
# as (role guardian-reader-guardian-iam, read-only on this namespace's kv
# subtree); the bootstrap importer seeds the App private key at
# guardian/guardian-mgmt/guardian-iam/promotion/github-app (same PEM as the
# company-site copy). Only the private key lives in OpenBao — the
# App/installation IDs are public identity and belong in Git.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: guardian-iam
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-iam
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: guardian-iam
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-iam
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: guardian-iam-openbao
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-iam
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-guardian-iam
          serviceAccountRef:
            name: secrets-reader
            namespace: guardian-iam
            audiences:
              - openbao
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: guardian-repo-creds
  namespace: guardian-iam
  labels:
    app.kubernetes.io/name: kargo
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-iam
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: guardian-iam-openbao
  target:
    name: guardian-repo-creds
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
      metadata:
        labels:
          kargo.akuity.io/cred-type: git
      data:
        repoURL: https://github.com/guardian-intelligence/guardian
        githubAppID: "4206397"
        githubAppInstallationID: "144138265"
        githubAppPrivateKey: "{{ .githubAppPrivateKey }}"
  data:
    - secretKey: githubAppPrivateKey
      remoteRef:
        key: guardian/guardian-mgmt/guardian-iam/promotion/github-app
        property: githubAppPrivateKey
