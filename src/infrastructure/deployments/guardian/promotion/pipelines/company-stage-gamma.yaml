# gamma receives Freight only after beta has verified it (sources.stages).
# No autoPromotionEnabled entry in the ProjectConfig — promotion is a
# deliberate act (human or agent), gated on beta's synthetic probe
# health via the http promotion step below.
#
# Kargo's reconciler pod runs in-cluster (namespace kargo) with normal
# in-cluster networking, so it can query vmselect-shortterm directly --
# no CI job needs network access into the cluster, no new inbound exposure
# is needed. This resolves what IAM's Stage comments (written before this
# PR) called "Kargo's native verification needs the Argo Rollouts
# integration this repo has deliberately skipped" -- that referred
# specifically to Kargo's spec.verification field (which does require
# Argo Rollouts' AnalysisTemplate CRD as its backing engine); the http
# promotion step is a different, simpler, always-available Kargo 1.10
# built-in that needs no such dependency.
#
# The two http steps below are a hard gate, not a soft check: if either
# failureExpression trips (a definitively bad measurement, not just an
# absence of data yet), the whole promotion fails terminally and no PR is
# ever opened -- better than opening a promotion PR doomed to be blocked,
# and it means a stale/never-populated metric (e.g. right after this PR
# first lands, before beta has emitted any canary data) leaves the step
# Running/retrying rather than hard-failing, bounded by retry.timeout.
#
# NOTE: the exact expr-lang syntax in successExpression/failureExpression
# (response.body.data.result[0].value[1], the float() conversion) is
# written to Kargo 1.10's documented HTTP step schema but has not been
# exercised against a live Kargo instance -- verify against a real
# promotion once this lands, per this repo's "local pass != CI/live pass"
# lesson from the CI perf-gate work in PR #409.
#
# substitute: disabled — the ${{ ... }} promotion expressions must reach
# Kargo verbatim, not be mangled by Flux's envsubst pass.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: gamma
  namespace: company-site
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: company-site
      sources:
        stages:
          - beta
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/guardian-intelligence/guardian.git
        - name: imageRepo
          value: ghcr.io/guardian-intelligence/company-site
        - name: sourceStageNamespace
          value: tenant-guardian-beta
        - name: vmQueryURL
          value: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus/api/v1/query
      steps:
        - uses: http
          as: check-source-stage-success
          retry:
            timeout: 10m
          config:
            method: GET
            url: ${{ vars.vmQueryURL }}
            queryParams:
              - name: query
                value: min(avg_over_time(probe_success{probe_namespace="${{ vars.sourceStageNamespace }}",probe_class="service"}[5m]))
            successExpression: len(response.body.data.result) > 0 && response.body.data.result[0].value[1] == '1'
            failureExpression: len(response.body.data.result) > 0 && response.body.data.result[0].value[1] != '1'
        - uses: http
          as: check-source-stage-p95-duration
          retry:
            timeout: 10m
          config:
            method: GET
            url: ${{ vars.vmQueryURL }}
            queryParams:
              - name: query
                value: max(quantile_over_time(0.95, probe_duration_seconds{probe_namespace="${{ vars.sourceStageNamespace }}",probe_class="service"}[5m]))
            successExpression: len(response.body.data.result) > 0 && float(response.body.data.result[0].value[1]) <= 1.0
            failureExpression: len(response.body.data.result) > 0 && float(response.body.data.result[0].value[1]) > 1.0
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/src/infrastructure/deployments/company/gamma/web.yaml
            updates:
              - key: spec.template.spec.containers.0.image
                value: ${{ vars.imageRepo }}@${{ imageFrom(vars.imageRepo).Digest }}
        # The release manifest's lane moves in the same commit as the
        # workload pin — TestReleaseManifestCoversRenderedReleases keeps the
        # PR red otherwise.
        - uses: yaml-update
          config:
            path: ./repo/src/infrastructure/deployments/guardian/system/release-manifest.yaml
            updates:
              - key: releases.company-site.gamma.image
                value: ${{ vars.imageRepo }}@${{ imageFrom(vars.imageRepo).Digest }}
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: promote company-site (gamma) to ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: git-push
          as: push
          config:
            path: ./repo
            generateTargetBranch: true
        - uses: git-open-pr
          as: open-pr
          config:
            repoURL: ${{ vars.repoURL }}
            provider: github
            sourceBranch: ${{ outputs.push.branch }}
            targetBranch: main
            title: promote company-site (gamma) to ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: git-wait-for-pr
          if: ${{ status('open-pr') == 'Succeeded' }}
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
