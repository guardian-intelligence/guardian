# The shortty-web prod promotion Stage: new Freight (a digest CI pushed and
# cosign-signed behind shortty-web:edge) becomes a pin-bump PR against main.
# Kargo is the untrusted proposer — CI checks and branch protection decide
# whether the PR merges.
#
# substitute: disabled — the ${{ ... }} promotion expressions must reach
# Kargo verbatim, not be mangled by Flux's envsubst pass.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: shortty-web-prod
  namespace: guardian-products
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: shortty-web
      sources:
        direct: true
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/guardian-intelligence/guardian.git
        - name: imageRepo
          value: ghcr.io/guardian-intelligence/shortty-web
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/src/infrastructure/deployments/shortty/prod/web.yaml
            updates:
              - key: spec.template.spec.containers.0.image
                value: ${{ vars.imageRepo }}@${{ imageFrom(vars.imageRepo).Digest }}
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: promote shortty-web (prod) to ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: git-push
          as: push
          config:
            path: ./repo
            generateTargetBranch: true
        - uses: git-open-pr
          as: open-pr
          config:
            repoURL: ${{ vars.repoURL }}
            provider: github
            sourceBranch: ${{ outputs.push.branch }}
            targetBranch: main
            title: promote shortty-web (prod) to ${{ imageFrom(vars.imageRepo).Digest }}
        # A false `if` is evaluated before the config expressions, so a
        # self-skipped open-pr never errors on the nil output and a no-op
        # promotion (pin already at this digest) ends Succeeded. This is the
        # idempotence path — retries after a merged promotion land here too.
        - uses: git-wait-for-pr
          if: ${{ status('open-pr') == 'Succeeded' }}
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
