# prod receives Freight only after gamma has verified it (sources.stages) —
# formerly this Stage took Freight direct from the Warehouse (single-stage
# pipeline); beta/gamma now sit in front of it. No autoPromotionEnabled
# entry — promotion to prod is always a deliberate act (human or agent),
# gated on gamma's http-latency-canary health via the http promotion step
# below. See company-stage-gamma.yaml's header comment for the full
# rationale (Kargo's reconciler queries vmselect-shortterm in-cluster
# directly; no CI network access into the cluster needed; the two-step
# hard-gate-vs-retry design; the not-yet-verified expr-lang syntax caveat).
#
# substitute: disabled — the ${{ ... }} promotion expressions must reach
# Kargo verbatim, not be mangled by Flux's envsubst pass.
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: prod
  namespace: company-site
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  requestedFreight:
    - origin:
        kind: Warehouse
        name: company-site
      sources:
        stages:
          - gamma
  promotionTemplate:
    spec:
      vars:
        - name: repoURL
          value: https://github.com/guardian-intelligence/guardian.git
        - name: imageRepo
          value: ghcr.io/guardian-intelligence/company-site
        - name: sourceStageNamespace
          value: tenant-guardian-gamma
        - name: vmQueryURL
          value: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus/api/v1/query
      steps:
        - uses: http
          as: check-source-stage-success
          retry:
            timeout: 10m
          config:
            method: GET
            url: ${{ vars.vmQueryURL }}
            queryParams:
              - name: query
                value: avg_over_time(http_canary_success{namespace="${{ vars.sourceStageNamespace }}"}[5m])
            successExpression: len(response.body.data.result) > 0 && response.body.data.result[0].value[1] == '1'
            failureExpression: len(response.body.data.result) > 0 && response.body.data.result[0].value[1] != '1'
        - uses: http
          as: check-source-stage-p95-duration
          retry:
            timeout: 10m
          config:
            method: GET
            url: ${{ vars.vmQueryURL }}
            queryParams:
              - name: query
                value: quantile_over_time(0.95, http_canary_duration_seconds{namespace="${{ vars.sourceStageNamespace }}",phase="total"}[5m])
            successExpression: len(response.body.data.result) > 0 && float(response.body.data.result[0].value[1]) <= 1.0
            failureExpression: len(response.body.data.result) > 0 && float(response.body.data.result[0].value[1]) > 1.0
        - uses: git-clone
          config:
            repoURL: ${{ vars.repoURL }}
            checkout:
              - branch: main
                path: ./repo
        - uses: yaml-update
          config:
            path: ./repo/src/infrastructure/deployments/company/prod/web.yaml
            updates:
              - key: spec.template.spec.containers.0.image
                value: ${{ vars.imageRepo }}@${{ imageFrom(vars.imageRepo).Digest }}
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: promote company-site (prod) to ${{ imageFrom(vars.imageRepo).Digest }}
        - uses: git-push
          as: push
          config:
            path: ./repo
            generateTargetBranch: true
        - uses: git-open-pr
          as: open-pr
          config:
            repoURL: ${{ vars.repoURL }}
            provider: github
            sourceBranch: ${{ outputs.push.branch }}
            targetBranch: main
            title: promote company-site (prod) to ${{ imageFrom(vars.imageRepo).Digest }}
        # A false `if` is evaluated before the config expressions, so a
        # self-skipped open-pr never errors on the nil output and a no-op
        # promotion (pin already at this digest) ends Succeeded. This is the
        # idempotence path — retries after a merged promotion land here too.
        - uses: git-wait-for-pr
          if: ${{ status('open-pr') == 'Succeeded' }}
          config:
            repoURL: ${{ vars.repoURL }}
            prNumber: ${{ outputs['open-pr'].pr.id }}
