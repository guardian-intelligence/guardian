# Flagger's controller has no inbound admission webhook (Canary/MetricTemplate
# CRDs validate against their OpenAPI schema, not a webhook server) — this
# policy is egress-only. Egress: kube-apiserver (watch Canaries/Deployments/
# Services and drive promotion), DNS, and tenant-root's vmselect-shortterm
# (Prometheus-compatible metric analysis queries). Any pre-rollout/rollout
# webhook targets Flagger calls (e.g. the Keycloak login-canary check) live
# in the same tenant namespace as the Canary and are reached via
# fromEndpoints rules declared alongside that Canary, not here.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: flagger
  namespace: flagger
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: flagger
  egress:
    - toEntities:
        - kube-apiserver
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # tenant-root's VictoriaMetrics vmselect-shortterm, queried for canary
    # analysis (request-success-rate / request-duration MetricTemplates).
    # Label match is the VictoriaMetrics Operator's usual
    # app.kubernetes.io/name convention — verify against the live
    # vmselect-shortterm pods post-deploy and adjust if it drifts.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: vmselect
      toPorts:
        - ports:
            - port: "8481"
              protocol: TCP
    # Per-stage loadtester webhook receivers (pre-rollout/rollout checks
    # for the Keycloak and company-site Canaries). Every loadtester name a
    # Canary webhook targets must be listed here: this egress allowlist is
    # the flagger-side half of the pair (the stage namespace holds the
    # ingress half), and a name missing here is a silent SYN drop that
    # surfaces as "webhook ... context deadline exceeded".
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - tenant-guardian-prod
            - key: k8s:app.kubernetes.io/name
              operator: In
              values:
                - flagger-loadtester
                - company-site-loadtester
                - payments-loadtester
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # tenant-root's alert-relay: Slack-format delivery target for Canary
    # spec.analysis.alerts (see alert-provider.yaml). Inert until the relay
    # pods exist.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: alert-relay
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# Ingress half of the alert path: tenant-root's generated isolation does not
# admit other namespaces (same reason as the vminsert-from-login-canary
# pair in ../../iam/*/login-canary.yaml); admit exactly the Flagger
# controller to the alert-relay.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-alert-relay-from-flagger
  labels:
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: alert-relay
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flagger
            k8s:app.kubernetes.io/name: flagger
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# Ingress half of the metric-analysis path (company/prod/canary.yaml's
# analysis.metrics). Same reason as the alert-relay pair above:
# tenant-root's generated isolation does not admit other namespaces.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-vmselect-from-flagger
  labels:
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: vmselect
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: flagger
            k8s:app.kubernetes.io/name: flagger
      toPorts:
        - ports:
            - port: "8481"
              protocol: TCP
