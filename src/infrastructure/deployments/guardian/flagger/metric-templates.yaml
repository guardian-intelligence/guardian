# Queries VictoriaMetrics (vmselect-shortterm, same Prometheus-compatible
# endpoint Flagger's own egress policy already opens — see
# flagger-networkpolicy.yaml) for the blackbox synthetic probe series
# (deployments/alerting/synthetic-probes.yaml). {{ namespace }} is
# Flagger's built-in substitution for the analyzed Canary's own namespace;
# the VMProbe targets carry probe_namespace as the literal namespace
# string for exactly this reason. service-class only: a Cloudflare blip
# must not fail a deploy the cluster served correctly (the edge class has
# its own VMRule alerts).
#
# Referenced from each stage's Canary via analysis.metrics — this is what
# gates a rollout's in-stage cutover on continuously-refreshed synthetic
# traffic. min()/max() collapse the per-path series so the gate is the
# WORST path, not whichever series the API returns first.
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: probe-success-rate
  namespace: flagger
spec:
  provider:
    type: prometheus
    address: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus
  query: |
    min(avg_over_time(probe_success{probe_namespace="{{ namespace }}",probe_class="service"}[{{ interval }}]))
---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: probe-p95-duration
  namespace: flagger
spec:
  provider:
    type: prometheus
    address: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus
  query: |
    max(quantile_over_time(0.95, probe_duration_seconds{probe_namespace="{{ namespace }}",probe_class="service"}[{{ interval }}]))
