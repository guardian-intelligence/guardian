# Queries VictoriaMetrics (vmselect-shortterm, same Prometheus-compatible
# endpoint Flagger's own egress policy already opens — see
# flagger-networkpolicy.yaml) for the blackbox synthetic probe series
# (deployments/alerting/synthetic-probes.yaml). {{ namespace }} is
# Flagger's built-in substitution for the analyzed Canary's own namespace;
# the VMProbe targets carry probe_namespace as the literal namespace
# string for exactly this reason. service-class only: a Cloudflare blip
# must not fail a deploy the cluster served correctly (the edge class has
# its own VMRule alerts).
#
# Referenced from each stage's Canary via analysis.metrics — this is what
# gates a rollout's in-stage cutover on continuously-refreshed synthetic
# traffic. min()/max() collapse the per-path series so the gate is the
# WORST path, not whichever series the API returns first.
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: probe-success-rate
  namespace: flagger
spec:
  provider:
    type: prometheus
    address: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus
  query: |
    min(avg_over_time(probe_success{probe_namespace="{{ namespace }}",probe_class="service"}[{{ interval }}]))
---
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: probe-p95-duration
  namespace: flagger
spec:
  provider:
    type: prometheus
    address: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus
  query: |
    max(quantile_over_time(0.95, probe_duration_seconds{probe_namespace="{{ namespace }}",probe_class="service"}[{{ interval }}]))
---
# Success rate of responses the canary color actually served, from the
# access-log-derived series vmalert-vlogs records
# (deployments/alerting/ingress-canary-metrics.yaml) — the only exporter
# path that can attribute the nginx canary-weight split. The record is
# already a 1m-windowed count refreshed every 60s, so the template reads
# the latest sample directly; no rate() over {{ interval }}.
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: canary-request-success-rate
  namespace: flagger
spec:
  provider:
    type: prometheus
    address: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus
  query: |
    sum(guardian:company_site_canary_responses:count1m{status!~"5.."})
    /
    sum(guardian:company_site_canary_responses:count1m)
    * 100
---
# Authentication errors Keycloak itself recorded on the canary color
# (deployments/iam/prod/canary.yaml). Scoped by pod name because both
# colors share one metrics Service: the Flagger clone is keycloak-primary,
# so everything else under the target's name is the canary color. The
# vector(0) arm makes an errorless window read as 0 rather than no-data —
# these counters only exist on a color once a first error has occurred.
# The 5m lookback covers the whole soak regardless of the per-check
# interval.
apiVersion: flagger.app/v1beta1
kind: MetricTemplate
metadata:
  name: keycloak-auth-errors
  namespace: flagger
spec:
  provider:
    type: prometheus
    address: http://vmselect-shortterm.tenant-root.svc:8481/select/0/prometheus
  query: |
    sum(increase(keycloak_user_events_total{namespace="{{ namespace }}",event=~"login_error|client_login_error",pod=~"{{ target }}-.*",pod!~"{{ target }}-primary-.*"}[5m]))
    or on() vector(0)
