# The rumi.engineering Cloudflare Origin CA certificate (apex + wildcard),
# minted at zone onboarding and stored in OpenBao; the Ingress tls block
# serves it to the edge's origin fetches. Rotation is a kv write + ESO
# refresh — the ingress controller watches the Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: shortty-origin-tls
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: shortty-web
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: shortty
    guardian.dev/stage: prod
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: iam-prod-openbao
  target:
    name: shortty-origin-tls
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: kubernetes.io/tls
      engineVersion: v2
  data:
    - secretKey: tls.crt
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/shortty/origin-tls
        property: tls.crt
    - secretKey: tls.key
      remoteRef:
        key: guardian/guardian-mgmt/tenant-guardian-prod/shortty/origin-tls
        property: tls.key
