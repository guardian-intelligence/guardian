# Coordination quorum for the analytics ClickHouse cluster. Separate CHK
# rather than embedded keeper so server restarts never cost quorum.
apiVersion: clickhouse-keeper.altinity.com/v1
kind: ClickHouseKeeperInstallation
metadata:
  name: analytics-keeper
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-keeper
    app.kubernetes.io/part-of: guardian
spec:
  # The cluster's DNS domain is cozy.local; without this the operator renders
  # cluster.local hostnames into raft/server configs.
  namespaceDomainPattern: '%s.svc.cozy.local'
  configuration:
    clusters:
      - name: quorum
        layout:
          replicasCount: 3
    settings:
      listen_host: 0.0.0.0
      logger/console: "true"
      logger/level: information
      keeper_server/four_letter_word_white_list: '*'
  defaults:
    templates:
      podTemplate: keeper
      dataVolumeClaimTemplate: keeper-data
  templates:
    podTemplates:
      - name: keeper
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      clickhouse-keeper.altinity.com/chk: analytics-keeper
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: clickhouse-keeper
              image: docker.io/clickhouse/clickhouse-keeper:26.3.17.4-alpine@sha256:6d1727bfdf2614b16c83aaeeba50ca8c64d66ca5c90d2f7ce7293014ca857089
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
    volumeClaimTemplates:
      - name: keeper-data
        spec:
          storageClassName: local-retain
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi
