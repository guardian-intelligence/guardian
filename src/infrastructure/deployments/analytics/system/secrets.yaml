# Per-namespace secret scope for guardian-analytics (OpenBao roles created
# by self-init since the 2026-07-05 structural reinit): secrets-reader is
# what ESO authenticates as; secrets-writer exists only so an operator with
# custody kubeconfig access can mint a short-lived token scoped to writing
# this namespace's subtree — used to relay the chart-generated ClickHouse
# ingest password from tenant-root/clickhouse-analytics-credentials into
# OpenBao. Neither SA automounts; nothing schedules as them.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-analytics
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-analytics
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: guardian-analytics-openbao
  labels:
    app.kubernetes.io/name: analytics-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-analytics
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-guardian-analytics
          serviceAccountRef:
            name: secrets-reader
            namespace: guardian-analytics
            audiences:
              - openbao
---
# ClickHouse ingest credential for the tenant-root analytics ClickHouse app.
# Source of truth is the chart-generated Secret
# clickhouse-analytics-credentials in tenant-root (key `ingest`), relayed
# into OpenBao by the operator (guardian-writer-guardian-analytics flow).
# The ingest service, OTel collector, and DDL job consume this Secret.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: analytics-ch-ingest
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: guardian-analytics
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: guardian-analytics-openbao
  target:
    name: analytics-ch-ingest
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: ingest
      remoteRef:
        key: guardian/guardian-mgmt/guardian-analytics/clickhouse
        property: ingest
