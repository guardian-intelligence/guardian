# Analytics/observability ClickHouse — the query home for business analytics
# and (next) OTel traces. Raw Altinity CHI rather than the Cozystack tenant
# ClickHouse app: the tenant chart exposes no version pin and no server
# config surface, and the storage design (docs/analytics-storage-design.md)
# was benched on 26.3; the tenant-root clickhouse-guardian instance stays as
# the db-load drill target. 26.3 is the LTS line carrying the native JSON
# type the traces schema needs (>= 25.8).
#
# 3 replicas x 1 shard, ReplicatedMergeTree over the CHK quorum, app-level
# replication on local (non-DRBD) volumes — block-level replication under a
# replicating database would store every byte 9x.
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: analytics
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-clickhouse
    app.kubernetes.io/part-of: guardian
spec:
  # The cluster's DNS domain is cozy.local; without this the operator renders
  # cluster.local hostnames into remote_servers/interserver configs.
  namespaceDomainPattern: '%s.svc.cozy.local'
  configuration:
    clusters:
      - name: analytics
        layout:
          shardsCount: 1
          replicasCount: 3
    zookeeper:
      nodes:
        - host: chk-analytics-keeper-quorum-0-0.guardian-analytics.svc.cozy.local
          port: 2181
        - host: chk-analytics-keeper-quorum-0-1.guardian-analytics.svc.cozy.local
          port: 2181
        - host: chk-analytics-keeper-quorum-0-2.guardian-analytics.svc.cozy.local
          port: 2181
    files:
      # System log retention: keep two weeks of query logs for debugging,
      # drop the high-churn logs that would eat the local volumes.
      config.d/query_log_ttl.xml: |
        <clickhouse>
            <query_log replace="1">
                <database>system</database>
                <table>query_log</table>
                <engine>ENGINE = MergeTree PARTITION BY (event_date)
                        ORDER BY (event_time)
                        TTL event_date + INTERVAL 15 DAY DELETE
                </engine>
                <flush_interval_milliseconds>7500</flush_interval_milliseconds>
            </query_log>
        </clickhouse>
      config.d/z_log_disable.xml: |
        <clickhouse>
            <asynchronous_metric_log remove="1"/>
            <metric_log remove="1"/>
            <query_views_log remove="1"/>
            <query_thread_log remove="1"/>
            <part_log remove="1"/>
            <session_log remove="1"/>
            <text_log remove="1"/>
            <trace_log remove="1"/>
            <crash_log remove="1"/>
            <opentelemetry_span_log remove="1"/>
            <processors_profile_log remove="1"/>
        </clickhouse>
      config.d/logger_console.xml: |
        <clickhouse>
            <logger>
                <level>information</level>
                <console>1</console>
                <log remove="1"/>
                <errorlog remove="1"/>
            </logger>
        </clickhouse>
    profiles:
      readonly/readonly: "1"
  defaults:
    templates:
      podTemplate: clickhouse
      dataVolumeClaimTemplate: data
      serviceTemplate: cluster-ip
  templates:
    serviceTemplates:
      # The operator's default chi service is LoadBalancer; this cluster is
      # in-cluster only (NetworkPolicy-scoped), so pin it to ClusterIP.
      - name: cluster-ip
        generateName: clickhouse-{chi}
        spec:
          type: ClusterIP
          ports:
            - name: http
              port: 8123
            - name: tcp
              port: 9000
    podTemplates:
      - name: clickhouse
        metadata:
          labels:
            app.kubernetes.io/name: analytics-clickhouse
            app.kubernetes.io/part-of: guardian
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      clickhouse.altinity.com/chi: analytics
                  topologyKey: kubernetes.io/hostname
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            fsGroup: 101
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: clickhouse
              image: docker.io/clickhouse/clickhouse-server:26.3.17.4@sha256:31c8e88e9f675f93fd9c9152fc729e4a1141f95b818c0d889ad4d8cd6f9342dd
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: "1"
                  memory: 4Gi
                limits:
                  cpu: "4"
                  memory: 12Gi
    volumeClaimTemplates:
      - name: data
        spec:
          storageClassName: local-retain
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi
