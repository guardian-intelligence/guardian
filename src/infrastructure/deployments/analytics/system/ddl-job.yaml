# Applies the canonical DDL idempotently after the CHI converges. Flux
# recreates the Job whenever its spec changes (force annotation) — DDL edits
# ship as ConfigMap changes plus a bumped GUARDIAN_DDL_REVISION here, which
# makes the spec differ and re-runs the (IF NOT EXISTS) statements.
apiVersion: batch/v1
kind: Job
metadata:
  name: analytics-ddl-apply
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ddl
    app.kubernetes.io/part-of: guardian
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics-ddl
        app.kubernetes.io/part-of: guardian
        guardian.dev/role: analytics-client
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apply
          image: docker.io/clickhouse/clickhouse-server:26.3.17.4@sha256:31c8e88e9f675f93fd9c9152fc729e4a1141f95b818c0d889ad4d8cd6f9342dd
          command:
            - /bin/bash
            - -ec
            - |
              host=clickhouse-analytics.guardian-analytics.svc.cozy.local
              until clickhouse-client --host "$host" --query "SELECT count() FROM system.clusters WHERE cluster = 'analytics'" | grep -q 3; do
                echo "waiting for 3 cluster members"; sleep 5
              done
              clickhouse-client --host "$host" --receive_timeout 300 --queries-file /ddl/events.sql
              clickhouse-client --host "$host" --query "EXISTS TABLE guardian_analytics.events"
          env:
            - name: GUARDIAN_DDL_REVISION
              value: "1"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: ddl
              mountPath: /ddl
              readOnly: true
      volumes:
        - name: ddl
          configMap:
            name: analytics-ddl
