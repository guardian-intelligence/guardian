# Ingest pods: admit only the root ingress controller; egress only DNS + CH.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: analytics-ingest
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ingest
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: analytics-ingest
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: ingress-nginx
            k8s:app.kubernetes.io/component: controller
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Events to the tenant-root Cozystack ClickHouse app.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            clickhouse.altinity.com/chi: clickhouse-analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "8123"
              protocol: TCP
    # Trace export to the in-namespace OTel collector.
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
---
# Egress half for the root ingress controller (its generated egress policy
# only admits tenant-root-labeled destinations) — same shape as the
# keycloak-prod pair.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-ingress-egress-analytics-ingest
  labels:
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: ingress-nginx
      k8s:app.kubernetes.io/component: controller
  egress:
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - guardian-analytics
            - key: k8s:app.kubernetes.io/name
              operator: In
              values:
                - analytics-ingest
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# OTel collector: receives OTLP from in-namespace producers (ingest today;
# web SSR + Keycloak later join by carrying the producer label). Egress is
# DNS + ClickHouse only (the analytics-client label above admits it there).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: otel-collector
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  ingress:
    - fromEndpoints:
        - matchLabels:
            guardian.dev/otel: producer
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Span writes to the tenant-root Cozystack ClickHouse app.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            clickhouse.altinity.com/chi: clickhouse-analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
