# In-cluster-only boundary for the analytics ClickHouse, following the repo's
# Cilium conventions (selecting an endpoint flips it to default-deny for that
# direction; each rule below is the complete allowed set). No Ingress object
# and no LoadBalancer exists for this cluster — the only consumers are
# same-namespace clients (DDL job, the analytics ingest service next), the
# Altinity operator (schema management + metrics polling over 8123), and the
# replicas themselves. Until the OpenBao scope for this namespace lands
# (structural self-init change, shipped separately), this network boundary is
# the access control: no CH user carries a custody-managed password yet, so
# nothing outside these rules may reach a ClickHouse port.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: analytics-clickhouse
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-clickhouse
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      clickhouse.altinity.com/chi: analytics
  ingress:
    # Replica <-> replica: native protocol for distributed DDL/queries plus
    # the interserver part-fetch port.
    - fromEndpoints:
        - matchLabels:
            clickhouse.altinity.com/chi: analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9009"
              protocol: TCP
    # Same-namespace clients: the DDL job, the ingest service, and the OTel
    # collector (all carry guardian.dev/role: analytics-client).
    - fromEndpoints:
        - matchLabels:
            guardian.dev/role: analytics-client
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
            - port: "9000"
              protocol: TCP
    # Altinity operator: reconcile-time schema/config management and the
    # metrics-exporter sidecar both speak HTTP to every host.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cozy-clickhouse-operator
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Keeper quorum for replication coordination.
    - toEndpoints:
        - matchLabels:
            clickhouse-keeper.altinity.com/chk: analytics-keeper
      toPorts:
        - ports:
            - port: "2181"
              protocol: TCP
    # Peers (native + interserver).
    - toEndpoints:
        - matchLabels:
            clickhouse.altinity.com/chi: analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9009"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: analytics-keeper
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-keeper
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      clickhouse-keeper.altinity.com/chk: analytics-keeper
  ingress:
    # ClickHouse replicas hold ZK sessions.
    - fromEndpoints:
        - matchLabels:
            clickhouse.altinity.com/chi: analytics
      toPorts:
        - ports:
            - port: "2181"
              protocol: TCP
    # Keeper raft between quorum members.
    - fromEndpoints:
        - matchLabels:
            clickhouse-keeper.altinity.com/chk: analytics-keeper
      toPorts:
        - ports:
            - port: "9444"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            clickhouse-keeper.altinity.com/chk: analytics-keeper
      toPorts:
        - ports:
            - port: "9444"
              protocol: TCP
---
# Ingest pods: admit only the root ingress controller; egress only DNS + CH.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: analytics-ingest
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ingest
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: analytics-ingest
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: ingress-nginx
            k8s:app.kubernetes.io/component: controller
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            clickhouse.altinity.com/chi: analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "8123"
              protocol: TCP
    # Trace export to the in-namespace OTel collector.
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
---
# Egress half for the root ingress controller (its generated egress policy
# only admits tenant-root-labeled destinations) — same shape as the
# keycloak-prod pair.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-ingress-egress-analytics-ingest
  labels:
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: ingress-nginx
      k8s:app.kubernetes.io/component: controller
  egress:
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - guardian-analytics
            - key: k8s:app.kubernetes.io/name
              operator: In
              values:
                - analytics-ingest
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# OTel collector: receives OTLP from in-namespace producers (ingest today;
# web SSR + Keycloak later join by carrying the producer label). Egress is
# DNS + ClickHouse only (the analytics-client label above admits it there).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: otel-collector
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  ingress:
    - fromEndpoints:
        - matchLabels:
            guardian.dev/otel: producer
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Span writes to ClickHouse.
    - toEndpoints:
        - matchLabels:
            clickhouse.altinity.com/chi: analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
