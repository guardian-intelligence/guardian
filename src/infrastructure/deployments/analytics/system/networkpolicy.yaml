# Ingest pods: admit only node-identity ingress (the public path terminates
# on the hostNetwork root ingress controller); egress only DNS + CH.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: analytics-ingest
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ingest
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: analytics-ingest
  ingress:
    # The root ingress controller runs hostNetwork, so its traffic arrives
    # with the reserved host/remote-node identities — never a pod identity —
    # and the admit must be entity-based (zot-networkpolicy.yaml carries the
    # same lesson for containerd pulls).
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Events to the tenant-root Cozystack ClickHouse app.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            clickhouse.altinity.com/chi: clickhouse-analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "8123"
              protocol: TCP
    # Trace export to the in-namespace OTel collector.
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
---
# OTel collector: receives OTLP from in-namespace producers (ingest today;
# web SSR + Keycloak later join by carrying the producer label). Egress is
# DNS + ClickHouse only (the analytics-client label above admits it there).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: otel-collector
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  ingress:
    - fromEndpoints:
        - matchLabels:
            guardian.dev/otel: producer
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Span writes to the tenant-root Cozystack ClickHouse app.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            clickhouse.altinity.com/chi: clickhouse-analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
