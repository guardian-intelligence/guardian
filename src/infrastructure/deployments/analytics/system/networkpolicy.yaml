# Ingest pods: admit only node-identity ingress (the public path terminates
# on the hostNetwork root ingress controller); egress only DNS + CH.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: analytics-ingest
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ingest
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: analytics-ingest
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            clickhouse.altinity.com/chi: clickhouse-analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "8123"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: otel-collector
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: otel-collector
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
  ingress:
    - fromEndpoints:
        - matchLabels:
            guardian.dev/otel: producer
      toPorts:
        - ports:
            - port: "4317"
              protocol: TCP
            - port: "4318"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            clickhouse.altinity.com/chi: clickhouse-analytics
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: payments-checkout-canary
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: payments-checkout-canary
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: payments-checkout-canary
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            clickhouse.altinity.com/chi: clickhouse-analytics
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
    # The canary drives headless Chromium against the public apex, which
    # Cloudflare serves with `alt-svc: h3=":443"` — a real browser therefore
    # reaches it over HTTP/3. UDP/443 is not optional hardening surface: TCP
    # alone leaves Chromium racing a QUIC attempt that the policy drops, so
    # every run pays the fallback and the canary reports a path no customer
    # takes.
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "443"
              protocol: UDP
