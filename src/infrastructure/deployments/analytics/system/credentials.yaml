# One-shot generator for the namespace-local ClickHouse user password
# (create-if-absent). The CHI, ingest service, collector, and DDL job all read
# the analytics-clickhouse-users Secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: analytics-ch-secret-init
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ch-secret-init
    app.kubernetes.io/part-of: guardian
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: analytics-ch-secret-init
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ch-secret-init
    app.kubernetes.io/part-of: guardian
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: analytics-ch-secret-init
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ch-secret-init
    app.kubernetes.io/part-of: guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: analytics-ch-secret-init
subjects:
  - kind: ServiceAccount
    name: analytics-ch-secret-init
    namespace: guardian-analytics
---
apiVersion: batch/v1
kind: Job
metadata:
  name: analytics-ch-secret-init
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ch-secret-init
    app.kubernetes.io/part-of: guardian
  annotations:
    # The shell body uses ${...} parameter expansion; keep Flux envsubst off it.
    kustomize.toolkit.fluxcd.io/substitute: disabled
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: analytics-ch-secret-init
        app.kubernetes.io/part-of: guardian
    spec:
      restartPolicy: OnFailure
      serviceAccountName: analytics-ch-secret-init
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: init
          image: docker.io/alpine/k8s:1.33.4@sha256:b0523f0a244ddc4c8e055aa335c040d3d78b3ead5528f4544395f7f9f69c7b68
          command:
            - /bin/sh
            - -ec
            - |
              ns=guardian-analytics
              name=analytics-clickhouse-users
              if kubectl -n "$ns" get secret "$name" >/dev/null 2>&1; then
                echo "$name already exists; leaving it untouched"
                exit 0
              fi
              pw=""
              while [ "${#pw}" -lt 30 ]; do
                pw="$pw$(head -c 48 /dev/urandom | base64 | tr -dc 'A-Za-z0-9')"
              done
              pw="$(printf %s "$pw" | head -c 30)"
              kubectl -n "$ns" create secret generic "$name" --from-literal=ingest="$pw"
              echo "created $name"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
