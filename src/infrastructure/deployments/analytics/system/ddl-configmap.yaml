apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-ddl
  namespace: guardian-analytics
  labels:
    app.kubernetes.io/name: analytics-ddl
    app.kubernetes.io/part-of: guardian
data:
  # Replicated form of the canonical events DDL
  # (src/infrastructure/analytics/events-table.sql — bake-off winner, 17.0
  # B/event; see docs/analytics-storage-design.md). Identical columns,
  # codecs, ORDER BY, partitioning, and TTL; only the engine differs:
  # ReplicatedMergeTree over the CHK quorum. Targets the tenant-root
  # Cozystack ClickHouse app (cluster name 'clickhouse' is fixed by the
  # chart; 2 replicas, DRBD-replicated volumes carry the durability).
  events.sql: |
    CREATE DATABASE IF NOT EXISTS guardian_analytics ON CLUSTER 'clickhouse';

    CREATE TABLE IF NOT EXISTS guardian_analytics.events ON CLUSTER 'clickhouse'
    (
        server_ts      DateTime64(3) CODEC(Delta(8), ZSTD(1)),
        site           LowCardinality(String) CODEC(ZSTD(1)),
        event_name     LowCardinality(String) CODEC(ZSTD(1)),
        trust_tier     Enum8('unspecified' = 0, 'server_observed' = 1, 'edge_verified' = 2, 'client_claimed' = 3) CODEC(ZSTD(1)),
        schema_version UInt8 CODEC(ZSTD(1)),
        trace_id       FixedString(16) CODEC(ZSTD(1)),
        correlation_id FixedString(16) CODEC(ZSTD(1)),
        session_seq    UInt32 CODEC(T64, ZSTD(1)),
        path           LowCardinality(String) CODEC(ZSTD(1)),
        referrer       LowCardinality(String) CODEC(ZSTD(1)),
        ua             LowCardinality(String) CODEC(ZSTD(1)),
        device_class   LowCardinality(String) CODEC(ZSTD(1)),
        os_family      LowCardinality(String) CODEC(ZSTD(1)),
        browser_family LowCardinality(String) CODEC(ZSTD(1)),
        client_ip      IPv6 CODEC(ZSTD(1)) TTL toDateTime(server_ts) + INTERVAL 90 DAY,
        ip_source      LowCardinality(String) CODEC(ZSTD(1)),
        country        LowCardinality(String) CODEC(ZSTD(1)),
        asn            UInt32 CODEC(T64, ZSTD(1)),
        status         UInt16 CODEC(T64, ZSTD(1)),
        duration_ms    UInt32 CODEC(T64, ZSTD(1)),
        client_skew_ms Int32 CODEC(T64, ZSTD(1)),
        vital_name     LowCardinality(String) CODEC(ZSTD(1)),
        vital_value    Float64 CODEC(Gorilla, ZSTD(1)),
        props          String CODEC(ZSTD(1))
    )
    ENGINE = ReplicatedMergeTree('/clickhouse/tables/{shard}/guardian_analytics/events', '{replica}')
    PARTITION BY toYYYYMM(server_ts)
    ORDER BY (site, correlation_id, server_ts)
    TTL toDateTime(server_ts) + INTERVAL 25 MONTH DELETE;
  # Idempotent ALTERs bringing a pre-existing populated table up to the
  # events.sql schema — CREATE ... IF NOT EXISTS is a no-op on live tables,
  # so column additions and TTL changes must be restated here. Keyed
  # separately because the DDL conformance test pins events.sql verbatim to
  # the canonical file.
  migrations.sql: |
    ALTER TABLE guardian_analytics.events ON CLUSTER 'clickhouse'
        ADD COLUMN IF NOT EXISTS device_class LowCardinality(String) CODEC(ZSTD(1)) AFTER ua,
        ADD COLUMN IF NOT EXISTS os_family LowCardinality(String) CODEC(ZSTD(1)) AFTER device_class,
        ADD COLUMN IF NOT EXISTS browser_family LowCardinality(String) CODEC(ZSTD(1)) AFTER os_family,
        MODIFY COLUMN client_ip IPv6 CODEC(ZSTD(1)) TTL toDateTime(server_ts) + INTERVAL 90 DAY;
