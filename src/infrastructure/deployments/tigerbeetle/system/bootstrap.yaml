---
apiVersion: batch/v1
kind: Job
metadata:
  name: tigerbeetle-format-0
  namespace: tenant-guardian
  labels:
    app.kubernetes.io/name: tigerbeetle
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: ledger
    guardian.dev/phase: bootstrap
    guardian.dev/replica: "0"
spec:
  activeDeadlineSeconds: 1800
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tigerbeetle
        app.kubernetes.io/part-of: guardian
        guardian.dev/component: ledger
        guardian.dev/phase: bootstrap
        guardian.dev/replica: "0"
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: ash-earth
      restartPolicy: Never
      securityContext:
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: tigerbeetle
      containers:
        - name: tigerbeetle
          image: ghcr.io/tigerbeetle/tigerbeetle:0.17.9@sha256:48f623f9c1e9b6cc44d77ca93634595ae99cce3246ded418763eb1a62eee45e9
          imagePullPolicy: IfNotPresent
          args:
            - format
            - --cluster=49532141921164377784457307205600684260
            - --replica=0
            - --replica-count=3
            - /data/ledger.tigerbeetle
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - IPC_LOCK
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: Unconfined
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tigerbeetle-data-0
---
