apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: postflight-canary-loop
  namespace: postflight-runner
  labels:
    app.kubernetes.io/name: postflight-canary-loop
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: postflight
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: postflight-canary-loop
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: vminsert
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
---
# tenant-root's generated policy does not admit child-tenant namespaces, so
# the VictoriaMetrics import path needs its matching ingress half.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-vminsert-from-postflight-canary-loop
  labels:
    app.kubernetes.io/name: postflight-canary-loop
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: postflight
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: vminsert
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: postflight-runner
            k8s:app.kubernetes.io/name: postflight-canary-loop
      toPorts:
        - ports:
            - port: "8480"
              protocol: TCP
