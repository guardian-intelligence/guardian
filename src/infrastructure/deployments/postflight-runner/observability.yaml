apiVersion: operator.victoriametrics.com/v1beta1
kind: VMRule
metadata:
  name: postflight-canary-loop
  namespace: postflight-runner
  labels:
    app.kubernetes.io/name: postflight-canary-loop
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: postflight
spec:
  groups:
    - name: postflight-canary-loop.rules
      interval: 30s
      rules:
        - alert: PostflightCanaryLoopFailing
          expr: last_over_time(postflight_canary_loop_last_run_success[20m]) == 0
          for: 2m
          labels:
            severity: critical
            guardian_stage: prod
            exported_instance: prod/postflight-canary-loop
          annotations:
            summary: "Postflight canary PR loop is failing"
            description: "The latest canary controller run failed for {{ $labels.owner }}/{{ $labels.repository }}. Inspect its newest postflight-canary-loop Job and open pull request."
        - alert: PostflightCanaryLoopAbsent
          expr: |-
            absent_over_time(postflight_canary_loop_heartbeat{owner="digital-guardian-software",repository="postflight-canary"}[30m])
            or absent_over_time(postflight_canary_loop_heartbeat{owner="digital-guardian-software",repository="simulated-customer-node"}[30m])
            or absent_over_time(postflight_canary_loop_heartbeat{owner="digital-guardian-software",repository="simulated-customer-go"}[30m])
            or absent_over_time(postflight_canary_loop_heartbeat{owner="digital-guardian-software",repository="simulated-customer-python"}[30m])
            or absent_over_time(postflight_canary_loop_heartbeat{owner="digital-guardian-software",repository="simulated-customer-gradle"}[30m])
          for: 2m
          labels:
            severity: critical
            guardian_stage: prod
            exported_instance: prod/postflight-canary-loop
          annotations:
            summary: "Postflight canary PR loop is stale"
            description: "No canary heartbeat for {{ $labels.owner }}/{{ $labels.repository }} has reached VictoriaMetrics for 30 minutes. Its CronJob, GitHub App secret, or network path is unavailable."
        - alert: PostflightCanaryLoopMissing
          expr: |-
            absent(kube_cronjob_status_last_schedule_time{namespace="postflight-runner",cronjob="postflight-canary-loop"})
            or absent(kube_cronjob_status_last_schedule_time{namespace="postflight-runner",cronjob="postflight-canary-loop-node"})
            or absent(kube_cronjob_status_last_schedule_time{namespace="postflight-runner",cronjob="postflight-canary-loop-go"})
            or absent(kube_cronjob_status_last_schedule_time{namespace="postflight-runner",cronjob="postflight-canary-loop-python"})
            or absent(kube_cronjob_status_last_schedule_time{namespace="postflight-runner",cronjob="postflight-canary-loop-gradle"})
          for: 15m
          labels:
            severity: warning
            guardian_stage: prod
            exported_instance: prod/postflight-canary-loop
          annotations:
            summary: "Postflight canary CronJob is missing"
            description: "kube-state-metrics has not reported {{ $labels.cronjob }} for 15 minutes."
