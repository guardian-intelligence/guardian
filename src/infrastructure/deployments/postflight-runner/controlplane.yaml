# postflight-controlplane — the runner control plane for stage (a): GitHub
# workflow_job webhook ingest, delivery ledger in the CNPG Postgres, PR
# comments. Contract: src/services/postflight/controlplane/. Single replica:
# GitHub retries undelivered webhooks and the worker loop is idempotent over
# the ledger, so a pod reschedule loses nothing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postflight-controlplane
  namespace: postflight-runner
  labels:
    app.kubernetes.io/name: postflight-controlplane
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: postflight
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: postflight-controlplane
  template:
    metadata:
      labels:
        # app.kubernetes.io/name is load-bearing: the CiliumNetworkPolicy and
        # the tenant-root ingress-egress pair in networkpolicy.yaml select
        # control-plane pods by exactly this label.
        app.kubernetes.io/name: postflight-controlplane
        app.kubernetes.io/part-of: guardian
        guardian.dev/product: postflight
        guardian.dev/otel: producer
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controlplane
          image: ghcr.io/guardian-intelligence/postflight-controlplane@sha256:e7169b3c27c5b152b7e9c85896617aea82dcac2b65f3b488ed1bc87f704b27bf
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            # The CNPG app credential lives in tenant-root (Cozystack
            # constraint) and is relayed into this namespace's OpenBao scope
            # by an operator; see secrets.yaml's postgres ExternalSecret.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: DATABASE_URL
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: GITHUB_APP_ID
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: GITHUB_WEBHOOK_SECRET
            - name: GITHUB_APP_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: GITHUB_APP_PRIVATE_KEY_PEM
            # Stage (a) is single-tenant: one pinned installation. The id is
            # public identity (visible in any App-authored PR comment), not a
            # credential.
            - name: GITHUB_APP_INSTALLATION_ID
              value: "123769944"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: otel-collector.guardian-analytics.svc.cozy.local:4317
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postflight-controlplane
  namespace: postflight-runner
  labels:
    app.kubernetes.io/name: postflight-controlplane
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: postflight
spec:
  selector:
    app.kubernetes.io/name: postflight-controlplane
  ports:
    - name: http
      port: 8080
      targetPort: http
