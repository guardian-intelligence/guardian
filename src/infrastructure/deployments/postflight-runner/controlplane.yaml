# postflight-controlplane — the runner control plane for stage (a): GitHub
# workflow_job webhook ingest, delivery ledger in the CNPG Postgres, PR
# comments. Contract: src/services/postflight/controlplane/. Single replica:
# GitHub retries undelivered webhooks and the worker loop is idempotent over
# the ledger, so a pod reschedule loses nothing.
apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    reloader.stakater.com/auto: "true"
  name: postflight-controlplane
  namespace: postflight-runner
  labels:
    app.kubernetes.io/name: postflight-controlplane
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: postflight
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: postflight-controlplane
  template:
    metadata:
      annotations:
        guardian.dev/hostd-sync-generation: "2"
      labels:
        # app.kubernetes.io/name is load-bearing: the CiliumNetworkPolicy and
        # the tenant-root ingress-egress pair in networkpolicy.yaml select
        # control-plane pods by exactly this label.
        app.kubernetes.io/name: postflight-controlplane
        app.kubernetes.io/part-of: guardian
        guardian.dev/product: postflight
        guardian.dev/otel: producer
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controlplane
          image: ghcr.io/guardian-intelligence/postflight-controlplane:edge@sha256:c43dd138eca995d3dce89b8169f7a7ccf6a272bcfc398cd2f73a56c22975e413 # {"$imagepolicy": "guardian-imageops:postflight-controlplane"}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            # The CNPG app credential lives in tenant-root (Cozystack
            # constraint) and is relayed into this namespace's OpenBao scope
            # by an operator; see secrets.yaml's postgres ExternalSecret.
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres
                  key: DATABASE_URL
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: GITHUB_APP_ID
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: GITHUB_WEBHOOK_SECRET
            - name: GITHUB_APP_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: github-app
                  key: GITHUB_APP_PRIVATE_KEY_PEM
            # Setting the sync secret arms /api/v1/hostd/sync; SCHEDULER_ENABLED
            # turns on demand→lease→JIT. Together they enable the runner data
            # plane. The secret is relayed into this scope's OpenBao subtree by
            # an operator; see secrets.yaml's hostd-sync ExternalSecret.
            - name: HOSTD_SYNC_SECRET
              valueFrom:
                secretKeyRef:
                  name: hostd-sync
                  key: HOSTD_SYNC_SECRET
            - name: SCHEDULER_ENABLED
              value: "true"
            - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: otel-collector.guardian-analytics.svc.cozy.local:4317
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: postflight-controlplane
  namespace: postflight-runner
  labels:
    app.kubernetes.io/name: postflight-controlplane
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: postflight
spec:
  selector:
    app.kubernetes.io/name: postflight-controlplane
  ports:
    - name: http
      port: 8080
      targetPort: http
