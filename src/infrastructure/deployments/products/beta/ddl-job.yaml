apiVersion: batch/v1
kind: Job
metadata:
  name: cockpit-ddl-apply
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: cockpit-ddl
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: beta
  annotations:
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cockpit-ddl
        app.kubernetes.io/part-of: guardian
        guardian.dev/product: cockpit
        guardian.dev/stage: beta
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: apply
          image: docker.io/library/postgres:18.1@sha256:1090bc3a8ccfb0b55f78a494d76f8d603434f7e4553543d6e807bc7bd6bbd17f
          command:
            - /bin/sh
            - -ec
            - |
              psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f /ddl/cockpit.sql
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-products-credentials
                  key: cockpit
            - name: DATABASE_URL
              value: postgresql://cockpit:$(PGPASSWORD)@postgres-products-rw.tenant-guardian-beta.svc:5432/cockpit?sslmode=require
            - name: GUARDIAN_DDL_REVISION
              value: "5"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: ddl
              mountPath: /ddl
              readOnly: true
      volumes:
        - name: ddl
          configMap:
            name: cockpit-ddl
