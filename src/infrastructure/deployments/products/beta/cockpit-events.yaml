# The timeline writer: polls the repo's default branch (GitHub commits API,
# ETag conditional requests) and persists landed PRs / Kargo promotions /
# pushes into this stage's cockpit_events, served by Electric as the
# widget's timeline shape. One replica: inserts are idempotent by sha and a
# poll gap costs nothing (the next poll re-reads the branch head). Contract:
# src/services/cockpit/events.go.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockpit-events
  namespace: tenant-guardian-beta
  labels:
    app.kubernetes.io/name: cockpit-events
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: beta
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: cockpit-events
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cockpit-events
        app.kubernetes.io/part-of: guardian
        guardian.dev/product: cockpit
        guardian.dev/stage: beta
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: events
          image: ghcr.io/guardian-intelligence/cockpit@sha256:1930829e8a31551c241d124681d2938d133cda0770d5cb08e9f7aa9cc37e2b97
          args:
            - events
            - --repo=guardian-intelligence/guardian
          env:
            - name: PGHOST
              value: postgres-products-rw.tenant-guardian-beta.svc
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              value: cockpit
            - name: PGUSER
              value: cockpit_writer
            - name: PGSSLMODE
              value: require
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-products-credentials
                  key: cockpit_writer
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
