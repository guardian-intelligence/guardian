apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-guardian-prod-allow-root-ingress-electric
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values:
          - tenant-guardian-prod
      - key: k8s:app.kubernetes.io/name
        operator: In
        values:
          - electric
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: ingress-nginx
            k8s:app.kubernetes.io/component: controller
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-ingress-egress-electric-prod
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: ingress-nginx
      k8s:app.kubernetes.io/component: controller
  egress:
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - tenant-guardian-prod
            - key: k8s:app.kubernetes.io/name
              operator: In
              values:
                - electric
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
# vmagent scrapes the prometheus port from cozy-monitoring.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent-to-electric-metrics
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: electric
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: electric
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
---
# vmagent scrapes the rollup writer's staleness metrics; selecting the pod
# for ingress default-denies everything else, which is correct — the writer
# only dials out (hub + Postgres).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent-to-cockpit-rollup-metrics
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: cockpit-rollup
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cockpit-rollup
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
