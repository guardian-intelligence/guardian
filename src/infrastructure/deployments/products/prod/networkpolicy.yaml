# The public path terminates on the hostNetwork root ingress controller,
# whose traffic arrives with the reserved host/remote-node identities —
# never a pod identity — so the admit is entity-based.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-guardian-prod-allow-root-ingress-electric
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values:
          - tenant-guardian-prod
      - key: k8s:app.kubernetes.io/name
        operator: In
        values:
          - electric
  ingress:
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
# vmagent scrapes the prometheus port from cozy-monitoring.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vmagent-to-electric-metrics
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: electric
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: electric
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "4000"
              protocol: TCP
---
# The rollup writer's complete policy. Ingress: only vmagent's metrics
# scrape. Egress must be explicit — the Cozystack-generated tenant policies
# grant world (off-cluster) and DNS, but the hub lives in the plain
# guardian-cockpit namespace, which is the cluster entity, not world; the
# keycloak CNP is the precedent for a tenant pod's hand-written allow list.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cockpit-rollup
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: cockpit-rollup
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cockpit-rollup
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # This stage's product Postgres.
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: postgres-products
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # The cluster-singleton cockpit hub's frame stream.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: guardian-cockpit
            k8s:app.kubernetes.io/name: cockpit-hub
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# The events writer's complete policy: vmagent scrape in; DNS, this stage's
# Postgres, and the GitHub API (world) out.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cockpit-events
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: cockpit-events
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: prod
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cockpit-events
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: postgres-products
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
