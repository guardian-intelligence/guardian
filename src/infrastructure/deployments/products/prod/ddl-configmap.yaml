apiVersion: v1
kind: ConfigMap
metadata:
  name: cockpit-ddl
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: cockpit-ddl
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: prod
data:
  cockpit.sql: |
    -- Objects are owned by the chart's cockpit_admin group role so every
    -- database admin user (cockpit, electric) passes owner checks -- Electric
    -- requires table ownership to manage the publication for its shapes.
    -- Ownership transfer must run BEFORE SET ROLE: it executes as the
    -- connecting user, which either owns the table (first transfer) or is a
    -- member of cockpit_admin (idempotent re-run) -- both pass the owner check.
    ALTER TABLE IF EXISTS status_heartbeat OWNER TO cockpit_admin;
    ALTER TABLE IF EXISTS cockpit_metrics OWNER TO cockpit_admin;
    ALTER TABLE IF EXISTS cockpit_events OWNER TO cockpit_admin;
    SET ROLE cockpit_admin;
    CREATE TABLE IF NOT EXISTS status_heartbeat (
        id integer PRIMARY KEY,
        note text NOT NULL,
        updated_at timestamptz NOT NULL DEFAULT now()
    );
    INSERT INTO status_heartbeat (id, note) VALUES (1, 'cockpit seed heartbeat')
        ON CONFLICT (id) DO UPDATE SET updated_at = now();
    -- One row per node-second of control-plane telemetry, written by the
    -- cockpit rollup writer and served to browsers as an Electric shape;
    -- the writer prunes past the stream's one-hour horizon.
    CREATE TABLE IF NOT EXISTS cockpit_metrics (
        ts timestamptz NOT NULL,
        node text NOT NULL,
        cpu_min_bp integer NOT NULL,
        cpu_max_bp integer NOT NULL,
        cpu_avg_bp integer NOT NULL,
        mem_used_bp integer NOT NULL,
        PRIMARY KEY (ts, node)
    );
    -- One row per default-branch commit (landed PRs, Kargo promotions,
    -- pushes), written by the cockpit events writer and served as the
    -- widget's timeline shape; the writer prunes past 24 h.
    CREATE TABLE IF NOT EXISTS cockpit_events (
        id text PRIMARY KEY,
        ts timestamptz NOT NULL,
        kind text NOT NULL,
        actor text NOT NULL,
        title text NOT NULL,
        url text NOT NULL
    );
