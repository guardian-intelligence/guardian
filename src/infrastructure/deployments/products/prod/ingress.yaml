apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: electric
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: electric
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: prod
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: tenant-root
  rules:
    - host: guardianintelligence.org
      http:
        paths:
          - path: /electric(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: electric
                port:
                  number: 80
