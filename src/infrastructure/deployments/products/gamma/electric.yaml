apiVersion: apps/v1
kind: Deployment
metadata:
  name: electric
  namespace: tenant-guardian-gamma
  labels:
    app.kubernetes.io/name: electric
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: gamma
spec:
  replicas: 1
  revisionHistoryLimit: 3
  # Electric holds the database's single logical replication slot, so a
  # surged replacement pod can never become ready while the old one lives.
  # Rollouts take a brief serving gap: edge-cached shape reads keep working,
  # uncached ones fail until the new pod is Ready.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: electric
  template:
    metadata:
      labels:
        app.kubernetes.io/name: electric
        app.kubernetes.io/part-of: guardian
        guardian.dev/product: cockpit
        guardian.dev/stage: gamma
    spec:
      automountServiceAccountToken: false
      # Kubelet's docker-link env for the 'electric' Service (ELECTRIC_PORT=tcp://...)
      # collides with Electric's ELECTRIC_* config namespace and crashes boot.
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: electric
          image: docker.io/electricsql/electric:1.7.7@sha256:15e9a25d5f6c515ad9113392291e34c6751b8b31d563ee4c496fde499a5ce14f
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-products-credentials
                  key: electric
            - name: DATABASE_URL
              value: postgresql://electric:$(PGPASSWORD)@postgres-products-rw.tenant-guardian-gamma.svc:5432/cockpit?sslmode=require
            - name: ELECTRIC_DB_POOL_SIZE
              value: "20"
            # Shape logs persist across pod restarts so existing shape
            # handles stay valid for cached clients; a database failover
            # still rotates them (slot loss forces re-snapshot).
            - name: ELECTRIC_STORAGE_DIR
              value: /var/lib/electric
            # The shape API serves the cockpit database only, which is
            # public-status-page data by design; the database contains
            # nothing else and the ingress exposes read paths only.
            - name: ELECTRIC_INSECURE
              value: "true"
            - name: ELECTRIC_PROMETHEUS_PORT
              value: "4000"
          ports:
            - name: http
              containerPort: 3000
            - name: metrics
              containerPort: 4000
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 3000
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 3000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: shape-log
              mountPath: /var/lib/electric
      volumes:
        - name: shape-log
          persistentVolumeClaim:
            claimName: electric-shape-log
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: electric-shape-log
  namespace: tenant-guardian-gamma
  labels:
    app.kubernetes.io/name: electric
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: gamma
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: replicated
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: electric
  namespace: tenant-guardian-gamma
  labels:
    app.kubernetes.io/name: electric
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
    guardian.dev/stage: gamma
spec:
  selector:
    app.kubernetes.io/name: electric
  ports:
    - name: http
      port: 80
      targetPort: 3000
