apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-guardian-gamma-allow-root-ingress-electric
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
spec:
  endpointSelector:
    matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: In
        values:
          - tenant-guardian-gamma
      - key: k8s:app.kubernetes.io/name
        operator: In
        values:
          - electric
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: tenant-root
            k8s:app.kubernetes.io/name: ingress-nginx
            k8s:app.kubernetes.io/component: controller
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: tenant-root-ingress-egress-electric-gamma
  labels:
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
spec:
  endpointSelector:
    matchLabels:
      k8s:io.kubernetes.pod.namespace: tenant-root
      k8s:app.kubernetes.io/name: ingress-nginx
      k8s:app.kubernetes.io/component: controller
  egress:
    - toEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - tenant-guardian-gamma
            - key: k8s:app.kubernetes.io/name
              operator: In
              values:
                - electric
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
