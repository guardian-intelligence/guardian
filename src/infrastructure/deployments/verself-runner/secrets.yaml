# Per-namespace secret scope for verself-runner (OpenBao roles created by
# self-init): secrets-reader is what ESO authenticates as; secrets-writer
# exists only so an operator with custody kubeconfig access can mint a
# short-lived token scoped to writing this namespace's subtree. Neither SA
# automounts; nothing schedules as them.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-reader
  namespace: verself-runner
  labels:
    app.kubernetes.io/name: verself-runner-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: verself-runner
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secrets-writer
  namespace: verself-runner
  labels:
    app.kubernetes.io/name: verself-runner-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: verself-runner
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: guardian-verself-runner-openbao
  labels:
    app.kubernetes.io/name: verself-runner-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: verself-runner
spec:
  provider:
    vault:
      server: https://guardian-openbao.tenant-guardian.svc:8200
      path: kv
      version: v2
      caProvider:
        type: Secret
        name: guardian-openbao-api-tls
        key: ca.crt
        namespace: tenant-guardian
      auth:
        kubernetes:
          mountPath: kubernetes
          role: guardian-reader-verself-runner
          serviceAccountRef:
            name: secrets-reader
            namespace: verself-runner
            audiences:
              - openbao
---
# GitHub App credentials for the runner control plane. The kv values are
# seeded by the bootstrap importer (cmd/openbao_secret_import) from the
# custody env file's github_runner_app_prod_* keys; the secretKey names below
# are the exact env vars the control plane loads (services/verself/
# controlplane/config.go), consumed via secretKeyRef in controlplane.yaml.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-app
  namespace: verself-runner
  labels:
    app.kubernetes.io/name: verself-runner-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: verself-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: guardian-verself-runner-openbao
  target:
    name: github-app
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: guardian/guardian-mgmt/verself-runner/github-app
        property: appId
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef:
        key: guardian/guardian-mgmt/verself-runner/github-app
        property: webhookSecret
    - secretKey: GITHUB_APP_PRIVATE_KEY_PEM
      remoteRef:
        key: guardian/guardian-mgmt/verself-runner/github-app
        property: githubAppPrivateKey
---
# The control-plane Postgres app lives in tenant-root (Cozystack constraint,
# see base/apps/verself-controlplane-postgres.yaml); its operator-generated
# `uri` is relayed once into this scope by an operator with custody kubeconfig
# access (bao kv put kv/guardian/guardian-mgmt/verself-runner/postgres uri=-,
# same shape as the analytics ClickHouse ingest-password relay) so ESO can
# materialize it here without a cross-namespace secretKeyRef.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres
  namespace: verself-runner
  labels:
    app.kubernetes.io/name: verself-runner-secrets
    app.kubernetes.io/part-of: guardian
    guardian.dev/secret-scope: verself-runner
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: guardian-verself-runner-openbao
  target:
    name: postgres
    creationPolicy: Orphan
    deletionPolicy: Retain
    template:
      type: Opaque
      engineVersion: v2
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: guardian/guardian-mgmt/verself-runner/postgres
        property: uri
