# Sampler pods: admit only the hub's tick-stream dials (kubelet probes
# bypass CNP). The sampler dials nothing and exposes no /metrics, so there
# is no scraper rule and no egress section — egress stays Cilium-default
# rather than inventing a deny-all rule with no house precedent.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cockpit-sampler
  namespace: guardian-cockpit
  labels:
    app.kubernetes.io/name: cockpit-sampler
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cockpit-sampler
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: cockpit-hub
      toPorts:
        - ports:
            - port: "9101"
              protocol: TCP
---
# Hub pods: admit node-identity ingress (the public stream terminates on
# the hostNetwork root ingress controller) and vmagent (/metrics); egress
# only DNS + the in-namespace samplers.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cockpit-hub
  namespace: guardian-cockpit
  labels:
    app.kubernetes.io/name: cockpit-hub
    app.kubernetes.io/part-of: guardian
    guardian.dev/product: cockpit
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: cockpit-hub
  ingress:
    # The root ingress controller runs hostNetwork, so its traffic arrives
    # with the reserved host/remote-node identities — never a pod identity —
    # and the admit must be entity-based.
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # vmagent scraping /metrics (VMServiceScrape in observability.yaml).
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # The warm-tier rollup writer subscribing to the stream
    # (products/prod/cockpit-rollup.yaml).
    - fromEndpoints:
        - matchExpressions:
            - key: k8s:io.kubernetes.pod.namespace
              operator: In
              values:
                - tenant-guardian-prod
            - key: k8s:app.kubernetes.io/name
              operator: In
              values:
                - cockpit-rollup
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: cockpit-sampler
      toPorts:
        - ports:
            - port: "9101"
              protocol: TCP
