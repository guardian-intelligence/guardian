apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: postgres-spicedb-restore-20260718
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: spicedb-restore-release-reclaim
    app.kubernetes.io/part-of: guardian
    sharding.fluxcd.io/key: shard0
spec:
  interval: 5m
  chartRef:
    kind: ExternalArtifact
    name: cozystack-postgres-application-default-postgres
    namespace: cozy-system
  install:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m
  upgrade:
    strategy:
      name: RetryOnFailure
      retryInterval: 30s
    timeout: 10m
  maxHistory: 5
  valuesFrom:
    - kind: Secret
      name: cozystack-values
  values:
    backup:
      destinationPath: s3://guardian-backups/tenant-guardian-prod/spicedb/
      enabled: false
      endpointCA:
        key: ""
        name: ""
      endpointURL: https://c3eaeffaadf7d4847684d4775c16d598.r2.cloudflarestorage.com
      retentionPolicy: 30d
      s3AccessKey: ""
      s3CredentialsSecret:
        accessKeyIDKey: ""
        name: cozy-backups-creds
        secretAccessKeyKey: ""
      s3SecretKey: ""
      schedule: ""
      useSystemBucket: false
    bootstrap:
      enabled: true
      oldName: tenant-guardian-prod-spicedb
      recoveryTime: ""
      serverName: tenant-guardian-prod-spicedb
    databases:
      spicedb:
        roles:
          admin:
            - spicedb
    external: false
    postgresql:
      parameters:
        effective_cache_size: 1536MB
        idle_in_transaction_session_timeout: 300s
        lock_timeout: 10s
        max_connections: 100
        shared_buffers: 512MB
        statement_timeout: 120s
    quorum:
      maxSyncReplicas: 0
      minSyncReplicas: 0
    replicas: 1
    resources:
      cpu: 2
      memory: 2Gi
    size: 20Gi
    storageClass: replicated-encrypted
    users:
      spicedb: {}
    version: v18
