name: authorization correctness under load
weight: 1
steps:
  - op: WriteRelationships
    updates:
      - op: TOUCH
        resource: postflight_repository:qualification_{{ randomObjectID }}
        subject: guardian_account:alice
        relation: admin
  - op: CheckPermission
    resource: postflight_repository:qualification_{{ randomObjectID }}
    subject: guardian_account:alice
    permission: manage_members
    consistency: AtLeastAsFresh
  - op: CheckPermission
    resource: postflight_repository:qualification_{{ randomObjectID }}
    subject: guardian_account:mallory
    permission: manage_members
    expectNoPermission: true
    consistency: AtLeastAsFresh
  - op: DeleteRelationships
    resource: postflight_repository:qualification_{{ randomObjectID }}
    subject: guardian_account:alice
    relation: admin
  - op: CheckPermission
    resource: postflight_repository:qualification_{{ randomObjectID }}
    subject: guardian_account:alice
    permission: manage_members
    expectNoPermission: true
    consistency: AtLeastAsFresh
