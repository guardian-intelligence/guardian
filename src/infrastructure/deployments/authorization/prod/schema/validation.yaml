schemaFile: "./guardian.zed"
relationships: |-
  organization:guardian#owner@guardian_account:alice
  organization:guardian#member@guardian_account:bob
  github_installation:postflight#organization@organization:guardian
  postflight_project:guardian#organization@organization:guardian
  postflight_repository:guardian#project@postflight_project:guardian
  postflight_repository:guardian#installation@github_installation:postflight
assertions:
  assertTrue:
    - organization:guardian#manage_members@guardian_account:alice
    - organization:guardian#manage_integrations@guardian_account:alice
    - organization:guardian#run_job@guardian_account:alice
    - organization:guardian#view@guardian_account:bob
    - github_installation:postflight#manage@guardian_account:alice
    - postflight_repository:guardian#view@guardian_account:bob
    - postflight_repository:guardian#manage@guardian_account:alice
    - postflight_repository:guardian#run_job@guardian_account:bob
  assertFalse:
    - organization:guardian#manage_members@guardian_account:bob
    - organization:guardian#manage_integrations@guardian_account:bob
    - organization:guardian#view@guardian_account:mallory
    - github_installation:postflight#manage@guardian_account:bob
    - postflight_repository:guardian#view@guardian_account:mallory
    - postflight_repository:guardian#manage@guardian_account:mallory
    - postflight_repository:guardian#run_job@guardian_account:mallory
