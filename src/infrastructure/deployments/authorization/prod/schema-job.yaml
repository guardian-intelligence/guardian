apiVersion: batch/v1
kind: Job
metadata:
  name: spicedb-schema-v4
  namespace: tenant-guardian-prod
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
  labels:
    app.kubernetes.io/name: spicedb-schema
    app.kubernetes.io/part-of: guardian
    guardian.dev/stage: prod
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 604800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spicedb-schema
        app.kubernetes.io/part-of: guardian
        guardian.dev/stage: prod
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: import
          image: ghcr.io/authzed/zed@sha256:339db064131cfd75c9385938f16fa445bcfa4a82bd9eed73402fd10c00ea374c
          args:
            - --endpoint=spicedb:50051
            - --hostname-override=spicedb.tenant-guardian-prod.svc.cozy.local
            - --certificate-path=/tls/ca.crt
            - --token=$(SPICEDB_TOKEN)
            - --max-retries=50
            - --skip-version-check
            - import
            - /schema/validation.yaml
          env:
            - name: SPICEDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spicedb-api-token-slot-b
                  key: password
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
            - name: tls
              mountPath: /tls
              readOnly: true
      containers:
        - name: positive-check
          image: ghcr.io/authzed/zed@sha256:339db064131cfd75c9385938f16fa445bcfa4a82bd9eed73402fd10c00ea374c
          args:
            - --endpoint=spicedb:50051
            - --hostname-override=spicedb.tenant-guardian-prod.svc.cozy.local
            - --certificate-path=/tls/ca.crt
            - --token=$(SPICEDB_TOKEN)
            - --max-retries=10
            - --skip-version-check
            - permission
            - check
            - --consistency-full
            - --error-on-no-permission
            - organization:guardian
            - manage_members
            - guardian_account:alice
          env:
            - name: SPICEDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spicedb-api-token-slot-b
                  key: password
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
        - name: tls-auth-negative-checks
          image: docker.io/alpine/k8s:1.33.4@sha256:b0523f0a244ddc4c8e055aa335c040d3d78b3ead5528f4544395f7f9f69c7b68
          command:
            - /bin/sh
            - -ec
          args:
            - |
              api=https://spicedb:8443/v1/permissions/check
              allowed='{"resource":{"objectType":"organization","objectId":"guardian"},"permission":"manage_members","subject":{"object":{"objectType":"guardian_account","objectId":"alice"}},"consistency":{"fullyConsistent":true}}'
              denied='{"resource":{"objectType":"organization","objectId":"guardian"},"permission":"manage_members","subject":{"object":{"objectType":"guardian_account","objectId":"mallory"}},"consistency":{"fullyConsistent":true}}'
              authorization_header="Authorization: Bearer ${SPICEDB_TOKEN}" # gitleaks:allow -- runtime value from the mounted generated Secret
              invalid_authorization_header='Authorization: Bearer deliberately-invalid-token' # gitleaks:allow -- deliberately invalid test input

              allowed_result="$(curl --fail --silent --show-error --cacert /tls/ca.crt \
                -H "${authorization_header}" \
                -H 'Content-Type: application/json' \
                --data "${allowed}" "${api}")"
              test "$(printf '%s' "${allowed_result}" | jq -r .permissionship)" = PERMISSIONSHIP_HAS_PERMISSION

              denied_result="$(curl --fail --silent --show-error --cacert /tls/ca.crt \
                -H "${authorization_header}" \
                -H 'Content-Type: application/json' \
                --data "${denied}" "${api}")"
              test "$(printf '%s' "${denied_result}" | jq -r .permissionship)" = PERMISSIONSHIP_NO_PERMISSION

              invalid_status="$(curl --silent --show-error --output /dev/null --write-out '%{http_code}' \
                --cacert /tls/ca.crt \
                -H "${invalid_authorization_header}" \
                -H 'Content-Type: application/json' \
                --data "${allowed}" "${api}")"
              case "${invalid_status}" in
                401|403) ;;
                *)
                  echo "SpiceDB returned HTTP ${invalid_status} for an invalid bearer token" >&2
                  exit 1
                  ;;
              esac

              if curl --fail --silent --show-error --cacert /wrong-ca/ca.crt \
                -H "${authorization_header}" \
                -H 'Content-Type: application/json' \
                --data "${allowed}" "${api}"; then
                echo "SpiceDB accepted an unrelated CA" >&2
                exit 1
              fi

              if curl --fail --silent --show-error --cacert /tls/ca.crt \
                --connect-to wrong.invalid:8443:spicedb:8443 \
                -H "${authorization_header}" \
                -H 'Content-Type: application/json' \
                --data "${allowed}" https://wrong.invalid:8443/v1/permissions/check; then
                echo "SpiceDB accepted an invalid TLS hostname" >&2
                exit 1
              fi
          env:
            - name: SPICEDB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spicedb-api-token-slot-b
                  key: password
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: wrong-ca
              mountPath: /wrong-ca
              readOnly: true
      volumes:
        - name: schema
          configMap:
            name: guardian-authorization-schema-v2
        - name: tls
          secret:
            secretName: spicedb-server-tls
            items:
              - key: ca.crt
                path: ca.crt
        - name: wrong-ca
          secret:
            secretName: postgres-spicedb-ca
            items:
              - key: ca.crt
                path: ca.crt
