apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: authorization-check-token
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: authorization
    app.kubernetes.io/part-of: guardian
spec:
  length: 48
  digits: 8
  symbols: 0
  noUpper: false
  allowRepeat: true
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: authorization-check-token
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: authorization
    app.kubernetes.io/part-of: guardian
spec:
  refreshInterval: "0"
  target:
    name: authorization-check-token
    creationPolicy: Owner
    deletionPolicy: Retain
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: authorization-check-token
---
