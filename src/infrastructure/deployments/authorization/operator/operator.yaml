apiVersion: v1
kind: ConfigMap
metadata:
  name: spicedb-operator-update-graph
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: spicedb-operator
    app.kubernetes.io/part-of: guardian
data:
  update-graph.yaml: |
    imageName: ghcr.io/authzed/spicedb
    channels:
      - name: stable
        metadata:
          datastore: postgres
          default: "true"
        edges:
          v1.52.0:
            - v1.54.0
        nodes:
          - id: v1.54.0
            migration: populate-schema-tables
            digest: sha256:830527f85ac4cb40aaf3d3e8e3fe0b84cdace5ee81ceb43f905b3822ee580b82
          - id: v1.52.0
            migration: add-index-for-transaction-gc
            digest: sha256:1d205e9e98e39d87f9640893a06787c854a77d1ffcc3f7ece5e3293896565aa9
---
apiVersion: v1
