apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spicedb-operator
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: spicedb-operator
    app.kubernetes.io/part-of: guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spicedb-operator
subjects:
  - kind: ServiceAccount
    name: spicedb-operator
    namespace: tenant-guardian-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spicedb-operator
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: spicedb-operator
    app.kubernetes.io/part-of: guardian
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: spicedb-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spicedb-operator
        app.kubernetes.io/part-of: guardian
    spec:
      serviceAccountName: spicedb-operator
      securityContext:
        runAsUser: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: spicedb-operator
          image: ghcr.io/authzed/spicedb-operator@sha256:b797b1a1f825c9ae5f49cb28401dee8b8abf74cb5902f9c40a01101b94a05754
          args:
            - run
            - -v=2
            - --crd=false
            - --config=/opt/operator/update-graph.yaml
            - --watch-namespaces=tenant-guardian-prod
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 2
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 20m
              memory: 256Mi
            limits:
              cpu: 250m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          volumeMounts:
            - name: update-graph
              mountPath: /opt/operator
              readOnly: true
      volumes:
        - name: update-graph
          configMap:
            name: spicedb-operator-update-graph
            defaultMode: 0444
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: spicedb-operator
  namespace: tenant-guardian-prod
  labels:
    app.kubernetes.io/name: spicedb-operator
    app.kubernetes.io/part-of: guardian
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: spicedb-operator
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: vmagent
            k8s:io.kubernetes.pod.namespace: cozy-monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "6443"
              protocol: TCP
