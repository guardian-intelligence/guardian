apiVersion: v1
kind: ConfigMap
metadata:
  name: gatus-config
  namespace: aisucks
data:
  config.yaml: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gatus
  namespace: aisucks
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gatus
  template:
    metadata:
      labels:
        app: gatus
    spec:
      hostAliases: []
      containers:
        - name: gatus
          image: registry.guardian.internal/gatus:bootstrap
          env:
            - name: GATUS_CONFIG_PATH
              value: /config/config.yaml
          ports:
            - name: web
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /config
      volumes:
        - name: config
          configMap:
            name: gatus-config
