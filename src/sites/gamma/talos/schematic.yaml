# Talos Image Factory schematic for the gamma box (gd-gamma-w0, Latitude
# sv_nPRbajqEB5koM). Content-addressed: identical contents always resolve to
# the same schematic ID, so registration is idempotent.
#
# No DHCP at the site: static addressing is baked into the boot assets, or a
# disk/PXE-booted maintenance node comes up unreachable. The same facts live
# in site.yaml for the machine config. Gateway is the /31 pair address.
customization:
  extraKernelArgs:
    - ip=45.250.254.119::45.250.254.118:255.255.255.254::enp1s0f1:off
    # Mirror the kernel console to the BMC SOL port; see the dev schematic
    # for the 2026-06-10 boot-wedge rationale.
    - console=ttyS1,115200n8
  systemExtensions:
    officialExtensions:
      - siderolabs/zfs
