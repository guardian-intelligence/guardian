# Talos Image Factory schematic for the dev playground box.
# The factory is content-addressed: identical contents always resolve to the
# same schematic ID, so registration is idempotent.
#
# siderolabs/zfs provides the ZFS kernel module and tooling for the data-disk
# pool; the factory builds it to match the requested Talos version.
#
# The site has no DHCP, so static addressing is baked into the boot assets:
# a disk-image-booted maintenance node would otherwise come up without
# networking and be unreachable. The same facts live in site.yaml for the
# machine config and the kexec command line.
customization:
  extraKernelArgs:
    - ip=206.223.228.101::206.223.228.100:255.255.255.254::enp1s0f1:off
    # Mirror the kernel console to the Supermicro BMC's SOL port (ttyS1).
    # Without this the console lever is lost exactly when needed: the
    # 2026-06-10 boot wedge was undiagnosable because the UKI only wrote
    # tty0. SOL access additionally needs the BMC's per-user SOL payload
    # enabled (Latitude-side; customer_access was disabled when checked).
    - console=ttyS1,115200n8
  systemExtensions:
    officialExtensions:
      - siderolabs/zfs
