apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-ops-controller
  labels:
    app.kubernetes.io/name: openbao-ops-controller
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openbao-ops-controller
  labels:
    app.kubernetes.io/name: openbao-ops-controller
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
rules:
  - apiGroups:
      - openbao.guardian.dev
    resources:
      - openbaoauthbackends
      - openbaokubernetesauthroles
      - openbaomounts
      - openbaomounttunes
      - openbaopkiroles
      - openbaopkirootissuers
      - openbaopolicies
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - openbao.guardian.dev
    resources:
      - openbaoauthbackends
      - openbaomounts
      - openbaopkiroles
      - openbaopkirootissuers
      - openbaopolicies
      - openbaokubernetesauthroles
    verbs:
      - patch
      - update
  - apiGroups:
      - openbao.guardian.dev
    resources:
      - openbaoauthbackends/finalizers
      - openbaomounts/finalizers
      - openbaopkiroles/finalizers
      - openbaopolicies/finalizers
      - openbaokubernetesauthroles/finalizers
    verbs:
      - update
  - apiGroups:
      - openbao.guardian.dev
    resources:
      - openbaoauthbackends/status
      - openbaokubernetesauthroles/status
      - openbaomounts/status
      - openbaomounttunes/status
      - openbaopkiroles/status
      - openbaopkirootissuers/status
      - openbaopolicies/status
    verbs:
      - get
      - patch
      - update
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - create
      - get
      - list
      - update
      - watch
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openbao-ops-controller
  labels:
    app.kubernetes.io/name: openbao-ops-controller
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openbao-ops-controller
subjects:
  - kind: ServiceAccount
    name: openbao-ops-controller
