apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openbaoauthbackends.openbao.guardian.dev
spec:
  group: openbao.guardian.dev
  scope: Namespaced
  names:
    plural: openbaoauthbackends
    singular: openbaoauthbackend
    kind: OpenBaoAuthBackend
    listKind: OpenBaoAuthBackendList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Applied
          type: string
          jsonPath: .status.conditions[?(@.type=="Applied")].status
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [path, type]
              properties:
                path:
                  type: string
                type:
                  type: string
                  enum: [kubernetes]
                description:
                  type: string
                kubernetes:
                  type: object
                  properties:
                    kubernetesHost:
                      type: string
                    kubernetesCACert:
                      type: string
                    issuer:
                      type: string
                    pemKeys:
                      type: array
                      items:
                        type: string
                    disableISSValidation:
                      type: boolean
                    disableLocalCAJWT:
                      type: boolean
                tune:
                  type: object
                  properties:
                    defaultLeaseTTL:
                      type: string
                    maxLeaseTTL:
                      type: string
                    listingVisibility:
                      type: string
                    passthroughRequestHeaders:
                      type: array
                      items:
                        type: string
                    allowedResponseHeaders:
                      type: array
                      items:
                        type: string
                    auditNonHMACRequestKeys:
                      type: array
                      items:
                        type: string
                    auditNonHMACResponseKeys:
                      type: array
                      items:
                        type: string
                deletionPolicy:
                  type: string
                  enum: [Retain, Delete]
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                lastAppliedHash:
                  type: string
                lastError:
                  type: string
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
