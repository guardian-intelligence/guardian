apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openbaopkiroles.openbao.guardian.dev
spec:
  group: openbao.guardian.dev
  scope: Namespaced
  names:
    plural: openbaopkiroles
    singular: openbaopkirole
    kind: OpenBaoPKIRole
    listKind: OpenBaoPKIRoleList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Applied
          type: string
          jsonPath: .status.conditions[?(@.type=="Applied")].status
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required:
                - mountPath
                - allowLocalhost
                - allowedDomains
                - allowBareDomains
                - allowSubdomains
                - allowGlobDomains
                - allowWildcardCertificates
                - allowAnyName
                - enforceHostnames
                - allowIPSANs
                - serverFlag
                - clientFlag
                - codeSigningFlag
                - emailProtectionFlag
                - keyType
                - keyUsage
                - useCSRCommonName
                - useCSRSANs
                - generateLease
                - noStore
                - requireCN
              properties:
                mountPath:
                  type: string
                roleName:
                  type: string
                issuerRef:
                  type: string
                ttl:
                  type: string
                maxTTL:
                  type: string
                allowLocalhost:
                  type: boolean
                allowedDomains:
                  type: array
                  items:
                    type: string
                allowBareDomains:
                  type: boolean
                allowSubdomains:
                  type: boolean
                allowGlobDomains:
                  type: boolean
                allowWildcardCertificates:
                  type: boolean
                allowAnyName:
                  type: boolean
                enforceHostnames:
                  type: boolean
                allowIPSANs:
                  type: boolean
                allowedIPSANsCIDR:
                  type: array
                  items:
                    type: string
                serverFlag:
                  type: boolean
                clientFlag:
                  type: boolean
                codeSigningFlag:
                  type: boolean
                emailProtectionFlag:
                  type: boolean
                keyType:
                  type: string
                keyBits:
                  type: integer
                keyUsage:
                  type: array
                  items:
                    type: string
                extKeyUsage:
                  type: array
                  items:
                    type: string
                cnValidations:
                  type: array
                  items:
                    type: string
                useCSRCommonName:
                  type: boolean
                useCSRSANs:
                  type: boolean
                generateLease:
                  type: boolean
                noStore:
                  type: boolean
                requireCN:
                  type: boolean
                notBeforeDuration:
                  type: string
                notBeforeBound:
                  type: string
                notAfterBound:
                  type: string
                deletionPolicy:
                  type: string
                  enum: [Retain, Delete]
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                lastAppliedHash:
                  type: string
                lastError:
                  type: string
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
