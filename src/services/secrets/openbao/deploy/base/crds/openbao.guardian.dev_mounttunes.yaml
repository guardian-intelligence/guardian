apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openbaomounttunes.openbao.guardian.dev
spec:
  group: openbao.guardian.dev
  scope: Namespaced
  names:
    plural: openbaomounttunes
    singular: openbaomounttune
    kind: OpenBaoMountTune
    listKind: OpenBaoMountTuneList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Applied
          type: string
          jsonPath: .status.conditions[?(@.type=="Applied")].status
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [mountPath, tune]
              properties:
                mountPath:
                  type: string
                tune:
                  type: object
                  properties:
                    defaultLeaseTTL:
                      type: string
                    maxLeaseTTL:
                      type: string
                    listingVisibility:
                      type: string
                    passthroughRequestHeaders:
                      type: array
                      items:
                        type: string
                    allowedResponseHeaders:
                      type: array
                      items:
                        type: string
                    auditNonHMACRequestKeys:
                      type: array
                      items:
                        type: string
                    auditNonHMACResponseKeys:
                      type: array
                      items:
                        type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                lastAppliedHash:
                  type: string
                lastError:
                  type: string
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
