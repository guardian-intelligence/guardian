apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openbaopkirootissuers.openbao.guardian.dev
spec:
  group: openbao.guardian.dev
  scope: Namespaced
  names:
    plural: openbaopkirootissuers
    singular: openbaopkirootissuer
    kind: OpenBaoPKIRootIssuer
    listKind: OpenBaoPKIRootIssuerList
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Applied
          type: string
          jsonPath: .status.conditions[?(@.type=="Applied")].status
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required:
                - mountPath
                - issuerName
                - commonName
                - ttl
                - keyType
                - setDefault
              properties:
                mountPath:
                  type: string
                issuerName:
                  type: string
                commonName:
                  type: string
                ttl:
                  type: string
                keyType:
                  type: string
                keyBits:
                  type: integer
                setDefault:
                  type: boolean
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                lastAppliedHash:
                  type: string
                lastError:
                  type: string
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys: [type]
                  items:
                    type: object
                    required: [type, status]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
