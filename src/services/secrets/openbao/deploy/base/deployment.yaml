apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao-ops-controller
  labels:
    app.kubernetes.io/name: openbao-ops-controller
    app.kubernetes.io/part-of: guardian
    guardian.dev/component: secrets
    guardian.dev/tenant-id: gi-guardian
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao-ops-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao-ops-controller
        app.kubernetes.io/part-of: guardian
        guardian.dev/component: secrets
        guardian.dev/tenant-id: gi-guardian
        policy.cozystack.io/allow-to-apiserver: "true"
    spec:
      serviceAccountName: openbao-ops-controller
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: guardian/openbao-ops-controller:dev
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect=true
            - --reconcile-mode=observe
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPENBAO_ADDR
              value: http://guardian-openbao-active:8200
            - name: OPENBAO_AUTH_PATH
              value: kubernetes
            - name: OPENBAO_AUTH_ROLE
              value: guardian-openbao-ops-controller
          ports:
            - name: metrics
              containerPort: 8080
            - name: health
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
