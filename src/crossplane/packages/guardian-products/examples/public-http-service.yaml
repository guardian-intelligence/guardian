apiVersion: platform.guardian.dev/v1alpha1
kind: PublicHttpService
metadata:
  namespace: aisucks
  name: aisucks
spec:
  app: aisucks
  domain: aisucks.app
  image: registry.guardian.internal/aisucks@sha256:REPLACE_WITH_RELEASE_DIGEST
  podNetwork: true
  certDir: /var/lib/aisucks-certs
  observability:
    profile: standard
    metricsPort: 9090
    healthPath: /healthz
