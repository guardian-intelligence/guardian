# Source of truth for OpenBao -> Kubernetes Secret delivery.
# CLI bootstrap support lives in src/guardian-cli/cmd/guardian/secret_projection.go.
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: secretprojections.platform.guardian.dev
spec:
  scope: Cluster
  group: platform.guardian.dev
  names:
    kind: SecretProjection
    plural: secretprojections
  defaultCompositionRef:
    name: secret-projection-openbao
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                waitForSecrets:
                  type: boolean
                  default: true
                target:
                  type: object
                  properties:
                    namespace:
                      type: string
                    createNamespace:
                      type: boolean
                      default: true
                    namespaceLabels:
                      type: object
                      additionalProperties:
                        type: string
                  required:
                    - namespace
                openbao:
                  type: object
                  properties:
                    role:
                      type: string
                    serviceAccountName:
                      type: string
                  required:
                    - role
                    - serviceAccountName
                secrets:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      type:
                        type: string
                      remotePath:
                        type: string
                      data:
                        type: array
                        minItems: 1
                        items:
                          type: object
                          properties:
                            secretKey:
                              type: string
                            property:
                              type: string
                          required:
                            - secretKey
                            - property
                    required:
                      - name
                      - type
                      - remotePath
                      - data
              required:
                - target
                - openbao
                - secrets
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: secret-projection-openbao
spec:
  compositeTypeRef:
    apiVersion: platform.guardian.dev/v1alpha1
    kind: SecretProjection
  mode: Pipeline
  pipeline:
    - step: render-secret-projection
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $spec := $xr.spec -}}
            {{- $name := $xr.metadata.name -}}
            {{- $createNamespace := true -}}
            {{- if eq (printf "%v" $spec.target.createNamespace) "false" -}}
            {{- $createNamespace = false -}}
            {{- end -}}
            {{- if $createNamespace }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: secret-projection-{{ $name }}-namespace
              annotations:
                {{ setResourceNameAnnotation "namespace" }}
            spec:
              deletionPolicy: Orphan
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $spec.target.namespace }}
                    {{- with $spec.target.namespaceLabels }}
                    labels:
                      {{- range $key, $value := . }}
                      {{ $key }}: {{ $value }}
                      {{- end }}
                    {{- end }}
            {{- end }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: secret-projection-{{ $name }}-service-account
              annotations:
                {{ setResourceNameAnnotation "service-account" }}
            spec:
              {{- if $createNamespace }}
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: secret-projection-{{ $name }}-namespace
              {{- end }}
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ServiceAccount
                  metadata:
                    name: {{ $spec.openbao.serviceAccountName }}
                    namespace: {{ $spec.target.namespace }}
                    labels:
                      platform.guardian.dev/secret-projection: {{ $name }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: secret-projection-{{ $name }}-secret-store
              annotations:
                {{ setResourceNameAnnotation "secret-store" }}
            spec:
              references:
                {{- if $createNamespace }}
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: secret-projection-{{ $name }}-namespace
                {{- end }}
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: secret-projection-{{ $name }}-service-account
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: external-secrets.io/v1
                  kind: SecretStore
                  metadata:
                    name: openbao
                    namespace: {{ $spec.target.namespace }}
                    labels:
                      platform.guardian.dev/secret-projection: {{ $name }}
                  spec:
                    provider:
                      vault:
                        server: http://openbao.openbao.svc:8200
                        path: kv
                        version: v2
                        auth:
                          kubernetes:
                            mountPath: kubernetes
                            role: {{ $spec.openbao.role }}
                            serviceAccountRef:
                              name: {{ $spec.openbao.serviceAccountName }}
                              audiences:
                                - openbao
            {{- range $secret := $spec.secrets }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: secret-projection-{{ $name }}-external-secret-{{ $secret.name }}
              annotations:
                {{ setResourceNameAnnotation (print "external-secret-" $secret.name) }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: secret-projection-{{ $name }}-secret-store
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: external-secrets.io/v1
                  kind: ExternalSecret
                  metadata:
                    name: {{ $secret.name }}
                    namespace: {{ $spec.target.namespace }}
                    labels:
                      platform.guardian.dev/secret-projection: {{ $name }}
                  spec:
                    refreshInterval: 1h
                    secretStoreRef:
                      name: openbao
                      kind: SecretStore
                    target:
                      name: {{ $secret.name }}
                      creationPolicy: Owner
                      template:
                        type: {{ $secret.type }}
                    data:
                      {{- range $item := $secret.data }}
                      - secretKey: {{ $item.secretKey }}
                        remoteRef:
                          key: {{ $secret.remotePath }}
                          property: {{ $item.property }}
                      {{- end }}
            {{- end }}
    - step: automatically-detect-ready-composed-resources
      functionRef:
        name: function-auto-ready
