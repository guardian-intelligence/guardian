apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: observabilitystacks.platform.guardian.dev
spec:
  scope: Cluster
  group: platform.guardian.dev
  names:
    kind: ObservabilityStack
    plural: observabilitystacks
  defaultCompositionRef:
    name: observability-stack-status
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                site:
                  type: string
                namespace:
                  type: string
                namespaceLabels:
                  type: object
                  additionalProperties:
                    type: string
                victoriaMetrics:
                  type: object
                  properties:
                    image:
                      type: string
                      description: Digest-pinned VictoriaMetrics OCI image reference.
                    persistence:
                      type: object
                      properties:
                        claimName:
                          type: string
                        storageClassName:
                          type: string
                        size:
                          type: string
                        volumeName:
                          type: string
                        accessModes:
                          type: array
                          minItems: 1
                          items:
                            type: string
                      required:
                        - claimName
                        - storageClassName
                        - size
                        - volumeName
                        - accessModes
                    retentionPeriod:
                      type: string
                    memoryAllowedBytes:
                      type: string
                    ports:
                      type: object
                      properties:
                        http:
                          type: integer
                      required:
                        - http
                    resources:
                      type: object
                      properties:
                        requests:
                          type: object
                          additionalProperties:
                            type: string
                        limits:
                          type: object
                          additionalProperties:
                            type: string
                      required:
                        - requests
                        - limits
                  required:
                    - image
                    - persistence
                    - retentionPeriod
                    - memoryAllowedBytes
                    - ports
                    - resources
                clickhouse:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
              required:
                - site
                - namespace
                - victoriaMetrics
                - clickhouse
            status:
              type: object
              properties:
                namespace:
                  type: string
                victoriaMetricsURL:
                  type: string
                victoriaMetricsImage:
                  type: string
                clickhouseEnabled:
                  type: boolean
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: observability-stack-status
spec:
  compositeTypeRef:
    apiVersion: platform.guardian.dev/v1alpha1
    kind: ObservabilityStack
  mode: Pipeline
  pipeline:
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                mode: Single
                matchLabels:
                  - key: guardian.dev/site
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.site
    - step: mark-observability-stack
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $spec := $xr.spec -}}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: observability-stack-{{ $spec.namespace }}-namespace
              annotations:
                {{ setResourceNameAnnotation "namespace" }}
            spec:
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $spec.namespace }}
                    labels:
                      {{- range $key, $value := $spec.namespaceLabels }}
                      {{ $key }}: {{ $value }}
                      {{- end }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: observability-stack-{{ $spec.namespace }}-victoria-metrics-pvc
              annotations:
                {{ setResourceNameAnnotation "victoria-metrics-pvc" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: observability-stack-{{ $spec.namespace }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: PersistentVolumeClaim
                  metadata:
                    name: {{ $spec.victoriaMetrics.persistence.claimName }}
                    namespace: {{ $spec.namespace }}
                    labels:
                      guardian.dev/site: {{ $spec.site }}
                      app: victoria-metrics
                  spec:
                    accessModes:
                      {{ range $mode := $spec.victoriaMetrics.persistence.accessModes }}
                      - {{ $mode }}
                      {{ end }}
                    storageClassName: {{ $spec.victoriaMetrics.persistence.storageClassName }}
                    volumeName: {{ $spec.victoriaMetrics.persistence.volumeName }}
                    resources:
                      requests:
                        storage: {{ $spec.victoriaMetrics.persistence.size }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: observability-stack-{{ $spec.namespace }}-victoria-metrics
              annotations:
                {{ setResourceNameAnnotation "victoria-metrics" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: observability-stack-{{ $spec.namespace }}-namespace
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: observability-stack-{{ $spec.namespace }}-victoria-metrics-pvc
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: victoria-metrics
                    namespace: {{ $spec.namespace }}
                  spec:
                    replicas: 1
                    strategy:
                      type: Recreate
                    selector:
                      matchLabels:
                        app: victoria-metrics
                    template:
                      metadata:
                        labels:
                          app: victoria-metrics
                      spec:
                        containers:
                          - name: victoria-metrics
                            image: {{ $spec.victoriaMetrics.image }}
                            args:
                              - -retentionPeriod={{ $spec.victoriaMetrics.retentionPeriod }}
                              - -storageDataPath=/storage
                              - -memory.allowedBytes={{ $spec.victoriaMetrics.memoryAllowedBytes }}
                            ports:
                              - name: http
                                containerPort: {{ $spec.victoriaMetrics.ports.http }}
                            readinessProbe:
                              httpGet:
                                path: /health
                                port: {{ $spec.victoriaMetrics.ports.http }}
                              initialDelaySeconds: 2
                              periodSeconds: 5
                            resources:
                              requests:
                                cpu: {{ index $spec.victoriaMetrics.resources.requests "cpu" }}
                                memory: {{ index $spec.victoriaMetrics.resources.requests "memory" }}
                              limits:
                                memory: {{ index $spec.victoriaMetrics.resources.limits "memory" }}
                            volumeMounts:
                              - name: storage
                                mountPath: /storage
                        volumes:
                          - name: storage
                            persistentVolumeClaim:
                              claimName: {{ $spec.victoriaMetrics.persistence.claimName }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: observability-stack-{{ $spec.namespace }}-victoria-metrics-service
              annotations:
                {{ setResourceNameAnnotation "victoria-metrics-service" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: observability-stack-{{ $spec.namespace }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: victoria-metrics
                    namespace: {{ $spec.namespace }}
                  spec:
                    selector:
                      app: victoria-metrics
                    ports:
                      - name: http
                        port: {{ $spec.victoriaMetrics.ports.http }}
                        targetPort: {{ $spec.victoriaMetrics.ports.http }}
            ---
            apiVersion: platform.guardian.dev/v1alpha1
            kind: ObservabilityStack
            status:
              namespace: {{ $spec.namespace }}
              victoriaMetricsURL: http://victoria-metrics.{{ $spec.namespace }}.svc:{{ $spec.victoriaMetrics.ports.http }}
              victoriaMetricsImage: {{ $spec.victoriaMetrics.image }}
              clickhouseEnabled: {{ $spec.clickhouse.enabled }}
    - step: mark-ready
      functionRef:
        name: function-auto-ready
