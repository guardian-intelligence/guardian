apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: sloprofiles.platform.guardian.dev
spec:
  scope: Cluster
  group: platform.guardian.dev
  names:
    kind: SLOProfile
    plural: sloprofiles
  defaultCompositionRef:
    name: slo-profile-status
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                site:
                  type: string
                surface:
                  type: string
                window:
                  type: string
                  description: Prometheus range window for rollout-gate deltas.
                apps:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                      deployment:
                        type: string
                      metric:
                        type: string
                    required:
                      - name
                      - namespace
                      - deployment
                      - metric
                signals:
                  type: object
                  properties:
                    publicScrape:
                      type: boolean
                      default: true
                    errorRate:
                      type: boolean
                      default: true
                    restartDelta:
                      type: boolean
                      default: true
                    pageAlerts:
                      type: boolean
                      default: true
                    synthetic:
                      type: boolean
                      default: true
                    directHTTP:
                      type: boolean
                      default: true
              required:
                - site
                - surface
                - window
                - apps
                - signals
            status:
              type: object
              properties:
                gate:
                  type: string
                appCount:
                  type: integer
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: slo-profile-status
spec:
  compositeTypeRef:
    apiVersion: platform.guardian.dev/v1alpha1
    kind: SLOProfile
  mode: Pipeline
  pipeline:
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                mode: Single
                matchLabels:
                  - key: guardian.dev/site
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.site
    - step: mark-slo-profile
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $spec := $xr.spec -}}
            ---
            apiVersion: platform.guardian.dev/v1alpha1
            kind: SLOProfile
            status:
              gate: {{ $spec.surface }}
              appCount: {{ len $spec.apps }}
    - step: mark-ready
      functionRef:
        name: function-auto-ready
---
apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: syntheticchecks.platform.guardian.dev
spec:
  scope: Cluster
  group: platform.guardian.dev
  names:
    kind: SyntheticCheck
    plural: syntheticchecks
  defaultCompositionRef:
    name: synthetic-check-status
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                site:
                  type: string
                surface:
                  type: string
                targets:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      product:
                        type: string
                      kind:
                        type: string
                      url:
                        type: string
                      expectedStatus:
                        type: integer
                        minimum: 200
                        maximum: 299
                        default: 200
                      bodyContains:
                        type: string
                      gate:
                        type: boolean
                        default: true
                    required:
                      - name
                      - product
                      - kind
                      - url
              required:
                - site
                - surface
                - targets
            status:
              type: object
              properties:
                targetCount:
                  type: integer
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: synthetic-check-status
spec:
  compositeTypeRef:
    apiVersion: platform.guardian.dev/v1alpha1
    kind: SyntheticCheck
  mode: Pipeline
  pipeline:
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                mode: Single
                matchLabels:
                  - key: guardian.dev/site
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.site
    - step: mark-synthetic-check
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $spec := $xr.spec -}}
            ---
            apiVersion: platform.guardian.dev/v1alpha1
            kind: SyntheticCheck
            status:
              targetCount: {{ len $spec.targets }}
    - step: mark-ready
      functionRef:
        name: function-auto-ready
