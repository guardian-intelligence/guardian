apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: statussurfaces.platform.guardian.dev
spec:
  scope: Cluster
  group: platform.guardian.dev
  names:
    kind: StatusSurface
    plural: statussurfaces
  defaultCompositionRef:
    name: status-surface-status
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                site:
                  type: string
                namespace:
                  type: string
                image:
                  type: string
                  description: Digest-pinned Guardian status OCI image reference.
                domains:
                  type: array
                  items:
                    type: string
                monitor:
                  type: boolean
                  default: false
                replicas:
                  type: integer
                  minimum: 0
                acmeEmail:
                  type: string
                certDir:
                  type: string
                victoriaMetricsURL:
                  type: string
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      additionalProperties:
                        type: string
                    limits:
                      type: object
                      additionalProperties:
                        type: string
                  required:
                    - requests
                    - limits
                gateway:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    tlsRouteAPIVersion:
                      type: string
                    tlsSectionNamePrefix:
                      type: string
                  required:
                    - name
                    - namespace
                    - tlsRouteAPIVersion
                    - tlsSectionNamePrefix
                readiness:
                  type: object
                  properties:
                    waitForRollout:
                      type: boolean
                      default: true
              required:
                - site
                - namespace
                - image
                - domains
                - replicas
                - acmeEmail
                - certDir
                - victoriaMetricsURL
                - resources
                - gateway
            status:
              type: object
              properties:
                domainCount:
                  type: integer
                monitor:
                  type: boolean
                image:
                  type: string
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: status-surface-status
spec:
  compositeTypeRef:
    apiVersion: platform.guardian.dev/v1alpha1
    kind: StatusSurface
  mode: Pipeline
  pipeline:
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                mode: Single
                matchLabels:
                  - key: guardian.dev/site
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.site
    - step: mark-status-surface
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $spec := $xr.spec -}}
            {{- $env := index .context "apiextensions.crossplane.io/environment" -}}
            {{- $gatewayEnabled := index $env "gateway" "enabled" -}}
            {{- $clusterName := index $env "site" "clusterName" -}}
            {{- if gt (len $spec.domains) 0 }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: status-surface-{{ $spec.namespace }}-namespace
              annotations:
                {{ setResourceNameAnnotation "namespace" }}
            spec:
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $spec.namespace }}
                    labels:
                      pod-security.kubernetes.io/enforce: privileged
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: status-surface-{{ $spec.namespace }}-deployment
              annotations:
                {{ setResourceNameAnnotation "deployment" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: status-surface-{{ $spec.namespace }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: status
                    namespace: {{ $spec.namespace }}
                  spec:
                    replicas: {{ $spec.replicas }}
                    selector:
                      matchLabels:
                        app: status
                    template:
                      metadata:
                        labels:
                          app: status
                      spec:
                        terminationGracePeriodSeconds: 30
                        containers:
                          - name: status
                            image: {{ $spec.image }}
                            env:
                              - name: SITE
                                value: "{{ $clusterName }}"
                              - name: DOMAINS
                                value: "{{ range $i, $d := $spec.domains }}{{ if $i }},{{ end }}{{ $d }}{{ end }}"
                              - name: ACME_EMAIL
                                value: "{{ $spec.acmeEmail }}"
                              - name: CERT_DIR
                                value: {{ $spec.certDir }}
                              - name: VM_URL
                                value: {{ $spec.victoriaMetricsURL }}
                              - name: GOMEMLIMIT
                                value: "{{ index $spec.resources.limits "goMemory" }}"
                            ports:
                              - name: http
                                containerPort: 8080
                              - name: https
                                containerPort: 8443
                            resources:
                              requests:
                                cpu: {{ index $spec.resources.requests "cpu" }}
                                memory: {{ index $spec.resources.requests "memory" }}
                              limits:
                                memory: {{ index $spec.resources.limits "memory" }}
                            readinessProbe:
                              httpGet:
                                path: /healthz
                                port: 8080
                              initialDelaySeconds: 2
                              periodSeconds: 5
                            volumeMounts:
                              - name: certs
                                mountPath: {{ $spec.certDir }}
                        volumes:
                          - name: certs
                            hostPath:
                              path: {{ $spec.certDir }}
                              type: DirectoryOrCreate
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: status-surface-{{ $spec.namespace }}-service
              annotations:
                {{ setResourceNameAnnotation "service" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: status-surface-{{ $spec.namespace }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: status
                    namespace: {{ $spec.namespace }}
                  spec:
                    selector:
                      app: status
                    ports:
                      - name: https
                        port: 443
                        targetPort: 8443
                      - name: http
                        port: 80
                        targetPort: 8080
            {{- if $gatewayEnabled }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: status-surface-{{ $spec.namespace }}-tls-route
              annotations:
                {{ setResourceNameAnnotation "tls-route" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: status-surface-{{ $spec.namespace }}-service
              providerConfigRef:
                name: platform
              watch: true
              forProvider:
                manifest:
                  apiVersion: {{ $spec.gateway.tlsRouteAPIVersion }}
                  kind: TLSRoute
                  metadata:
                    name: status
                    namespace: {{ $spec.namespace }}
                  spec:
                    parentRefs:
                      {{- range $i, $_ := $spec.domains }}
                      - name: {{ $spec.gateway.name }}
                        namespace: {{ $spec.gateway.namespace }}
                        sectionName: {{ $spec.gateway.tlsSectionNamePrefix }}-{{ $i }}
                      {{- end }}
                    hostnames:
                      {{- range $domain := $spec.domains }}
                      - "{{ $domain }}"
                      {{- end }}
                    rules:
                      - backendRefs:
                          - name: status
                            port: 443
            {{- end }}
            {{- end }}
            ---
            apiVersion: platform.guardian.dev/v1alpha1
            kind: StatusSurface
            status:
              domainCount: {{ len $spec.domains }}
              monitor: {{ $spec.monitor }}
              image: {{ $spec.image }}
    - step: mark-ready
      functionRef:
        name: function-auto-ready
