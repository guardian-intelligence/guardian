apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: publichttpservices.platform.guardian.dev
spec:
  scope: Cluster
  group: platform.guardian.dev
  names:
    kind: PublicHttpService
    plural: publichttpservices
  defaultCompositionRef:
    name: public-http-service-kubernetes
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                site:
                  type: string
                namespace:
                  type: string
                app:
                  type: string
                domain:
                  type: string
                image:
                  type: string
                  description: Digest-pinned OCI image reference.
                podNetwork:
                  type: boolean
                replicas:
                  type: integer
                  minimum: 1
                certDir:
                  type: string
                acmeEmail:
                  type: string
                probeClusterIP:
                  type: string
                networkLabelKey:
                  type: string
                memoryRequest:
                  type: string
                memoryLimit:
                  type: string
                goMemoryLimit:
                  type: string
                cpuRequest:
                  type: string
                healthPath:
                  type: string
                readinessPeriod:
                  type: integer
                  minimum: 1
                ports:
                  type: object
                  properties:
                    http:
                      type: integer
                    https:
                      type: integer
                    metrics:
                      type: integer
                  required:
                    - http
                    - https
                    - metrics
                listen:
                  type: object
                  properties:
                    http:
                      type: string
                    https:
                      type: string
                    diagnostics:
                      type: string
                  required:
                    - http
                    - https
                    - diagnostics
                gateway:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    tlsSectionName:
                      type: string
                    tlsMode:
                      type: string
                      enum:
                        - Passthrough
                        - Terminate
                    httpSectionName:
                      type: string
                    tlsRouteAPIVersion:
                      type: string
                    httpRouteHostnames:
                      type: array
                      items:
                        type: string
                  required:
                    - name
                    - namespace
                    - tlsSectionName
                    - httpSectionName
                    - tlsRouteAPIVersion
              required:
                - site
                - namespace
                - app
                - domain
                - image
                - podNetwork
                - replicas
                - certDir
                - acmeEmail
                - networkLabelKey
                - memoryRequest
                - memoryLimit
                - goMemoryLimit
                - cpuRequest
                - healthPath
                - readinessPeriod
                - ports
                - listen
                - gateway
            status:
              type: object
              properties:
                url:
                  type: string
                image:
                  type: string
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: public-http-service-kubernetes
spec:
  compositeTypeRef:
    apiVersion: platform.guardian.dev/v1alpha1
    kind: PublicHttpService
  mode: Pipeline
  pipeline:
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                mode: Single
                matchLabels:
                  - key: guardian.dev/site
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.site
    - step: render-public-http-service
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $spec := $xr.spec -}}
            {{- $env := index .context "apiextensions.crossplane.io/environment" -}}
            {{- $gatewayEnabled := index $env "gateway" "enabled" -}}
            {{- $tlsMode := "Passthrough" -}}
            {{- with $spec.gateway.tlsMode -}}
            {{- $tlsMode = . -}}
            {{- end -}}
            {{- $networkLabelValue := "pod" -}}
            {{- if not $spec.podNetwork -}}
            {{- $networkLabelValue = "host" -}}
            {{- end -}}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-namespace
              annotations:
                {{ setResourceNameAnnotation "namespace" }}
            spec:
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $spec.namespace }}
                    labels:
                      pod-security.kubernetes.io/enforce: privileged
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-deployment
              annotations:
                {{ setResourceNameAnnotation "deployment" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: public-http-{{ $spec.app }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: {{ $spec.app }}
                    namespace: {{ $spec.namespace }}
                  spec:
                    replicas: {{ $spec.replicas }}
                    selector:
                      matchLabels:
                        app: {{ $spec.app }}
                    {{- if not $spec.podNetwork }}
                    strategy:
                      type: Recreate
                    {{- else }}
                    strategy:
                      type: RollingUpdate
                      rollingUpdate:
                        maxUnavailable: 0
                        maxSurge: 1
                    {{- end }}
                    template:
                      metadata:
                        labels:
                          app: {{ $spec.app }}
                          {{- if $spec.podNetwork }}
                          {{ $spec.networkLabelKey }}: {{ $networkLabelValue }}
                          platform.guardian.dev/metrics-scrape: "true"
                          platform.guardian.dev/metrics-port: "{{ $spec.ports.metrics }}"
                          platform.guardian.dev/slo-surface: public-http
                          {{- end }}
                      spec:
                        {{- if not $spec.podNetwork }}
                        hostNetwork: true
                        dnsPolicy: ClusterFirstWithHostNet
                        {{- end }}
                        securityContext:
                          seccompProfile:
                            type: RuntimeDefault
                        terminationGracePeriodSeconds: 30
                        containers:
                          - name: {{ $spec.app }}
                            image: {{ $spec.image }}
                            securityContext:
                              allowPrivilegeEscalation: false
                              capabilities:
                                drop:
                                  - ALL
                                add:
                                  - NET_BIND_SERVICE
                            env:
                              - name: DOMAIN
                                value: "{{ $spec.domain }}"
                              - name: ACME_EMAIL
                                value: "{{ $spec.acmeEmail }}"
                              - name: CERT_DIR
                                value: {{ $spec.certDir }}
                              - name: LISTEN_HTTP
                                value: "{{ index $spec.listen "http" }}"
                              - name: LISTEN_TLS
                                value: "{{ $spec.listen.https }}"
                              - name: DIAG_ADDR
                                value: "{{ $spec.listen.diagnostics }}"
                              - name: GOMEMLIMIT
                                value: "{{ $spec.goMemoryLimit }}"
                              - name: ENABLE_APP_TLS
                                value: "{{ if eq $tlsMode "Terminate" }}false{{ else }}true{{ end }}"
                              - name: REDIRECT_HTTP
                                value: "{{ if eq $tlsMode "Terminate" }}false{{ else }}true{{ end }}"
                            ports:
                              - name: http
                                containerPort: {{ $spec.ports.http }}
                              - name: https
                                containerPort: {{ $spec.ports.https }}
                              - name: metrics
                                containerPort: {{ $spec.ports.metrics }}
                            resources:
                              requests:
                                cpu: {{ $spec.cpuRequest }}
                                memory: {{ $spec.memoryRequest }}
                              limits:
                                memory: {{ $spec.memoryLimit }}
                            readinessProbe:
                              httpGet:
                                path: {{ $spec.healthPath }}
                                port: http
                              initialDelaySeconds: 2
                              periodSeconds: {{ $spec.readinessPeriod }}
                            volumeMounts:
                              - name: certs
                                mountPath: {{ $spec.certDir }}
                        volumes:
                          - name: certs
                            hostPath:
                              path: {{ $spec.certDir }}
                              type: DirectoryOrCreate
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-service
              annotations:
                {{ setResourceNameAnnotation "service" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: public-http-{{ $spec.app }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: {{ $spec.app }}
                    namespace: {{ $spec.namespace }}
                  spec:
                    selector:
                      app: {{ $spec.app }}
                    ports:
                      - name: https
                        port: 443
                        targetPort: https
                      - name: http
                        port: 80
                        targetPort: http
            {{- if and $spec.podNetwork $spec.probeClusterIP }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-probe-service
              annotations:
                {{ setResourceNameAnnotation "probe-service" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: public-http-{{ $spec.app }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: {{ $spec.app }}-probe
                    namespace: {{ $spec.namespace }}
                  spec:
                    clusterIP: {{ $spec.probeClusterIP }}
                    selector:
                      app: {{ $spec.app }}
                      {{ $spec.networkLabelKey }}: {{ $networkLabelValue }}
                    ports:
                      - name: https
                        port: 443
                        targetPort: https
                      - name: http
                        port: 80
                        targetPort: http
            {{- end }}
            {{- if and $gatewayEnabled $spec.domain (ne $tlsMode "Terminate") }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-tls-route
              annotations:
                {{ setResourceNameAnnotation "tls-route" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: public-http-{{ $spec.app }}-service
              providerConfigRef:
                name: platform
              watch: true
              forProvider:
                manifest:
                  apiVersion: {{ $spec.gateway.tlsRouteAPIVersion }}
                  kind: TLSRoute
                  metadata:
                    name: {{ $spec.app }}
                    namespace: {{ $spec.namespace }}
                  spec:
                    parentRefs:
                      - name: {{ $spec.gateway.name }}
                        namespace: {{ $spec.gateway.namespace }}
                        sectionName: {{ $spec.gateway.tlsSectionName }}
                    hostnames:
                      - "{{ $spec.domain }}"
                    rules:
                      - backendRefs:
                          - name: {{ $spec.app }}
                            port: 443
            {{- end }}
            {{- if and $gatewayEnabled (eq $tlsMode "Terminate") }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-https-route
              annotations:
                {{ setResourceNameAnnotation "https-route" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: public-http-{{ $spec.app }}-service
              providerConfigRef:
                name: platform
              watch: true
              forProvider:
                manifest:
                  apiVersion: gateway.networking.k8s.io/v1
                  kind: HTTPRoute
                  metadata:
                    name: {{ $spec.app }}-https
                    namespace: {{ $spec.namespace }}
                  spec:
                    parentRefs:
                      - name: {{ $spec.gateway.name }}
                        namespace: {{ $spec.gateway.namespace }}
                        sectionName: {{ $spec.gateway.tlsSectionName }}
                    hostnames:
                      - "{{ $spec.domain }}"
                    rules:
                      - backendRefs:
                          - name: {{ $spec.app }}
                            port: 80
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-http-redirect
              annotations:
                {{ setResourceNameAnnotation "http-redirect" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: public-http-{{ $spec.app }}-service
              providerConfigRef:
                name: platform
              watch: true
              forProvider:
                manifest:
                  apiVersion: gateway.networking.k8s.io/v1
                  kind: HTTPRoute
                  metadata:
                    name: {{ $spec.app }}-http-redirect
                    namespace: {{ $spec.namespace }}
                  spec:
                    parentRefs:
                      - name: {{ $spec.gateway.name }}
                        namespace: {{ $spec.gateway.namespace }}
                        sectionName: {{ $spec.gateway.httpSectionName }}
                    hostnames:
                      - "{{ $spec.domain }}"
                    rules:
                      - filters:
                          - type: RequestRedirect
                            requestRedirect:
                              scheme: https
                              statusCode: 301
            {{- else if $gatewayEnabled }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: public-http-{{ $spec.app }}-http-route
              annotations:
                {{ setResourceNameAnnotation "http-route" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: public-http-{{ $spec.app }}-service
              providerConfigRef:
                name: platform
              watch: true
              forProvider:
                manifest:
                  apiVersion: gateway.networking.k8s.io/v1
                  kind: HTTPRoute
                  metadata:
                    name: {{ $spec.app }}-http
                    namespace: {{ $spec.namespace }}
                  spec:
                    parentRefs:
                      - name: {{ $spec.gateway.name }}
                        namespace: {{ $spec.gateway.namespace }}
                        sectionName: {{ $spec.gateway.httpSectionName }}
                    {{- with $spec.gateway.httpRouteHostnames }}
                    hostnames:
                      {{- range $hostname := . }}
                      - "{{ $hostname }}"
                      {{- end }}
                    {{- end }}
                    rules:
                      - backendRefs:
                          - name: {{ $spec.app }}
                            port: 80
            {{- end }}
            ---
            apiVersion: platform.guardian.dev/v1alpha1
            kind: PublicHttpService
            status:
              url: https://{{ $spec.domain }}
              image: {{ $spec.image }}
    - step: mark-ready
      functionRef:
        name: function-auto-ready
