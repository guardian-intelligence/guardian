apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: ociregistries.platform.guardian.dev
spec:
  scope: Cluster
  group: platform.guardian.dev
  names:
    kind: OCIRegistry
    plural: ociregistries
  defaultCompositionRef:
    name: oci-registry-kubernetes
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                site:
                  type: string
                namespace:
                  type: string
                namespaceLabels:
                  type: object
                  additionalProperties:
                    type: string
                image:
                  type: string
                  description: Digest-pinned zot OCI image reference.
                domain:
                  type: string
                persistence:
                  type: object
                  properties:
                    claimName:
                      type: string
                    storageClassName:
                      type: string
                    size:
                      type: string
                    volumeName:
                      type: string
                    accessModes:
                      type: array
                      minItems: 1
                      items:
                        type: string
                  required:
                    - claimName
                    - storageClassName
                    - size
                    - volumeName
                    - accessModes
                publisherSecret:
                  type: object
                  properties:
                    name:
                      type: string
                    usernameKey:
                      type: string
                    passwordKey:
                      type: string
                    htpasswdKey:
                      type: string
                  required:
                    - name
                    - usernameKey
                    - passwordKey
                    - htpasswdKey
                secrets:
                  type: object
                  properties:
                    projection:
                      type: object
                      properties:
                        waitForSecrets:
                          type: boolean
                          default: true
                        openbao:
                          type: object
                          properties:
                            role:
                              type: string
                            serviceAccountName:
                              type: string
                          required:
                            - role
                            - serviceAccountName
                        remotePath:
                          type: string
                      required:
                        - openbao
                        - remotePath
                  required:
                    - projection
                gateway:
                  type: object
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    httpsSectionName:
                      type: string
                  required:
                    - name
                    - namespace
                    - httpsSectionName
                readiness:
                  type: object
                  properties:
                    waitForRollout:
                      type: boolean
                      default: true
              required:
                - site
                - namespace
                - image
                - domain
                - persistence
                - publisherSecret
                - secrets
                - gateway
            status:
              type: object
              properties:
                url:
                  type: string
---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: oci-registry-kubernetes
spec:
  compositeTypeRef:
    apiVersion: platform.guardian.dev/v1alpha1
    kind: OCIRegistry
  mode: Pipeline
  pipeline:
    - step: load-environment
      functionRef:
        name: function-environment-configs
      input:
        apiVersion: environmentconfigs.fn.crossplane.io/v1beta1
        kind: Input
        spec:
          environmentConfigs:
            - type: Selector
              selector:
                mode: Single
                matchLabels:
                  - key: guardian.dev/site
                    type: FromCompositeFieldPath
                    valueFromFieldPath: spec.site
    - step: render-oci-registry
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $xr := .observed.composite.resource -}}
            {{- $spec := $xr.spec -}}
            {{- $env := index .context "apiextensions.crossplane.io/environment" -}}
            {{- $gatewayEnabled := index $env "gateway" "enabled" -}}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: oci-registry-{{ $spec.namespace }}-namespace
              annotations:
                {{ setResourceNameAnnotation "namespace" }}
            spec:
              deletionPolicy: Orphan
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Namespace
                  metadata:
                    name: {{ $spec.namespace }}
                    {{- with $spec.namespaceLabels }}
                    labels:
                      {{- range $key, $value := . }}
                      {{ $key }}: {{ $value }}
                      {{- end }}
                    {{- end }}
            ---
            apiVersion: platform.guardian.dev/v1alpha1
            kind: SecretProjection
            metadata:
              name: {{ $xr.metadata.name }}-publisher-secrets
              annotations:
                {{ setResourceNameAnnotation "publisher-secret-projection" }}
            spec:
              waitForSecrets: {{ if eq (printf "%v" $spec.secrets.projection.waitForSecrets) "false" }}false{{ else }}true{{ end }}
              target:
                namespace: {{ $spec.namespace }}
                createNamespace: false
              openbao:
                role: {{ $spec.secrets.projection.openbao.role }}
                serviceAccountName: {{ $spec.secrets.projection.openbao.serviceAccountName }}
              secrets:
                - name: {{ $spec.publisherSecret.name }}
                  type: Opaque
                  remotePath: {{ $spec.secrets.projection.remotePath }}
                  data:
                    - secretKey: {{ $spec.publisherSecret.usernameKey }}
                      property: {{ $spec.publisherSecret.usernameKey }}
                    - secretKey: {{ $spec.publisherSecret.passwordKey }}
                      property: {{ $spec.publisherSecret.passwordKey }}
                    - secretKey: {{ $spec.publisherSecret.htpasswdKey }}
                      property: {{ $spec.publisherSecret.htpasswdKey }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: oci-registry-{{ $spec.namespace }}-config
              annotations:
                {{ setResourceNameAnnotation "config" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: oci-registry-{{ $spec.namespace }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: ConfigMap
                  metadata:
                    name: zot
                    namespace: {{ $spec.namespace }}
                  data:
                    config.json: |
                      {
                        "distSpecVersion": "1.1.1",
                        "storage": {
                          "rootDirectory": "/var/lib/zot"
                        },
                        "http": {
                          "address": "0.0.0.0",
                          "port": "5000",
                          "auth": {
                            "failDelay": 2,
                            "htpasswd": {
                              "path": "/zot-auth/htpasswd"
                            }
                          },
                          "accessControl": {
                            "repositories": {
                              "**": {
                                "anonymousPolicy": ["read"],
                                "policies": [
                                  {
                                    "users": ["guardian-release"],
                                    "actions": ["read", "create", "update", "delete"]
                                  }
                                ]
                              }
                            }
                          }
                        },
                        "log": {
                          "level": "info"
                        },
                        "extensions": {
                          "search": {
                            "enable": true
                          },
                          "ui": {
                            "enable": true
                          }
                        }
                      }
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: oci-registry-{{ $spec.namespace }}-pvc
              annotations:
                {{ setResourceNameAnnotation "pvc" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: oci-registry-{{ $spec.namespace }}-namespace
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: PersistentVolumeClaim
                  metadata:
                    name: {{ $spec.persistence.claimName }}
                    namespace: {{ $spec.namespace }}
                    labels:
                      guardian.dev/site: {{ $spec.site }}
                      app: zot
                  spec:
                    accessModes:
                      {{ range $mode := $spec.persistence.accessModes }}
                      - {{ $mode }}
                      {{ end }}
                    storageClassName: {{ $spec.persistence.storageClassName }}
                    volumeName: {{ $spec.persistence.volumeName }}
                    resources:
                      requests:
                        storage: {{ $spec.persistence.size }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: oci-registry-{{ $spec.namespace }}-deployment
              annotations:
                {{ setResourceNameAnnotation "deployment" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: oci-registry-{{ $spec.namespace }}-config
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: oci-registry-{{ $spec.namespace }}-pvc
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: zot
                    namespace: {{ $spec.namespace }}
                  spec:
                    replicas: 1
                    strategy:
                      type: Recreate
                    selector:
                      matchLabels:
                        app: zot
                    template:
                      metadata:
                        labels:
                          app: zot
                      spec:
                        securityContext:
                          seccompProfile:
                            type: RuntimeDefault
                        containers:
                          - name: zot
                            image: {{ $spec.image }}
                            command: ["/usr/local/bin/zot-linux-amd64"]
                            args: ["serve", "/zot-config/config.json"]
                            ports:
                              - name: http
                                containerPort: 5000
                            securityContext:
                              allowPrivilegeEscalation: false
                              capabilities:
                                drop:
                                  - ALL
                            resources:
                              requests:
                                cpu: 100m
                                memory: 128Mi
                              limits:
                                memory: 512Mi
                            readinessProbe:
                              httpGet:
                                path: /v2/
                                port: http
                              initialDelaySeconds: 2
                              periodSeconds: 5
                            livenessProbe:
                              httpGet:
                                path: /v2/
                                port: http
                              initialDelaySeconds: 10
                              periodSeconds: 10
                            volumeMounts:
                              - name: config
                                mountPath: /zot-config
                                readOnly: true
                              - name: auth
                                mountPath: /zot-auth
                                readOnly: true
                              - name: storage
                                mountPath: /var/lib/zot
                        volumes:
                          - name: config
                            configMap:
                              name: zot
                              items:
                                - key: config.json
                                  path: config.json
                          - name: auth
                            secret:
                              secretName: {{ $spec.publisherSecret.name }}
                              items:
                                - key: {{ $spec.publisherSecret.htpasswdKey }}
                                  path: htpasswd
                          - name: storage
                            persistentVolumeClaim:
                              claimName: {{ $spec.persistence.claimName }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: oci-registry-{{ $spec.namespace }}-service
              annotations:
                {{ setResourceNameAnnotation "service" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: oci-registry-{{ $spec.namespace }}-deployment
              providerConfigRef:
                name: platform
              forProvider:
                manifest:
                  apiVersion: v1
                  kind: Service
                  metadata:
                    name: zot
                    namespace: {{ $spec.namespace }}
                  spec:
                    selector:
                      app: zot
                    ports:
                      - name: http
                        port: 5000
                        targetPort: http
            {{- if and $gatewayEnabled $spec.domain }}
            ---
            apiVersion: kubernetes.crossplane.io/v1alpha2
            kind: Object
            metadata:
              name: oci-registry-{{ $spec.namespace }}-route
              annotations:
                {{ setResourceNameAnnotation "route" }}
            spec:
              references:
                - dependsOn:
                    apiVersion: kubernetes.crossplane.io/v1alpha2
                    kind: Object
                    name: oci-registry-{{ $spec.namespace }}-service
              providerConfigRef:
                name: platform
              watch: true
              forProvider:
                manifest:
                  apiVersion: gateway.networking.k8s.io/v1
                  kind: HTTPRoute
                  metadata:
                    name: zot
                    namespace: {{ $spec.namespace }}
                  spec:
                    parentRefs:
                      - name: {{ $spec.gateway.name }}
                        namespace: {{ $spec.gateway.namespace }}
                        sectionName: {{ $spec.gateway.httpsSectionName }}
                    hostnames:
                      - "{{ $spec.domain }}"
                    rules:
                      - backendRefs:
                          - name: zot
                            port: 5000
            {{- end }}
            ---
            apiVersion: platform.guardian.dev/v1alpha1
            kind: OCIRegistry
            status:
              url: https://{{ $spec.domain }}
    - step: mark-ready
      functionRef:
        name: function-auto-ready
