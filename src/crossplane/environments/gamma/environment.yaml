apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: guardian-gamma
  labels:
    guardian.dev/site: gamma
data:
  site:
    name: gamma
    clusterName: guardian-gamma
    nodeHostname: gd-gamma-w0
  alerts:
    ntfyTopic: "aisucks-ops-1ebda4d035e83ac0"
  gateway:
    enabled: true
  products:
    aisucks:
      domain: gamma.aisucks.app
      watch:
        - https://aisucks.app/healthz
        - https://dev.aisucks.app/healthz
      watchPages:
        - https://aisucks.app/
        - https://dev.aisucks.app/
      podNetwork: true
    company:
      domain: gamma.guardianintelligence.org
  platform:
    oci: {}
    clickhouse:
      enabled: true
    status:
      domains:
        - status.gamma.guardianintelligence.org
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SecretProjection
metadata:
  name: observability-admin-secrets
spec:
  target:
    namespace: observability
    namespaceLabels:
      pod-security.kubernetes.io/enforce: privileged
  openbao:
    role: observability-secrets
    serviceAccountName: external-secrets-observability
  secrets:
    - name: clickhouse-admin
      type: Opaque
      remotePath: guardian/guardian-gamma/observability/clickhouse-admin
      data:
        - secretKey: password
          property: password
    - name: grafana-admin
      type: Opaque
      remotePath: guardian/guardian-gamma/observability/grafana-admin
      data:
        - secretKey: password
          property: password
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SecretProjection
metadata:
  name: directus-secrets
spec:
  target:
    namespace: directus
    namespaceLabels:
      pod-security.kubernetes.io/enforce: privileged
  openbao:
    role: directus-secrets
    serviceAccountName: external-secrets-directus
  secrets:
    - name: directus-runtime
      type: Opaque
      remotePath: guardian/guardian-gamma/directus/runtime
      data:
        - secretKey: secret
          property: secret
    - name: directus-admin
      type: Opaque
      remotePath: guardian/guardian-gamma/directus/admin
      data:
        - secretKey: password
          property: password
    - name: directus-postgres
      type: Opaque
      remotePath: guardian/guardian-gamma/directus/postgres
      data:
        - secretKey: password
          property: password
---
apiVersion: platform.guardian.dev/v1alpha1
kind: EdgeGateway
metadata:
  name: edge
spec:
  gatewayClass:
    name: cilium
    controllerName: io.cilium/gateway-controller
  gateway:
    namespace: gateway
    name: edge
  listeners:
    - name: tls-aisucks
      hostname: "gamma.aisucks.app"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
    - name: tls-company-site
      hostname: "gamma.guardianintelligence.org"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
    - name: tls-status-0
      hostname: "status.gamma.guardianintelligence.org"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
    - name: http
      port: 80
      protocol: HTTP
---
apiVersion: products.guardian.dev/v1alpha1
kind: AisucksProduct
metadata:
  name: aisucks
spec:
  site: gamma
  domain: gamma.aisucks.app
  image: '{{ index .Images "aisucks" }}'
  podNetwork: true
  replicas: 2
---
apiVersion: products.guardian.dev/v1alpha1
kind: CompanySite
metadata:
  name: company-site
spec:
  site: gamma
  domain: gamma.guardianintelligence.org
  image: '{{ index .Images "company-site" }}'
  directusRef:
    name: directus
  contentSnapshot:
    digest: workspace
  routes:
    - /
    - /letters
    - /news
  replicas: 2
---
apiVersion: platform.guardian.dev/v1alpha1
kind: DirectusInstance
metadata:
  name: directus
spec:
  site: gamma
  namespace: directus
  image: '{{ index .Images "directus" }}'
  postgresImage: '{{ index .Images "postgres" }}'
  publicAdminRoute: false
  secrets:
    runtimeSecretName: directus-runtime
    runtimeSecretKey: secret
    adminSecretName: directus-admin
    adminPasswordKey: password
    databaseSecretName: directus-postgres
    databasePasswordKey: password
  admin:
    email: im.shovonhasan@gmail.com
  database:
    name: directus
    user: directus
    storagePath: /var/lib/guardian/directus/postgres
  uploadsPath: /var/lib/guardian/directus/uploads
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  gateway:
    name: edge
    namespace: gateway
    httpSectionName: http
