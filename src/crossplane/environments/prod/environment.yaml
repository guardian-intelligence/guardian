apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: guardian-prod
  labels:
    guardian.dev/site: prod
data:
  site:
    name: prod
    clusterName: guardian-prod
    nodeHostname: gd-prod-w0
  alerts:
    ntfyTopic: "aisucks-ops-1ebda4d035e83ac0"
  gateway:
    enabled: true
  products:
    aisucks:
      domain: aisucks.app
      watch:
        - https://dev.aisucks.app/healthz
        - https://gamma.aisucks.app/healthz
      watchPages:
        - https://dev.aisucks.app/
        - https://gamma.aisucks.app/
      podNetwork: true
    company:
      domain: guardianintelligence.org
  platform:
    oci: {}
    clickhouse:
      enabled: false
    status: {}
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SecretProjection
metadata:
  name: observability-admin-secrets
spec:
  target:
    namespace: observability
    namespaceLabels:
      pod-security.kubernetes.io/enforce: privileged
  openbao:
    role: observability-secrets
    serviceAccountName: external-secrets-observability
  secrets:
    - name: clickhouse-admin
      type: Opaque
      remotePath: guardian/guardian-prod/observability/clickhouse-admin
      data:
        - secretKey: password
          property: password
    - name: grafana-admin
      type: Opaque
      remotePath: guardian/guardian-prod/observability/grafana-admin
      data:
        - secretKey: password
          property: password
---
apiVersion: platform.guardian.dev/v1alpha1
kind: EdgeGateway
metadata:
  name: edge
spec:
  gatewayClass:
    name: cilium
    controllerName: io.cilium/gateway-controller
  gateway:
    namespace: gateway
    name: edge
  listeners:
    - name: tls-aisucks
      hostname: "aisucks.app"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
    - name: tls-company-site
      hostname: "guardianintelligence.org"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
    - name: http
      port: 80
      protocol: HTTP
