apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: guardian-dev
  labels:
    guardian.dev/site: dev
data:
  site:
    name: dev
    clusterName: guardian-dev
    nodeHostname: vs-dev-w0
  alerts:
    ntfyTopic: "aisucks-ops-1ebda4d035e83ac0"
  gateway:
    enabled: true
  products:
    aisucks:
      domain: dev.aisucks.app
    company:
      domain: dev.guardianintelligence.org
  platform:
    oci:
      domain: oci.guardianintelligence.org
    clickhouse:
      enabled: true
    status:
      domains:
        - status.guardianintelligence.org
        - status.dev.guardianintelligence.org
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SLOProfile
metadata:
  name: public-http
spec:
  site: dev
  surface: public-http
  window: 15m
  apps:
    - name: aisucks
      namespace: aisucks
      deployment: aisucks
      metric: aisucks_http_requests_total
    - name: company-site
      namespace: company
      deployment: company-site
      metric: company_site_http_requests_total
  signals:
    publicScrape: true
    errorRate: true
    restartDelta: true
    pageAlerts: true
    synthetic: true
    directHTTP: true
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SyntheticCheck
metadata:
  name: public-http-cross-site
spec:
  site: dev
  surface: public-http
  targets:
    - name: prod-aisucks-healthz
      product: aisucks
      kind: health
      url: https://aisucks.app/healthz
      expectedStatus: 200
      gate: true
    - name: gamma-aisucks-healthz
      product: aisucks
      kind: health
      url: https://gamma.aisucks.app/healthz
      expectedStatus: 200
      gate: true
    - name: prod-aisucks-page
      product: aisucks
      kind: page
      url: https://aisucks.app/
      expectedStatus: 200
      bodyContains: never be sold
      gate: true
    - name: gamma-aisucks-page
      product: aisucks
      kind: page
      url: https://gamma.aisucks.app/
      expectedStatus: 200
      bodyContains: never be sold
      gate: true
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SecretProjection
metadata:
  name: observability-admin-secrets
spec:
  target:
    namespace: observability
    namespaceLabels:
      pod-security.kubernetes.io/enforce: privileged
  openbao:
    role: observability-secrets
    serviceAccountName: external-secrets-observability
  secrets:
    - name: clickhouse-admin
      type: Opaque
      remotePath: guardian/guardian-dev/observability/clickhouse-admin
      data:
        - secretKey: password
          property: password
    - name: grafana-admin
      type: Opaque
      remotePath: guardian/guardian-dev/observability/grafana-admin
      data:
        - secretKey: password
          property: password
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SecretProjection
metadata:
  name: zot-publisher-secrets
spec:
  target:
    namespace: guardian-oci
    namespaceLabels:
      pod-security.kubernetes.io/enforce: privileged
  openbao:
    role: guardian-oci-secrets
    serviceAccountName: external-secrets-guardian-oci
  secrets:
    - name: zot-publisher
      type: Opaque
      remotePath: guardian/guardian-dev/oci/zot-publisher
      data:
        - secretKey: username
          property: username
        - secretKey: password
          property: password
        - secretKey: htpasswd
          property: htpasswd
---
apiVersion: platform.guardian.dev/v1alpha1
kind: EdgeGateway
metadata:
  name: edge
spec:
  gatewayClass:
    name: cilium
    controllerName: io.cilium/gateway-controller
  gateway:
    namespace: gateway
    name: edge
  listeners:
    - name: https-aisucks
      hostname: "dev.aisucks.app"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefName: aisucks-tls
    - name: https-company-site
      hostname: "dev.guardianintelligence.org"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefName: company-site-tls
    - name: tls-status-0
      hostname: "status.guardianintelligence.org"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
    - name: tls-status-1
      hostname: "status.dev.guardianintelligence.org"
      port: 443
      protocol: TLS
      tls:
        mode: Passthrough
    - name: https-oci
      hostname: "oci.guardianintelligence.org"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefName: oci-guardianintelligence-org-tls
    - name: http
      port: 80
      protocol: HTTP
  acme:
    email: im.shovonhasan@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretName: letsencrypt-production-account-key
    dns01CloudflareSecretName: cloudflare-guardianintelligence-org-dns-token
    dns01CloudflareSecretKey: api-token
    dnsZones:
      - guardianintelligence.org
  certificates:
    - name: aisucks-tls
      namespace: gateway
      secretName: aisucks-tls
      dnsNames:
        - "dev.aisucks.app"
      issuerRefName: letsencrypt-production
    - name: oci-guardianintelligence-org-tls
      namespace: gateway
      secretName: oci-guardianintelligence-org-tls
      dnsNames:
        - "oci.guardianintelligence.org"
      issuerRefName: letsencrypt-production
    - name: company-site-tls
      namespace: gateway
      secretName: company-site-tls
      dnsNames:
        - "dev.guardianintelligence.org"
      issuerRefName: letsencrypt-production
---
apiVersion: platform.guardian.dev/v1alpha1
kind: OCIRegistry
metadata:
  name: zot
spec:
  site: dev
  namespace: guardian-oci
  image: '{{ index .Images "zot" }}'
  domain: oci.guardianintelligence.org
  storagePath: /var/lib/guardian/zot
  publisherSecret:
    name: zot-publisher
    htpasswdKey: htpasswd
  gateway:
    name: edge
    namespace: gateway
    httpsSectionName: https-oci
  readiness:
    waitForRollout: true
---
apiVersion: products.guardian.dev/v1alpha1
kind: AisucksProduct
metadata:
  name: aisucks
spec:
  site: dev
  domain: dev.aisucks.app
  image: '{{ index .Images "aisucks" }}'
  replicas: 2
---
apiVersion: products.guardian.dev/v1alpha1
kind: CompanySite
metadata:
  name: company-site
spec:
  site: dev
  domain: dev.guardianintelligence.org
  image: '{{ index .Images "company-site" }}'
  directusRef:
    name: directus
  contentSnapshot:
    digest: workspace
  routes:
    - /
    - /letters
    - /news
  replicas: 2
---
apiVersion: platform.guardian.dev/v1alpha1
kind: DirectusInstance
metadata:
  name: directus
spec:
  site: dev
  namespace: directus
  namespaceLabels:
    pod-security.kubernetes.io/enforce: privileged
  image: '{{ index .Images "directus" }}'
  postgresImage: '{{ index .Images "postgres" }}'
  publicAdminRoute: false
  readiness:
    waitForRollout: false
  secrets:
    projection:
      waitForSecrets: false
      openbao:
        role: directus-secrets
        serviceAccountName: external-secrets-directus
      remotePaths:
        runtime: guardian/guardian-dev/directus/runtime
        admin: guardian/guardian-dev/directus/admin
        database: guardian/guardian-dev/directus/postgres
    runtimeSecretName: directus-runtime
    runtimeSecretKey: secret
    adminSecretName: directus-admin
    adminPasswordKey: password
    databaseSecretName: directus-postgres
    databasePasswordKey: password
  admin:
    email: im.shovonhasan@gmail.com
  database:
    name: directus
    user: directus
    storagePath: /var/lib/guardian/directus/postgres
  uploadsPath: /var/lib/guardian/directus/uploads
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  gateway:
    name: edge
    namespace: gateway
    httpSectionName: http
