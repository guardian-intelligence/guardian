# Helm values for the generated Cilium Talos inline manifest
# (talos/cilium-inline.yaml). This file is the input of record; the chart
# tarball and SHA live in MODULE.bazel, and Bazel renders the Talos patch.
#
# Cilium replaces Flannel (CNI) and kube-proxy (eBPF service handling) on
# every site; the sites' cni-none.yaml patch disables both, and the
# cilium-inline.yaml patch bakes the render into the machine config as a
# Talos inline bootstrap manifest — Talos applies the CNI itself, exactly
# as it applied flannel; guardian knows nothing about it.
#
# UPGRADES ARE WIPE DRILLS: Talos applies inline manifests at bootstrap
# only — it never updates or deletes existing objects on a config change,
# so regenerating + plain re-converge is a silent no-op. A Cilium version
# bump ships as `guardian down --yes && guardian up` per site (dev gates,
# as ever), and objects dropped from a re-render must be pruned by hand.
#
# It is SUBSTRATE,
# not a workspace component: it cannot ride the seed registry (the registry
# pod needs a pod IP and a working ClusterIP route — both require the CNI),
# so images are digest-pinned upstream quay.io refs, the same layer
# flannel/coredns/kubelet already live at.

# API server via Talos KubePrism (localhost load balancer, enabled by
# default). With kube-proxy gone there is no kubernetes.default route until
# Cilium itself programs one — pointing at 10.96.0.1 would deadlock.
k8sServiceHost: localhost
k8sServicePort: 7445

# Full kube-proxy replacement. Socket-LB is load-bearing twice over:
# containerd resolves the registry mirror's ClusterIP from the host netns
# through it, and the hostNetwork aisucks pod reaches postgres/coredns
# ClusterIPs through it. KPR mode implies socket-LB, but the chart still
# renders bpf-lb-sock from socketLB.enabled — pin it true so the config
# states what the cluster depends on. Never set hostNamespaceOnly.
kubeProxyReplacement: true
socketLB:
  enabled: true

# Per-node PodCIDR from Kubernetes (10.244.0.0/16 lives in the machine
# config). The chart's cluster-pool default would carve from 10.0.0.0/8 and
# collide with the service CIDR (the seed registry's fixed ClusterIP).
ipam:
  mode: kubernetes

# Talos-required capability lists (Talos "Deploying Cilium" guide, v1.13).
# SYS_MODULE is deliberately absent: Talos forbids workloads loading kernel
# modules, and everything Cilium needs is built into the Talos kernel.
# Re-check these lists against the Talos guide on every Cilium upgrade.
securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

# Talos mounts cgroup2 at /sys/fs/cgroup itself; the chart's auto-mount
# attempt fails against the immutable host.
cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

# Single-node sites: the default 2 replicas + anti-affinity leaves one
# operator Pending forever and wedges upgrades.
operator:
  replicas: 1

# Hubble: metrics with namespace+workload context only (pod-level labels
# explode cardinality), OpenMetrics for the future OTel Collector scrape.
# Flow export to disk stays OFF pending the charter amendment on client-IP
# retention (flows carry visitor IPs; docs/aisucks/charter.md value 2).
hubble:
  enabled: true
  metrics:
    enableOpenMetrics: true
    enabled:
      - drop:labelsContext=source_namespace,source_workload,destination_namespace,destination_workload,traffic_direction
      - dns:labelsContext=source_namespace,source_workload,destination_namespace,destination_workload
      - tcp:labelsContext=source_namespace,source_workload,destination_namespace,destination_workload,traffic_direction
      - flow:labelsContext=source_namespace,source_workload,destination_namespace,destination_workload,traffic_direction
      - port-distribution:labelsContext=source_namespace,source_workload,destination_namespace,destination_workload
  relay:
    enabled: true
  ui:
    enabled: true
  # In-cluster certgen (CronJob) instead of the chart default that bakes
  # helm-generated TLS material into the render: the default put the hubble
  # CA *private key* into git (charter: code goes public) and one-year leaf
  # certs into a static manifest that Talos installs verbatim forever —
  # every wipe-converge after the expiry would deploy dead certs. cronJob
  # mints and renews them in-cluster; nothing secret is vendored.
  tls:
    auto:
      enabled: true
      method: cronJob

# Gateway API on the node Envoy (cilium-envoy DaemonSet), hostNetwork mode:
# listeners are plain host sockets on whatever port each Gateway's
# spec.listeners declares — no LoadBalancer Service, no NodePort path (the
# chart auto-disables the Service mode). The CRDs the operator watches ship
# as their own inline manifest (talos/gateway-api-crds-inline.yaml), listed
# before this render in every environment bundle. The chart/source pins and SHAs live
# in MODULE.bazel, and Bazel generates both inline manifests. Enabling this
# only arms the operator: nothing binds a port until a Gateway object exists
# (a later phase), so the app keeps host :80/:443 today.
#
# Cilium supplies the Gateway controller and Envoy only. The platform
# EdgeGateway Crossplane substrate owns GatewayClass/Gateway objects.
gatewayAPI:
  enabled: true
  gatewayClass:
    create: "false"
  hostNetwork:
    enabled: true

# Envoy stays the standalone DaemonSet (chart default since 1.16). For
# Gateway listeners on ports <1024 the starter wrapper must pass
# NET_BIND_SERVICE through to the forked Envoy: the cap goes on the
# container AND keepCapNetBindService=true (the wrapper drops every other
# cap). Setting the list REPLACES the chart default [NET_ADMIN, SYS_ADMIN]
# — keep those. Re-check against the chart values on every Cilium upgrade,
# as with the agent lists above.
envoy:
  enabled: true
  securityContext:
    capabilities:
      envoy:
        - NET_ADMIN
        - SYS_ADMIN
        - NET_BIND_SERVICE
      keepCapNetBindService: true

# Deliberately defaulted (do not "fix"):
# - bpf.masquerade=false — eBPF masquerade + Talos forwardKubeDNSToHost is a
#   documented CoreDNS breakage; iptables masquerade until that changes.
# - Gateway API CRDs-before-render (was: Gateway API off pending exactly
#   this): resolved by vendoring the CRDs as a separate inline manifest
#   ordered ahead of this render — see the gatewayAPI block above.
# - MTU auto-detected (standard 1500 underlay).
