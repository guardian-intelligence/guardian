# Map the virtual registry name every workload manifest references to the
# in-cluster seed registry. Manifests never name a real registry, so the
# transport can change (node-local -> in-cluster -> hosted) without touching
# workloads. The endpoint is the seed-registry Service's fixed ClusterIP;
# containerd resolves ClusterIPs from the host netns via Cilium's socket-LB
# (kube-proxy replacement) — which makes bpf-lb-sock load-bearing for every
# image pull on this site.
machine:
  registries:
    mirrors:
      registry.guardian.internal:
        endpoints:
          - http://10.96.0.100:5000
