# Gamma host facts consumed before Kubernetes exists. Paths are repo-root
# relative; run guardian from the repo root. Box: Latitude sv_nPRbajqEB5koM
# (f4.metal.small, Ashburn), provisioned 2026-06-11.
host: ash-bm-002
environment: gamma

provider:
  name: latitude
  serverId: sv_nPRbajqEB5koM
  metro: ash
  plan: f4.metal.small

cluster:
  name: guardian-gamma
  endpoint: https://45.250.254.119:6443

node:
  address: 45.250.254.119
  hostname: gi-ash-gamma-platform-01
  # Latitude assigns the address statically (no DHCP): /31 point-to-point
  # with the gateway on the paired address.
  prefixLength: 31
  gateway: 45.250.254.118
  # Physical facts derived from the maintenance node on 2026-06-11.
  interfaceMac: "7c:c2:55:6e:92:1b"
  installDiskSerial: "352410A4E051" # nvme0n1, Talos system disk
  zfsDiskSerial: "352410A4E0A6" # nvme1n1, reserved for the ZFS pool

storage:
  pools:
    - name: guardian
      type: zfs
      role: product-workloads
      deviceSerials:
        - "352410A4E0A6"
      wipePolicy: never
      mountpoint: /var/mnt/guardian

talos:
  schematic: src/hosts/ash-bm-002/talos/schematic.yaml
  patches:
    - src/hosts/ash-bm-002/talos/patches/single-node.yaml
    - src/hosts/ash-bm-002/talos/patches/registry-mirror.yaml
    - src/hosts/ash-bm-002/talos/patches/zfs-module.yaml
    - src/hosts/ash-bm-002/talos/patches/cni-none.yaml
    # Gateway API CRDs MUST stay listed above cilium: list order is
    # inlineManifests order, and the CRDs have to exist before the Cilium
    # render that watches them.
    - src/infrastructure-components/cilium/talos/gateway-api-crds-inline.yaml
    # Shared generated render, deliberately not copied per host: one Cilium
    # version across the fleet, one Bazel target to update on upgrade.
    - src/infrastructure-components/cilium/talos/cilium-inline.yaml
    - src/hosts/ash-bm-002/talos/patches/ingress-firewall.yaml
