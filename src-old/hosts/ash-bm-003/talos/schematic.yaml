# Talos Image Factory schematic for ash-bm-003 (Latitude sv_BDXM5E4QLNrpk).
# Content-addressed: identical contents always resolve to the same schematic
# ID, so registration is idempotent.
#
# No DHCP at the host: static addressing is baked into the boot assets, or a
# disk/PXE-booted maintenance node comes up unreachable. The same facts live
# in host.yaml for the machine config. Gateway is the /31 pair address.
customization:
  extraKernelArgs:
    # external is X550 function 0 on THIS box — flipped from dev/gamma.
    # Evidence: installed boot bound to f1 went network-dark (2026-06-11),
    # while maintenance showed the public /31 alive on f0.
    - ip=67.213.115.113::67.213.115.112:255.255.255.254::enp1s0f0:off
    # Mirror the kernel console to the BMC SOL port; see the dev schematic
    # for the 2026-06-10 boot-wedge rationale.
    - console=ttyS1,115200n8
  systemExtensions:
    officialExtensions:
      - siderolabs/zfs
