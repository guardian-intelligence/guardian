apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: guardian-prod
  labels:
    guardian.dev/site: prod
data:
  site:
    name: prod
    clusterName: guardian-prod
    nodeHostname: gi-ash-bm-003
  alerts:
    ntfyTopic: "aisucks-ops-1ebda4d035e83ac0"
  gateway:
    enabled: true
  products:
    aisucks:
      domain: aisucks.app
  platform:
    oci:
      domain: oci.guardianintelligence.org
---
apiVersion: platform.guardian.dev/v1alpha1
kind: StoragePlane
metadata:
  name: local-zfs
spec:
  site: prod
  nodeName: gi-ash-bm-003
  storageClassName: guardian-local-retain
  reclaimPolicy: Retain
  volumeBindingMode: WaitForFirstConsumer
  volumes:
    - name: victoria-metrics
      persistentVolumeName: guardian-prod-victoria-metrics
      namespace: observability
      claimName: victoria-metrics-storage
      capacity: 20Gi
      localPath: /var/mnt/guardian/victoria-metrics
    - name: directus-postgres
      persistentVolumeName: guardian-prod-directus-postgres
      namespace: directus
      claimName: directus-postgres-data
      capacity: 20Gi
      localPath: /var/mnt/guardian/directus/postgres
    - name: directus-uploads
      persistentVolumeName: guardian-prod-directus-uploads
      namespace: directus
      claimName: directus-uploads
      capacity: 10Gi
      localPath: /var/mnt/guardian/directus/uploads
    - name: zot
      persistentVolumeName: guardian-prod-zot
      namespace: guardian-oci
      claimName: zot-storage
      capacity: 50Gi
      localPath: /var/mnt/guardian/zot
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SLOProfile
metadata:
  name: public-http
spec:
  site: prod
  surface: public-http
  window: 15m
  apps:
    - name: aisucks
      namespace: aisucks
      deployment: aisucks
      metric: aisucks_http_requests_total
  signals:
    publicScrape: true
    errorRate: true
    restartDelta: true
    pageAlerts: true
    synthetic: true
    directHTTP: true
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SyntheticCheck
metadata:
  name: public-http-cross-site
spec:
  site: prod
  surface: public-http
  targets:
    - name: dev-aisucks-healthz
      product: aisucks
      kind: health
      url: https://dev.aisucks.app/healthz
      expectedStatus: 200
      gate: true
    - name: gamma-aisucks-healthz
      product: aisucks
      kind: health
      url: https://gamma.aisucks.app/healthz
      expectedStatus: 200
      gate: true
    - name: dev-aisucks-page
      product: aisucks
      kind: page
      url: https://dev.aisucks.app/
      expectedStatus: 200
      bodyContains: never be sold
      gate: true
    - name: gamma-aisucks-page
      product: aisucks
      kind: page
      url: https://gamma.aisucks.app/
      expectedStatus: 200
      bodyContains: never be sold
      gate: true
---
apiVersion: platform.guardian.dev/v1alpha1
kind: ObservabilityStack
metadata:
  name: observability
spec:
  site: prod
  namespace: observability
  namespaceLabels:
    pod-security.kubernetes.io/enforce: privileged
  victoriaMetrics:
    image: registry.guardian.internal/victoria-metrics:bootstrap
    persistence:
      claimName: victoria-metrics-storage
      storageClassName: guardian-local-retain
      size: 20Gi
      volumeName: guardian-prod-victoria-metrics
      accessModes:
        - ReadWriteOnce
    retentionPeriod: "13"
    memoryAllowedBytes: 256MiB
    ports:
      http: 8428
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
  clickhouse:
    enabled: false
---
apiVersion: platform.guardian.dev/v1alpha1
kind: StatusSurface
metadata:
  name: status
spec:
  site: prod
  namespace: status
  image: registry.guardian.internal/status:bootstrap
  domains: []
  monitor: false
  replicas: 0
  acmeEmail: im.shovonhasan@gmail.com
  certDir: /var/lib/status-certs
  victoriaMetricsURL: http://victoria-metrics.observability.svc:8428
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
      goMemory: 410MiB
  gateway:
    name: edge
    namespace: gateway
    tlsRouteAPIVersion: gateway.networking.k8s.io/v1alpha2
    tlsSectionNamePrefix: tls-status
  readiness:
    waitForRollout: false
---
apiVersion: platform.guardian.dev/v1alpha1
kind: SecretProjection
metadata:
  name: observability-admin-secrets
spec:
  target:
    namespace: observability
    createNamespace: false
  openbao:
    role: observability-secrets
    serviceAccountName: external-secrets-observability
  secrets:
    - name: clickhouse-admin
      type: Opaque
      remotePath: guardian/guardian-prod/observability/clickhouse-admin
      data:
        - secretKey: password
          property: password
    - name: grafana-admin
      type: Opaque
      remotePath: guardian/guardian-prod/observability/grafana-admin
      data:
        - secretKey: password
          property: password
---
apiVersion: platform.guardian.dev/v1alpha1
kind: EdgeGateway
metadata:
  name: edge
spec:
  gatewayClass:
    name: cilium
    controllerName: io.cilium/gateway-controller
  gateway:
    namespace: gateway
    name: edge
  listeners:
    - name: https-aisucks
      hostname: "aisucks.app"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefName: aisucks-tls
    - name: https-oci
      hostname: "oci.guardianintelligence.org"
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefName: oci-guardianintelligence-org-tls
    - name: http
      port: 80
      protocol: HTTP
  acme:
    email: im.shovonhasan@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretName: letsencrypt-production-account-key
    dns01CloudflareSecretName: cloudflare-guardianintelligence-org-dns-token
    dns01CloudflareSecretKey: api-token
    dnsZones:
      - guardianintelligence.org
  certificates:
    - name: aisucks-tls
      namespace: gateway
      secretName: aisucks-tls
      dnsNames:
        - "aisucks.app"
      issuerRefName: letsencrypt-production
    - name: oci-guardianintelligence-org-tls
      namespace: gateway
      secretName: oci-guardianintelligence-org-tls
      dnsNames:
        - "oci.guardianintelligence.org"
      issuerRefName: letsencrypt-production
---
apiVersion: platform.guardian.dev/v1alpha1
kind: OCIRegistry
metadata:
  name: zot
spec:
  site: prod
  namespace: guardian-oci
  namespaceLabels:
    pod-security.kubernetes.io/enforce: privileged
  image: registry.guardian.internal/zot:bootstrap
  domain: oci.guardianintelligence.org
  persistence:
    claimName: zot-storage
    storageClassName: guardian-local-retain
    size: 50Gi
    volumeName: guardian-prod-zot
    accessModes:
      - ReadWriteOnce
  publisherSecret:
    name: zot-publisher
    usernameKey: username
    passwordKey: password
    htpasswdKey: htpasswd
  secrets:
    projection:
      waitForSecrets: true
      openbao:
        role: guardian-oci-secrets
        serviceAccountName: external-secrets-guardian-oci
      remotePath: guardian/guardian-prod/oci/zot-publisher
  gateway:
    name: edge
    namespace: gateway
    httpsSectionName: https-oci
  readiness:
    waitForRollout: true
---
apiVersion: products.guardian.dev/v1alpha1
kind: AisucksProduct
metadata:
  name: aisucks
spec:
  site: prod
  domain: aisucks.app
  image: registry.guardian.internal/aisucks:bootstrap
  replicas: 2
---
apiVersion: platform.guardian.dev/v1alpha1
kind: DirectusInstance
metadata:
  name: directus
spec:
  site: prod
  namespace: directus
  namespaceLabels:
    pod-security.kubernetes.io/enforce: privileged
  image: registry.guardian.internal/directus:bootstrap
  postgresImage: registry.guardian.internal/postgres:bootstrap
  publicAdminRoute: false
  runtime:
    suspend: true
  readiness:
    waitForRollout: false
  secrets:
    projection:
      waitForSecrets: false
      openbao:
        role: directus-secrets
        serviceAccountName: external-secrets-directus
      remotePaths:
        runtime: guardian/guardian-prod/directus/runtime
        admin: guardian/guardian-prod/directus/admin
        database: guardian/guardian-prod/directus/postgres
    runtimeSecretName: directus-runtime
    runtimeSecretKey: secret
    adminSecretName: directus-admin
    adminPasswordKey: password
    databaseSecretName: directus-postgres
    databasePasswordKey: password
  admin:
    email: im.shovonhasan@gmail.com
  database:
    name: directus
    user: directus
    persistence:
      claimName: directus-postgres-data
      storageClassName: guardian-local-retain
      size: 20Gi
      volumeName: guardian-prod-directus-postgres
      accessModes:
        - ReadWriteOnce
  uploads:
    persistence:
      claimName: directus-uploads
      storageClassName: guardian-local-retain
      size: 10Gi
      volumeName: guardian-prod-directus-uploads
      accessModes:
        - ReadWriteOnce
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      memory: 1Gi
  gateway:
    name: edge
    namespace: gateway
    httpSectionName: http
