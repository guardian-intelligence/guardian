# The analytics-gate: PR check + main-push publisher for the analytics
# ingest service, mirroring the site-gate's trust model (see
# company-site-image.yml and docs/supply-chain-design.md). This file's path
# is the cosign trust anchor for ghcr.io/guardian-intelligence/analytics-ingest
# â€” a separate workflow, never a shared one, because certificate identities
# are per-workflow-file. It also runs the proto contract tests (buf lint +
# breaking) whenever src/proto changes: the wire contract gates here.
name: analytics-ingest-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # The deployment pin file is deliberately NOT a build trigger: pin-only
    # promotion merges change no build input (see site-gate rationale).
    paths:
      - "src/products/analytics/**"
      - "src/proto/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/analytics-ingest-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: analytics-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analytics-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Classify the diff
        id: classify
        run: |
          pin_file=src/infrastructure/deployments/analytics/system/ingest.yaml
          pin_re='ghcr.io/guardian-intelligence/analytics-ingest@sha256:[a-f0-9]\{64\}'
          build=false proto=false pin=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/$GITHUB_BASE_REF"
            while IFS= read -r f; do
              case "$f" in
                src/products/analytics/*|go.mod|go.sum|.github/workflows/analytics-ingest-image.yml|MODULE.bazel|MODULE.bazel.lock|.bazelrc|.bazelversion)
                  build=true ;;
              esac
              case "$f" in
                src/proto/*) proto=true build=true ;;
              esac
            done < <(git diff --name-only "$base"...HEAD)
            pinned="$(grep -o "$pin_re" "$pin_file" 2>/dev/null | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$pin_file" 2>/dev/null | grep -o "$pin_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then pin=true; fi
          else
            build=true proto=true
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "proto=$proto" >> "$GITHUB_OUTPUT"
          echo "pin=$pin" >> "$GITHUB_OUTPUT"
          echo "classified: build=$build proto=$proto pin=$pin"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: steps.classify.outputs.pin == 'true' || github.event_name == 'push'

      # Promotion gate: a PR may move the ingest pin only to a digest signed
      # by THIS workflow's canonical identity.
      - name: Verify the changed pin is canonically signed
        if: steps.classify.outputs.pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/analytics-ingest-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/analytics-ingest@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/analytics/system/ingest.yaml | cut -d@ -f2)"
          echo "verifying provenance of $pinned"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/analytics-ingest@$pinned" > /dev/null

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0
        if: steps.classify.outputs.build == 'true' || steps.classify.outputs.proto == 'true'

      - name: Proto contract tests (buf lint + breaking)
        if: steps.classify.outputs.proto == 'true'
        run: bazelisk test //src/proto/...

      - name: Service tests
        if: steps.classify.outputs.build == 'true'
        run: bazelisk test //src/products/analytics/...

      - name: Build image
        if: steps.classify.outputs.build == 'true'
        run: bazelisk build //src/products/analytics/ingest:image

      - name: Compute built digest
        if: steps.classify.outputs.build == 'true'
        id: digest
        run: |
          built="$(jq -r '.manifests[0].digest' bazel-bin/src/products/analytics/ingest/image/index.json)"
          echo "built: $built"
          echo "digest=$built" >> "$GITHUB_OUTPUT"

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.classify.outputs.build == 'true'
        id: syft

      - name: Generate SBOM (SPDX)
        if: steps.classify.outputs.build == 'true'
        run: |
          "${{ steps.syft.outputs.cmd }}" scan \
            oci-dir:bazel-bin/src/products/analytics/ingest/image \
            -o spdx-json=sbom.spdx.json
          test -s sbom.spdx.json

      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bazelisk run //src/products/analytics/ingest:push

      - name: Sign image (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes "ghcr.io/guardian-intelligence/analytics-ingest@${{ steps.digest.outputs.digest }}"

      - name: Attach SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            "ghcr.io/guardian-intelligence/analytics-ingest@${{ steps.digest.outputs.digest }}"

      - name: Verify signature and SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/analytics-ingest-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          img="ghcr.io/guardian-intelligence/analytics-ingest@${{ steps.digest.outputs.digest }}"
          cosign verify --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
          cosign verify-attestation --type spdxjson \
            --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
