# Builds the company-site OCI image and enforces the digest-pin invariant:
# the digest pinned in src/infrastructure/deployments/company/prod/web.yaml
# must equal the digest CI builds from the same commit (CI is the canonical
# builder; the vite output is not bit-reproducible across machines, so
# workstation builds are advisory — repin from this workflow's output). A
# content change without a repin cannot merge; a repin without the matching
# content cannot merge. On main, the verified image is pushed to ghcr.io and
# cosign-signed (keyless, bound to this workflow's OIDC identity). Flux may
# reconcile the merge before the push completes; the rollout self-heals via
# image pull backoff and maxUnavailable: 0 keeps the old ReplicaSet serving.
name: company-site-image

on:
  pull_request:
    paths:
      - "src/products/company/**"
      - "src/viteplus-monorepo/**"
      - "src/infrastructure/deployments/company/prod/web.yaml"
      - ".github/workflows/company-site-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  push:
    branches: [main]
    paths:
      - "src/products/company/**"
      - "src/viteplus-monorepo/**"
      - "src/infrastructure/deployments/company/prod/web.yaml"
      - ".github/workflows/company-site-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - name: Build image
        run: bazelisk build //src/products/company/site:image

      - name: Verify pinned digest matches built digest
        id: digest
        run: |
          # //src/products/company/site:image aliases //src/products/company/web:image,
          # so the OCI layout lands under web/.
          built="$(jq -r '.manifests[0].digest' bazel-bin/src/products/company/web/image/index.json)"
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/company-site@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/company/prod/web.yaml | cut -d@ -f2)"
          echo "built:  $built"
          echo "pinned: $pinned"
          if [[ "$built" != "$pinned" ]]; then
            echo "::error::Digest pin is stale. Repin web.yaml and images.lock to $built (built from this commit) and push again." >&2
            exit 1
          fi
          echo "digest=$built" >> "$GITHUB_OUTPUT"

      - name: Verify images.lock and rendered manifests agree
        run: bazelisk test //src/infrastructure/tests:talm_render_test

      # Push and sign only for the canonical main history — not for PRs, and
      # not for workflow_dispatch on arbitrary branches (a dispatch push would
      # retag `edge` and sign bytes that never went through review).
      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bazelisk run //src/products/company/site:push

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      - name: Sign image (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes "ghcr.io/guardian-intelligence/company-site@${{ steps.digest.outputs.digest }}"
