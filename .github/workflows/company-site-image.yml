# The site-gate: one always-running PR check that (a) verifies any digest-pin
# move names an image cosign-signed by this workflow's canonical identity —
# i.e. built by CI from reviewed main history — (b) rebuilds the site when
# its inputs change (CI is the canonical builder; the vite output is not
# bit-reproducible across machines), and (c) runs the manifest/lock
# conformance suite when infrastructure manifests change.
#
# It runs on EVERY pull request and classifies the diff itself, exiting fast
# when nothing relevant changed: required status checks cannot be
# path-filtered without hanging unrelated PRs, and this job is a required
# check on main — it is the enforcement point that makes the promotion bot
# (Kargo) untrusted-by-construction. Promotion is a separate pin-only PR
# whose digest is signature-verified here without a rebuild (see
# docs/supply-chain-design.md, "Promotion: how digests move").
#
# On main, every build is pushed to ghcr.io and cosign-signed (keyless,
# OIDC-bound), which is what makes a digest eligible for promotion. Flux may
# reconcile a repin merge before ghcr replication settles; the rollout
# self-heals via image pull backoff and maxUnavailable: 0 keeps the old
# ReplicaSet serving.
name: company-site-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # web.yaml is deliberately NOT here: a pin-only promotion merge changes
    # no build input, and rebuilding on it would re-sign and retag `edge` —
    # if the image ever lost bit-reproducibility again, every promotion
    # merge would mint a new edge digest and the system would promote
    # itself in a loop with no breaker.
    paths:
      - "src/products/viteplus-monorepo/**"
      - ".github/workflows/company-site-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: site-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  site-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Classify the diff
        id: classify
        run: |
          web_yaml=src/infrastructure/deployments/company/prod/web.yaml
          pin_re='ghcr.io/guardian-intelligence/company-site@sha256:[a-f0-9]\{64\}'
          build=false conformance=false pin=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/$GITHUB_BASE_REF"
            while IFS= read -r f; do
              case "$f" in
                src/products/viteplus-monorepo/*|.github/workflows/company-site-image.yml|MODULE.bazel|MODULE.bazel.lock|.bazelrc|.bazelversion)
                  build=true ;;
              esac
              case "$f" in
                # src/tools is in scope because the conformance suite includes
                # the version-skew test over the kubectl/talosctl tool pins.
                src/infrastructure/*|src/tools/*) conformance=true ;;
              esac
            done < <(git diff --name-only "$base"...HEAD)
            pinned="$(grep -o "$pin_re" "$web_yaml" | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$web_yaml" 2>/dev/null | grep -o "$pin_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then pin=true; fi
          else
            # push to main / workflow_dispatch: full build path, as before.
            build=true conformance=true
          fi
          # A rebuild exercises the manifests' inputs too.
          [[ "$build" == true ]] && conformance=true
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "conformance=$conformance" >> "$GITHUB_OUTPUT"
          echo "pin=$pin" >> "$GITHUB_OUTPUT"
          echo "classified: build=$build conformance=$conformance pin=$pin"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: steps.classify.outputs.pin == 'true' || github.event_name == 'push'

      # Promotion gate: a PR may move the pin only to a digest signed by the
      # canonical identity. A pin identical to the base branch needs no check
      # (it was verified when it landed); a stale pin on main is healed by
      # promotion, not by blocking content merges.
      - name: Verify the changed pin is canonically signed
        if: steps.classify.outputs.pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/company-site-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/company-site@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/company/prod/web.yaml | cut -d@ -f2)"
          echo "verifying provenance of $pinned"
          # stdout is the multi-MB signature payload that stalls the Actions
          # log streamer; the verification summary goes to stderr.
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/company-site@$pinned" > /dev/null

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0
        if: steps.classify.outputs.build == 'true' || steps.classify.outputs.conformance == 'true'

      - name: Build image
        if: steps.classify.outputs.build == 'true'
        run: bazelisk build //src/products/viteplus-monorepo/apps/guardianintelligence-web/site:image

      - name: Compute built digest
        if: steps.classify.outputs.build == 'true'
        id: digest
        run: |
          # //src/products/viteplus-monorepo/apps/guardianintelligence-web/site:image aliases //src/products/viteplus-monorepo/apps/guardianintelligence-web:image,
          # so the OCI layout lands under web/.
          built="$(jq -r '.manifests[0].digest' bazel-bin/src/products/viteplus-monorepo/apps/guardianintelligence-web/image/index.json)"
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/company-site@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/company/prod/web.yaml | cut -d@ -f2)"
          echo "built:  $built"
          echo "pinned: $pinned"
          echo "digest=$built" >> "$GITHUB_OUTPUT"

      # Runtime performance promotion gate: load the exact image just built,
      # run it, and fail the check if the letters page's scroll-frame timing
      # regresses (perf/scroll-jank-gate.mjs, thresholds + rationale there).
      # Runs against the shipped artifact, not a dev server, so it catches
      # anything a bundler/runtime difference would otherwise hide.
      - name: Load and run the built image
        if: steps.classify.outputs.build == 'true'
        run: |
          bazelisk run //src/products/viteplus-monorepo/apps/guardianintelligence-web/site:load
          docker run -d --name perf-gate -p 8080:8080 ghcr.io/guardian-intelligence/company-site:edge
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/letters/dear-shovon >/dev/null && break
            sleep 1
          done

      - name: Runtime performance gate
        if: steps.classify.outputs.build == 'true'
        working-directory: src/products/viteplus-monorepo/apps/guardianintelligence-web
        run: |
          # Installed in an empty scratch dir, not in place: `npm install` in
          # this directory would read this app's package.json and choke on
          # pnpm's `catalog:` protocol in its dependency versions. Copied in
          # rather than resolved via NODE_PATH: Node's ESM loader does not
          # search NODE_PATH at all (CJS-only, verified against a real CI run
          # -- ERR_MODULE_NOT_FOUND despite NODE_PATH being set), so the
          # package has to be a real node_modules/ entry to import-resolve.
          mkdir -p /tmp/perf-gate-deps && cd /tmp/perf-gate-deps
          npm init -y >/dev/null
          npm install playwright@1.61.1
          cd - >/dev/null
          mkdir -p node_modules
          cp -r /tmp/perf-gate-deps/node_modules/playwright node_modules/
          cp -r /tmp/perf-gate-deps/node_modules/playwright-core node_modules/
          # webkit is excluded: unusable on this runner (see scroll-jank-gate.mjs header).
          node node_modules/playwright/cli.js install --with-deps chromium firefox
          BASE=http://127.0.0.1:8080 node perf/scroll-jank-gate.mjs

      - name: Stop perf-gate container
        if: always() && steps.classify.outputs.build == 'true'
        run: docker rm -f perf-gate || true

      - name: Run the manifest/lock conformance suite
        if: steps.classify.outputs.conformance == 'true'
        run: bazelisk test //src/infrastructure/tests:talm_render_test

      # SBOM is generated from the local OCI layout on every build (PRs
      # included) so a broken SBOM pipeline fails before merge, not after.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.classify.outputs.build == 'true'
        id: syft

      - name: Generate SBOM (SPDX)
        if: steps.classify.outputs.build == 'true'
        run: |
          "${{ steps.syft.outputs.cmd }}" scan \
            oci-dir:bazel-bin/src/products/viteplus-monorepo/apps/guardianintelligence-web/image \
            -o spdx-json=sbom.spdx.json
          test -s sbom.spdx.json

      # Push and sign only for the canonical main history — not for PRs, and
      # not for workflow_dispatch on arbitrary branches (a dispatch push would
      # retag `edge` and sign bytes that never went through review).
      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bazelisk run //src/products/viteplus-monorepo/apps/guardianintelligence-web/site:push

      - name: Sign image (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes "ghcr.io/guardian-intelligence/company-site@${{ steps.digest.outputs.digest }}"

      - name: Attach SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            "ghcr.io/guardian-intelligence/company-site@${{ steps.digest.outputs.digest }}"

      # Close the loop: verify what we just published against the pinned
      # identity. This is the same policy an offline verifier uses — the
      # identity string below is the canonical trust anchor for guardian
      # artifacts (recorded in docs/supply-chain-design.md).
      - name: Verify signature and SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/company-site-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          img="ghcr.io/guardian-intelligence/company-site@${{ steps.digest.outputs.digest }}"
          cosign verify --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
          # stdout is the multi-MB DSSE payload on a single line, which stalls
          # the Actions log streamer indefinitely; the verification summary
          # goes to stderr and stays in the log.
          cosign verify-attestation --type spdxjson \
            --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
