name: npm sdk release

on:
  workflow_dispatch:
    inputs:
      source-ref:
        description: "Git ref to build; defaults to the workflow dispatch ref."
        required: false
        type: string
      skip-npm:
        description: "Publish/sign OCI only; useful for restoring an already-published npm version."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-sdk-release
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check out release source
        if: ${{ inputs.source-ref != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.source-ref }}
          path: release-source

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - name: Install repo-pinned tools
        run: |
          bazelisk run //src/guardian-cli/cmd/guardian -- tools install --bin-dir "$RUNNER_TEMP/guardian-bin"
          echo "$RUNNER_TEMP/guardian-bin" >> "$GITHUB_PATH"

      - name: Release SDK
        run: |
          args=(
            release
            sdk-oci
            --publish
            --channel
            edge
            --ref
            oci.guardianintelligence.org/guardian/aisucks/sdk/npm:edge
          )
          if [[ "${{ inputs.skip-npm }}" == "true" ]]; then
            args+=(--skip-npm)
          fi
          if [[ "${{ inputs.source-ref }}" != "" ]]; then
            args+=(--source-root "$GITHUB_WORKSPACE/release-source")
          fi
          aspect "${args[@]}"
        env:
          GUARDIAN_OCI_USERNAME: guardian-release
          GUARDIAN_OCI_PASSWORD: ${{ secrets.GUARDIAN_OCI_PASSWORD }}
