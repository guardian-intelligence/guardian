name: npm sdk release

on:
  workflow_dispatch:
    inputs:
      source-ref:
        description: "Git ref to build; defaults to the workflow dispatch ref."
        required: false
        type: string
      channel:
        description: "Release channel/dist-tag/OCI tag to publish."
        required: false
        default: edge
        type: choice
        options:
          - edge
          - nightly
          - rc
      skip-npm:
        description: "Skip npm projection; useful for OCI-only repair."
        required: false
        default: false
        type: boolean
      run-gate:
        description: "Run the public SDK Health SLO gate after publication."
        required: false
        default: false
        type: boolean
      gate-track:
        description: "Gate track to execute."
        required: false
        default: nightly
        type: choice
        options:
          - nightly
          - rc
      gate-from-channel:
        description: "Dist-tag to install for the gate; defaults to channel."
        required: false
        type: string
      gate-to-channel:
        description: "Channel to promote after a passing gate; defaults to gate-track."
        required: false
        type: string
      gate-endpoint:
        description: "Aisucks endpoint probed through the installed SDK."
        required: false
        default: https://gamma.aisucks.app
        type: string
      promote-on-pass:
        description: "Publish the gate's to-channel after the SLO gate passes."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-sdk-release
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Check out release source
        if: ${{ inputs.source-ref != '' }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ inputs.source-ref }}
          path: release-source

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - name: Install repo-pinned tools
        run: |
          bazelisk run //src/guardian-cli/cmd/guardian:guardian_tools -- tools install --bin-dir "$RUNNER_TEMP/guardian-bin"
          echo "$RUNNER_TEMP/guardian-bin" >> "$GITHUB_PATH"

      - name: Release SDK
        run: |
          release_output="$RUNNER_TEMP/aisucks-sdk-release"
          mkdir -p "$release_output"
          args=(
            release
            sdk-oci
            --publish
            --channel
            "${CHANNEL}"
            --ref
            "oci.guardianintelligence.org/guardian/aisucks/sdk/npm:${CHANNEL}"
            --output-dir
            "$release_output"
            --with-attestation
            --sign-oci
          )
          if [[ "${{ inputs.skip-npm }}" == "true" ]]; then
            args+=(--skip-npm)
          fi
          if [[ "${{ inputs.source-ref }}" != "" ]]; then
            args+=(--source-root "$GITHUB_WORKSPACE/release-source")
          fi
          if [[ "${{ inputs.skip-npm }}" != "true" ]]; then
            args+=(--npm-provenance)
          fi
          aspect "${args[@]}"
          echo "RELEASE_OUTPUT=$release_output" >> "$GITHUB_ENV"
        env:
          CHANNEL: ${{ inputs.channel }}
          GUARDIAN_OCI_USERNAME: guardian-release
          GUARDIAN_OCI_PASSWORD: ${{ secrets.GUARDIAN_OCI_PASSWORD }}

      - name: Run SDK Health gate
        if: ${{ inputs.run-gate }}
        run: |
          gate_output="$RUNNER_TEMP/aisucks-sdk-gate"
          mkdir -p "$gate_output"
          from_channel="${GATE_FROM_CHANNEL:-$CHANNEL}"
          to_channel="${GATE_TO_CHANNEL:-$GATE_TRACK}"
          aspect \
            release \
            sdk-gate \
            --track "$GATE_TRACK" \
            --from-channel "$from_channel" \
            --to-channel "$to_channel" \
            --endpoint "$GATE_ENDPOINT" \
            --output-dir "$gate_output"
          cat "$gate_output/gate-summary.md" >> "$GITHUB_STEP_SUMMARY"
          echo "GATE_OUTPUT=$gate_output" >> "$GITHUB_ENV"
          echo "GATE_FROM=$from_channel" >> "$GITHUB_ENV"
          echo "GATE_TO=$to_channel" >> "$GITHUB_ENV"
        env:
          CHANNEL: ${{ inputs.channel }}
          GATE_TRACK: ${{ inputs.gate-track }}
          GATE_FROM_CHANNEL: ${{ inputs.gate-from-channel }}
          GATE_TO_CHANNEL: ${{ inputs.gate-to-channel }}
          GATE_ENDPOINT: ${{ inputs.gate-endpoint }}

      - name: Promote gated channel
        if: ${{ inputs.run-gate && inputs.promote-on-pass }}
        run: |
          promote_output="$RUNNER_TEMP/aisucks-sdk-promote"
          mkdir -p "$promote_output"
          args=(
            release
            sdk-oci
            --publish
            --channel
            "$GATE_TO"
            --ref
            "oci.guardianintelligence.org/guardian/aisucks/sdk/npm:${GATE_TO}"
            --output-dir
            "$promote_output"
            --skip-npm
            --with-attestation
            --sign-oci
          )
          if [[ "${{ inputs.source-ref }}" != "" ]]; then
            args+=(--source-root "$GITHUB_WORKSPACE/release-source")
          fi
          aspect "${args[@]}"
          echo "PROMOTE_OUTPUT=$promote_output" >> "$GITHUB_ENV"
        env:
          GUARDIAN_OCI_USERNAME: guardian-release
          GUARDIAN_OCI_PASSWORD: ${{ secrets.GUARDIAN_OCI_PASSWORD }}

      - name: Upload release records
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aisucks-sdk-release-records
          path: |
            ${{ env.RELEASE_OUTPUT }}
            ${{ env.GATE_OUTPUT }}
            ${{ env.PROMOTE_OUTPUT }}
          if-no-files-found: ignore
          retention-days: 30
