# Package-scoped npm release for the aisucks public SDK.
#
# Fleet deploys and OCI vending are intentionally separate. This workflow only
# invokes repo-owned release tooling. The package@version no-op decision lives
# in scripts/release/npm-aisucks-sdk.sh and the `aspect release npm-sdk` task.
name: npm-sdk-release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: npm-sdk-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

defaults:
  run:
    shell: bash

env:
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-release
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install Guardian tool shims
        run: |
          bazelisk run //src/guardian-cli/cmd/guardian:guardian -- tools install --bin-dir "$RUNNER_TEMP/guardian-bin"
          echo "$RUNNER_TEMP/guardian-bin" >> "$GITHUB_PATH"

      - name: Release SDK
        run: aspect release npm-sdk --publish
