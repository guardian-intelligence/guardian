# The payments-gate is the PR check and trusted publisher identity for both
# halves of the payment path: the Stripe/TigerBeetle service and the browser
# canary that proves it through ClickHouse. This file path is their Fulcio
# identity; do not rename it.
name: payments-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "src/services/payments/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/payments-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: payments-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  payments-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Classify the diff
        id: classify
        run: |
          service_pin_file=src/infrastructure/deployments/payments/prod/deployment.yaml
          canary_pin_file=src/infrastructure/deployments/payments/prod/canary.yaml
          service_re='ghcr.io/guardian-intelligence/payments@sha256:[a-f0-9]\{64\}'
          canary_re='ghcr.io/guardian-intelligence/payments-canary@sha256:[a-f0-9]\{64\}'
          build=false service_pin=false canary_pin=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/$GITHUB_BASE_REF"
            while IFS= read -r f; do
              case "$f" in
                src/services/payments/*|go.mod|go.sum|.github/workflows/payments-image.yml|MODULE.bazel|MODULE.bazel.lock|.bazelrc|.bazelversion)
                  build=true ;;
              esac
            done < <(git diff --name-only "$base"...HEAD)
            pinned="$(grep -o "$service_re" "$service_pin_file" 2>/dev/null | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$service_pin_file" 2>/dev/null | grep -o "$service_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then service_pin=true; fi
            pinned="$(grep -o "$canary_re" "$canary_pin_file" 2>/dev/null | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$canary_pin_file" 2>/dev/null | grep -o "$canary_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then canary_pin=true; fi
          else
            build=true
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "service_pin=$service_pin" >> "$GITHUB_OUTPUT"
          echo "canary_pin=$canary_pin" >> "$GITHUB_OUTPUT"
          echo "classified: build=$build service_pin=$service_pin canary_pin=$canary_pin"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: steps.classify.outputs.service_pin == 'true' || steps.classify.outputs.canary_pin == 'true' || github.event_name == 'push'

      - name: Verify the changed service pin is canonically signed
        if: steps.classify.outputs.service_pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/payments-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/payments@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/payments/prod/deployment.yaml | cut -d@ -f2)"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/payments@$pinned" > /dev/null

      - name: Verify the changed canary pin is canonically signed
        if: steps.classify.outputs.canary_pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/payments-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/payments-canary@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/payments/prod/canary.yaml | cut -d@ -f2)"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/payments-canary@$pinned" > /dev/null

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0
        if: steps.classify.outputs.build == 'true'

      - name: Service and canary tests
        if: steps.classify.outputs.build == 'true'
        run: bazelisk test //src/services/payments/...

      - name: Build images
        if: steps.classify.outputs.build == 'true'
        run: bazelisk build //src/services/payments:image //src/services/payments/canary:image

      - name: Compute built digests
        if: steps.classify.outputs.build == 'true'
        id: digest
        run: |
          service="$(jq -r '.manifests[0].digest' bazel-bin/src/services/payments/image/index.json)"
          canary="$(jq -r '.manifests[0].digest' bazel-bin/src/services/payments/canary/image/index.json)"
          echo "service: $service"
          echo "canary: $canary"
          echo "service=$service" >> "$GITHUB_OUTPUT"
          echo "canary=$canary" >> "$GITHUB_OUTPUT"

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.classify.outputs.build == 'true'
        id: syft

      - name: Generate SBOMs
        if: steps.classify.outputs.build == 'true'
        run: |
          "${{ steps.syft.outputs.cmd }}" scan oci-dir:bazel-bin/src/services/payments/image \
            -o spdx-json=payments.spdx.json
          "${{ steps.syft.outputs.cmd }}" scan oci-dir:bazel-bin/src/services/payments/canary/image \
            -o spdx-json=payments-canary.spdx.json
          test -s payments.spdx.json
          test -s payments-canary.spdx.json

      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bazelisk run //src/services/payments:push
          bazelisk run //src/services/payments/canary:push

      - name: Sign images and attach SBOM attestations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          service="ghcr.io/guardian-intelligence/payments@${{ steps.digest.outputs.service }}"
          canary="ghcr.io/guardian-intelligence/payments-canary@${{ steps.digest.outputs.canary }}"
          cosign sign --yes "$service"
          cosign sign --yes "$canary"
          cosign attest --yes --type spdxjson --predicate payments.spdx.json "$service"
          cosign attest --yes --type spdxjson --predicate payments-canary.spdx.json "$canary"

      - name: Verify signatures and SBOM attestations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/payments-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          for image in \
            "ghcr.io/guardian-intelligence/payments@${{ steps.digest.outputs.service }}" \
            "ghcr.io/guardian-intelligence/payments-canary@${{ steps.digest.outputs.canary }}"; do
            cosign verify --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$image" > /dev/null
            cosign verify-attestation --type spdxjson \
              --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$image" > /dev/null
          done
