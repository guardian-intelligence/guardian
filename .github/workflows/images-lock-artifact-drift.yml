# Generalizes promotion-lock-sync.yml's bot-PR lane to the "artifact
# section" of images.lock: Flux OCIRepository CRs pinned by tag+digest
# (external-secrets, kargo charts today). images.lock's own header still
# describes this as a manual scrape ("ghcr manifest HEAD for installer/chart
# digests") — this workflow is that job, made unattended and scheduled,
# reusing the same bot identity/PR/provenance-gate lane task #26 established
# should be shared infrastructure, not a company-site-only mechanism.
#
# Deliberately stateless: no cluster access, no cosign/oras/crane binary —
# .github/scripts/check-oci-ref-drift.sh does one anonymous registry-token
# exchange plus one manifest lookup per pinned ref (curl+jq, already on every
# runner). PR-mode, not auto-commit-to-main: a tag resolving to a new digest
# is a real dependency bump and gets the same review + provenance-gate any
# other content change gets, per "updating dependencies needs to be a
# deliberate action."
name: images-lock-artifact-drift

on:
  schedule:
    - cron: "17 6 * * *" # once daily, off the hour to avoid GitHub's cron pile-up
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app
        with:
          app-id: ${{ secrets.PROMOTIONS_APP_ID }}
          private-key: ${{ secrets.PROMOTIONS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.app.outputs.token }}

      - name: Check OCIRepository tag/digest drift
        id: check
        run: |
          changed="$(.github/scripts/check-oci-ref-drift.sh "$(pwd)")"
          if [[ -z "$changed" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$changed"
          fi

      - name: Open a PR with the drift fix
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: |
          branch="bot/oci-artifact-drift-${{ github.run_id }}"
          git config user.name "guardian-promotions[bot]"
          git config user.email "guardian-promotions[bot]@users.noreply.github.com"
          git checkout -b "$branch"
          git commit -am "images.lock: sync OCIRepository artifact digests to upstream"
          git push origin "$branch"
          printf '%s\n' \
            "## Summary" \
            "- Automated: a Flux OCIRepository tag now resolves to a different upstream digest than the one pinned in Git. This bumps the pin and the matching images.lock line to match." \
            "" \
            "## Test plan" \
            "- [ ] required checks pass on this PR like any other digest-pin change (this bot is untrusted by construction -- the required checks and branch protection decide whether it merges)." \
            > /tmp/pr-body.md
          gh pr create --head "$branch" --base main \
            --title "images.lock: OCI artifact digest drift" \
            --body-file /tmp/pr-body.md
