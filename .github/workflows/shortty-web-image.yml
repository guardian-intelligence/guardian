# The shortty gate: one always-running PR check that (a) verifies any
# digest-pin move names an image cosign-signed by this workflow's canonical
# identity — i.e. built by CI from reviewed main history — and (b) rebuilds
# the app when its inputs change (CI is the canonical builder; the vite
# output is not bit-reproducible across machines).
#
# It runs on EVERY pull request and classifies the diff itself, exiting fast
# when nothing relevant changed: required status checks cannot be
# path-filtered without hanging unrelated PRs. Promotion is a separate
# pin-only PR whose digest is signature-verified here without a rebuild.
#
# On main, every build is pushed to ghcr.io and cosign-signed (keyless,
# OIDC-bound), which is what makes a digest eligible for promotion.
name: shortty-web-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # web.yaml is deliberately NOT here: a pin-only promotion merge changes
    # no build input, and rebuilding on it would re-sign and retag `edge` —
    # if the image ever lost bit-reproducibility, every promotion merge
    # would mint a new edge digest and the system would promote itself in a
    # loop with no breaker.
    paths:
      - "src/products/viteplus-monorepo/**"
      - ".github/workflows/shortty-web-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: shortty-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  shortty-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0

      - name: Classify the diff
        id: classify
        run: |
          web_yaml=src/infrastructure/deployments/shortty/prod/web.yaml
          pin_re='ghcr.io/guardian-intelligence/shortty-web@sha256:[a-f0-9]\{64\}'
          build=false pin=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/$GITHUB_BASE_REF"
            while IFS= read -r f; do
              case "$f" in
                src/products/viteplus-monorepo/*|.github/workflows/shortty-web-image.yml|MODULE.bazel|MODULE.bazel.lock|.bazelrc|.bazelversion)
                  build=true ;;
              esac
            done < <(git diff --name-only "$base"...HEAD)
            pinned="$(grep -o "$pin_re" "$web_yaml" 2>/dev/null | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$web_yaml" 2>/dev/null | grep -o "$pin_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then pin=true; fi
          else
            # push to main / workflow_dispatch: full build path.
            build=true
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "pin=$pin" >> "$GITHUB_OUTPUT"
          echo "classified: build=$build pin=$pin"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: steps.classify.outputs.pin == 'true' || github.event_name == 'push'

      # Promotion gate: a PR may move the pin only to a digest signed by the
      # canonical identity. A pin identical to the base branch needs no check
      # (it was verified when it landed); a stale pin on main is healed by
      # promotion, not by blocking content merges.
      - name: Verify the changed pin is canonically signed
        if: steps.classify.outputs.pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/shortty-web-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/shortty-web@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/shortty/prod/web.yaml | cut -d@ -f2)"
          echo "verifying provenance of $pinned"
          # stdout is the multi-MB signature payload that stalls the Actions
          # log streamer; the verification summary goes to stderr.
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/shortty-web@$pinned" > /dev/null

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0
        if: steps.classify.outputs.build == 'true'

      - name: Build image
        if: steps.classify.outputs.build == 'true'
        run: bazelisk build //src/products/viteplus-monorepo/apps/shortty-web/site:image

      - name: Compute built digest
        if: steps.classify.outputs.build == 'true'
        id: digest
        run: |
          built="$(jq -r '.manifests[0].digest' bazel-bin/src/products/viteplus-monorepo/apps/shortty-web/image/index.json)"
          echo "built: $built"
          echo "digest=$built" >> "$GITHUB_OUTPUT"

      # Runtime gate: load the exact image just built, run it, and require a
      # healthy serve of the app shell. Runs against the shipped artifact,
      # not a dev server, so it catches anything a bundler/runtime
      # difference would otherwise hide.
      - name: Load and smoke-test the built image
        if: steps.classify.outputs.build == 'true'
        run: |
          bazelisk run //src/products/viteplus-monorepo/apps/shortty-web/site:load
          docker run -d --name shortty-smoke -p 8080:8080 ghcr.io/guardian-intelligence/shortty-web:edge
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8080/healthz >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8080/ | grep -q "under 4"
          curl -sf http://127.0.0.1:8080/healthz >/dev/null

      - name: Stop smoke container
        if: always() && steps.classify.outputs.build == 'true'
        run: docker rm -f shortty-smoke || true

      # SBOM is generated from the local OCI layout on every build (PRs
      # included) so a broken SBOM pipeline fails before merge, not after.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.classify.outputs.build == 'true'
        id: syft

      - name: Generate SBOM (SPDX)
        if: steps.classify.outputs.build == 'true'
        run: |
          "${{ steps.syft.outputs.cmd }}" scan \
            oci-dir:bazel-bin/src/products/viteplus-monorepo/apps/shortty-web/image \
            -o spdx-json=sbom.spdx.json
          test -s sbom.spdx.json

      # Push and sign only for the canonical main history — not for PRs, and
      # not for workflow_dispatch on arbitrary branches (a dispatch push
      # would retag `edge` and sign bytes that never went through review).
      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bazelisk run //src/products/viteplus-monorepo/apps/shortty-web/site:push

      - name: Sign image (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes "ghcr.io/guardian-intelligence/shortty-web@${{ steps.digest.outputs.digest }}"

      - name: Attach SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            "ghcr.io/guardian-intelligence/shortty-web@${{ steps.digest.outputs.digest }}"

      # Close the loop: verify what we just published against the pinned
      # identity — the same policy an offline verifier uses.
      - name: Verify signature and SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/shortty-web-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          img="ghcr.io/guardian-intelligence/shortty-web@${{ steps.digest.outputs.digest }}"
          cosign verify --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
          # stdout is the multi-MB DSSE payload on a single line, which
          # stalls the Actions log streamer indefinitely; the verification
          # summary goes to stderr and stays in the log.
          cosign verify-attestation --type spdxjson \
            --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
