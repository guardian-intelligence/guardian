name: identity-services-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "src/services/authorization/**"
      - "src/services/iam/login-canary/**"
      - "src/proto/guardian/authorization/**"
      - "src/proto/gen/go/guardian/authorization/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/identity-services-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: identity-services-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  identity-services:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Classify the diff
        id: classify
        run: |
          authorization_pin_file=src/infrastructure/deployments/authorization/prod/api.yaml
          canary_pin_file=src/infrastructure/deployments/iam/prod/login-canary.yaml
          authorization_re='ghcr.io/guardian-intelligence/authorization@sha256:[a-f0-9]\{64\}'
          canary_re='ghcr.io/guardian-intelligence/login-canary@sha256:[a-f0-9]\{64\}'
          build=false authorization_pin=false canary_pin=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/$GITHUB_BASE_REF"
            while IFS= read -r f; do
              case "$f" in
                src/services/authorization/*|src/services/iam/login-canary/*|src/proto/guardian/authorization/*|src/proto/gen/go/guardian/authorization/*|src/proto/BUILD.bazel|src/proto/testdata/buf/authorization.binpb|go.mod|go.sum|.github/workflows/identity-services-image.yml|MODULE.bazel|MODULE.bazel.lock|.bazelrc|.bazelversion)
                  build=true ;;
              esac
            done < <(git diff --name-only "$base"...HEAD)
            pinned="$(grep -o "$authorization_re" "$authorization_pin_file" 2>/dev/null | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$authorization_pin_file" 2>/dev/null | grep -o "$authorization_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then authorization_pin=true; fi
            pinned="$(grep -o "$canary_re" "$canary_pin_file" 2>/dev/null | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$canary_pin_file" 2>/dev/null | grep -o "$canary_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then canary_pin=true; fi
          else
            build=true
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "authorization_pin=$authorization_pin" >> "$GITHUB_OUTPUT"
          echo "canary_pin=$canary_pin" >> "$GITHUB_OUTPUT"
          echo "classified: build=$build authorization_pin=$authorization_pin canary_pin=$canary_pin"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: steps.classify.outputs.authorization_pin == 'true' || steps.classify.outputs.canary_pin == 'true' || github.event_name == 'push'

      - name: Verify the changed authorization pin is canonically signed
        if: steps.classify.outputs.authorization_pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/identity-services-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/authorization@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/authorization/prod/api.yaml | cut -d@ -f2)"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/authorization@$pinned" > /dev/null

      - name: Verify the changed canary pin is canonically signed
        if: steps.classify.outputs.canary_pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/identity-services-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/login-canary@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/iam/prod/login-canary.yaml | cut -d@ -f2)"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/login-canary@$pinned" > /dev/null

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0
        if: steps.classify.outputs.build == 'true'

      - name: Test
        if: steps.classify.outputs.build == 'true'
        run: |
          bazelisk test \
            //src/proto:authorization_buf_breaking_test \
            //src/proto:authorization_buf_lint_test \
            //src/proto:authorization_go_codegen_check \
            //src/services/authorization:authorization_test \
            //src/services/iam/login-canary:login_canary_test

      - name: Build images
        if: steps.classify.outputs.build == 'true'
        run: |
          bazelisk build \
            //src/services/authorization:image \
            //src/services/iam/login-canary:image

      - name: Compute digests
        if: steps.classify.outputs.build == 'true'
        id: digest
        run: |
          authorization="$(jq -r '.manifests[0].digest' bazel-bin/src/services/authorization/image/index.json)"
          canary="$(jq -r '.manifests[0].digest' bazel-bin/src/services/iam/login-canary/image/index.json)"
          echo "authorization=$authorization" >> "$GITHUB_OUTPUT"
          echo "canary=$canary" >> "$GITHUB_OUTPUT"
          echo "authorization: $authorization"
          echo "login canary: $canary"

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.classify.outputs.build == 'true'
        id: syft

      - name: Generate SBOMs
        if: steps.classify.outputs.build == 'true'
        run: |
          "${{ steps.syft.outputs.cmd }}" scan \
            oci-dir:bazel-bin/src/services/authorization/image \
            -o spdx-json=authorization.spdx.json
          "${{ steps.syft.outputs.cmd }}" scan \
            oci-dir:bazel-bin/src/services/iam/login-canary/image \
            -o spdx-json=login-canary.spdx.json
          test -s authorization.spdx.json
          test -s login-canary.spdx.json

      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push images
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          bazelisk run //src/services/authorization:push
          bazelisk run //src/services/iam/login-canary:push

      - name: Sign images and attest SBOMs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          authorization="ghcr.io/guardian-intelligence/authorization@${{ steps.digest.outputs.authorization }}"
          canary="ghcr.io/guardian-intelligence/login-canary@${{ steps.digest.outputs.canary }}"
          cosign sign --yes "$authorization"
          cosign sign --yes "$canary"
          cosign attest --yes --type spdxjson --predicate authorization.spdx.json "$authorization"
          cosign attest --yes --type spdxjson --predicate login-canary.spdx.json "$canary"

      - name: Verify signatures and SBOM attestations
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/identity-services-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          for image in \
            "ghcr.io/guardian-intelligence/authorization@${{ steps.digest.outputs.authorization }}" \
            "ghcr.io/guardian-intelligence/login-canary@${{ steps.digest.outputs.canary }}"; do
            cosign verify --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$image" > /dev/null
            cosign verify-attestation --type spdxjson \
              --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$image" > /dev/null
          done
