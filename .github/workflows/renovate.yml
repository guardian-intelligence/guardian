# Scheduled Renovate run — the proposer for source-plane pins (renovate.json5
# is the policy; this workflow is only the scheduler). Runs as the
# guardian-renovate App, NOT GITHUB_TOKEN, for the same reason as
# promotion-automerge: its PRs and commits must be attributed to a distinct
# bot identity and must trigger the normal PR workflows.
#
# A silently dead scheduler is the Kargo-wedge failure mode: every proposal
# it would raise freezes, and nothing downstream notices the absence.
name: renovate

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: renovatebot/github-action@3064367f740a1a91cca218698a63902689cce200 # v46.1.20
        with:
          configurationFile: renovate.json5
          token: ${{ steps.app.outputs.token }}
          # -full ships the package managers preinstalled; the slim image
          # would install Go/pnpm on every run just to update lockfiles.
          renovate-version: 43.268.4-full
        env:
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Permits the tool-pin postUpgradeTasks repins (renovate.json5);
          # commands not on this list are refused by the runner.
          RENOVATE_ALLOWED_COMMANDS: '["tools/ops/multitool-repin","tools/ops/oathtool-repin"]'
          LOG_LEVEL: info
