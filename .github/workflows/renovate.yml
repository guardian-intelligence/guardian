# Scheduled Renovate run — the proposer for source-plane pins (renovate.json5
# is the policy; this workflow is only the scheduler). Runs as the
# guardian-renovate App, NOT GITHUB_TOKEN, for the same reason as
# promotion-automerge: its PRs and commits must be attributed to a distinct
# bot identity and must trigger the normal PR workflows.
#
# A silently dead scheduler is the Kargo-wedge failure mode: every proposal
# it would raise freezes, and nothing downstream notices the absence.
name: renovate

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: renovate

jobs:
  renovate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: renovatebot/github-action@22e0a16091fc706b04affe6ae53d5e3358ac4023 # v46.1.19
        with:
          configurationFile: renovate.json5
          token: ${{ steps.app.outputs.token }}
          # -full ships the package managers preinstalled; the slim image
          # would install Go/pnpm on every run just to update lockfiles.
          renovate-version: 43.263.4-full
        env:
          RENOVATE_AUTODISCOVER: "false"
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # Permits the lockfile postUpgradeTasks repin (renovate.json5);
          # commands not on this list are refused by the runner.
          RENOVATE_ALLOWED_COMMANDS: '["tools/ops/multitool-repin"]'
          LOG_LEVEL: info
