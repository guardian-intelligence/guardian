# First-party image publisher. One matrix workflow for every service and web
# image: on pushes to main it rebuilds and pushes exactly the images whose
# inputs changed. Images are not signed — provenance enforcement is the
# digest-pinning admission policy plus the reviewed-main-only path to `edge`
# (docs/supply-chain-design.md). The released postflight CLI keeps its own
# signed lane (postflight-cli-image.yml).
name: images

on:
  push:
    branches: [main]
    # Deployment pin files are deliberately NOT triggers: a pin-only
    # promotion commit changes no build input, and rebuilding on it would
    # retag `edge` — the vite images are not bit-reproducible, so every
    # promotion would mint a new edge digest and the system would promote
    # itself in a loop with no breaker.
    paths:
      - "src/services/alerting/**"
      - "src/services/authorization/**"
      - "src/services/cockpit/**"
      - "src/services/payments/**"
      - "src/services/postflight/**"
      - "src/products/analytics/**"
      - "src/products/viteplus-monorepo/**"
      - "src/proto/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/images.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: images-${{ github.sha }}
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      images: ${{ steps.classify.outputs.images }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0

      - name: Classify the diff
        id: classify
        run: |
          names=(alert-relay analytics-ingest authorization canary-journeys
            cockpit payments payments-canary postflight-controlplane
            company-site shortty-web visual-harness)
          declare -A watch=(
            [alert-relay]='^src/services/alerting/'
            [analytics-ingest]='^src/products/analytics/|^src/proto/'
            [authorization]='^src/services/authorization/|^src/proto/guardian/authorization/|^src/proto/gen/go/guardian/authorization/'
            [canary-journeys]='^src/products/viteplus-monorepo/packages/canary-journeys/|^src/products/viteplus-monorepo/pnpm-(lock|workspace)\.yaml$'
            [cockpit]='^src/services/cockpit/|^src/proto/'
            [payments]='^src/services/payments/'
            [payments-canary]='^src/services/payments/'
            [postflight-controlplane]='^src/services/postflight/'
            [company-site]='^src/products/viteplus-monorepo/'
            [shortty-web]='^src/products/viteplus-monorepo/'
            [visual-harness]='^src/products/viteplus-monorepo/packages/visual-harness/|^src/products/viteplus-monorepo/pnpm-(lock|workspace)\.yaml$'
          )
          declare -A push_target=(
            [alert-relay]='//src/services/alerting/relay:push'
            [analytics-ingest]='//src/products/analytics/ingest:push'
            [authorization]='//src/services/authorization:push'
            [canary-journeys]='//src/products/viteplus-monorepo/packages/canary-journeys:push'
            [cockpit]='//src/services/cockpit:push'
            [payments]='//src/services/payments:push'
            [payments-canary]='//src/services/payments/canary:push'
            [postflight-controlplane]='//src/services/postflight/controlplane:push'
            [company-site]='//src/products/viteplus-monorepo/apps/guardianintelligence-web/site:push'
            [shortty-web]='//src/products/viteplus-monorepo/apps/shortty-web/site:push'
            [visual-harness]='//src/products/viteplus-monorepo/packages/visual-harness:push'
          )
          go_images=' alert-relay analytics-ingest authorization cockpit payments payments-canary postflight-controlplane '
          common='^MODULE\.bazel$|^MODULE\.bazel\.lock$|^\.bazelrc$|^\.bazelversion$|^\.github/workflows/images\.yml$'

          all=false changed=""
          if [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            if [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "$base" 2>/dev/null; then
              all=true
            else
              changed="$(git diff --name-only "$base" HEAD)"
            fi
          else
            all=true
          fi

          hits() { printf '%s\n' "$changed" | grep -qE "$1"; }
          selected=()
          for name in "${names[@]}"; do
            re="${watch[$name]}|$common"
            case "$go_images" in *" $name "*) re="$re|^go\.(mod|sum)$" ;; esac
            if [[ "$all" == true ]] || hits "$re"; then
              selected+=("$name")
            fi
          done

          images='[]'
          if [[ ${#selected[@]} -gt 0 ]]; then
            images="$(for name in "${selected[@]}"; do
              jq -n --arg name "$name" --arg target "${push_target[$name]}" \
                '{name: $name, target: $target}'
            done | jq -sc .)"
          fi
          echo "images=$images" >> "$GITHUB_OUTPUT"
          echo "classified: images=$images"

  # Push only for the canonical main history — not for workflow_dispatch on
  # arbitrary branches (a dispatch push would retag `edge` with bytes that
  # never went through review).
  publish:
    needs: classify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.classify.outputs.images != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: publish ${{ matrix.name }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.classify.outputs.images) }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        run: bazelisk run ${{ matrix.target }}
