# Removes a PR's preview when it closes (merged or not): deletes
# manifests/pr-<N>/ from the `previews` branch, so Flux prunes the workload.
# Nothing DNS-side to clean up -- pr-<N> resolves via the always-present
# *.guardianintelligence.org wildcard, never a per-preview record.
name: company-site-preview-teardown

on:
  pull_request:
    types: [closed]

concurrency:
  group: company-site-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  teardown:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      deployments: write # retire the pr-<N> environment's deployments
    env:
      PR: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Check out previews branch
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          ref: previews
          path: .previews

      - name: Remove preview manifests
        run: |
          if [ ! -e ".previews/manifests/pr-${PR}.yaml" ]; then
            echo "no preview for pr-${PR}; nothing to tear down"
            exit 0
          fi
          .github/scripts/company-site-preview.sh remove .previews "$PR"
          cd .previews
          git config user.name "company-site-preview[bot]"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "preview: tear down pr-${PR}"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:previews; then exit 0; fi
            echo "push rejected (attempt ${attempt}), rebasing"
            git fetch origin previews
            git rebase origin/previews
          done
          echo "::error::could not push to previews branch after 5 attempts" >&2
          exit 1

      - name: Retire GitHub deployments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Deleting an environment needs repo-admin, which GITHUB_TOKEN never
          # gets — inactive statuses are the API-shaped way to say "gone".
          gh api "repos/${GITHUB_REPOSITORY}/deployments?environment=pr-${PR}" --paginate \
            --jq '.[].id' | while read -r id; do
            gh api "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" \
              -f state=inactive -f description="preview torn down" > /dev/null
            echo "deployment ${id}: inactive"
          done

      - name: Update sticky preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          marker="<!-- company-site-preview -->"
          body="$(printf '%s\nPreview torn down.' "$marker")"
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -1)"
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -f body="$body" > /dev/null
          fi
