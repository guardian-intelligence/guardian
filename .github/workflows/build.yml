name: build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Bootstrap toolchain
        run: scripts/bootstrap.sh

      - name: Secret scan
        run: tools/ops/secret-scan tree

      # Fails at PR time when a workflow uses a third-party action ref the
      # declared allowlist does not carry — the GitHub-side alternative is a
      # log-less, page-invisible startup_failure after merge.
      - name: Actions allowlist check
        run: .github/scripts/check-actions-allowlist.sh "$(pwd)"

      - name: Build
        run: bazelisk build --embed_label="$GITHUB_SHA" //:build

      # Tool pins are fetched lazily and //:build does not depend on them, so
      # only this proves a bumped archive still fetches, unpacks, and carries
      # the declared binary paths. Scoped to diffs that can move a pin — the
      # full set is multi-GB and most PRs touch none of it.
      - name: Verify tool pins fetch and unpack
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD |
            grep -qE '^(src/tools/|MODULE\.bazel)'; then
            bazelisk build //src/tools:pins
          else
            echo "no tool-pin paths in diff; skipping"
          fi

      # //src/tools:pins exercises only the host (linux) half of the
      # lockfile; this re-downloads every entry on both platforms and fails
      # on any stale sha256, missing archive member, tag/filename
      # disagreement, or content change under an unchanged URL, so a
      # hand-bumped macOS pin cannot merge stale.
      - name: Verify multitool lockfile hashes on both platforms
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD |
            grep -q '^src/tools/multitool\.lock\.json$'; then
            tools/ops/multitool-repin --check
          else
            echo "lockfile untouched; skipping"
          fi
