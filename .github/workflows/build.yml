name: build

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: build-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    # The full cold graph — no remote cache until Postflight supplies one.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Bootstrap toolchain
        run: scripts/bootstrap.sh

      # Bazel's disk + repository caches (the :ci config), persisted by main
      # and restored by everyone: a PR re-executes only what its diff
      # invalidates. Only trusted main history writes — a PR run's cache is
      # never saved, so nothing a PR builds can feed a later main build
      # through this path.
      - name: Restore Bazel cache
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/bazel-ci
          key: bazel-ci-${{ github.sha }}
          restore-keys: |
            bazel-ci-

      - name: Secret scan
        run: tools/ops/secret-scan tree

      # Fails at PR time when a workflow uses a third-party action ref the
      # declared allowlist does not carry — the GitHub-side alternative is a
      # log-less, page-invisible startup_failure after merge.
      - name: Actions allowlist check
        run: .github/scripts/check-actions-allowlist.sh "$(pwd)"

      - name: Build
        run: bazelisk build --config=ci //...

      - name: Test
        run: bazelisk test --config=ci //...

      # //src/tools:pins is tagged manual (the archive set is multi-GB and
      # fetched lazily), so only this proves a bumped archive still fetches,
      # unpacks, and carries the declared binary paths. Scoped to diffs that
      # can move a pin — most PRs touch none of it. Deliberately not
      # --config=ci: the step exists to prove a fresh fetch works.
      - name: Verify tool pins fetch and unpack
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD |
            grep -qE '^(src/tools/|MODULE\.bazel)'; then
            bazelisk build //src/tools:pins
          else
            echo "no tool-pin paths in diff; skipping"
          fi

      # //src/tools:pins exercises only the host (linux) half of the
      # lockfile; this re-downloads every entry on both platforms and fails
      # on any stale sha256, missing archive member, tag/filename
      # disagreement, or content change under an unchanged URL, so a
      # hand-bumped macOS pin cannot merge stale.
      - name: Verify multitool lockfile hashes on both platforms
        if: github.event_name == 'pull_request'
        run: |
          if git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD |
            grep -q '^src/tools/multitool\.lock\.json$'; then
            tools/ops/multitool-repin --check
          else
            echo "lockfile untouched; skipping"
          fi

      - name: Save Bazel cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/bazel-ci
          key: bazel-ci-${{ github.sha }}
