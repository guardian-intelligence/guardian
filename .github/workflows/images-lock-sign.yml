# Derives the GENERATED union images lock (declared + rendered, see
# //src/infrastructure/imageset) on main, signs it, and publishes the
# signature bundle to ghcr keyed by the union's own sha256. The dark-uplink
# haul is derived from the union and every blob in it is digest-addressed,
# so a verified union plus offline digest verification of the haul covers
# the whole bundle — no key infrastructure. A derivation that cannot be
# produced fails here, after merge: the Bazel conformance suite checks the
# same digest-pinning and dark-mirror-coverage invariants pre-merge over its
# runfiles subset.
#
# The sign-blob bundle JSON embeds the Fulcio certificate and Rekor proof,
# so verification works offline given the pinned Sigstore trusted root and
# the canonical identity recorded in docs/supply-chain-design.md. The
# derivation is deterministic: `aspect infra bundle` re-derives the same
# bytes from the same revision and looks the signature up by hash. The push
# paths include the Go/Bazel toolchain pins because union bytes are a
# function of the extraction toolchain, not just the inventory inputs.
name: images-lock-sign

on:
  push:
    branches: [main]
    paths:
      - "src/infrastructure/bootstrap/bundle/images.declared.lock"
      - "src/infrastructure/deployments/**"
      - "src/infrastructure/base/**"
      - "src/infrastructure/imageset/**"
      - "src/infrastructure/cmd/imageset/**"
      - "src/infrastructure/talm/values.yaml"
      - "go.mod"
      - "go.sum"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelversion"
      - ".github/workflows/images-lock-sign.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  sign:
    # workflow_dispatch is allowed only where it is equivalent to a main
    # push: signing reviewed history is fine, signing arbitrary branches is
    # not.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d # v2.0.1

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # Deterministic derivation: identical to what `aspect infra bundle`
      # re-runs at drive-build time.
      - name: Derive the union lock
        run: |
          bazelisk run //src/infrastructure/cmd/imageset -- \
            --declared "$PWD/src/infrastructure/bootstrap/bundle/images.declared.lock" \
            --repo-root "$PWD" \
            --dark-mirror-values "$PWD/src/infrastructure/talm/values.yaml" \
            --out "$PWD/images.lock.union"

      # oras push (not cosign upload blob) so the layer carries the filename
      # title annotation — `oras pull` in the bundle task fetches it by name.
      # One tag only, keyed by the union's sha256: a floating "latest" tag
      # has no consumer and would race concurrent pushes.
      - name: Sign the union lock and publish the signature bundle
        id: sign
        run: |
          lockhash="$(sha256sum images.lock.union | cut -d' ' -f1)"
          # --new-bundle-format: the protobuf sigstore bundle is the only
          # format cosign accepts with --trusted-root, i.e. the only one
          # verifiable offline at dark bring-up.
          cosign sign-blob --yes --new-bundle-format --bundle images.lock.sigbundle images.lock.union
          oras push "ghcr.io/guardian-intelligence/supply-chain:images.lock-${lockhash}" \
            images.lock.sigbundle:application/json
          echo "signed union lock sha256:${lockhash}"
          echo "lockhash=$lockhash" >> "$GITHUB_OUTPUT"

      # Verify what ghcr actually serves, not the local file — a corrupted
      # or partial push must fail here, not at the next drive build. Uses the
      # repo-pinned trusted root so every signing run rehearses the exact
      # offline verification from the cold-boot runbook's step 0.
      - name: Verify the published bundle against the pinned identity
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/images-lock-sign.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          mkdir published && cd published
          oras pull "ghcr.io/guardian-intelligence/supply-chain:images.lock-${{ steps.sign.outputs.lockhash }}"
          cosign verify-blob --bundle images.lock.sigbundle \
            --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" \
            --trusted-root ../src/infrastructure/bootstrap/bundle/sigstore-trusted-root.json \
            ../images.lock.union
