# Signs src/infrastructure/bootstrap/bundle/images.lock on every main push
# that changes it, and publishes the signature bundle to ghcr keyed by the
# lock's own sha256. The dark-uplink haul is derived from the lock and every
# blob in it is digest-addressed, so a verified lock plus offline digest
# verification of the haul covers the whole bundle — no key infrastructure.
# The sign-blob bundle JSON embeds the Fulcio certificate and Rekor proof, so
# verification works offline given the pinned Sigstore trusted root and the
# canonical identity recorded in docs/supply-chain-design.md.
#
# In addition to the plain signature (proves "CI produced these exact
# bytes"), this workflow also attests a small predicate over the lock's
# shape (proves "this commit, this section-shape") via stock `cosign
# attest-blob` — no custom DSSE/signing code, keyless OIDC only, same
# identity and trusted root as the signature. See docs/images-lock-spec.md
# ("Provenance") for the full field list and verification commands.
name: images-lock-sign

on:
  push:
    branches: [main]
    paths:
      - "src/infrastructure/bootstrap/bundle/images.lock"
      - ".github/workflows/images-lock-sign.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  sign:
    runs-on: ubuntu-latest
    # workflow_dispatch is allowed only where it is equivalent to a main push:
    # signing reviewed history is fine, signing arbitrary branches is not.
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1

      - uses: oras-project/setup-oras@38de303aac69abb66f3e6255b7198bff35f323e3 # v2.0.0

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # oras push (not cosign upload blob) so the layer carries the filename
      # title annotation — `oras pull` in the bundle task fetches it by name.
      # One tag only, keyed by the lock's sha256: a floating "latest" tag has
      # no consumer and would race concurrent pushes.
      - name: Sign images.lock and publish the signature bundle
        id: sign
        run: |
          lock=src/infrastructure/bootstrap/bundle/images.lock
          lockhash="$(sha256sum "$lock" | cut -d' ' -f1)"
          # --new-bundle-format: the protobuf sigstore bundle is the only
          # format cosign accepts with --trusted-root, i.e. the only one
          # verifiable offline at dark bring-up.
          cosign sign-blob --yes --new-bundle-format --bundle images.lock.sigbundle "$lock"
          oras push "ghcr.io/guardian-intelligence/supply-chain:images.lock-${lockhash}" \
            images.lock.sigbundle:application/json
          echo "signed lock sha256:${lockhash}"
          echo "lockhash=$lockhash" >> "$GITHUB_OUTPUT"

      # The predicate is a small flat JSON object (gitCommit, lockSha256,
      # sectionCounts, totalEntries) generated by a hermetic Go tool so the
      # counting logic is unit-tested and shared with nothing ad hoc in
      # bash — see src/infrastructure/cmd/images_lock_attest.
      - name: Build the images.lock closure predicate
        id: predicate
        run: |
          lock=src/infrastructure/bootstrap/bundle/images.lock
          bazelisk run //src/infrastructure/cmd/images_lock_attest -- \
            --lock "$PWD/$lock" \
            --git-commit "${{ github.sha }}" \
            --lock-sha256 "${{ steps.sign.outputs.lockhash }}" \
            > images.lock.predicate.json
          cat images.lock.predicate.json

      # Same pinned identity, same trusted root, same --new-bundle-format
      # requirement as the sign-blob step above — this is additive
      # provenance over the same signing operation, not a second trust
      # chain. No new secrets or permissions beyond what this job already
      # has. Tagged with an "-attestation" suffix so it never races or
      # overwrites the plain signature bundle published above.
      - name: Attest images.lock closure
        run: |
          cosign attest-blob --yes --new-bundle-format \
            --predicate images.lock.predicate.json \
            --type https://guardianintelligence.org/attestations/images-lock/v1 \
            --bundle images.lock.attestation.sigbundle \
            src/infrastructure/bootstrap/bundle/images.lock
          oras push "ghcr.io/guardian-intelligence/supply-chain:images.lock-${{ steps.sign.outputs.lockhash }}-attestation" \
            images.lock.attestation.sigbundle:application/json

      # Verify what ghcr actually serves, not the local file — a corrupted
      # or partial push must fail here, not at the next drive build. Uses the
      # repo-pinned trusted root so every signing run rehearses the exact
      # offline verification from the cold-boot runbook's step 0.
      - name: Verify the published bundle against the pinned identity
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/images-lock-sign.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          mkdir published && cd published
          oras pull "ghcr.io/guardian-intelligence/supply-chain:images.lock-${{ steps.sign.outputs.lockhash }}"
          cosign verify-blob --bundle images.lock.sigbundle \
            --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" \
            --trusted-root ../src/infrastructure/bootstrap/bundle/sigstore-trusted-root.json \
            ../src/infrastructure/bootstrap/bundle/images.lock

          oras pull "ghcr.io/guardian-intelligence/supply-chain:images.lock-${{ steps.sign.outputs.lockhash }}-attestation"
          cosign verify-blob-attestation --bundle images.lock.attestation.sigbundle \
            --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" \
            --trusted-root ../src/infrastructure/bootstrap/bundle/sigstore-trusted-root.json \
            --type https://guardianintelligence.org/attestations/images-lock/v1 \
            ../src/infrastructure/bootstrap/bundle/images.lock
