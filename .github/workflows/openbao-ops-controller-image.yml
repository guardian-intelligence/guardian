name: openbao ops controller image

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/openbao-ops-controller-image.yml
      - MODULE.bazel
      - MODULE.bazel.lock
      - src/services/secrets/openbao/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: openbao-ops-controller-image
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - name: Build image and push target
        run: |
          bazelisk build \
            --embed_label="$GITHUB_SHA" \
            //src/services/secrets/openbao/operator:image \
            //src/services/secrets/openbao/operator:push-harbor

      - name: Export expected digest
        run: |
          jq_bin="bazel-bin/src/services/secrets/openbao/operator/push_push-harbor.sh.runfiles/aspect_bazel_lib++toolchains+jq_linux_amd64/jq"
          test -x "$jq_bin"
          digest="$("$jq_bin" -r '.manifests[0].digest' bazel-bin/src/services/secrets/openbao/operator/image/index.json)"
          case "$digest" in
            sha256:*) ;;
            *) echo "unexpected OpenBao ops controller digest: $digest" >&2; exit 1 ;;
          esac
          echo "OPENBAO_OPS_CONTROLLER_DIGEST=$digest" >> "$GITHUB_ENV"

      - name: Authenticate to Harbor
        env:
          GUARDIAN_HARBOR_USERNAME: ${{ secrets.GUARDIAN_HARBOR_USERNAME }}
          GUARDIAN_HARBOR_PASSWORD: ${{ secrets.GUARDIAN_HARBOR_PASSWORD }}
        run: |
          crane="bazel-bin/src/services/secrets/openbao/operator/push_push-harbor.sh.runfiles/rules_oci++oci+oci_crane_linux_amd64/crane"
          test -x "$crane"
          test -n "$GUARDIAN_HARBOR_USERNAME"
          test -n "$GUARDIAN_HARBOR_PASSWORD"
          printf '%s' "$GUARDIAN_HARBOR_PASSWORD" | "$crane" auth login harbor.guardianintelligence.org -u "$GUARDIAN_HARBOR_USERNAME" --password-stdin

      - name: Push image
        run: |
          for attempt in 1 2 3; do
            if bazelisk run \
              --embed_label="$GITHUB_SHA" \
              //src/services/secrets/openbao/operator:push-harbor; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              exit 1
            fi
            sleep "$((attempt * 20))"
          done

      - name: Verify Harbor digest
        run: |
          crane="bazel-bin/src/services/secrets/openbao/operator/push_push-harbor.sh.runfiles/rules_oci++oci+oci_crane_linux_amd64/crane"
          test -x "$crane"
          remote_ref="harbor.guardianintelligence.org/guardian/openbao-ops-controller@${OPENBAO_OPS_CONTROLLER_DIGEST}"
          remote_digest="$("$crane" digest "$remote_ref")"
          test "$remote_digest" = "$OPENBAO_OPS_CONTROLLER_DIGEST"

      - name: Summarize digest
        run: |
          {
            echo "## OpenBao ops controller image"
            echo
            echo "- Repository: \`harbor.guardianintelligence.org/guardian/openbao-ops-controller\`"
            echo "- Tag: \`edge\`"
            echo "- Digest: \`${OPENBAO_OPS_CONTROLLER_DIGEST}\`"
          } >> "$GITHUB_STEP_SUMMARY"
