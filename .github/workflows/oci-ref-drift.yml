# PR-time gate for Flux OCIRepository tag+digest pins: when a PR touches
# infrastructure YAML, verify every pinned tag still resolves to its pinned
# digest upstream. Check-only — it fails with a copy-paste fix, it never
# edits or pushes. The mistake this guards is a human bumping a tag and
# pasting a wrong or stale digest; these pins are rendered inputs to the
# generated union images lock, so the fix is one digest line in the same
# PR, not a follow-up commit.
#
# Deliberately NOT scheduled: Flux pulls by the pinned digest and never
# re-resolves the tag, so upstream re-tagging has no effect on the cluster —
# there is nothing for a standing schedule to protect. And deliberately NOT
# part of build.yml: this step has an external network dependency (ghcr), and
# a registry hiccup must not be able to block PRs that don't touch pins.
# Path-filtered workflows skip rather than fail when unmatched, so this must
# not be added to branch protection's required checks.
name: oci-ref-drift

on:
  pull_request:
    paths:
      - "src/infrastructure/**/*.yaml"
      - ".github/scripts/check-oci-ref-drift.sh"
      - ".github/workflows/oci-ref-drift.yml"
  push:
    branches: [main]
    paths:
      - "src/infrastructure/**/*.yaml"
      - ".github/scripts/check-oci-ref-drift.sh"
      - ".github/workflows/oci-ref-drift.yml"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check OCIRepository pins against upstream
        run: .github/scripts/check-oci-ref-drift.sh "$(pwd)"
