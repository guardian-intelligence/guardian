# Public artifact vending for a fleet-gated aisucks release.
#
# The self-hosted release workflow owns deploy credentials and cuts the
# aisucks/v<N> tag only after prod gates green. This workflow runs on
# GitHub-hosted runners because npm trusted publishing and cosign keyless
# signing both depend on GitHub OIDC and must not run on the fleet runner.
name: public-release

on:
  push:
    tags:
      - "aisucks/v*"
  workflow_dispatch:

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  packages: write

defaults:
  run:
    shell: bash

env:
  OCI_REPOSITORY: ghcr.io/guardian-intelligence/aisucks
  OCI_PUBLISH_TARGET: //src/products/aisucks/services/api:publish_ghcr
  SDK_DIR: src/viteplus-monorepo/packages/aisucks-sdk
  NPM_PUBLISH_ENABLED: ${{ vars.NPM_PUBLISH_ENABLED }}

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-release
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.15.0"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.2"

      - name: Derive release coordinates
        run: |
          set -euo pipefail
          if [[ ! "$GITHUB_REF_NAME" =~ ^aisucks/v[0-9]+$ ]]; then
            echo "public-release only accepts aisucks/v<N> tags; got $GITHUB_REF_NAME" >&2
            exit 1
          fi
          seq="${GITHUB_REF_NAME#aisucks/v}"
          {
            echo "RELEASE_SEQ=$seq"
            echo "OCI_TAG=v$seq"
            echo "OCI_GIT_TAG=git-${GITHUB_SHA::12}"
            echo "NPM_VERSION=0.1.$seq"
          } >> "$GITHUB_ENV"

      - name: Build
        run: bazelisk build //:build

      - name: Push aisucks image to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          printf '%s' "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
          bazelisk run "$OCI_PUBLISH_TARGET" -- --tag "$OCI_TAG" --tag "$OCI_GIT_TAG"
          digest="$(cat bazel-bin/src/products/aisucks/services/api/image.json.sha256)"
          image_ref="$OCI_REPOSITORY@$digest"
          {
            echo "IMAGE_DIGEST=$digest"
            echo "IMAGE_REF=$image_ref"
          } >> "$GITHUB_ENV"
          {
            echo "### OCI"
            echo
            echo "- Image: \`$image_ref\`"
            echo "- Tags: \`$OCI_TAG\`, \`$OCI_GIT_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sign aisucks image
        run: cosign sign --yes "$IMAGE_REF"

      - name: Attach SLSA provenance
        run: |
          set -euo pipefail
          image_sha="${IMAGE_DIGEST#sha256:}"
          cat > slsa-provenance-predicate.json <<JSON
          {
            "buildDefinition": {
              "buildType": "https://github.com/guardian-intelligence/guardian/.github/workflows/public-release.yml",
              "externalParameters": {
                "repository": "https://github.com/${GITHUB_REPOSITORY}",
                "ref": "${GITHUB_REF}",
                "sha": "${GITHUB_SHA}",
                "workflow": "${GITHUB_WORKFLOW_REF}",
                "bazelTarget": "${OCI_PUBLISH_TARGET}"
              },
              "internalParameters": {},
              "resolvedDependencies": [
                {
                  "uri": "git+https://github.com/${GITHUB_REPOSITORY}@${GITHUB_REF}",
                  "digest": {
                    "sha1": "${GITHUB_SHA}"
                  }
                },
                {
                  "uri": "${OCI_REPOSITORY}",
                  "digest": {
                    "sha256": "${image_sha}"
                  }
                }
              ]
            },
            "runDetails": {
              "builder": {
                "id": "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/public-release.yml@${GITHUB_REF}"
              },
              "metadata": {
                "invocationId": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
              }
            }
          }
          JSON
          cosign attest --yes --predicate slsa-provenance-predicate.json --type slsaprovenance "$IMAGE_REF"

      - name: Verify published image evidence
        run: |
          set -euo pipefail
          identity='^https://github.com/guardian-intelligence/guardian/.github/workflows/public-release.yml@refs/tags/aisucks/v[0-9]+$'
          issuer='https://token.actions.githubusercontent.com'
          cosign verify "$IMAGE_REF" \
            --certificate-identity-regexp "$identity" \
            --certificate-oidc-issuer "$issuer" >/tmp/cosign-image.json
          cosign verify-attestation "$IMAGE_REF" \
            --type slsaprovenance \
            --certificate-identity-regexp "$identity" \
            --certificate-oidc-issuer "$issuer" >/tmp/cosign-attestation.json

      - name: Publish SDK to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
        run: |
          set -euo pipefail
          if [[ "${NPM_PUBLISH_ENABLED:-}" != "true" ]]; then
            echo "::notice::Skipping npm publish; set NPM_PUBLISH_ENABLED=true after package bootstrap/trusted publishing is ready."
            {
              echo
              echo "### npm"
              echo
              echo "- Skipped: \`NPM_PUBLISH_ENABLED\` is not \`true\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          cd "$SDK_DIR"
          node --version
          npm --version
          node - <<'NODE'
          const fs = require("node:fs");
          const path = "package.json";
          const pkg = JSON.parse(fs.readFileSync(path, "utf8"));
          pkg.version = process.env.NPM_VERSION;
          fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + "\n");
          NODE
          test -f dist/index.js
          if [[ -n "${NODE_AUTH_TOKEN:-}" ]]; then
            npm publish --access public --provenance
          else
            npm publish --access public
          fi
          {
            echo
            echo "### npm"
            echo
            echo "- Package: \`@guardian-intelligence/aisucks@$NPM_VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"
