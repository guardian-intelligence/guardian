# Companion to every Kargo promotion Stage (company-site's beta/gamma/prod,
# guardian-iam's beta/gamma/prod): a pin-bump PR changes only web.yaml or
# keycloak.yaml -- Kargo's promotion steps cannot edit the plain-text
# images.lock -- so this workflow re-derives the affected lock line(s) from
# the PR's pin, pushes the fix to the PR branch, and arms automerge. This
# has to react to the promotion PR itself, not run at image-build time:
# each product's Stages promote independently and asynchronously (a
# beta-only promotion changes only beta's pin), so the lock must always
# carry every digest any Stage currently references, and the only moment
# that's known for certain is when a given PR actually changes a pin.
# Interim mechanism -- the images.lock derivation tool replaces the sed
# when it lands.
#
# It pushes with the guardian-promotions App token, NOT GITHUB_TOKEN: pushes
# made with GITHUB_TOKEN do not trigger workflows, so the site-gate would
# never run on the synced head and automerge would wait forever. The bot is
# untrusted either way — the site-gate required check and branch protection
# decide whether the PR merges; this workflow only proposes and arms.
name: promotion-lock-sync

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  sync:
    if: github.event.pull_request.user.login == 'guardian-promotions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app
        with:
          app-id: ${{ secrets.PROMOTIONS_APP_ID }}
          private-key: ${{ secrets.PROMOTIONS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app.outputs.token }}

      - name: Sync images.lock to the pinned digest
        id: sync
        run: |
          lock=src/infrastructure/bootstrap/bundle/images.lock

          # Digests accumulate rather than replace: each product's Stages
          # promote independently, so at any moment its own beta/gamma/prod
          # can each reference a different digest, and the lock has to
          # carry all of them (also what keeps a blue/green window, or a
          # Git-revert rollback, mirror-servable). Insert any pin a Stage's
          # manifest references that the lock doesn't already have, next
          # to that image's existing entries.
          sync_pin() {
            local manifest="$1" repo="$2"
            [ -f "$manifest" ] || return 0
            local pin
            pin="$(grep -o "${repo}@sha256:[a-f0-9]\{64\}" "$manifest" | head -1)"
            [ -n "$pin" ] || return 0
            grep -q "^$pin$" "$lock" && return 0
            awk -v pin="$pin" -v repo="$repo" '
              index($0, repo "@sha256:") == 1 && !done { print pin; done=1 }
              { print }
            ' "$lock" > "$lock.tmp" && mv "$lock.tmp" "$lock"
            grep -q "^$pin$" "$lock"
          }

          for manifest in src/infrastructure/deployments/company/beta/web.yaml \
                          src/infrastructure/deployments/company/gamma/web.yaml \
                          src/infrastructure/deployments/company/prod/web.yaml; do
            sync_pin "$manifest" "ghcr.io/guardian-intelligence/company-site"
          done

          for manifest in src/infrastructure/deployments/iam/*/keycloak.yaml; do
            sync_pin "$manifest" "quay.io/keycloak/keycloak"
          done

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push the lock sync
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "guardian-promotions[bot]"
          git config user.email "guardian-promotions[bot]@users.noreply.github.com"
          git commit -am "sync images.lock to the promoted digest"
          git push

      # Only armed once the lock is already in step (the push above triggers
      # a fresh run that lands here). Automerge waits for the required checks
      # on the synced head — the site-gate's provenance verification included.
      - name: Arm automerge
        if: steps.sync.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: gh pr merge --auto --merge "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
