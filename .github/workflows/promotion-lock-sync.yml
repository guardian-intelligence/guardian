# Companion to the company-site (beta/gamma/prod) and guardian-iam
# (beta/gamma/prod) promotion Stages: Kargo's pin-bump PR changes only
# web.yaml/keycloak.yaml (its promotion steps cannot edit the plain-text
# images.lock), so this workflow re-derives the affected lock line(s) from
# the PR's pin, pushes the fix to the PR branch, and arms automerge.
# Interim mechanism — the images.lock derivation tool replaces the sed
# when it lands.
#
# It pushes with the guardian-promotions App token, NOT GITHUB_TOKEN: pushes
# made with GITHUB_TOKEN do not trigger workflows, so the site-gate would
# never run on the synced head and automerge would wait forever. The bot is
# untrusted either way — the site-gate required check and branch protection
# decide whether the PR merges; this workflow only proposes and arms.
name: promotion-lock-sync

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  sync:
    if: github.event.pull_request.user.login == 'guardian-promotions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        id: app
        with:
          app-id: ${{ secrets.PROMOTIONS_APP_ID }}
          private-key: ${{ secrets.PROMOTIONS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ steps.app.outputs.token }}

      - name: Sync images.lock to the pinned digest
        id: sync
        run: |
          lock=src/infrastructure/bootstrap/bundle/images.lock

          # company-site pin-bump PRs (beta/gamma/prod, one Stage each):
          # same accumulate-not-replace model as Keycloak below, for the
          # same reason -- promotion isn't instant/synchronized across
          # stages, so beta/gamma/prod can each be pinned to a DIFFERENT
          # digest at any moment (this is exactly what a beta-only
          # promotion PR looks like: beta's web.yaml changes, gamma/prod's
          # don't). The lock must carry every currently-referenced digest,
          # not just whichever stage this specific PR happens to touch.
          # A single sed-replace against one hardcoded stage file (prod)
          # was correct back when company-site had only one Stage; it
          # silently no-op'd once beta/gamma existed, since a beta-only PR
          # never changes prod's pin.
          for cs_yaml in src/infrastructure/deployments/company/beta/web.yaml \
                         src/infrastructure/deployments/company/gamma/web.yaml \
                         src/infrastructure/deployments/company/prod/web.yaml; do
            [ -f "$cs_yaml" ] || continue
            cs_pin="$(grep -o 'ghcr.io/guardian-intelligence/company-site@sha256:[a-f0-9]\{64\}' "$cs_yaml" | head -1)"
            [ -n "$cs_pin" ] || continue
            if ! grep -q "^$cs_pin$" "$lock"; then
              awk -v pin="$cs_pin" '
                /^ghcr\.io\/guardian-intelligence\/company-site@sha256:/ && !done { print pin; done=1 }
                { print }
              ' "$lock" > "$lock.tmp" && mv "$lock.tmp" "$lock"
              grep -q "^$cs_pin$" "$lock"
            fi
          done

          # Keycloak pin-bump PRs (guardian-iam pipeline): upstream digests
          # accumulate rather than replace — the lock deliberately carries
          # both the running and the incoming digest so the blue/green
          # window (and a Git-revert rollback) stay mirror-servable. Insert
          # any pinned digest the lock does not know yet next to its section.
          for kc_yaml in src/infrastructure/deployments/iam/*/keycloak.yaml; do
            [ -f "$kc_yaml" ] || continue
            kc_pin="$(grep -o 'quay.io/keycloak/keycloak@sha256:[a-f0-9]\{64\}' "$kc_yaml" | head -1)"
            [ -n "$kc_pin" ] || continue
            if ! grep -q "^$kc_pin$" "$lock"; then
              awk -v pin="$kc_pin" '
                /^quay\.io\/keycloak\/keycloak@sha256:/ && !done { print pin; done=1 }
                { print }
              ' "$lock" > "$lock.tmp" && mv "$lock.tmp" "$lock"
              grep -q "^$kc_pin$" "$lock"
            fi
          done

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push the lock sync
        if: steps.sync.outputs.changed == 'true'
        run: |
          git config user.name "guardian-promotions[bot]"
          git config user.email "guardian-promotions[bot]@users.noreply.github.com"
          git commit -am "sync images.lock to the promoted digest"
          git push

      # Only armed once the lock is already in step (the push above triggers
      # a fresh run that lands here). Automerge waits for the required checks
      # on the synced head — the site-gate's provenance verification included.
      - name: Arm automerge
        if: steps.sync.outputs.changed == 'false'
        env:
          GH_TOKEN: ${{ steps.app.outputs.token }}
        run: gh pr merge --auto --merge "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
