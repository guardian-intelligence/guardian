# The postflight-controlplane-gate: PR check + main-push publisher for the
# postflight runner control plane, mirroring the alert-relay-gate's trust model
# (see alert-relay-image.yml and docs/supply-chain-design.md). This file's
# path is the cosign trust anchor for
# ghcr.io/guardian-intelligence/postflight-controlplane — a separate workflow,
# never a shared one, because certificate identities are per-workflow-file.
name: postflight-controlplane-image

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    # The deployment pin file is deliberately NOT a build trigger: pin-only
    # promotion merges change no build input (see site-gate rationale).
    paths:
      - "src/services/postflight/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/postflight-controlplane-image.yml"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - ".bazelrc"
      - ".bazelversion"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: postflight-controlplane-gate-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  postflight-controlplane-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Classify the diff
        id: classify
        run: |
          # The pin file does not exist until the deployment PR lands; an
          # absent file greps to empty on both sides, so pin stays false.
          pin_file=src/infrastructure/deployments/postflight-runner/controlplane.yaml
          pin_re='ghcr.io/guardian-intelligence/postflight-controlplane@sha256:[a-f0-9]\{64\}'
          build=false pin=false
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="origin/$GITHUB_BASE_REF"
            while IFS= read -r f; do
              case "$f" in
                src/services/postflight/*|go.mod|go.sum|.github/workflows/postflight-controlplane-image.yml|MODULE.bazel|MODULE.bazel.lock|.bazelrc|.bazelversion)
                  build=true ;;
              esac
            done < <(git diff --name-only "$base"...HEAD)
            pinned="$(grep -o "$pin_re" "$pin_file" 2>/dev/null | cut -d@ -f2 || true)"
            base_pinned="$(git show "$base:$pin_file" 2>/dev/null | grep -o "$pin_re" | cut -d@ -f2 || true)"
            if [[ "$pinned" != "$base_pinned" ]]; then pin=true; fi
          else
            build=true
          fi
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "pin=$pin" >> "$GITHUB_OUTPUT"
          echo "classified: build=$build pin=$pin"

      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        if: steps.classify.outputs.pin == 'true' || github.event_name == 'push'

      # Promotion gate: a PR may move the controlplane pin only to a digest
      # signed by THIS workflow's canonical identity.
      - name: Verify the changed pin is canonically signed
        if: steps.classify.outputs.pin == 'true' && github.event_name == 'pull_request'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/postflight-controlplane-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          pinned="$(grep -o 'ghcr.io/guardian-intelligence/postflight-controlplane@sha256:[a-f0-9]\{64\}' \
            src/infrastructure/deployments/postflight-runner/controlplane.yaml | cut -d@ -f2)"
          echo "verifying provenance of $pinned"
          cosign verify --certificate-identity "$IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "ghcr.io/guardian-intelligence/postflight-controlplane@$pinned" > /dev/null

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0
        if: steps.classify.outputs.build == 'true'

      - name: Service tests
        if: steps.classify.outputs.build == 'true'
        run: bazelisk test //src/services/postflight/...

      - name: Build image
        if: steps.classify.outputs.build == 'true'
        run: bazelisk build //src/services/postflight/controlplane:image

      - name: Compute built digest
        if: steps.classify.outputs.build == 'true'
        id: digest
        run: |
          built="$(jq -r '.manifests[0].digest' bazel-bin/src/services/postflight/controlplane/image/index.json)"
          echo "built: $built"
          echo "digest=$built" >> "$GITHUB_OUTPUT"

      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        if: steps.classify.outputs.build == 'true'
        id: syft

      - name: Generate SBOM (SPDX)
        if: steps.classify.outputs.build == 'true'
        run: |
          "${{ steps.syft.outputs.cmd }}" scan \
            oci-dir:bazel-bin/src/services/postflight/controlplane/image \
            -o spdx-json=sbom.spdx.json
          test -s sbom.spdx.json

      - name: Log in to ghcr.io
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: bazelisk run //src/services/postflight/controlplane:push

      - name: Sign image (keyless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cosign sign --yes "ghcr.io/guardian-intelligence/postflight-controlplane@${{ steps.digest.outputs.digest }}"

      - name: Attach SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cosign attest --yes --type spdxjson --predicate sbom.spdx.json \
            "ghcr.io/guardian-intelligence/postflight-controlplane@${{ steps.digest.outputs.digest }}"

      - name: Verify signature and SBOM attestation
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IDENTITY: https://github.com/guardian-intelligence/guardian/.github/workflows/postflight-controlplane-image.yml@refs/heads/main
          ISSUER: https://token.actions.githubusercontent.com
        run: |
          img="ghcr.io/guardian-intelligence/postflight-controlplane@${{ steps.digest.outputs.digest }}"
          cosign verify --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
          cosign verify-attestation --type spdxjson \
            --certificate-identity "$IDENTITY" --certificate-oidc-issuer "$ISSUER" "$img" > /dev/null
