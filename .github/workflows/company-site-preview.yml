# Vercel-style preview deploys for company-site. On every push to a PR that
# touches the site: build the image, push it to ghcr.io by digest (no tag),
# render per-PR manifests onto the `previews` orchestration branch, register a
# GitHub deployment (transient environment pr-<N> — this is what populates the
# PR's deployment card and the branch's deployments panel), wait for Flux +
# external-dns to converge, then flip the deployment to success/failure and pin
# a sticky comment with the URL. Teardown on close lives in
# company-site-preview-teardown.yml; the static cluster half is documented in
# src/infrastructure/deployments/company/previews.
#
# Kargo deliberately does NOT drive previews: its Stages are long-lived CRs
# with no ephemeral-per-PR primitive and no deployments-API awareness — it
# promotes merged work to prod, and that's the whole of its job.
name: company-site-preview

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "src/products/company/**"
      - "src/viteplus-monorepo/**"
      - ".github/workflows/company-site-preview.yml"
      - ".github/scripts/company-site-preview.sh"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"

# One preview pipeline per PR; a new push supersedes the in-flight run.
concurrency:
  group: company-site-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  preview:
    # Fork PRs get no preview: the job pushes to ghcr and to the previews
    # branch, which is deploy access — same-repo PRs only.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write # push rendered manifests to the previews branch
      packages: write # push the preview image digest to ghcr.io
      pull-requests: write # sticky preview comment
      deployments: write # register the pr-<N> transient environment
    env:
      PR: ${{ github.event.pull_request.number }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      HOST: pr-${{ github.event.pull_request.number }}.guardianintelligence.org
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: bazelbuild/setup-bazelisk@b39c379c82683a5f25d34f0d062761f62693e0b2 # v3.0.0

      - name: Build image
        run: bazelisk build //src/products/company/site:image

      - name: Read built digest
        id: digest
        run: |
          digest="$(jq -r '.manifests[0].digest' bazel-bin/src/products/company/web/image/index.json)"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
          echo "built $digest"

      - name: Log in to ghcr.io
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push image (digest only)
        run: bazelisk run //src/products/company/site:push_preview

      - name: Check out previews branch
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: previews
          path: .previews

      - name: Render preview manifests and push to previews branch
        env:
          DIGEST: ${{ steps.digest.outputs.digest }}
        run: |
          .github/scripts/company-site-preview.sh render .previews "$PR" "$DIGEST" "$HEAD_SHA"
          cd .previews
          git config user.name "company-site-preview[bot]"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "previews branch already current"
            exit 0
          fi
          git commit -m "preview: pr-${PR} @ ${HEAD_SHA}"
          # Serialize against concurrent preview pipelines for other PRs.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:previews; then exit 0; fi
            echo "push rejected (attempt ${attempt}), rebasing"
            git fetch origin previews
            git rebase origin/previews
          done
          echo "::error::could not push to previews branch after 5 attempts" >&2
          exit 1

      - name: Register GitHub deployment
        id: deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # required_contexts:[] — the deployment must not gate on this PR's
          # own in-flight checks; the environment IS how we report state.
          payload="$(jq -n --arg ref "$HEAD_SHA" --arg env "pr-${PR}" \
            '{ref:$ref, environment:$env, transient_environment:true, auto_merge:false,
              required_contexts:[], description:"company-site preview"}')"
          id="$(gh api "repos/${GITHUB_REPOSITORY}/deployments" --input - --jq '.id' <<< "$payload")"
          echo "id=$id" >> "$GITHUB_OUTPUT"
          gh api "repos/${GITHUB_REPOSITORY}/deployments/${id}/statuses" \
            -f state=in_progress -f environment_url="https://${HOST}" \
            -f description="pushed to previews branch; waiting for Flux + DNS + TLS" > /dev/null
          echo "deployment ${id} registered for pr-${PR}"

      - name: Wait for preview to serve this commit
        id: converge
        continue-on-error: true
        run: |
          echo "polling https://${HOST} for guardian:commit-sha == ${HEAD_SHA}"
          # Tight on purpose: measured convergence is ~1m (pr-354's ReplicaSet
          # appeared 13s after the manifest push, image already node-cached),
          # so past 6m something is wrong and should say so loudly, not grind.
          # Resolve via 1.1.1.1 (fresh records; the runner's stub resolver
          # negative-caches pre-creation NXDOMAINs) and log status + title per
          # probe: the pr-354 poll printed "nothing yet" for its whole window
          # WHILE the pod was serving — a runner-only blindness that smells
          # like Cloudflare challenging datacenter IPs, which curl -f would
          # swallow silently. No -f: we want to SEE the 403/challenge.
          deadline=$((SECONDS + 360))
          while [ $SECONDS -lt $deadline ]; do
            ip="$(dig +short @1.1.1.1 A "$HOST" 2>/dev/null | grep -E '^[0-9.]+$' | head -1)"
            resolve=()
            [ -n "$ip" ] && resolve=(--resolve "${HOST}:443:${ip}")
            resp="$(curl -sSL --max-time 10 "${resolve[@]}" -w $'\n%{http_code}' "https://${HOST}/" 2>/dev/null || true)"
            code="${resp##*$'\n'}"
            body="${resp%$'\n'*}"
            served="$(grep -o 'name="guardian:commit-sha" content="[a-f0-9]*"' <<< "$body" \
              | grep -o '[a-f0-9]\{40\}' || true)"
            if [ "$served" = "$HEAD_SHA" ]; then
              echo "live: https://${HOST}"
              echo "status=live" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            title="$(grep -o '<title>[^<]*' <<< "$body" | head -1 | cut -c8-70 || true)"
            echo "$(date -u +%T) …serving '${served:-nothing}' http=${code:-none} title='${title:-}' via ${ip:-system-dns} ($((deadline - SECONDS))s left)"
            sleep 10
          done
          echo "status=pending" >> "$GITHUB_OUTPUT"
          echo "::warning::preview did not converge within 6m — check the http/title probe lines above: 403s or challenge titles mean Cloudflare is blocking the runner, not a broken preview"
          exit 1

      - name: Report deployment state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS: ${{ steps.converge.outputs.status || 'pending' }}
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.id }}
        run: |
          if [ "$STATUS" = "live" ]; then
            state=success
            desc="serving ${HEAD_SHA}"
          else
            state=failure
            desc="did not converge within 6m — check Flux, external-dns, or the previews branch"
          fi
          # A success auto-inactivates this environment's older deployments.
          gh api "repos/${GITHUB_REPOSITORY}/deployments/${DEPLOYMENT_ID}/statuses" \
            -f state="$state" -f environment_url="https://${HOST}" \
            -f description="$desc" > /dev/null
          echo "deployment ${DEPLOYMENT_ID}: ${state}"

      - name: Post sticky preview comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS: ${{ steps.converge.outputs.status || 'pending' }}
        run: |
          marker="<!-- company-site-preview -->"
          body="$(printf '%s\nPreview URL: https://%s' "$marker" "$HOST")"
          if [ "$STATUS" != "live" ]; then
            body="$body"$'\n\n'"_(publishing — not serving this commit yet)_"
          fi
          existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -1)"
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${existing}" -f body="$body" > /dev/null
          else
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR}/comments" -f body="$body" > /dev/null
          fi
